悅衆云展具頂禮和尚禮畢云末後先行侍者二人捧單票前行拂子拄杖隨後進堂住持禮佛登座維那舉贊時到座前拈香三瓣展大具三拜起具歸位至三稱雲來集菩薩畢維那云頂禮和尚衆展具三禮已二悅衆次第鳴引磬三陳住持說法說竟衆齊立班首單條住持貼貼竟維那云大衆師禮謝和尚住持出堂維那復云大衆師送和尚若免即止餘者維那貼兩序以執大小為次序同執以戒先後為次序堂中各照自己名位次序安行李送單晚課畢上方丈謝貼單小食後告香見前住持章中證義曰按梵網經乖尊卑次序戒及律藏臥具法等俱明位次蓋兩序論執同一執論戒是佛正制今叢林安單不問戒不問臘於一執中先來在前後來在後似是而非違佛敕先受戒者在前坐後受戒者在後坐之律結冬十月十五日結冬乃衲子九旬辦道之期也內外肅嚴內不放出外不放入屏除一切專精辦道於早課前燒香傳爐大衆雲集維那舉贊住持拈香祝聖祈禱乃至上方丈住持說法等並照元旦式其所別者此日晚課畢上祖堂上方丈維那鳴引磬巡寮云結制巡寮問訊某某師云云巡畢回堂對面展具三拜拜畢歸位少頃齊堂吃普茶將訖維那宣共住規約晚二板本堂宣堂規是晚起禪七證義曰孟冬結制正為生死若不打掃心地明白只管看鼻頭做模樣有甚用處人看你似參禪及至打開肚裡黑漫漫地可憐生不知禪是個甚麼只管要你去扭揑他你若肯將偷心頓然放下到有幾分相應古人云做工夫不得力病在多知多解穿鑿公案習氣膠粘打脫不下所以不得洞明佛性若真正為生死的人無雜用心一個話頭如咬鐵丸相似定要嚼碎嚼不碎拚命嚼寧將身心墮地獄終不放捨話頭具如是信力如是疑情日深歲久正眼迸開光明普照物物頭頭了無差別矣或曰從上諸祖多以機用接人今何授人以死話頭死工夫答曰噫是何言歟夫參話頭之法自黃蘗肇端諸師遵承而大慧尤主張之大慧中興濟北之道豈其機用弗具而開示來學以一句話頭塞其咽喉消其伎倆然後顯大機大用激䇿精進而獲證者四十餘人蓋師家機用學者工夫必兩相宜而有成也若不䇿進其工夫唯機用接人則上根利機當下知歸能有幾人中下之流永失法利而掠虗者乘風接響達磨一宗掃地盡矣夫達磨西來九年面壁可謂壁立萬仞乃其接引神光亦用方便語曰汝但外息諸緣內心無喘心如墻壁方可入道此即死工夫之說也蓋工夫不死情識橫生非逐名利即膠知解雖有機用將安施乎故今請安禪結制者看一個死話頭為正務幸無以機用公案雜用心也然所謂看死話頭者正為用工在話頭上名看死話頭非兀然空坐觀靜也禪宗祕要云西域崛多法師遊五臺至定襄縣見一僧結菴而坐法師問曰汝孤坐奚為曰觀靜師曰汝出誰門耶曰神秀大師法師曰我西域異道最下根者不墮此見兀然空坐於道何益起禪七不拘何時可起七不專在十月望日凡起禪七前一日維那悅衆同到庫房商酌一切應用等物及請護七酌派已聽悅衆料理其看香監香候方丈示牌起七日午飯後開小靜維那云今晚起七上單養息晚課持具上殿課畢鳴鐘禮祖上方丈住持說法開示畢維那云禮謝和尚禮畢鳴引磬云起七巡寮問訊某某師云云巡畢回堂安息至晚二板前維那鳴香板三陳令香燈護七各理本務次於齊堂前鳴香板三陳令各堂寮共集禪堂衆坐齊次看香鳴二板吃茶茶畢維那表堂規云云表畢維那令悅衆捧香板維那送監香板畢鳴香板三下衆皆起立護七師收地上坐位維那云諸同參師作禮首座師西堂師後堂師堂主師香燈師護七師司水師三拜首座繼云拜維那師禮畢令監香師行禮次呼寄七師禮佛拜兩序凡本山法眷及遠近菴院來寄七者即進堂附後若居士寄七仍安單在外凡寄七者二例隨衆期滿方許出堂尼女不許進堂或尊客或施主隨喜坐香不在此例但不可放逸耳拜畢悅衆鳴引磬一對燈籠迎請和尚若住持傳牌即依牌請班首到維那云兩序同參師頂禮某某大師禮畢說法起七二枝香小點心四枝香齊堂用普放參或飯或麵隨便仍厨房人燒煮護七人照應六枝香清茶八枝香每人炒糯米一杯十枝香養息養息一枝香打巡照四板淨面各歸位坐飲糖湯每人糖餅一個聞厨下接板即經行二三悅衆輪流上殿應酬課誦大殿繞佛打抽解課完熄燈聞早粥梆開靜小粥後二枝香開小靜用米糕四塊午飯止靜青果茶四枝香點心六枝香聞晚梆晚課完開靜遇堂回堂行香云云上單養息晚起香二板腐乾一塊一夜一日如是以後六日亦然若期內施主有零星小食供衆隨時散之至圓滿時悅衆仍領二清衆上方丈請住持考功解七或請班首代考解凡禪七師家考功唯提本參學人請益單問話頭不許亂統公案凡站香香站大半枝站須雙足並齊不得八字參差雙手垂下不許叉手行忌袖手坐忌垂足凡禪七乃刻期取證了辦生死之日專以參究為事首衆不得多語有妨正務過堂起香放香站香維那俱鳴香板三下凡香板式巡香板長二尺唯打昏沉監香板長一尺八寸兼帶掉舉班首䇿香專看工夫住持看香唯是直下會取而已故巡香須是兩手捧持不許一手垂下監香一手擎一手垂不得將香板拖下應作供養想班首則上下不拘不論昏沉掉舉盡皆可打又看香板長二尺二寸散香竹篦長三尺六寸證義曰叢林長年坐香參禪何為又有禪七蓋欲尅期成辦之意耳學者於此時當猛著精彩較平日當加倍用心參究參究者即參此一箇話頭也參話頭不外起疑情所謂小疑小悟大疑大悟不疑不悟疑即參也夫疑之之念固為覺體之障而因其勢而善用之則反可假之以為破障之術蓋以疑之與悟其機相待其勢相因故求悟者必貴疑也夫人心之機不凝結必不能開豁如隆冬閉塞實釀泰元若氣泄而不完則其發生也必無力故貴疑者疑則凝結也法界之源不深研必不能遠到故凡疑者必深研也是知疑為悟因悟為疑果殆若暗必有明吸必有呼矣可無疑乎可無疑乎至於由疑而悟則悟且不存疑於何有而鍊磨之功成矣解禪七或一七或二七三七圓滿已方丈傳牌至維那白衆云云白畢鳴引磬奉和尚命請某某大師為衆解七三拜畢說法解七竟維那白云多日辛苦兩序同參師禮謝首座師云云乃至護七師司水師禮三拜洗腳安息晚課畢鳴鐘禮祖上方丈禮畢巡寮云解七巡寮問訊某某師云云乃至巡畢回堂餘儀如常寄七回本處證義曰所謂解七者但解幾七之期非解參禪也或曰參禪之義已聞命矣然未知參禪之事起於何時答曰楞嚴經云當在此中精研妙明又曰內外研究又曰研究深遠又曰研究精猛非參乎其中七處徵心八還辨見飛光舉拳垂手作喝等皆示疑也自後凡教看公案起疑情皆從此生其餘如華嚴經之梵行品楞伽圓覺等經皆有禪也至於言之最詳明者莫若鵝湖大義禪師云若人靜坐不用工何年及第悟心空又云直須提起吹毛利要剖西來第一義又云剔起眼睛豎起眉反覆看渠渠是誰如是等言參禪人當書諸紳雖然若向語句中推測穿鑿情識上卜度博量則又錯會其曰用功曰剖曰反覆看之意矣則與靜坐默默者事不同而其病同矣亦不可不辨要而言之禪宗門下無意識領略底禪無逐假商量底禪亦無漸次習得底禪所以要汝拍盲做將去不許胡思亂想妄生知解若信得過便如是參究不必問東問西蓋大事未明盡千七百孰非可疑只要在一則上拚命拶去若一則過得百千則無不過得也勉之解冬正月十五日解冬佛聖前焚香燭是晚薰塔早課祈禱乃至升座與元旦同說法畢維那鳴引磬巡寮云解制巡寮問訊某某師云云巡畢回堂行禮上供等事仍照朔望例若告假者至晚課畢搭衣持具先白維那已悅衆領到客堂告假次領上方丈排班候住持臨座各展具頂禮和尚三拜起具問訊合掌白云某甲告假住持𠃔假回堂晚二板後方丈令侍者到禪堂白維那云請告假諸師用茶仍悅衆陪上吃茶回堂止靜前行禮禮圓仍照位坐不得閒談雜話次日早小食方丈請齊還香信回堂起單若未到期去方丈不待齊香信亦不還行李不出堂到期取行李若私走者客堂掛逃單牌牌云今日某時某執某甲私自逃單證義曰佛制從正月十五至三月十五是解冬行腳之期從八月十五至十月十五是解夏行腳之期今禪和多有終年行腳者殊違佛制即安居結制者亦多虗應故事少有實在行持雲棲解冬頌曰庭前𪹼竹聲初歇又是上元告假節彈指流光去不停衲衣下事何時決細尋思堪痛切各各者回須猛烈提起陳年舊話頭直教打破疑團徹月分須知前八卷詳明者皆刪出不録正月元旦預日掛牌牌云明日恭逢元旦新節合院大衆師聞鐘聲齊詣大殿禮誦祝釐三日伏願皇圖永固帝道遐昌佛日增輝法輪常轉元旦較平日早一炷香打三板厨房人於監齊聖前掃灑潔淨擺香案庫司設供客堂維那等十人燒香傳爐至舉香贊住持拈香拜畢監院拈香設供獻茶化紙回堂候開靜上殿衆集燒香傳爐至維那舉寶鼎爇名香祈禱祝聖並與首卷祝𨤲條同至念楞嚴呪時悅衆領監院同十餘人出殿至四聖前次第祈禱初至韋殿左右分立二悅衆鳴引磬先誦善天女呪三遍監院問訊拈香轉出檻外長跪大悅衆亦問訊拈香展具三拜長跪隨舉南無護法韋䭾尊天菩薩三稱畢此稱鳴鐺鈸鈴鼓下皆同此但換聖號大悅衆白云神功叵測云云次伽藍次祖師次監齊儀皆同但改祈禱念誦並載禪門日誦中茲不録祝四聖畢回大殿隨衆繞佛乃至歸位大衆向上展具已鳴磬止佛聲維那押磬舉腔拜南無本師釋迦牟尼佛十二拜南無文殊師利菩薩南無彌勒菩薩南無十方諸佛南無十方菩薩各三拜已不念回向文即三歸竟維那高聲云無勞起具鳴磬云頂禮西天東土歷代祖師三拜天下宏宗演教諸大善知識三拜本寺開山老祖三拜以下續禮本枝一派歷代祖師各人得戒和尚及壇上諸師三拜各人剃度恩師三拜各人代為父母禮佛三拜頂禮方丈和尚三拜拜畢對面展具維那按磬白云皇清某某幾年幾月某某良辰大衆師雲集普禮三拜至第三拜云無勞起具即俯伏偈云某某師三拜云云內外執事俱照執事單次第喝禮畢云再禮方丈和尚三拜起具問訊雲集祖堂禮祖禮畢上方丈次序對面站定維那與侍者請住持出臨座衆向上排班維那云展具頂禮和尚禮畢呼起具問訊分班對立舉贊乃至說法竟維那呼展具頂禮和尚已上每月朔望及諸節日同此唯元旦住持即云大衆師同詣大殿前普禮衆集展具住持云我某甲與大衆師賀新節普禮三拜首衆繼云頂禮和尚禮畢回堂兩單對拜一切內外不許行私禮唯除師長結冬解冬結夏解夏立春等皆如是元旦天明照客到庫房取喜神紙知客命鐘頭鳴鐘三下知客焚香一把在手立彌勒前分與大衆師人各執香一枝出山門次序到喜神方舉香舉已插地上鳴引磬三下三問訊化紙元即化於插香處次序各歸本處早晨齊堂饅頭腐湯或年糕或糰子或麵俱可三板止靜後即啓請上堂見住持章上堂畢殿主於殿傍設各人同居父母師長及十方檀那護法等供位或除夕日先設亦可及果菜香燭俱陳列已小食二板茶後即止靜鳴鐘三下大衆分班上普供供畢回堂宜先派定班數處所可預讀普供贊附末少頃飲茶抽解已再鳴鐘三下衆集大殿誦呪念佛每日六時或四時至初三日早小食止靜後大衆聞鐘聲照原班上普供午飯後念佛回向化牌位凡新年除夕不放假禪堂不請茶日午油腐白米早晚白腐常米晚課畢禮祖上方丈已行堂師到禪堂監值寮問當值取茶鐘茶壺晚二板聞鼓聲大衆齊至齊堂悅衆二人鳴引磬請和尚至行堂將茶次第斟齊茶果二人合一桌擺齊已或每人一碗亦可悅衆鳴引磬二下監院即云和尚請茶大衆師請茶少頃監院又云和尚請用果品大衆師請用果品普茶畢免宣規約悅衆鳴引磬二下齊起各回三板止靜上殿念普佛回堂已禪堂放香至初三日止仍照常行坐禮塔掃塔見第三卷住持監院知客當分往熟處賀新歲凡初十內或諸山遣執或施護遣使來賀者待以六色茶菜初十外四菜飯不用茶果凡元旦小年除夕入院等事客堂於早粥掛牌牌云大衆師聞鐘聲照派名處上普供知客與維那將衆師分作幾班每班幾處分派各處上供人數定開單實貼齊堂知會或早或小食鳴二板即鳴鐘三下三板止靜開小靜搭衣持具齊集大殿上供已隨依派分班各處上供一班住持拈香一班監院拈香其餘或都監或副寺或諸班首皆可代拈香上供畢各回本處凡供菜煮熟得味不填底果用三乾兩水俱要潔淨供畢即收唯供花香淨水蓋佛聖過午不食常供不收乃俗人嚴飾非僧所宜甚違佛制初九帝釋尊天誕即玉帝也證義曰普供世間諸聖凡者一正覺世間佛菩薩等四聖也二有情世間天人修羅等六凡也三器世開三界依報中司地水火風等諸類神祇也今供四聖中如彌陀彌勒文殊普賢觀音勢至準提地藏及達磨百丈天台賢首南山遠公乃至齊堂田園土地等皆前八卷已出者茲不重録凡上四聖供不用紙元用則反不敬上六凡供須用紙元又門神廁神田園神等須用紙元內唯圊房廁神但供食物紙元等而不念誦至於父母師長鬼神上供須念誦用冥錠此之三例幸勿混濫也附各堂結贊除上普供外亦可隨宜所用禪堂大乘了義當體全空見聞知覺即空中示跡顯金容精進加功撒手脫樊籠南無毗盧遮那佛觀音菩薩圓通教主常住洛伽隨緣赴感總無差火宅救迷邪楊枝露灑一滴遍天涯南無觀世音菩薩藏經樓諸佛海會圓應大千慈悲愍念濟人天聖教義幽元三藏宏宣解行證金仙禪悅藏華嚴閣華嚴海會舍那如來蓮花藏海坐花臺諸佛歎奇哉萬象昭回幽暗一時開華嚴海會佛菩薩戒壇千華臺上舍那慈尊各還本界濟沉淪心地戒為因千億佛身一曲和陽春南無盧舍那佛藥師殿藥師佛延壽王光臨水月壇場悲心救苦降禎祥免難消灾障懺悔檀那三世罪願祈福壽綿長吉星高照沐恩光如意永安康消灾延壽藥師佛藥師塔燈讚禮東方滿月世界琉璃妙境非常焰網輝煌因中誓顯昭彰藥師佛大展祥光滅除衆生灾障降吉祥現前衆等歌揚福壽無疆現前衆等稱揚福壽無疆南無藥師琉璃光如來大悲樓慈威等濟同體大悲通身手眼現千支演說陀羅尼諸佛歎奇功德妙難思大悲觀世音羅漢九天漏盡果證無生供受人天赴感誠錫福降祥禎虎伏龍迎萬古聳聲名阿羅漢尊者東羅漢梵行具足了解真空正定遊戲現神通克振佛家風聞者歸崇利濟永無終阿羅漢尊者西懺堂志公鳥巢應跡梁代尊師曾於寶華現威儀山號寶公基法化難思萬古懺摩依度人師普菴祖師普菴靈應大德名稱天龍八部永隨身地境悉和平妙法欽聞善果植升恆度人師出生臺前大鵬金翅鬼子母天息惡歸拜世尊前受戒護心源誓願宏堅分向曠野邊生天界米房倉神庫房財神資緣進道五正食先檀那無吝破其慳信敬植福田布施涓涓感應仰龍天護法藏關帝殿忠心報國勇猛丈夫呵護佛法外魔除僧衆永安居進道無虞萬古作金堤護法藏三官殿三官大帝功德難量雲臺山上放毫光賜福降禎祥赦罪除殃解厄保安康護法藏天王殿持國增長廣目多聞匡扶國界定安寧法苑作金城擁護僧倫道化永遠行護法藏山門門神報居器界司戶尊神願護僧垣保安寧承佛大威靈驅邪逐溷灾障永無侵護法藏同居人各父母師長位前叢林寶社六和同居父母師恩時憶知仗憑覺王慈勉力修持法食平等施生天界放生所胎卵濕化多劫沉迷歸依三寶發菩提籠網永出離海躍天飛盡報生忉利生天界證義曰普供諸家增減不同然要以誠敬為本今之叢林雖依例供獻多草率從事或用生冷不可食物但了人事而已不思供禮從心生禮節苟簡其心可知心既不誠何勞供獻如是供獻是將誰欺是直以禮為戲也其獲咎甚矣普願天下緇素共反此習正月建寅曰攝提格又曰太簇又曰孟陬又十一月冬至一陽生乃至四月名六陽今正月名三陽月也二月初一日封止火爐或山寺寒冷無拘二月建卯曰單閼又曰夾鐘又云仲春又稱芳春三月三月建辰日執徐又曰姑洗又曰莫春曰晚春曰杪春又稱宿月四月候天氣暖時僧堂內下暖簾上凉簾單上草並運出十五日藥王菩薩誕他本作二十八日四月建巳曰大荒落又曰仲呂亦名麥秋又稱清和亦名葵月又稱孟夏初夏等五月端陽節早課畢或住持說小參或命班首秉拂候方丈傳牌而行早粥分粽每人四枚午梆大殿上供齊堂吃腐是月疏浚溝渠建青苗會念誦保苗僧堂內掛帳證義曰我宗門中無一事無一節不以說法提撕於人今録端午法語一則以例其餘湛然澄禪師端午上堂云五月五日天中節赤口白舌盡消滅桃符艾虎插滿頭雄黃菖蒲和酒噎酩酊不知歲月移千妖百怪昏驅絶誰管魔來與佛來一齊都把腦門揭大衆何故如此不見道護生須是殺殺盡始安居要知殺底道理趁此良辰以艾葉為旗以菖蒲為劍以猛利心挺英雄膽不管是非得失聖凡真妄乃至貪瞋癡愛一切諸煩惱賊提起一刀兩斷直得淨裸裸赤灑灑圓陀陀活潑潑作箇世出世間大丈夫兄弟還有恁麼人真得恁麼地麼若不得恁麼地山僧有箇護身符子相送去也拈拄杖云看看太上老君急急如律令敕五月建午曰敦牂又曰蕤賓或名天中節或修月又稱皋月蒲月艾月榴月等夏至一陰生六月六月建未曰協洽又曰林鍾又號稱且月荷月七月二十四日龍樹菩薩誕七月建申曰涒灘又曰夷則亦名孟秋又稱相月巧月等八月二十二日然燈古佛誕八月建酉曰作噩又曰南呂或名清秋又稱壯月桂月等九月九日重陽早課畢說小參與端午節同九月建戌曰閹茂又曰無射或名季秋暮秋深秋杪秋又稱元月菊月等又夏秋二熟至收租時莊主先點各莊租簿斗斛等項齊備次白方丈赴莊收租公平正直不可欺壓佃人亦不得市恩侵損常住租畢回寺將租資帳目並呈住持閲過入帳事畢即獻新上供大衆吃新加腐與朔望日同十月初一日開爐證義曰開爐乃開各堂之火爐今借以打禪七為開爐也十月建亥日大淵獻又曰應鐘或名孟冬開冬小春亦稱陽月良月等十一月冬至節客堂預日掛牌牌云冬至良辰合院大衆師於早課畢禮祖上方丈次日早課傳爐住持拈香祈禱祝聖繞佛歸位禮釋迦佛十二拜課畢禮祖名號已對面展具雲集鳴鐘普禮三拜到祖堂禮祖上方丈住持說法竟維那云頂禮和尚禮畢住持下座云某甲與大衆師拜節維那云大衆師頂禮和尚禮畢回堂對面展具維那云拜某師云云班首師云兩單對拜普禮三拜拜畢侍寮回方丈頂禮和尚午梆上七處供大殿四聖影堂老和尚像齊堂吃腐或掃塔祀祖與清明同十一月建子日困敦又曰黃鐘或名仲冬亦稱辜月至月等十二月二十九日華嚴菩薩誕除夕前三日客堂掛牌云歲暮在邇合院佛聖殿堂并及前後廊廡內外丹墀俱灑掃潔淨預日禮塔詳見前除夕日小食白腐午飯油腐攢菜早粥掛牌云合院大衆師聞鼓聲各處上普供見前元旦下午掛牌云是晚二板聞鐘聲齊詣大殿念普佛新年三日同此晚課各帶具課畢禮祖上方丈升座說法或普說竟住持云兩序大衆師同詣大殿前普禮辭歲衆至殿前對面展具住持在下向上展具云我某甲與大衆師辭歲首衆即云大衆師頂禮尚尚普同三拜拜畢大衆到方丈辭歲頂禮和尚禮畢回堂展具三拜畢掛鐘板有師長者即行私禮已回堂聞鼓聲大衆齊至齊堂喫普茶悅衆鳴引磬請和尚普茶畢回堂方丈請執事茶晚二板念普佛至佛千聲已到各人父母師長位前住持拈香衆誦心經往生呪舉回向贊偈仍念佛各歸本位收佛號展具禮佛十二拜文殊彌勒諸佛諸菩薩各一拜三歸依回堂開大靜放香安息新年三日同此餘見前元旦條說是月歲終結呈諸色簿書證義曰古人以除夕當死日蓋一歲盡處猶一生盡處昔黃檗禪師云預先若打不徹臘月三十日到來管取你熱亂然則正月初一便理會除夕事不為早初識人事時便理會死日事不為早那堪荏荏苒苒悠悠揚揚不覺少而壯壯而老老而死況更有不及壯且老者豈不重可哀哉故須將除夕無常時時警惕自誓自要不可依舊蹉跎去也者個打徹一事不可容易看過不是通幾本經論當得徹也不是坐幾炷香不動不搖當得徹也不是解幾則古德問答機緣作幾首頌古拈古當得徹也不是酬對幾句口頭三昧滑溜當得徹也古人謂於此事洞然如桶底驟脫爽然如大夢得醒更無絲毫疑處才有幾分相應如一僧常於神廟紙爐中宿有別僧潛入紙爐俟其來宿攔胸把住便問如何是祖師西來意答云神前酒臺盤又一僧人言其得悟元沙故與偕行至水邊忽推之落水急問牛頭未見四祖時如何僧曰伸腳在縮腳裏似此二僧可謂預先已打徹則胸中七穿八洞千了百當隨呼隨應能於倉卒忙遽做手腳不迭時出言吐語如是的當如是自在若閒時以意識博量卜度酬機作頌非不粲然可觀至於病到無常如到了除夕相似腳忙手亂一場懡㦬可不惜哉願吾人常以此自警方至八苦交煎總不妨其或未然難免自誤昔天台智者大師得法華三昧習定華頂忽於後夜大風雷震魑魅千羣狀極可畏師安心空寂自然退散復作父母師僧之形悲哽流涕師深念實相尋復消殞至滅度時門人請日不審師入何位沒此何生師曰吾不領衆必淨六根為他損己只五品位耳又誠維那曰人命將終聞鐘磬聲增其止念惟長惟久氣盡為期哭泣喪服皆不應為言訖如入三昧噫智者大師尚說為他損己況吾輩乎豈可不自警哉十二月建丑曰赤奮若又曰大呂或名季冬杪冬亦稱臘月除月等
