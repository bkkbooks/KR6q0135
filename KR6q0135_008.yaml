body:
  text: 唐洪州百丈山沙門懷海集編清古杭真寂寺苾芻儀潤證義清越城戒珠寺住持妙永校閲節臘章第八述曰僧不序齒而序臘以別俗也西域三時以一時為安居自五月十五日至九月十五日出入有禁止凡禪誦行坐依受戒先後為次而制以九旬䇿進於道以三旬營資身之具共四月使內外均養身心俱安尅期進修不捨寸陰護惜生命行兼慈忍旨哉聖訓萬世永遵而五竺地廣暑寒霖潦氣候之弗齊故結制有以四月五月十二月然皆始以十四五六日因地隨時惟適之安或曰坐夏或曰坐臘戒臘之義始此今叢林結夏以四月望解夏以七月望此三月為安居又結冬以十月望解冬以正月望以此三月專務禪那成規久立化在隨宜千餘年來周旋規矩聳觀龍象之筵主賓唱酬迭聞獅子之吼猗歟盛哉安居亦各結夏亦名結制今先行籌次安居法按律所制安居事詳今從權便四月十六日結夏客堂預日掛牌牌云安居十五日知客知會維那及各堂將各人名號戒臘開齊以便登冊再派悅衆收籌行籌迎請各人認定庶臨時無有紊亂其外單沙彌淨人亦傳掛號已知客令法堂香燈師鋪蒲團若無法堂即在齊堂量人數多少鋪畢正中上首方桌一張供釋迦佛小像一軀無像即供牌位上寫安居會上中天教主本師釋迦牟尼佛再於右邊前廊下傍官桌一張供韋䭾住持之座在佛桌左傍又堂中央置小桌一張可放籌盤空盤外有大籌三枝待行佛韋䭾住持三處如法備已小食止靜後知客鳴大鐘三下衆各搭七衣持具集法堂悅衆二人請住持到佛前拈香三拜轉身至韋天拈香三問訊已歸位班首上香已鳴引磬大衆禮佛三拜轉身向韋天三問訊再向上頂禮住持三拜尚云一拜拜已各照位坐住持開示乃至云今差悅衆某師行籌悅衆某師收籌我今集僧後次第作法律制此處有一單白羯磨白已悅衆起立禮佛三拜問訊各拏籌盤至佛前左右對立維那將籌盤放空盤上禮佛三拜問訊長跪取一大籌雙手橫捧高聲白云大清某某幾年夏三月安居會上中天教主本師釋迦牟尼佛受第一籌說已放香爐上起立一拜收者以空盤放彼籌盤上禮佛三拜問訊長跪雙手收籌置空盤上再禮佛一拜然後持盤各行分左右從住持上座起次第而行受者應蹲身取籌放於空盤內如是依次行已再至韋天前對而立定維那仍將籌盤放收盤上三問訊雙手捧一大籌高聲白云大清某某幾年夏三月安居會上護法韋䭾尊天受最後籌說已放在桌上再一問訊收籌者以盤放行籌盤上向韋天三問訊已雙手取籌放盤內再一問訊收籌人齊至韋天前共算人數若干又說欲在會未在會人報數亦查明已末後先行至佛前上下兩班站定已維那高聲白云大清某某年夏三月安居會上座中比邱幾百幾十幾人沙彌若干人報已盤放桌上維那又云為僧行舍羅竟住持答云善維那云爾齊一問訊歸位住持云同居大衆已知此處今夏有若干人安居以後誦戒期中不必行籌各人收攝身心九旬之中努力為道受籌已竟念偈回向悅衆鳴引磬衆念回向偈已各人起座住持禮佛問訊韋天已歸方丈大衆禮佛問訊韋天已齊上方丈頂禮和尚若免即止各回本處知客令香燈送佛韋天至本處已住持上堂及衆誦戒如黑白常儀或在十六安居後上堂亦可次日十六早粥止靜後鳴大鐘三下衆集大殿燒香傳爐住持拈香維那舉讚畢出位至中拈香展具禮佛三拜長跪合掌唱云釋迦如來二稱結夏安居衆和畢維那合掌作白云禁足安居乃如來之儀軌識心達本是釋子之行門道在人行功由日進茲者四月十六日屆當我佛結夏安居之辰雲集衆僧登臨寶殿諷演祕章結起期制自今以後發十願起三心開明智性報四恩七趣消滅障緣受持佛號存想聖容不得冒熱遊行傷害生命稟七支之戒皎如冰霜持三律之儀淨無瑕穢定水澄清慧月朗照內契真源外敷梵行長般若之靈苗成菩提之妙果由此法門隆盛海衆安和天龍擁護人物欽崇曰竟一拜歸位悅衆鳴引磬大衆齊唱安居文云大德一心念我比丘某甲今依某某寺僧伽藍大界內夏三月結制安居三唱竟衆念大悲呪三遍繞殿歸位次念偈呪衆生無邊誓願度煩惱無盡誓願斷法門無量誓願學佛道無上誓願成唵鉢囉末憐陀𩕳娑婆訶三唱三和畢跪念怡山文已起立結贊云安居期結道體先成殷勤發願猛修行教論作規繩戒律圓明頓證法王身歡喜地三稱次舉結夏功德殊勝行云云偈畢三拜回堂證義曰結夏安居自佛制已來不拘宗教未有不遵者邇來宗門置之度外亦可慨矣即如列祖提綱一書載禪宗結夏法語有九十則彰彰可考今略舉數則以見大意白雲端云安居之首禁足為名禁足之意意在進道而護生真淨文云十方聚會三月一結息狂妄心除苦惱熱獲勝清涼證大寂滅到波羅岸出生死轍以此聖制故不虗設又云茲日夏首衆僧結制之辰泐潭山比丘克文與清淨大衆踞菩薩乘修寂滅行以大圓覺為我伽藍身心安居平等本際涅槃自性無繫屬故今我敬請不依聲聞當與十方如來及大菩薩三月安居為修菩薩無上妙覺大因緣故離諸垢染清淨梵行若能如是所謂如蓮華不著水心清淨超於彼五祖演云此夏居白雲禪人偶聚會三月九旬中尊卑相倚賴粥飯與茶湯精粗隨分耐逐意習經書任運行三昧彼此出家兒放教肚皮大石屋珙云今朝四月十五日行腳師僧念頭息草鞋乾晒待秋風金錫罷遊留靠壁鸕偏愛守空池鳳凰豈肯棲荊棘平生肝膽向人傾相識猶如不相識噫如是說法豈非禪宗軌範何今之不然也夏中念佛結夏已欲安禪者仍照常例坐禪若不坐禪即便以念佛為常課期內每日早課如常粥後上殿念楞嚴經中勢至圓通章一遍大悲十小呪心經一遍佛號五百聲回向作梵唱一者禮敬諸佛十句願偈三歸依各回小食止靜後念十六觀經中雜想觀章一遍往生呪三遍佛號五百聲禮彌陀佛十二拜三菩薩各一拜三歸依各回午飯後念大懺悔文佛號五百聲三歸依回堂晚課彌陀經放蒙山仍照常黃昏止靜後念十六觀經上品上生章一遍往生呪三遍佛號千聲拜彌陀十二拜三菩薩各三拜三歸依畢凡夏中嚴禁雜話并出入等事犯遮逆者不共住破重戒者依律治凡禪堂堂師喜學健椎法器并在寺習學經律者聽凡犍椎法器依次輪擊凡經律論宜互學習凡不隨衆者依規罰衆欲聽經維那白住持請講楞嚴經餘經亦得證義曰結夏安居乃佛法住世根本梵網經言冬夏坐禪所以清規以安居解夏結冬解冬為四大節也邇來禪宗只結冬而不結夏殊違佛制夫修行之要無過禪淨兩途今既以結冬坐禪即可以結夏講經學律等皆夏中所有事而以念佛為首務也夏中講經講律講論儀皆同此將講某經預日大衆先具禮儀面請住持或命某某代講即轉請某某師搭衣持具禮請開講另有講堂規約見後初開講日早粥後法堂香燈鋪設講經法座座前供佛像一及兩邊聽經桌若無法堂即在齊堂小食過堂後方可鋪設小食後鳴大鐘十下收鐘二下聽經者搭衣持具法堂兩邊站住持命侍者三人一傳牌一傳經一傳爐到法堂行十方圓禮已隨即鳴大鐘鼓聽經者持具上方丈請法師升座引磬先行衆隨後監院執香居末到方丈衆兩邊照位對立侍者與維那請法師出登座已監院出位上香展大具三拜次大衆向上展四折具三拜已仍引磬前行衆隨後監院執香在大衆後法師又在後侍者隨從到法堂維那候法師至中立定打磬一下鐘鼓齊歇隨舉偈云降伏魔力冤除結盡無餘聞此妙響音盡當雲來集候法師三拜問訊偈畢隨即舉南無雲來集菩薩摩訶薩四稱末後於雲來上加海會二字法師登座拈香三瓣維那呼衆頂禮三拜已衆各歸位坐入定少頃維那鳴磬三下或鳴手鐘三陳亦可按磬唱云鐘聲傳三千界內佛法揚萬億國中功勳酬帝主深恩利益報檀那厚德偈畢舉今為講某經說者舉南無本師釋迦牟尼佛衆同三稱次舉開經偈衆作梵唱已各將經揭開然後開講乃至講竟法師云向下文長付與來日衆唱回向偈云講經功德沙界難量情與無情同圓種智偈畢遂鳴鐘鼓法師下座禮座上佛三拜大衆齊送法師回方丈登座大衆作禮三拜若免送即止各回本處期內自是以後禮儀小異不鳴鐘鼓亦不監院迎請聽經者亦不上方丈唯站法堂俟候時至鳴大鐘三下衆集用悅衆二人當值二人講小座一人持具至方丈迎請法師若班首代講即在本寮請師登座已當值一人拈香迎請五人拜餘皆合掌立又夏中盛暑免衣或大衆一拜已即就坐聽講建首日與圓滿日上供儀如常唯當各用一疏疏語應切合所講經義故不備證義曰律中謂五夏已前專精戒律五夏已後方乃聽教參禪故我釋尊廣說經律旨歸拈花至於法流東土亦先經律而繼禪宗可見經律與禪宗並重住世模範所以冬參夏學相須而不相違也今之禪宗於經律二者漠不留意誤矣至聽經學律須明五要第一要信諸佛境界吾人各具本無差刖不生退怯第二要會歸自己不可說食數寶第三要虗心樂善稍有長者皆師友之所謂擇其善者而從之無友不如己者第四要悲愍一切凡堪以此意相警者不惜苦口第五要恕人責己人不如法發哀愍心勿見其過若自生放逸長憍慢則斷斷不可每見世人欲學經律入講肆者有種種障難汝今遇良緣反慕浮淺豈不惜哉又凡講經者須會佛祖意莫只依文解義反障學者見地當知代佛宣揚人天矚目不可忽也按正法念處經說凡人間講經受戒修道證果及舉行佛事從地神報空神如是展轉上報三界諸天乃至諸佛禪宗祕要云隨餘法師講維摩經有李録事者死後其鬼時依附人共人言論師問曰今講此經感何人聽答曰自人頭已上便是鬼神上及諸天重級充滿然見諸天聞法師酒氣皆回面而聽餘即悔過不復飲鬼又曰非唯此會獨感諸天但有法事無不來降據此凡作法事𠃔宜誠敬講堂規約凡一十二條夫禪之與教非有二也教為禪詮禪為教髓執文義而守詮禪亦為教離文義而契心教亦名禪即行儀以彰真如依模範而成妙道善財遍法界參求釋尊示有學成覺為參學標榜作後昆楷模故知由信解以行證因開示而悟入典至重矣非有條章莫由持守謹列於左幸各式遵講經期內倘有破根本戒者飲酒放逸者諍人我是非者毀謗講法及法師同學等者以上若犯一法即擯出院託故在外間遊及應經懺者出院不隨衆者罰出入衣冠不正者罰每日早粥後聽經者到大殿搭衣誦本經一卷或禮懺一時以求消障增慧每日小食後請師講經須齊到聽講講大座經三回不到者出堂別經雜典槩不許看違者出堂預日先細閲大座所講經文庶聽講時易於領會有不解處下座後請問如懈怠不看聽講時昏沉放逸者出堂聽經須解義可期開悟只圖消文而不解義決無悟期若并文亦不消隨行逐隊虗應故事者出堂講小座先鳴鐘三下內外俱到倘小座講錯含糊處不得戲笑輕慢有貢高不聽者罰講小座人上方丈告座乃至大衆前總告座大衆亦同站班當值一人亦上香小座人須回禮至講完後仍如前告座每日輪次小座外抽籤講小座以日進除真愚鈍者以上條約各宜遵守有疾病者或尊客等隨喜聽者不拘常例年月日住持某甲重録附座主條約凡九條夫講堂規約皆學人事竊謂座主亦有當守之則當悉之義良以講經一事乃代佛宣揚之時人天拱聽之地理宜敬慎昔阿難結集法藏登座執筆感得相好如佛集經講經其義一也是非遠離諸過豈易為萬一之稱哉故約例九條以肅威儀以昭誠敬須具大慈悲誨人不倦說法平等無有高下不擇冤親不計供養當著清淨衣內外俱淨不得褻衣登座雖大暑亦必搭衣柔和忍辱并不得因坐久去衣澄心寂照觀諸法空梵響遠聞人天交集當體即假照空不空照假非假當體即中攝事歸理才堪入妙理坐宜端正莊重不得斜身踞坐言笑粗野不得置正義不講多說枝葉若發揮奧旨引喻的確雖世諦語言不相違背凡講經固當提要鈎元暢明其義然消文乃是入手功夫不可詳義而略文令淺識茫然不解不得於所見不真之處穿鑿附會或強經就我貽誤後人若遇此等處當直言不知不強其為知不得因引喻事蹟縱談淫邪等趣以法為戲有尼女在會更宜慎不得憚煩偷安敷衍了事以上各條乃為明曉經義之法師防其過咎若自量經義不甚了了則此座豈易登人天羅列因果昭彰各宜慎之證義曰天神聽經已見前釋又凡叢林中即閒談偶語亦皆有鬼神來聽察托古云宋光孝安師住清泰寺不樂從務日惟晏坐儼然在定偶於定中見二僧倚欄而語初有天神擁衛傾聽久之散去俄而惡鬼吐罵仍掃腳跡安乃出定詢其故初論佛法次及世諦末談資養安師以二僧事自礪終身未嘗言及世事寂後火化舌根不壞柔軟如紅蓮花葉雲棲崇行録亦載此事噫倚欄而談尚有神聽況登講經可不慎乎蘭盆儀軌摘要全卷見蘭盆會纂中七月十五日設蘭盆供預日於山門貼匾云蘭盆勝會即打掃大殿并內外丹墀及辦供器莊嚴諸什物等一一齊備次日早課祈禱等事照元宵解冬例詳後茲不贅早晨普請成蘭盆壇丹墀上共設桌五行每行方桌一張條桌四張最上第一行中間方桌供一大錫鉢盂飯左右四長桌並列果品各十餘盤第二行中間供盂蘭盆一座以經彰名表法殊勝盆內旋疊甘美熟蔬菜二十四色不得菲淺兩邊條桌仍如上式供果品等物第三行中間方桌供一大碗淨水碗內浸鮮花幾朵條桌仍如上式供果品等物第四行中間方桌供一大瓶荷花條桌仍如上式供果品等物第五行中間方桌供設香案將自恣僧物置條桌上條桌仍如上式安擱餘物四邊用木柵欄圍庶食葷酒人不得混入南北兩傍開小門可衆僧施主出入各使二人守之禁間闖壇之四邊多貼禁條其禁條云此係清淨供壇恭迎三寶天神降臨之所各宜誠敬凡飲酒喫葷者莫入此建壇儀式也早粥二板後知客鳴大鐘三下禪堂即三板止靜開小靜大衆搭衣持具齊入壇已二行者持引導幡二悅衆鳴引磬首領執事八人執小幡到方丈分班對面立定鳴引磬四下住持出室不拜即末後先行二引導幡在小幡前引磬在和尚前一侍者執手爐一侍者捧香碟隨住持後引導幡入壇兩角站定小幡分開住持至香案前拈香維那舉贊衆和淨壇繞經即繞誦盂蘭盆經目連啓教世尊宣揚鉢和羅飯利存亡脫苦往天堂妙樂無疆孝行永流芳南無香雲蓋菩薩摩訶薩三稱住持禮佛畢接手爐問訊舉云南無大悲觀世音菩薩三稱維那持淨水杯舉淨壇偈菩薩柳頭甘露水能令一滴遍十方腥羶穢垢盡蠲除加持壇場悉清淨教有密言謹當持誦即舉大悲呪繞壇悅衆鳴大魚子大衆同誦維那酒淨其四角擺小桌一張各設蘭盆經一卷四悅衆在四桌合掌高聲同誦引導幡至大殿階下對面而立小幡前行和尚接行一侍者捧香碟隨行班首隨後大衆各執事次序而行從壇右繞上殿從佛右繞而下持呪灑淨一匝不止步即誦佛說盂蘭盆經云云誦經三遍繞畢大衆照課誦位排班住持至香案前經完侍者接手爐大衆跪下合掌住持合掌祝云我等同孝志修行淨土因懺除三障罪報答二親恩存者獲福壽亡者得超升同生安養國度盡衆冤親祝已一齊起立俱合掌維那舉南無本師釋迦牟尼佛十二拜南無文殊師利菩薩三拜南無彌勒菩薩三拜南無十方諸佛三拜南無十方菩薩三拜南無蘭盆啓教大目犍連尊者三拜三皈依竟三拜而退各回本處收衣抽解飲茶用點上蘭盆供飲茶用點已少頃即鳴鐘三下衆皆入壇禮佛三拜住持拈香維那舉獻供贊衆齊唱云蘭盆會啓普度門開恭迎三寶降臨來一一坐花臺唯願慈哀受我妙香齊南無齊供養菩薩摩訶薩三稱維那至中拈香已展具三拜已長跪合掌白云恭聞法身常寂本無去以無來妙智圓融實非空而非色靈明絶待覺海難量俯潤迷蒙時彰影響今屬如來歡喜僧衆自恣當為七世父母施設百味蘭盆儀遵充國孝效目連黍稷唯馨覺王斯格願降慈光受我供養白已一拜起立舉云三身如來衆和奉獻蘭盆上供三寶說已執爐白請詞云大雄出世同赴齊於舍衛城中正法流行共應供於匿王宮內既隨機而現相亦普濟於羣生今辰衆等謹設蘭盆志心頂禮專申奉獻千華臺上百寶光中三十二相之能仁八十種好之大覺盡十方遍法界過現未來無量佛寶唯願不捨慈悲受斯供養三白三拜次舉供佛偈鳴鐘鼓鐺鈸齊唱三遍或一遍南無蓮座天人師威德端嚴無與等唯願佛寶大慈悲受此盂蘭盆供養南無香水海花藏界蘭盆供獻真如佛陀耶衆唱竟維那執爐高聲請法云今辰衆等謹設蘭盆志心頂禮專為奉獻西乾竺國白馬䭾來修多羅了義上乘十二部真空妙典盡十方遍法界過現未來無量法寶唯願不捨慈悲受斯供養三白三拜次舉供法偈仍鳴鼓鈸等唱三遍或一遍南無相應最勝法成就菩提涅槃果唯願法寶大慈悲受此盂蘭盆供養南無香水海花藏界蘭盆供獻海藏達磨耶衆唱竟維那執爐高聲請僧云今辰衆等謹設蘭盆志心頂禮專為奉獻三明八解五果六通分身於此界他方應供於人間天上盡十方遍法界過現未來無量僧寶唯願不捨慈悲受斯供養三白三拜次舉供僧偈仍鳴鼓鈸或三唱或一唱南無自在衆中尊栴檀林內澄心者唯願僧寶大慈悲受此盂蘭盆供養南無香水海花藏界蘭盆供獻福田僧伽耶唱竟維那歸位住持拈香悅衆鳴引磬大衆齊聲緩誦云南無常住十方佛南無常住十方法南無常住十方僧南無本師釋迦牟尼佛南無藥師琉璃光佛南無過去覺花定自在王佛南無清淨蓮花目佛南無多寶如來南無寶勝如來南無妙色身如來南無廣博身如來南無離怖畏如來南無甘露王如來南無阿彌陀如來南無世間廣大威德自在光明如來南無佛說盂蘭盆經南無大慈地藏王菩薩南無大悲觀世音菩薩南無大勢至菩薩南無護法諸天菩薩南無伽藍聖衆菩薩南無歷代祖師菩薩南無蘭盆會上佛菩薩南無古往自恣緣覺聲聞僧南無大孝目犍連尊者南無三界聖凡幽顯尊神三請已誦變食呪二十一遍甘露呪七遍上供文如常又普供養呪七遍已維那至中三拈香展具三拜問訊長跪合掌用鐘鼓齊聲念南無十方常住三寶三稱畢維那宣疏時住持與大衆俱長跪合掌伏以誦世典蓼莪之章難罄情於罔極參聖教蘭盆之旨敢竭念於熏修望度慈航爰伸誠悃鄉貫寺名住持等名衆等切念早割塵緣長辭親愛或嚴慈而早喪頓乏蒸嘗或星𩬆而在堂永違菽水無自利利他之行尚空受於人施有仰愧俯怍之情敢置懷於源本生身既托於親恩訓教無踰於師德本始無窮不遣纍劫之宗緒圓心普度總超法界之有情爰披瀝於丹衷汲水採花而獻供敬歸依於寶帙亙天彌地以流恩盡拔苦輪咸躋覺道由是擇於本月某日起至某日告圓雲集僧衆登臨寶殿諷某經禮某懺或大衆發心各有持誦一一齊登伏願慈光輝映娑婆無處不圓明法海汪洋大地有情俱潤澤我等多生父母歷劫親姻及以師長並諸眷屬存者加增福慧歿者高證蓮胎普滋一善之良緣均利恆沙之苦趣更冀山門寧靜海衆安和凡所止作願皆如意右疏恭請三寶證明云云若會中有俗姓士女當更宣俗人所祈之疏云伏以教演盂蘭舍衛之芳猷未散功超天壤目連之孝行常稱欲資七世於蓮胎當禮三身于華座鄉貫寺名在會士女等名衆等切念唱一味之圓音隨剎土隨衆生盡入平等嘉會演千秋之孝旨或善男或信女咸遵舍衛遺風仰悲濟之宏猷救倒懸之極苦是以於本月某日恭遇某寺崇建蘭盆勝會普超恩有含生某等深追罔極少答善因躬叩法筵仰求慈濟由是各備香儀薄陳芹供仗苾芻之威德仰三寶之恩光超度先靈福資現在所有各各念誦皆當一一具録伏願真慈赴感聖人隨機一雨普滋大千蒙潤俾我等多身父母歷世親緣同承冥福之資俱解三途之苦歿世證生天之樂在堂稱難老之春五福日新三灾電捲凡所祈求願皆果遂右疏云云宣畢一齊起立衆唱贊云五果百味香色清新自恣會上獻能仁願親出沉淪普濟幽冥沙界布陽春南無普供養菩薩摩訶薩三唱若此會七日或五日三日者此二疏待回向化若但設齊供而不念誦作會者此疏即時化大衆念佛送疏住持三奠茶設拜維那舉回向云以此蘭盆供善根報答父母劬勞恩存者福樂壽無疆亡者離苦得超升四生九有諸含識八難三途苦衆生各各悔過洗瑕疵盡蒙慈濟出沉淪念偈時住持禮佛三拜問訊偈畢引導幡前行小幡隨後二悅衆鳴引磬二侍者執手爐搆香碟送住持歸方丈衆各回本處衆僧受食上供竟悅衆將自恣僧物謂檀越所施之物如手巾麻線鞋襪等類安置一處是日齊堂外多鋪桌碗筯以便客師受食其供普果菜不論客舊平等普分於齊堂事俱齊備已開午梆鳴大鐘三下住持搭衣持鉢先至齊堂坐大衆搭衣持鉢進堂坐齊執事人先行果已住持云大衆師先用供果食畢方鳴雲板執事人將蘭盆蔬菜及供飯勻入大衆菜內行堂盛菜飯已大衆舉鉢念供養呪至當願衆生句即改念過去父母七世超升現在二親永無病惱自他饒益存歿沾恩永離惡道究竟常樂念畢出生不唱五觀住持云大衆先行禪定意然後受食大衆入觀觀自心內外中間皆不可得默坐少時住持白云大衆受食大衆食畢維那起坐將自恣物即手巾襪底線帶之類也先奉一分和尚位前頂禮一拜復同悅衆將自恣物分作兩盤東西各行從上至下客舊次第勻分散畢歸位結齊已僧值云大衆所食供果及自恣物各自藏鉢或置袖內衆齊起立捧鉢各回本處證義曰蘭盆大齊佛敕解夏舉者謂一夏安居九旬加行不階四果亦得功勳此日設供其德大矣年年行之者蓋父母結愛既念念不去心孝子報恩須年年不絶供也又經意以苦報恩為主與世俗異世俗之孝在順其情此則兼順其性世俗之孝唯資其形此則兼資其神世人不知不信輒曰釋氏無君親亦未之深考也夫順性資神之道固所難明而形情之間亦豈遠于人哉如釋尊謁母於忉利送父而負棺等其孝為何如也梵網經以孝為戒曰孝順至道之法四十二章經云凡人事天地鬼神不如孝二親二親最神也律中父母不聽者不許出家觀無量壽佛經首稱孝養父母為成佛正因大報恩經心地觀經廣說父母恩重及至孝之法睒子一經全彰孝事地藏因孝母而立誓度生至於我佛訓弟子謂父母與補處菩薩等許弟子減衣鉢之資養其父母父母有正信者可恣與之無正信者可稍與之若自無物許轉化與之藏中勸孝之語層見疊出豈不以孝為首務哉特其教兼於順性資神固非世法可及耳今此儀軌全遵佛敕誦經猷供修懺設斛俾七世親靈超冥漠之界出思議之表冥罰有所不能制業苦有所不能拘其法利殊常豈但五鼎之豐三猷之勤之孝而已故知教孝之旨唯佛教為獨深也以上乃一日簡便行法若七日五日當依下會約行之蘭盆會約凡二十一條切聞蘭盆佳節大施門開仰𠙥有力大檀營辦無遮妙味法喜遍享乎佛僧禪悅普資於凡聖現行財施法施當來福足慧足模範次序條列於左每年七月朔識字者詣藏主寮領蘭盆注釋藏主問名登簿至初六日或起佛七或不舉但每日講蘭盆經注一時客堂山門俱貼捐資牌除施主大分外不拘緇素內外隨各人所捐供銀或助飯僧或為薦先俱一一開明示衆以廣度衆之心方合佛意期畢注釋仍還藏主消號斯會不拘道俗皆可入會念佛聽經但不許年少尼女入寺恐壞名聞故古規用大殿前丹墀為供壇上覆篷限下圍木柵以在會人及供物多故若人物俱少在殿上亦可古規白詞俱維那與住持預熟讀念近時僧少熟習故立內壇用法師表白以便看文展讀俱詳蘭盆儀軌中明另有流通本行世但蘭盆經人人預宜熟習舊盆鉢可用即用若無預製一大盆用木為之狀如香亭底如盆式中作四格每格安菜六味共疊二十四味皆用熟美供畢齊僧盆大方三尺許其下施架復製一大錫鉢可容斗米之飯供畢齊僧此會佛敕唯供三寶故內壇不似水陸兼列下堂凡供事但取誠敬不必僞飾富盛亦不得惜錢物苟簡太甚隨人貧富誠心而行可也供獻依本經具五果百味者乾果十湯菜十水果十瓜笋十糕餅十糖色十油貨十乾菜十豆色十醬貨十亦不可太拘各隨地之宜備辦可也次飯次茶凡素品皆可供獻供畢齊僧但凡佛事本無定法若人衆財多則具百味供千僧誦經懺並可增益若人寡財乏但具三果六菜乃至只供十僧皆可所謂富羅天下奇珍貧竭一己力量但取誠敬而已新會略同水陸內壇供佛惟無下堂外壇宜誦華嚴經普賢行願品二十四卷妙法蓮華經十二部地藏經十二部觀無量壽佛經十二部金剛經二十四部藥師經二十四部金光明經十二部佛說阿彌陀經一百八卷佛頂尊勝陀羅尼經二十四卷佛說盂蘭盆經愈多愈妙或純禮蘭盆懷七日亦可此會雖薦父母宗親兼度六凡又六道輪回互為眷屬凡夫不識佛敕放生以助功德宜廣勸衆施於圓滿日買放切不可廢若禮懺者十三日起懺莊嚴沐浴等事見前念誦規條說結界更須嚴護勿令人畜不淨雜物闖入設有入者依法重結懺壇僧衆不得混雜如比丘結壇咸須比丘若尼衆結壇俱用尼衆在家男隨比丘衆女隨比丘尼不得混亂若尼不能主壇請一二耆年高德比丘在壇外主懺教之不得同壇觀堂香燈不得混雜亦然進供壇拈香禮拜進內壇拈香禮拜亦然懺期內登廁時入浴時不得以淨衣與觸衣相雜先脫淨衣淨鞋置在淨處乃著觸衣鞋入廁次洗淨洗手畢脫觸衣觸鞋入浴乃著淨衣鞋歸堂洗手面潄口入壇期內不與外人接對不得私其語言亦不得看餘教典上供用得味熟食供畢即收淨抹供桌唯供香花淨水此齊供佛敕在解夏節者謂僧安居九旬果新戒淨堪度餓鬼凡懺師等皆須清淨過午同八關齊不得遲延時刻以破齊法禮懺五更香到洗面用茶入壇為第一時日出吃早粥粥後二板入壇為第二時出壇後約燃線香一炷於中抽解已小食小食後入壇為第三時午飯後燃行香一炷於中用二板茶抽解止靜已再燃坐香半炷開靜吃茶入壇為第四時出壇後坐香半炷用非時漿畢入壇為第五時出壇後用茶坐香半炷入壇為第六時出壇後安臥養息出壇後坐香皆須精修禪觀不得縱恣昏沉倘不能坐香入觀或默念經呪佛菩薩名俱可不許放逸高談嘻笑睡眠等每聞鐘鳴即抽解盥澡一聞長鐘即依次站班勿得先後參差觀堂中設案用香燭桌圍上供南無蘭盆會上啓教大士大孝大目揵連尊者蓮座其中唯許香燈給侍設有要事止可依事直說不得因事牽發餘語倘有吃葷酒人間遊知客當好語使遠看不得亂闖懺至十五日子時大衆沐浴更衣乃至獻供臨齊見前儀軌所說若無蘭盆懺用大悲懺或淨土懺可代年月日住持某甲重録證義曰蘭盆注釋藏中只見唐圭峯宗密法師疏一卷後宋依此疏出孝衡鈔二卷明末台宗蕅益法師出新疏一卷律宗書玉律師出合釋一卷板存昭慶經房然儀軌規約久不行矣世人誤以施鬼神食為盂蘭盆齊此訛也雲棲正訛集云蘭盆緣起目連謂七月十五日衆僧解夏自恣九旬參學多得道者此日修供其福百倍非施鬼神食也施食自緣起阿難不限七月十五所用之器是摩竭國斛亦非蘭盆蓋一則上奉聖賢一則下濟餓鬼悲敬異田惡可等混今清規有中元施食之條則是日獻蘭盆奉敬三寶夜施斛食普濟鬼神乃兩全之法也解夏七月十六日解夏客堂預日掛牌牌云明日自恣次日解夏儀式如結夏同住持定時已時至鳴大鐘三下衆集大殿燒香傳爐住持拈香維那舉讚畢至中拈香展具禮佛三拜長跪合掌白云釋迦如來二聲休夏自恣衆和已維那合掌高聲白休夏自恣誠佛門之要道懺愆悔過實僧行之良謀善因培植樂果圓證不憑戒定之航曷到涅槃之岸茲者七月十六日屆當我佛解制休夏之辰雲集衆僧登臨寶殿諷演祕章解開期制自今已後破四重蹈十惡恣任自陳起三毒犯七遮隨從他說若見若聞若疑一一須悔或身或口或意重重當懺根塵纏縛聲色牽連積諸罪纍障閉心源若不宣揚何由雪淨特開懺摩之門廣滌自他之罪懺則懺於已往悔則悔其將來故云已作之罪願乞消滅未作之罪不敢更作故今解制自恣懺悔白竟一拜維那歸位悅衆鳴引磬大衆齊唱云大德一心念衆僧今日自恣我比丘某甲亦自恣若見聞疑罪大德長老哀愍故語我若見聞疑罪當如法懺悔三唱竟或一一說竟大衆念大悲呪三遍繞殿念畢各歸本位維那舉懺悔偈大衆唱云往昔所造諸惡業皆由無始貪瞋癡從身語意之所生一切罪根皆懺悔唵三陀囉伽陀娑婆訶三唱已跪念大懺悔文畢舉回向贊云自恣休夏佛果圓成一切業障頓冰清覺海性圓澄智慧光明法界盡蒙恩南無求懺悔菩薩摩訶薩三稱次舉回向偈云解夏功德殊勝行云云唱偈時住持禮佛三拜問訊偈畢即回方丈大衆鳴引磬禮佛三拜上方丈頂禮和尚若免即回堂是日晚課畢解制維那鳴引磬上方丈巡寮告假等事與解冬同例若不據蘭盆勝會十五日解制告假證義曰解夏自恣者蓋比丘當初夏時結制安居不令乞食名休夏今朝滿期解制自知有過恣其自陳自不知過恣任僧舉故名自恣或問蓮池師曰許僧自恣何謂也師答曰有過如病人舉過如醫王諱病而惡醫是名大愚癡則知有過而舉之之為是矣或又曰自舉或可他人舉之不畏起爭端乎答曰律載僧有過傍僧白佛佛召本僧種種呵責因制為律叢林逐日直言據此也此遵佛制非出私意何有爭端且世法猶云君有爭臣父有爭子士有爭友故曰興王賞直諫之臣聖主立誹謗之木況為僧修出世法可不須友以成其德乎若惡直言則讒諂面諛之人至矣拒諫飾非損德敗業非小失也因復作頌曰古自恣協金蘭今自恣生棘刺口談他過忿起諍目對毗尼盲不視何怪乎正法衰魔軍熾雲棲主人發長嘆一則傷我心一則慰我志君不見愛禮故存羊宣尼曾告端木賜禪宗祕要云昔闍夜多尊者至羅閲城敷揚頓教謂遍行曰吾適對衆抑挫仁者得無惱於衷乎曰我憶念七劫前生常安樂國師於智者月淨記我非久當證斯陀含果時有大光明菩薩出世我以老故䇿杖禮謁師叱我曰重子輕父一何鄙哉時我自謂無過請師示之師曰汝禮大光明菩薩以杖倚壁畫佛面以此過慢遂失二果我責躬悔過以來聞諸惡言如風如響況獲飲無上甘露而反生熱惱耶噫此可謂自恣之龜鏡矣坐禪分五早課第一中秋起加香五鼓夜巡鳴四板香燈點燈司水擔水監值揭帳幔衆起維耶鳴香板三擊衆人下單抽解淨面監值兩邊鋪棕韉各人隨閒禮佛三拜各歸本位五板畢香燈接報鐘三陳徐徐敲半枝線香監值灌開水兩壺用熱水洗杯將杯提至監值位所散香散杯悅衆點手照監值行開水衆用開水畢散香收杯香燈煞報鐘掛一板一鐘當值聞大鐘完接二板一鐘監值捲門簾關門中擺蒲墩收中間棕韉聞大鼓完接三板一鐘止靜當值行小十方禮禮佛三拜此中悅衆鳴引磬共四下當值行禮拜佛畢悅衆鳴引磬一下開小靜監值收中問蒲墩開門當值行十方禮悅衆鳴引磬共十二下此中監值打板三陳鳴鐘三擊接外呼板衆人上殿課畢回堂監值在門外候衆人歸堂放下門簾衆人各於本位前立定當值行十方禮到中間一問訊再向新值問訊交值監值立本位交監值牌問訊新監值將門簾拉起新當值打魚一下衆人出外小解畢將門簾放下順行一匝看衆人坐定然後熄燈歸位若時早打魚三下止靜歸位監值掩門聞梆聲當值打魚一下開小靜或不止靜亦可上午第二早梆鳴監值下位捲門簾提茶壺至楊枝瓶所司水擔潄口水維那敲香板三下衆人放腿或小淨聽便即回候齊堂板鳴悅衆鳴引磬過堂香燈打掃佛前及住持位粥畢回堂散香請散香篦衆圓禮當值掛一板一鐘鳴起香魚二下於西南接散香篦三下繞至東北又三下定行香一枝衆人去衣脫袍穿草鞋徐徐出堂潄口嚼楊枝畢監值收杯當值候香過將半枝掛二板一鐘衆人立定小停寸香當值至東北角打催板二下經行香餘一寸維那喝起提香板催行首領監香緊隨和之至香六分維那揮香板下垂當值打抽解魚一下衆人立定監值拉起門簾與散香至門首一邊一位站定小停一刻逆巡一匝維那歸本位卓香板監值進來擺蒲團散香師敲散香篦三陳衆人小解畢歸位監值關兩邊小門復敲散香篦一陳監值放下門簾散香師回堂順行交散香牌卓篦一下問訊至中央問訊插散香篦復至中央問訊歸位當值搭衣持具打三板一鐘止靜行十方禮禮佛三拜悅衆鳴引磬四下問訊出堂翻止靜牌東邊出西邊進問訊至維摩單所禮和尚一拜歸位監值收蒲團關門鋪韀當值推香盤散香師出位至中央問訊從東邊上請香板西邊下一拱逆行一匝當值看香到拉至香盤悅衆鳴引磬一下開小靜此節應移在交香板後維那敲香板三下放腿巡香師交巡香牌至中央問訊交香板散香師出位至中央問訊從西邊上請散香篦至東邊下問訊順行半匝卓散香一下當值打經行魚二下經行香半炷站板一下站香寸數打催板二下經行香完鳴魚一下抽解監值捲門簾候交散香當值鳴魚三下止靜監值關門請香板如上下午第三聞午梆鳴當值打魚一下開小靜維那敲香板三下穿鞋著衣畢悅衆鳴引磬一下各本在位立當值出位行十方禮翻牌悅衆鳴引磬監值鳴板三陳接鐘三下磬三下衆禮佛一拜坐定聞呼板鳴擊引磬過堂飯畢結齊時監值香燈司水先回堂開門候衆人回堂圓禮請散香照前當值打一板一鐘鳴起香魚二下定行香一炷衆潄口嚼楊枝畢經行監值收楊枝杯用熱水洗當值候香過將半枝打二板一鐘衆立定監值打茶候維那歸位卓香板衆隨便坐下散香師將散香竹篦靠佛前然後散杯監值行茶三四匝茶畢散香與監值收杯關門已然後在監值寮洗杯畢回堂經行香完當值打抽解魚一下衆照前立維那歸位卓香板監值開門拉門簾鋪蒲團散香三陳小解看淨房無人再散香一陳回堂照前交散香監值收門簾歸位當值打三板一鐘行禮時悅衆鳴引磬四下止靜監值收蒲團關門當值推香盤散香師照前巡香香到當值鳴引磬一下開小靜巡香師照前交監值開門打茶二壺巡香師散杯從維那位起和尚在堂散杯五個大悅衆送和尚茶復散悅衆位照人散杯從班首散起一對一對擺監值茶來用簽攪幾攪茶巡四五匝衆人茶畢巡香與監值收杯散香師照前行事當值鳴魚二下經行香半炷打站板一下小停寸香打催板二下經行香完鳴魚一下抽解候交散香牌當值鳴魚三下止靜散香關門香完開小靜吃茶經行等一一照前行坐晚課第四聞晚梆鳴當值鳴魚一下開小靜悅衆鳴引磬衆立班首出位拱手