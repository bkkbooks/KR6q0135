依僧竟三說三和從今已往稱佛為師更不歸依邪魔外道稱法為師更不歸依外道典籍稱僧為師更不歸依外道邪眾三說三和諸佛子等歸依三寶已今當為汝稱揚寶勝如來十號功德令汝得聞如彼十千遊魚即得生天等無有異遂舉柰麻過去寶勝如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊三說眾三和已法師撫尺一下白云諸佛子我今更為汝說十二因緣生相滅相令汝了知生滅之法悟不生滅同於諸佛證大涅槃白已遂舉所謂無明緣行行緣識識緣名色名色緣六入六入緣觸觸緣受受緣愛愛緣取取緣有有緣生生緣老死憂悲苦惱無明滅則行滅行滅則識滅識滅則名色滅名色滅則六入滅六入滅則觸滅觸滅則受滅受滅則愛滅愛滅則取滅取滅則有滅有滅則生滅生滅則老死憂悲苦惱滅三說法師撫尺一下白云諸佛子我今依大乘經授汝三歸十號十二因緣已竟今當為汝對三寶前發露罪愆求哀懺悔願汝罪業一切消除得生善處近佛聞法汝當至心隨我懺悔白已遂舉往昔所造諸惡業皆由無始貪瞋癡從身語意之所生一切罪根皆懺悔三說眾三和已遂唱柰麻清涼地菩薩摩訶薩三唱眾三和已一僧向佛作禮畢遂執水盂遍洒諸物身上已法師白云唯願放生以後永不遭遇惡魔吞噉網捕優游自在獲盡天年乘三寶寶勝如來本願慈力命終之後或生忉利或生人間持戒修行不復造惡信心念佛隨願往生更祈施主某甲現生如意他報隨心菩提行願念念增明救苦眾生當如己想以是因緣得生安養見阿彌陀佛及諸聖眾證無生忍分身塵剎廣度有情俱成正覺現前大眾齊聲念華嚴十回向經往生淨土神呪白已悅眾鳴小木魚大眾齊聲朗誦經呪大方廣佛華嚴經十回向品隨順堅固一切善根回向佛子菩薩摩訶薩作大國王於法自在普行教命令除殺業閻浮提內城邑聚落一切屠殺皆令禁斷無足二足四足多足種種生類普施無畏無欲奪心廣修一切菩薩諸行仁慈蒞物不行侵惱發妙寶心安隱眾生於諸佛所立深志樂常自安住三種淨戒亦令眾生如是安住菩薩摩訶薩令諸眾生住於五戒永斷殺業以此善根如是回向所謂願一切眾生發菩提心具足智慧永保壽命無有終盡願一切眾生住無量劫供一切佛恭敬勤修更增壽命願一切眾生具足修行離老死法一切灾毒不害其命願一切眾生具足成就無病惱身壽命自在能隨意住願一切眾生得無盡命窮未來劫住菩薩行教化調伏一切眾生願一切眾生為壽命門十力善根於中增長願一切眾生善根具足得無盡命成滿大願願一切眾生悉見諸佛供養承事住無盡壽修習善根願一切眾生於如來處善學所學得聖法喜無盡壽命願一切眾生得不老不病常住命根勇猛精進入佛智慧是為菩薩摩訶薩住三聚淨戒永斷殺業善根回向為令眾生得佛十力圓滿智故接誦徃生呪三遍已法師白云上來放生功德四恩普報三有均資法界眾生同圓種智十方三世一切佛一切菩薩摩訶薩摩訶般若波羅密舉三歸依畢各回本處以上略明放生儀軌竟若放生而兼念誦或兼飯僧等事並見前儀唯回向疏文隨施主所求事證義曰放生儀涼譯金光明經如此若據隋唐二譯俱有呪語梵網經亦有放生之條又考律藏凡士女先授三歸次傳五戒不許獵等故今放生似應但說三歸不必添說五戒或間雲棲蓮池師云說法對人人猶未信勸畜發心畜則何知師答曰性在含靈不可思議安期畜類終無覺心蛤之生天鵬之敬律虎之弭耳避地蟒之垂淚革心如斯比類曷勝枚舉縱彼業重無知亦為未來善種譬如嚴冬下種春暖自然發芽但以慈心向說行人自當獲福故應教化無間人畜也至於放生感應內典甚多今略舉最古者數條金光明經第四卷流水長者子路見一池水涸有十千魚將入死門四向宛轉是時長者施水并食而救其命復入池中為魚說十二因緣法并稱南無過去寶勝如來名後十千魚俱生忉利天自識前生為魚流水長者子與我等水及以飲食復為我等解說十二因緣并稱寶勝如來名號以是因緣令我等輩得生此天於是為報恩故各持真珠瓔珞到流水長者子家奉寶散花流水長者子即今釋迦牟尼佛是十千魚即十千天子並蒙佛授菩提記隋朝天台智者大師居台州修禪寺以身衣資勸人贖一所為放生池甞於其上講金光明經忽一日法堂前見黃無數翔集半日悲鳴而去大師見之曰乃江魚化為黃來謝吾恩耳今大慈寺是也又隋計詡任台州郡守嘗請天台智者於江上講金光明經流水品漁者聞法皆好生去殺詡後還都坐罪下獄臨當伏法遙祈大師一伸救護乃夜夢羣魚吐沫相濡明旦降敕持原詡罪據此則金光明經中流水長者一段為放生最初典型故此經為放生切要尊法後賢當知之附生所規約凡十五條佛言情多想少流入橫生故知彼等異類昔以暗蔽愚癡不修正念今則羽毛鱗甲受此劣形水陸飛空種種不一吾等當遵佛敕宜隨力放生并捨糧草願彼異類盡此報身往生淨土管生靈者發恒慈心盡己所執隨宜調法所有規條開列於左凡送來生靈問已說三歸否若未說即移至佛前焚香說三歸放生法飛禽水族即念佛放去牛羊鷄鵞等別其雌雄另攔關放不得混作一處各生頭如管雞名雞頭師餘例此管生靈出入各登簿記晨昏査數清楚倘有死者白庫房客堂看然後埋葬生所常使乾淨不得任其臭氣難聞牲口身穢新放生至必另置一處待夜方入羣糧草一日早晚二食食畢即收食盆不得任糞泥踐污盆食生頭打生靈致損者照大小罰錢歸入生所公用致死者罰已擯出失管致被惡獸傷害惡人盜去者亦照大小罰錢放牧損人苗稼等照數賠錢米糠麥麩等凡霉濕即晒或烘不得任其蟲生爛壞凡施生糧錢不得作別事用池中不可放黑魚鮎魚汪剌黃團魚等恐殘害他魚故亦不放螺螄青魚食螺螄故宜另設池放之不得以洗刮油膩及糟糠等物入池中魚食青草宜不時與之池中不得浸柴竹黃篾等一切物件池水不得挑動別用常使盈滿清淨凡水陸生口至各生頭所值自有常住舊例分規不得私向施主索取財物違者得一償二以買生糧鷄鵞鴨蛋所賣之錢仍買生糧私賣入己者罰年月日住持某甲重錄證義曰生所規約護生靈而修慈行也梵網經云若佛子以慈心故行放生業一切男子是我父一切女人是我母我生生無不從之受生故六道眾生皆是我父母而殺而食者即殺我父母云云又放生是作善慈心不殺具諸戒行是止善止作雙持是真護生也或問蓮池師云墨子兼愛闢為異端云何眾生皆以作我父母觀之耶師云儒道止談今世佛法乃論前身受身既列多生託胎必遍諸趣六道眾生皆我父母豈不然乎唯拘近跡不審遠緣等之異端其過甚矣供法衣法帔寶葢幢旛等法器皆同此供法衣之儀與前不同前之受法衣乃門人受嗣法師之衣或尊長所賜之衣故須住持往客堂親接及至方丈見禮答拜不受此之供法衣乃施主供住持也待客之儀如飯僧例然住持乃一寺之主凡施主所供法衣等一切法器須上堂白眾入萬年簿交莊嚴衣鉢收歸莊嚴厨上記年月日及施主名不得以施主供我私自受之有違佛制證義曰施主施法衣住持若預知者當訊其造法不得繡佛在衣上雲棲正訛集云近世袈裟上遍繡諸佛云千佛衣此訛也佛像止宜頂戴在首負荷在肩懸掛胸膈已涉褻慢況羅綴一身自腰膝而下皆佛也其過可勝言哉輪王福傾諒非虗語而成風久襲不自覺知願高明俯察芻蕘慎勿著此或曰然則千佛衣果無之乎曰有之即今二十五條衣者千佛相傳之衣也佛告比邱我此僧伽黎過去未來諸佛皆著此衣而得解脫是其證也或繡壽字名萬壽衣亦屬非是或繡以花名千華衣亦非所宜又千華之名犯千華臺上盧舍那佛之義亦恐折福矣受煎點煎是燒煑之意點乃小食之稱煎點之禮或住持回祖剎而行蓋住持回祖庭省覲彼必以尊宿之禮待之住持亦應以禮回敬祖庭之眾設此煎點即設齋也至臨齋之際仍命侍者代拜不敢親詣以動眾又或以上待下下敬上或比肩轉敬或特為或謝法或報恩或答禮或發心或行罰而設此則輕重各隨己力其中或設齋或設腐或設茶均謂煎點儀與飯僧同通嗣書嗣法書至遺書至初為住持必通嗣書不忘本也若法嗣通書至則住持必陞座咨問專使法要隨機說法蓋為同建法化互相酬唱令法久住也若嗣法師剃度師授經師同遺書至即刻於法堂左或方丈左設香案掛師真供靈位住持出己財命侍者送庫司代辦祭並素淨莊嚴訖即知會兩序大眾或當日或隔宿上堂白眾上堂儀見前說哀歎法下座到靈几拈香舉哀設念誦壇集眾念誦念誦某經及念誦日數隨意行之首日上供須跪獻見前尊祖章開山忌說二親遺書至儀亦同此唯立靈位宜設於幽靜之處不掛真上供不須跪獻不搭衣不拜但問訊心喪而已其安待專使詳兩序章客堂規約說附薦嗣法師䟽云伏以靈源湛徹觀泡影以識浮生法乳汪洋遡道風而思本始訃音忽至敬展孝誠仰歸調御之尊俯答先覺之德切念圓寂先師某甲和尚續入先師鄉貫寺名及生死日時示生滅相如明鏡無來去之痕契佛祖機似吹毛具殺活之用續慧命於將墜之際振宗風於末法之秋祖道重光真燈復耀方能事之已畢悼法幢之忽摧某甲猥膺付矚幸沐熏陶痛鑪鞴之先規謦咳已杳想巾瓶之遺澤追慕難忘爰陳蘋藻之齋持諷梵網之典經典隨改仰𠙥慈力用報師恩伏願先師某和尚大寂光中等毗盧而受用一真法界踞寶藏以莊嚴迴施法雨普潤羣機冀叢林之鼎盛祈道化以流通恭請三寶證明諷經薦師文疏年月日不肖嗣法門人某甲具疏文中須加序本師德行茲不錄薦剃度授經師酌改用之餘儀如常證義曰愚菴摭古云真淨和尚有時喚侍者請老和尚來侍者請南禪師真展開淨以手加額嘆云不是者老和尚豈能如此輙顰蹙半晌却戒收之潛菴源和尚每見南禪師真即淚下噫斯二人可謂孝思不匱者矣附錄於此請新住持凡十方寺院住持虗席須細訪有道德高僧方可舉請宜集眾共議定已監院具須和一冊載明本寺所有田產物業及迎接儀從一切畢備即請二三班首及施護二三人為專使至起程日詣眾寮相別客堂候時至鳴大鐘三下集眾門送啟行專使到彼寺客堂以客禮接待用茶點一知客白方丈及通告庫房維那次將請啟須知禮物供法座上次領專使見住持行禮畢坐次上茶陳白請啟緣由畢若路遙遠專使送上客房當日可回即不送房若不𠃔所請則回辭帖然請住持宜預討𠃔否意旨𠃔則發使否則止或𠃔自臨或轉薦班首若自受請已即通告兩序眾執次早掛陞座牌早課畢眾集法堂陞座說受請法竟專使待為受請住持煎點即設齋供眾受請人亦設特為席欵專使已新住持即擇數親信人同專使到彼收萬年簿及文契莊嚴錢米用物等唯盤結文契不清不接以常住文契關重也擇日定已至起程日新住持早粥齋堂白眾告辭次即上堂致謝兩序耆舊臨起程時鳴鐘鼓大眾齊集殿前候住持搭祖衣與大眾登殿禮佛三拜大眾頂禮住持三拜住持同拜大眾先行在山門外兩傍整齊對立合掌恭敬住持禮伽藍韋䭾彌勒已命眾回堂辭退而去大眾望去遠而回若請班首住者餘儀同前專使先見住持行禮已合掌白云某處某寺盧席今具禮儀恭請座下某師為住持伏望和尚慈悲𠃔許並祈勸請白已眾使同一拜住持答云敬奉來教即賓主同坐用茶命侍者先行通知所請住持與班首及諸專使同往彼寮專使行禮與請住持同共坐次陳請啟云云如不𠃔眾為勸請受請後住持請受請者并專使茶次待方丈齋次日專使請住持為受請者引座儀與陞座同令侍者請受請者趺坐勸請舉揚為法而出慰眾渴仰褒美語畢舉話有無不拘下座住持歸座左向外而立知客領專使往受請者前作禮畢受請者往住持前作禮次與兩序大眾作禮若受請者是門人住持付法衣有法語受請者搭衣向住持展具三拜白云早蒙陶鑄仰愧先宗來請既動難辭公命下情無任惶恐之至又三拜起具問訊住持答云斯道所寄一九鼎不忝當仁唯冀保任說已住持起歸寢室受請者令侍者同專使詣方丈稟借法座乃陞座說受請法畢下座到住持所禮謝三拜次與兩序大眾作禮已知客引受請者巡寮致謝專使特為受請者煎點至起程時鳴鐘鼓大眾齊集殿前候受請者搭祖衣與大眾登殿禮佛畢大眾與受請者作禮受請者回拜大眾先行在山門外候送受請者復詣住持禮辭住持一同送出山門受請者禮伽藍韋䭾彌勒已乃收祖衣同專使等辭別住持大眾而去附請新住持啟凡請啟宜各隨境緣而作倘無人作依此成式修改用之伏以史占寶氣西方之聖瑞宏開帝夢金身東土之法輪常轉莊嚴覘妙相毫光照世界三千梵唄演大乘圓音貫牟尼百八故知由來聖教端以緣興竊謂自古僧園必由人顯恭唯上某下某大和尚某地名僧某寺宿德參真如之妙諦笑合拈花證最上之菩提印同立雪一缾一鉢不妨到處垂慈六妙六通可以隨身應化今吾里某寺某代名藍某方古剎藏經臺在紀剏埀者若干年香積厨開綿慧命者若干世自某師歸寂若退院去改歸寂二字為別行法席已虗雖無天魔混擾其柰覺路瀰漫不遇痛棒當頭誰識寶珠在額用是共竭丹忱勤彼白足伏乞不辭素履惠我元風振祖席之宏猷俯慰兒孫之望為某山之大樹羣叨庇蔭之恩從茲舊布黃金之地大開甘露之門靈山佳會儼然未散於今時選佛道場𠃔矣觀光於此日矣敬陳短啟聊竭鄙誠無任寅心統祈丙鑒右啟上上某下某大和尚蓮座護法某檀那某前住某兩序某頓首拜證義曰叢林興衰在乎住持住持美惡在乎舉請荷担常住在此一舉敗壞常住亦在此一舉而受請者之禍福昇沉亦因之是故兩者俱不可不慎山菴雜雜云奕休菴揚州人嘗客天童寺穿破衲日一飡夜不寢儼有古德之風時奉化上雪竇虗席眾請奕住持奕欣然擕一笠而往不周一年盡變所為向之壞衲今輕裘向之一飡今列鼎左右稍有犯必瞋怒自起撲犯者仆地用拳舂脚擣心暢始休既而盡括常住羨餘就鄞城買民屋為菴而居日以資生為事與竹林寺僧爭屋訟於官對理不直牢死噫常住敗壞矣而奕休菴竟何如哉此皆因舉請之人不察真偽而聽信近時外貌率爾轉薦率爾延請故其害至於如此又云東嵒年八十一江西人僧俗共請住天童維時天童隳弛嵒思年老承此重任不遑安居召徒東圓慶三人分司寺事不五年而百廢具舉計餘資就象山置田以贍常住俗喜僧寧觀此二事可知梟鸞既別成敗判然則舉請之關重不可不慎也明矣入院擇日定已當計兩寺相去遠近近則首座領眾往迎遠則兩序執事往迎專使當預白新住持若固辭即止凡進院齋茶香燭等俱當預備預日掛接住持牌牌云明日某時合院大眾師聞鐘聲各搭衣持具在山門外迎請新住持入院正日時至鳴鐘鼓焚香燭處處煒煌大眾門迎由遠至近兩傍對立合掌恭敬新住持搭祖衣而來前用錫杖幢旛提爐香盤拂子如意拄杖行列整齊到山門分兩邊站定新住持說法諸處說法儀皆同此次彌勒次韋䭾次佛前次伽藍次祖堂乃至合寺像前俱拈香說法禮拜唯大殿佛前舊住持接具送蒲團位若無舊住持本寺法派尊長送位方丈位齋堂位皆同此入室舊住持接具送方丈法座位已新住持對座前說法數句即登座位立拈香維那舉讚至唱雲來集竟方坐大眾作禮已悅眾對鳴引磬三陣時燒香師至座前拈香三瓣展大具三拜或四摺具歸位新住持說法竟眾作禮已各回本處知客即領新住持參堂巡寮儀見前尊宿條巡畢歸方丈少頃客堂鳴序板兩序舊執大眾請新住持上堂啟請等儀見前上堂條所不同者唯至座前說法度啟維那宣啟畢新住持指座說法數句即登座祝聖次拈當道官僚香侍者逐一接香置爐唯嗣法本師香住持懷中拈出自插爐中斂衣趺坐眾拜已對面立鳴引磬三陣時燒香至座前拈香三瓣展大具三拜起具上座臺代侍者執拄杖眾侍者齊下臺展具三拜起具問訊仍登臺侍立燒香下臺歸位班首白椎住持說法乃至下座歸方丈已茶頃專使拜賀次送進院人等先緇後素次班首眾執次庫房次客堂次禪室次厨房次下院次各堂寮次侍寮俱拜賀而退聞鼓聲上普供若事忙唯佛及四聖普供在第二日上午亦可新住持一一拈香頂禮午梆鳴舊住持候送新住持齋堂位齋畢舊住持同專使護法諸房兩序請新住持看文契莊嚴及諸器皿并金糓等事晚課畢眾上方丈請新住持說小參儀見前小參條禮畢舊住持率眾為新住持看單舊住持預退居東堂新住持亦率眾回看舊住持單儀見前尊宿條看畢各回本處晚二板聞鼓聲齊詣齋堂用普茶宣規約畢眾退舊住持富晚請新住持茶新住持回敬舊住持及兩序等茶凡專使及送進院人一一俱請茶乃至各各送房安單竟次日早粥二板後合寺上普供午齋舊住持請新住持方丈齋新住持亦回敬舊住持及兩序眾執俱方丈齋凡請齋茶使侍寮俱一一預請已臨時再請午後知客領新住持謁四隣第三日早課畢為建寺檀那陞座粥罷庫司差祖堂香燈嚴飾檀那案位并諸供器知客白維那請堂師十八上供新住持點茶湯問訊午齋方丈設齋謝專使并酬勞大眾或人多送齋於各堂寮亦可行單及執勞運力之人須酬勞金每人若干是日即當掃開山及諸祖墖如掃墖儀距遠則另日晚課畢或有告退執者新住持當留若執意求退亦須過數日待新住持稍暇再辭證義曰一夢漫言云邇來諸方堂頭一入院莫不分收檀施香儀即入方丈齋資乃歸庫房抑或單奉香儀則銀錢畜為己有欵客仍出常住累當家七事之憂不思常住屬我我物即是常住物雖香儀亦宜歸常住若萬不獲已必須私用亦當以情白眾而不惟自便斯乃住持本分行履也昔東山空禪師答余茂才借脚夫書其略云書中就覔脚夫不知出於常住耶空上座耶若出於空空亦何有若出常住是私用常住一涉私則為盜豈有知識盜用常住乎云云又山菴雜錄云雲外和尚晚住天童以常住為己任百廢俱新不倨傲不貪積不私食得施利隨與常住接眾惟謹雖於後生下執亦略無疎慢之意二時粥飯必掌鉢赴齋堂身雖眇小才德皆優至於圓寂毫無私畜學者感德遐邇稱讚噫如斯住持堪為師法矣住持出入凡住持有事遠出客堂先一日掛牌牌云明日某時方丈和尚公出往某處大眾師聞鼓聲齊集恭送住持預日午飯在齋堂白眾告假即晚方丈設兩序茶囑托院事監院與衣鉢備住持出門應用之物已次日時至知客鳴鼓四下即上方丈合掌白云大眾師送和尚住持到祖堂禮祖次至大殿禮佛畢即鳴鐘鼓維那云展具頂禮和尚禮畢隨送出山門而回凡住持在外朔望等節不掛免禮牌至回山信到侍者先報客堂客堂掛牌牌云即日某時方丈和尚回山大眾師聞皷聲齊集迎接候住持至山門維那云大眾師頂禮和尚住持說免禮即回堂然此乃遠出半月一月之禮若早出晚歸或三五日之期但告知衣鉢庫房客堂而行大眾不迎送又凡遇住持回山大眾不及迎接即於晚課畢上方丈頂禮慰安並請開示儀與晚參同證義曰此之住持出入即古之公事出隊及出隊歸也古之住持領眾辦道非常住公事未嘗敢出於寺今則身為住持不知領眾辦道逐日夤緣奔走以求名聞利養者其失可勝道哉然又有養尊處優憚於勞苦雖遇公事當出而亦置之不理者厥失維均愚菴摭古云昔奉新慧菴院臨洪洲孔道郡牧移書真淨擇人主之一眾憚行時惠淵首座孤硬自立雖於真淨有契證泯泯作息人無知者以眾不應是命乃白真淨曰惠淵何如淨曰汝去得遂舉之淵得公牒即辭去湛堂問曰公如何住持淵曰惠淵無福負栲栳打街供眾湛堂作偈餞之既住慧安如所酬如此三十年風雨不易百廢俱舉終於慧安闍維得六根不壞者三獲舍利無算異香累日噫從古至今常以打街供而為住持者唯師一人而已故錄之為喜逸惡勞者勸退院住持或受別寺請或年老或有疾病或世緣不順自忖福薄即宜知退密與兩序班首權執商定已齋堂表眾說要退緣由凡舉後住預察真實有道德者或宗眼明白或行止廉潔𠃔服眾望始可接住若有數人堪授而一時難定者即於韋䭾前對眾以鬮卜之若住持得人法道尊重寺門有光决不可私商於里人老堂人及房頭等當知彼不以常住為重恐有樹黨狥私互相攙奪之弊切宜慎之若所請𠃔許即將常住錢糓器物等項登記簿書一一分明具須知單目一樣三本住持班首權執各簽押用常住圖記印之新舊住持并庫房各收一本為執照至後住持進院前一日在齋堂辭眾隨上堂說退院法已移居東堂公請名德一人看守方丈待後住持至再同兩序交楚新住持須詳詢合寺事務將所交逐一對清倘前住持遺失必須賠補兩序執事倘有告假等事須候新舊交代明白若不候新住持到而先去者唯班首權執是問至居東堂者新住持當盡禮溫存以商正事證義曰叢林興衰在進退交關倘一顢頇常住虧損矣故不可不詳慎也至退院一節有道德人皆淡泊居心不肯貪戀禪宗秘要云世奇首座參龍門佛眼禪師洞臻元奧眼命分座師固辭云此非細事也如金針刺眼毫髮若差睛則破矣願生生居學地而自煅煉眼因以偈美之曰有道只因頻退步謙和元自慣回光不知已在青雲上猶更將身入眾藏又福州大章山契如菴主素蘊孤操志探祖道預元沙之室頴悟幽旨元沙記曰子禪已逸格則他後要一人侍立也無師自此不務聚徒不畜童侍隱於小界山刳大朽杉形若小菴但容身而已又杭州南蕩法空禪師久侍死心得旨後欲辭去死心記曰汝福薄宜以道自養後出世南蕩不踰月而院被火了無孑遺師嘆曰吾違先師之言故見今日之難又愚菴摭古云感禪師住黃龍有郡守臨牧以事侵之感笑作偈投之不揖而去偈曰院是大宋國裏院州是大宋國裏州州中有院不容住何妨一鉢五湖遊守使人追之已渡江矣觀此四事固以見古人之美節亦可知住持之任最重不可使無福慧者處之而凡應是舉者宜自審量也板賬凡住持病覺沉重監院預集班首權執等人至室若係餘人移歸病堂監院白云抱病堂頭和尚餘人改云某某執事師諱某甲字某甲年幾十幾歲係某省某府某縣籍於某年某月某日住持本寺領眾辦道餘人則云本寺安單在眾學道於今年某月某日偶值病緣恐風火不測於今某月某日移居東堂餘人則云入省行堂所有隨身衣鉢請書記師抄錄板賬以便後事伏希眾悉計開某衣某衣共若干某物某物共若干年月日首座某甲押監院某甲餘人則添寫省行堂主某甲押維那某甲押知客某甲押知庫某甲押書記某甲押看病某甲押物件仍留方丈命公謹有德人看守餘人寄存內庫房待病愈𠙥眾歸原人否則以俟估唱證義曰自古聖賢臨終屢有為惡疾所纏而不能免避者皆由夙緣業報而致也然不害其為聖賢凡小師看痛當存謹孝勿以惡疾而存輕忽之意愚菴摭古云死心頎南公之子夢神語師當感惡疾果患大瘋屏院事歸小菴養病頎小師克慈著名楊岐歸菴侍疾乞食村落謹孝不倦頎謂慈曰吾之嗣黃龍以其道行兼重不意半生感斯惡緣吾不因此怎有今日如今把住放行總得自由噓一聲而逝闍維香遍野舍利無數愚菴頌曰大聖示夙愆雙樹亦背痛吾師業可懲神人預為夢小師聞事罷參請得得歸來視定省柴門積葉蒼苔靜草砌無人青騁掩扉持鉢走村舍病僧簷下曝孤影歸廬火斷病僧饑怨鼠跳梁情耿耿久病難為人至性吾所秉頎公幸有廖淹淹殘陽景臨行噓一聲日射松窓冷又病者正念或不能持則看病者當以十念往生法門委曲開導斷不可少遷化臨寂時至凡伴病者齊聲念佛以助往生寂後一枝香盡方理後事或有標撥俵散物件須令均平以免爭競若衣鉢微薄務宜從儉遺戒小師不得披慟哭請首座主喪餘人應客堂庫房料理無主喪者一切佛事隨宜而行同亡僧例無費常住無勞大眾若住持有功常住執事亦然僧眾念其遺澤抑或衣鉢稍豐俱當從厚薦悼證義曰平日功勳在臨終看不必有疾苦亦不必無疾苦唯觀其自在不自在而已禪宗秘要云洞山良价禪師示寂時問眾曰離此殻漏子向什麼處與吾相見眾無對隨命剃髮澡身聲鐘辭眾儼然坐化時大眾號慟移不止師忽開目謂眾曰出家人心不附物是真修行勞生惜死哀悲何益乃令主事辦愚癡齋延七日食具方備師亦隨眾齋畢乃曰僧家無事大率臨行之際勿須喧動歸坐丈室端坐長往又翠巖可真禪師將入滅示疾甚勞若席藁於地轉側不少休喆侍者垂泣曰平生訶佛罵祖今何為乃爾師熟視訶曰汝亦作此見解耶即起趺坐呼侍者燒香煙起遂示寂此二古德臨終俱有病苦而乃自由自在若此豈非功勳之又經言人欲終時聞鐘磬聲增其正念要鳴在氣未絕已前今時直待亡者氣絕良久至入棺時方乃念誦擊磬已無及矣雖然此乃後人之事若亡人在日修行淨業至此時更得他人力助則如錦上添花若亡人在日不修淨業至此時全仗他力正使從氣未斷絕以前直念擊至入棺以後雖亦蒙益而其益有幾然則助道固不可少而辦道安可緩耶但臨終之際糾集同志分班念佛助其正念往生待氣盡一枝香而止不可少也入棺棺他本俱改作龕大誤詳證義中辯凡病危棺先預備其棺材料較俗減薄以便焚化氣盡久已再魚引念佛送入棺預請別剎住持至時說法封棺或即班首說法須跪說凡嗣法小輩俱合掌跪說封棺已餘人即本寺住持說法封棺或命班首隨所宜維那白云上來念誦功德奉為新圓寂堂頭大和尚餘人改某執事某甲上座入棺之次莊嚴報地十方三世一切佛一切菩薩摩訶薩摩訶般若波羅密客堂即掛牌請大眾師四人一班輪次相接到靈前誦彌陀經念佛晝夜連接至起棺止早晚課誦大眾齊到念誦維那回向云亡靈所造諸惡業皆由無始貪瞋癡從身語意之所生一切罪根皆懺悔唯願亡靈神不亂正念直徃生安養面奉彌陀及聖眾修行十地證常樂十方三世一切佛云云若亡僧有遺資加誦梵網經等按古制僧寂入棺著浣淨舊服外搭常用七衣上露頂下赤足數珠掛手坐具疊足前入已即用灰漆封固雖親族至不得更開不張羅孝堂不廣列聯輓不披蔴帶白不四出報訃不糾集施主眷屬不作俗格道場但照常念誦衣鉢之類盡以供眾住持尚如此餘可例知矣證義曰近日坐龕一事相習成風而不知有違佛制按涅槃經後分世尊在拘尸那城雙林樹下眠臥而寂入棺而化嗚呼佛為三界至尊尚眠臥入棺僧宜學佛亦應用棺明矣是故六祖壇經云死去臥不坐只此一句可見當六祖時亡僧亦臥棺也坐脫之事總由好名而起若果平日禪定力深能坐脫立化坐龕無礙如若一生外務不學趺坐命終強使坐龕費幾許氣力且亡識未全離難免大苦愚菴摭古云鎮州普化和尚唐咸通初將示滅向人乞一直裰人或與披襖或與布裘皆不受臨濟令人送與一棺笑而受之乃辭眾曰明日普化去東門死也郡人相率出觀師曰今日葬不合青烏明日出南門遷化人亦隨之又曰明日出西門吉人出漸稀出已還反人意稍怠第四日自擎棺出北門外振鐸入棺而逝此亦用棺之一證停棺既入棺已丈室停棺止間掛幃幙設諸供器如事生禮中間法座上掛真安靈位逢七陳列祭筵餘時爐瓶素花香燭二時上茶湯粥飯供養若諸山長老及士宦等行奠小師在真左答拜夜守棺幃停棺三七日火化入墖墖高三尺不得侈費石工及舉殯無益之事如綵亭音樂等俱不應用但眾僧念佛導引而已其住持一切規模皆仍其舊接諸來者不失常則莊嚴什物等不得移屬他處凡嗣法戒子剃度俱心喪而已六祖壇經云吾滅度後莫作世情悲泣雨淚受人弔問身著孝服非吾弟子亦非正法此是祖訓宜遵守也若兩序重病入上客堂命終停棺四日凡清眾外單重病入省行堂死後停省行堂一日即燒化不作餘事亦不設供位證義曰雲棲蓮池師云心喪者但略其哭踊非不展哀苦也按大涅槃經雖並無服制然佛當涅槃時眾撫膺大叫而血現今吾徒臨喪可不哀乎但不可同於世俗號呌喧亂耳又見近來住持圓寂其弟子為具帖求名家銘其墖必書生時父母得異夢云云死後火化某處不壞舍利無數云云豈無此數端不成尊宿乎曰吾宗所重者唯戒定慧之真修有禪教律之實德餘皆末事也至若火化而間有諸根不壞舍利流注者葢其平日所修純淨之驗亦豈易得哉葢棺論定金鍮自分縱欲妄美人豈可欺哉徒作一時笑據耳並記於此以告世之哀其師而不得其道者愚菴摭古云雲門偃禪師說法如雲雨絕不喜記錄見必罵逐曰汝口不用反記我語他時必販賣我去今室中機語皆香林以紙為衣隨所聞書之噫法語尚不喜記錄況妄飾餘語乎茶毗凡起棺燒化客堂預日下午掛牌牌云明日早粥後聞鼓聲請大眾師搭衣持具送新圓寂堂頭大和尚茶毗若餘人則通稱亡僧大眾師不必持具次日早粥二板後鳴大鼓三下雲集棺前誦彌陀經一卷乃至上供說法畢唱讚已維那白云欲舉靈棺赴茶毗之盛禮仰𠙥大眾誦彌陀之洪名用表寸沈上資覺路大眾念佛送至化壇白已即舉西方極樂世界云云首眾即前念佛導行眾齊步隨之各懷悲感監院隨棺倘路遙一知客路傍阻眾但送一二里即回隨俵散䞋唯兩序眾執十餘人監院隨棺送至化壇前上供說法如常名德舉火已維那白云新圓寂堂頭大和尚餘人則云某甲上座既隨緣而順寂乃依法以茶毗化百年宏道之身入一路涅槃之境仰凴大眾稱揚佛號資助覺靈白已起佛偈念佛約時久暫念畢眾唱讚已維那回向云上來念誦資助堂頭和尚餘人則云某甲上座往生淨土唯願慧鏡揚輝真風散彩菩提園裏開敷覺意之花法性海中蕩滌心塵之垢茶傾三奠香爇一爐奉送雲程和南尊靈白已眾皆同上問訊各回證義曰佛制亡僧燒化者令其離分段之假而證常住之法身也俗人見不及此語以燒化則謬為不情猶可今竟有僧畏燒化而遺命不燒者愚之甚矣又誤傳為一代住持者則不燒化亦訛若果如曹溪六祖等已證堅固不壞身留供不妨若未能不壞焚化為宜昔楚石禪師示寂於洪武三年時禁火葬師遺語欲遵佛制明太祖特為開例噫聖君明達若此愚僧當慚愧無地矣或問蓮池師云有欲臨終活燒可乎師答曰活燒之法大乘所開小乘所禁大乘悲願既重忍力已充故可開小乘祇知自利悲願輕微兼以忍力未充倘臨危而失其正念則其害可勝道哉況或貪身後之名或因一時之激既非正念必招苦果可弗禁歟又有為魔所著者平日趣向不正狂知邪見與魔相近魔因附之初動其燒身之念繼成其燒身之事以魔力所加端坐火中似無所苦無何魔去慘毒痛苦不可云喻百劫千生為橫死鬼良可悲悼故知死而不燒及未死而燒皆非正制末法僧徒切宜秉正而行又為亡僧說法恐其見道不明靈魂有所滯著實欲開發之也凡住持圓寂後一切佛事俱請名德說法其餘僧眾封棺起棺等事維那與首座稟問住持或自說或命班首代說唯秉矩即舉火須住持親說今時亦命班首有違古制至於因名打字說法乃古德一時觸機而說非拘拘有意為之山菴雜錄云無準住徑山為觀上座下火云觀大海者難為水窮盡波瀾一漚爾即今海滅漚亦亡回頭踏著自家底云云打名說法自此始後賢名勝因傚之至今叢林以打名字為定式牽綴逗合絕無宗眼而所謂開發亡者果何在也又不但為亡僧說法打名字即付法偈亦多因名按境而言既非性地本色惟向尖巧詼諧縱說得十成亦屬綺語而已有何益耶入墖燒化第二日入墖客堂預日掛牌牌云明日小食後聞鼓聲請大眾師集住持墖前餘人則改集普同塔前送靈骨入墖次日小食二板後鳴鼓三下維那領眾送入墖若路遠不掛牌但請兩序執事一二十人到墖前站班禮拜唱讚畢維那白云是新寂堂頭大和尚餘人則改某甲上座既依法以茶毗乃藏骨而入塔裂百年塵勞之網入一路涅槃之門仰凴清眾恭謹念誦資助覺靈白已誦彌陀經一卷往生呪三遍待別剎長老或名德說法竟餘人則本寺班首說眾念佛知客開墖將骨用繩垂入墖已仍鎻墖竟維收佛號唱彌陀讚回向維那白云上來念誦資助往生唯願草盡街頭花間碓嘴寂光土裏無見頂相常圓娑婆世間有漏塵軀永脫茶傾三奠香爇一爐奉送雲程和南尊靈白畢眾皆向上問訊各回證義曰按古例唯開山祖師及中興祖師於常住大有功者方另造墖其平常住持即入普同墖中間歷代住持墖而已凡墖院位或三或五或七或九之不同若唯造三墖者中間住持墖位左本寺及十方比邱之普同墖右本寺及十方沙彌之普同墖其尼墖仍歸尼菴不許附僧寺也或用五墖者中間住持墖左中本寺比邱右中十方比邱左邊本寺沙彌附優婆塞右邊十方沙彌亦附優婆塞或有七墖者五墖同上唯分出優婆塞兩種另為兩墖近來左末加比邱尼墖右末加沙彌尼與優婆夷合墖共成九墖又邇來尼墖大都附於男寺不時祭掃往來流弊百出不可不鑒估唱入墖後庫房齊會兩序執事監院維那知客值歲庫頭知浴衣鉢等將亡者行李除遺命贈人物請監院維那每件估價照時價七折筭書記上簿知客編號已值歲點數酌留一二件犒勞看病之人凡衣具被帳等有四角者應歸常住餘者即寫號條第幾號某件價若干縛於本件之上俱定價登簿已若餘人則應白住持客堂掛牌牌云估唱小食二板後眾集齋堂坐已維那舉香讚畢白云浮雲散而影不留殘燭盡而光自滅留衣表信乃列祖之芳規以法破慳稟先達之遺範今茲估唱用表無常仰凴大眾念清淨法身毗盧遮那佛遂舉佛號百聲鳴磬收佛號已白云今白大眾唱衣之法用表常規新舊短長各宜照顧領物繳價各照號條磬聲斷後不許返悔白已藍院照號取號條唱一件價維那鳴磬一下要者稱名收號條書記填某號某甲收知客僧值照應或當時錢物兩交副寺照號收錢知客給物或另日往庫房繳錢取物凡衣物先讓行單領買其亡僧所遺銀錢亦登估唱簿若豐厚分作三分一分準喪事另用及燈燭之費一分歸常住陪貼供養一分請眾僧念誦并佛事等用如亡者淡薄常住固宜賠墊大眾師亦不得心存苟簡估畢念佛回向維那白云上來念誦唱衣功德奉為圓寂堂頭大和尚餘人則云某甲上座莊嚴報地十方三世一切佛云云白畢各回證義曰估唱一事可以覘亡者之道心道心重者資財自輕資財厚者道心必薄其勢然也愚菴摭古云昔有尊宿宗教之輩尊仰之晚年被旨住院雅為朝廷賞遇臨終上震悼詔賜祭葬侍臣奏以此僧衣鉢太富現訟有司上不悅遂寢前命愚菴頌曰君不見雪山童子金輪子寶位棄之如弊屣草居露宿六春秋瘦骨稜稜近于死又不見迦葉老頭陀日中一食衣麤疎百萬叢中奪錦標兩土師尊居首科尊宿宗教師說法當如何尊宿寵眷隆上衣鉢多安牌五七送牌位入祖堂餘人於大眾牌中添一名字在七七日內追薦隨宜每逢七期或嗣法或剃度設薦或常住設薦餘人遇七期當設靈位前上供入位時祖堂上供證義曰梵網經第三十九輕戒云父母兄弟和尚阿闍黎亡滅之日及三七日四五七日乃至七七日亦應講說大乘經律是追薦之禮佛所教勅豈可忽焉但當豐儉合宜不可過費以損常住耳裝造佛像三歸正範云佛滅度後以刻鑄圖繪如來遺像是為佛寶遺像既為住持佛寶是我所依理合敬奉使其金色晃耀神氣常新如有故損宜自行裝修惟恐常住乏貲不能不資募化或有歸敬檀信發心願裝者亦可矣切不可強之令彼不樂兩無利益又今時僧家裝造佛像更有二弊一借裝造為由廣募信施而入私槖正犯楞嚴第三明誨偷心之咎一檀信所施裝佛之貲即以充常住別事之用亦犯涅槃所言盜佛物罪有此二罪故宜戒此弊也愚僧但貪現利不懼苦報輙謂僧是佛子衣食俱仗佛光恣意妄為自謂得計實可憐憫至若裝造之法雖不能一一具備相好但亦須大段不致舛謬今我震旦於肉髻白毫卍字三處全失如來本相按如來三十二相內肉髻一相當在正頂色紅高顯所謂無能見頂也今多偏在前又不甚高誤之甚矣至白毫卍字二相則從無造作者西藏所造之像唯肉髻得法卍字間有之至白毫亦從來未見又西像佛腰俱細頗為得法東國則腰麤非相矣此數處俱關大體且甚易造作後人裝造佛像切須留意內唯白毫一相恐匠作不知即嵌一水晶珠於兩眉中間亦得此乃外相可見匠力可作故摘錄之以備如法裝雕儼如真佛凡裝造佛像常住主人於開工日先當具疏上供以祈吉祥疏云伏以瞻紫磨之金身軌範全彰於法界現玉毫之瑞相光明普照於閻浮敢緣傾仰之誠特備金土木之用爰有一四天下云云切念某甲不逢像教憐罪𮊁以深纏渴想慈容幸善根以緣起恭就某寺造立南無本師釋迦牟尼文佛妙像一軀左範迦葉右儀阿難或裝別佛菩薩隨改俾人人仰望咸生禮敬之心在在瞻依廣作津梁之福特涓今月某日某時先起洪規伏乞加被自今立模之始逮至成像之日百動無虞諸緣順助威神昭著潛通伶俐之功妙相希奇傑出巧匠之手端嚴無比耀四八之靈儀依正圓成變百億之淨土兼祝風調雨順國泰民安檀那沾恩叢林鼎盛龍神衛護道俗蒙光右疏恭請三寶證明造佛開工文疏年月日某甲具疏若脩舊佛待上供已然後匠人封光證義曰輔弼侍佛俗云阿難迦葉是隨禪宗所名其經律論所指佛常隨侍實是舍利弗大目徤連非迦葉阿難也按大毗婆沙論第一百三十五卷中鄔波毱多尊者自以未曾覩佛儀容令魔王變現佛像以觀魔應𠃔即自化身作如來像右舍利子左大目徤連此魔乃曾親見佛者愈足徵信矣然而禪宗侍佛以迦葉阿難為尊講宗侍佛以舍利子大目徤連為尊推之律宗應以優波離大迦葉為尊隨各家所尊宗緒設像亦理之可通者所謂法無一定也裝造佛像功德法華經云若人為佛故建立諸形像雕刻成眾相皆已成佛道或以七寶成鍮鉐赤白銅白鑞及鉛錫鐵木及與泥或以膠漆布嚴飾作佛像如是諸人等皆已成佛道華嚴經賢首品云又放光明名歡喜此光能覺一切眾令其愛慕佛菩提發心願證無師道造立如來大悲像眾相莊嚴坐華座恒歎最勝諸功德是故得成此光明廣如樓閣正法甘露鼓經及造像功德經等所說如來身相有三十二佛說大乘百福相經云一者足下安平二者手足千輻輪網三者手足指纖長四者手足柔輭如兜羅綿五者足跟滿好六者手足指網縵七者足趺高平與跟相稱八者𦟛長如伊尼鹿王九者平身端立垂手過膝十者陰藏不現十一者身縱廣等如尼拘陀樹十二者一毛孔有一毛生十三者身毛上靡青色柔輭而右旋十四者身色微妙勝閻浮金十五者身光一丈十六者皮薄細滑不受塵垢十七者兩肩圓好十八者身廣端正十九者臆如師子王二十者兩腋下滿二十一者牙白而大二十二者四十齒二十三者齒白齊密而根深二十四者七處滿足二十五者方頰如師子王二十六者味中得上味咽中二處津液流出二十七者舌輭薄能覆面至髮際二十八者梵音深遠如迦陵伽二十九者眼如優鉢羅華三十者眼睫如牛王三十一者眉間白毫色如珂雪三十二者頂肉髻成又有八十隨形好始自肉髻高顯無能見頂乃至髮長不亂右旋青紺具如經說又有八十隨相茲亦不錄共有一百九十二相由裝佛取利犯楞嚴經第三決定清淨明誨者經言六道眾生其心不偷則不隨其生死相續偷心不除塵不可出我教比邱循方乞食令其捨貪成菩提道諸比邱等不自熟食寄於殘生旅泊三界示一往還去已無返云何賊人假我衣服裨販如來造種種業皆言佛法却誹出家具戒比邱為小乘道由是疑誤無量眾生墮無間獄取裝佛利亦犯涅槃盜佛物大般涅槃經後分上卷云若佛滅後一切信心所施佛物應用造佛形像及造佛衣七寶旛葢買諸香油寶華以供養佛除供養佛餘不得用用者則犯盜佛物罪噫施供佛物尚不得作別用況裝造佛錢豈可作餘用耶因果昭彰升沉皆自招矣裝佛圓工擇日開光正開光日時至焚香燃燭及諸莊嚴六塵妙供俱齊備已先請裝佛工人開點光明眾師與齋主三拜已齋主上香眾唱香讚畢維那高聲喝云釋迦如來二稱眾和蓮座降臨餘佛菩薩隨改下皆同此大迦葉尊者阿難陀尊者俱二稱輔弼蓮座眾和畢維那振鈴眾齊唱偈云佛面猶如淨滿月亦如千日放光明圓光普照於十方喜捨慈悲皆具足如於此會見佛坐一切塵中悉如是佛身無去亦無來所有國土皆明現偈畢煞下鐘鼓維那宣開光文伏以紺目金容現四八之妙相玉毫卍字放百億之寶光信瑞應於斯時實祥開於季運伏念某甲或稱眾等幸蒙世尊教法實渴仰於勝淨妙明仰賴大慈開迷敢圖報於紫金光聚既已和土範金圓成寶相用是諏吉選日開點靈光伏願現真實相放無量光巍巍蓮座作羣生低頭禮敬之因昱昱金軀示弟子瞻仰取足之教歸依則三途盡拔秉教乃九品頓超白已一問訊維那舉香花大眾各執手爐齊聲隨請云香花迎香煙請弟子某甲用住持名等一心奉請南無娑婆教主千釋迦千百億釋迦牟尼佛餘佛菩薩隨改惟願不違本誓哀憫有情分身現相居茲蓮座一拜三請三拜維那與請主等皆運想釋迦佛隨請而來儼然安居寶座已齋主拈香眾唱獻座偈呪佛身充滿於法界普現一切眾生前隨緣赴感靡不周而恒處此菩提座唵㫊暮伽一鉢頭摩遜娜𥛬二䭾囉䭾囉𤙌三漫拏𥛬𤙖三遍畢煞鼓鈸一通維那再宣大迦葉尊者開光文云伏以靈標遐寄千秋想雞足之風慧命長扶一脉衍龍華之緒恭惟西天初祖迦葉尊者靈山會上悟妙旨於拈花多子墖前播清風於椎拂作古今傳燈之標準開東西付法之淵源衣鉢流芳人天欽仰伏念某甲躭迷積劫莫覩微咲之慈顏慨慕聖容特肖飲光之瑞像敬諏吉日開點靈光伏願普圓明之照金色遍法界以流輝廣慈護之恩錦襴統羣生而覆幬使祖道以重光令正法而久住白已一問訊維那舉香花大眾齊聲隨請香花迎香煙請弟子某甲稱住持名等一心奉請南無頭陀第一拈花得旨禪宗初祖大迦葉尊者惟願不違本誓哀憫有情分身現相居茲蓮座三請三拜維那想大迦葉尊者隨請赴座眾唱獻座偈呪南無禪宗最初祖摩訶迦葉大尊者唯願隨佛來降臨受此輔座恒供養唵㫊暮伽一鉢頭摩遜娜𥛬二䭾囉䭾囉𤙌三漫拏𥛬𤙖四三遍畢動鼓鈸一陣維那再宣阿難開光文證義曰梵語摩訶迦葉此翻大飲光姓也佛弟子中有十力迦葉優樓頻羅迦葉等同姓故標大字以別之名畢鉢羅此菩提樹名父母禱樹神而生故從樹立名羅閱祇國人此云王舍城父迦毗羅世稱大富長者迦葉因中與一貧女同修毗婆尸佛像共誓常為夫婦身真金色是以迦葉身真金色具三十相其婦亦報得金色雖為夫婦了無慾意後出家值佛聞法即得無漏年已百二十歲其婦亦得四果迦葉受乞食法行頭陀行至老不捨佛言汝年老根弊可捨乞食及受長衣迦葉答曰我當盡壽行頭陀行佛言善哉若迦葉行頭陀行在世者我法久住法華會中蒙佛授記未來世中當得成佛名曰光明如來至涅槃會佛告諸比邱我今所有無上正法悉已付囑迦葉當為汝等作大依止佛滅後在王舍城結集三藏宏持正法至二十年以法藏付囑阿難遍禮佛墖即往雞足山持佛所囑衣入定住身以待彌勒佛出世付衣已乃入寂焚身阿難開光文云伏以師資慶遇夙欽耆闍之遺風法藏親聞欣受靈山之付囑恭惟啟教阿難陀尊者功高結集貫妙義於千花慧洽多聞傳一水於異器感巾瓶之夙緣示天倫於如來愛弟悟剎竿之倒卻領心印於迦葉師兄追思至教樂瞻如銀之清標渴慕真儀特倩範金之巧匠爰諏吉日開點寶光仰望聖師俯垂感格伏願真燈晃耀齊日月無量之光法乳汪洋等江河有源之水兒孫不替祖禰常存白已一問訊維那舉請眾同請香花迎香煙請弟子某甲稱住持名等一心奉請南無多聞第一為佛侍者禪宗二祖阿難陀尊者惟願不違本誓哀憫有情分身現相居茲蓮座三請三拜維那想阿難陀尊者隨請而來儼然居此弼座已眾唱獻座偈南無禪宗第二祖結集三藏阿難尊惟願隨佛來降臨受此弼座恒供養唵㫊慕伽一鉢頭摩遜娜𥛬二䭾囉䭾囉𤙌三漫拏𥛬𤙖四誦呪三遍畢煞鼓鈸一陣證義曰梵語阿難陀此翻慶喜以佛成道日生王心歡喜合國欣慶故名慶喜是佛叔父白飯王次子即調達之弟也面如滿月眼若青蓮八歲出家三十侍佛多聞第一法華會中蒙佛授記未來世中當得作佛號山海慧自在通王如來復告諸菩薩曰我與阿難於空王佛所同時發菩提心阿難常樂多聞我常精進是故我已得成菩提而阿難護持我法亦護將來諸佛法藏至涅槃會佛讚阿難有八不可思議功德及諸勝妙敕文殊降魔領阿難赴會受持大般涅槃經佛滅度後大迦葉結集法藏令阿難升師子座宣說諸經迦葉將入滅時法付阿難住持阿難遊行宣化二十年甞至王舍城外竹林中聞比邱誦偈云若人生百歲不見水潦涸不如生一日時得覩見之阿難慘然曰此非佛偈當云若人生百歲不解生滅法不如生一日而得解了之比邱向其師說師曰阿難老朽言不可信阿難後時聞彼比邱猶誦前偈即自思惟今此比邱不受吾教於世無益宜入涅槃即詣王宮告辭闍王而行王追至恒河阿難乘船在河中流王稽首白言三界明燈願勿涅槃時雪山有五百仙人觀見阿難將欲涅槃飛空而至乞求出家阿難即以神力化恒河變成金地為末田地諸仙人說法成阿羅漢時末田地欲先涅槃阿難囑云佛記汝當於罽賓國建立佛法遂不涅槃其餘俱時入滅阿難涌身虗空作十八變入風奮迅三昧分身四分一分與釋提桓因一分與娑伽龍王一分與毗舍離子一分與阿闍世王四處各起寶墖供養舍利維那白云上來奉請本師釋迦牟尼佛迦葉阿難二大尊者餘佛菩薩隨改天眼遙見天耳遙聞他心悉知身通自在一念能感聖應昭然更誦密言用伸殷重我佛如來有奉請真言謹當宣誦柰麻三滿多母陀南唵烏佐鉢囉諦賀多諦薩縛怛多孽多俱舍冒地唵娑哩野沒哩布羅迦也薩訶維那振鈴緩誦三遍想一佛二尊者在蓮座上光明交映維那白云願因秘密俱蒙光臨齋主拈香虔誠頂禮眾師齋主同禮三拜齋主拈香眾師齊誦吉祥偈安聖位歸命世尊無有上迦葉阿難共垂慈我今依教安聖位唯願慈悲哀納受迦葉如來具大悲諸吉祥中最無上彼佛曾來入此殿是故此處最吉祥拘那牟尼見無礙諸吉祥中最無上彼佛曾來入此殿是故此處最吉祥迦羅鳩䭾如金山諸吉祥中最無上彼佛曾來入此殿是故此處最吉祥毗舍浮佛無三垢諸吉祥中最無上彼佛曾來入此殿是故此處最吉祥尸棄如來離分別諸吉祥中最無上彼佛曾來入此殿是故此處最吉祥毗婆尸佛如滿月諸吉祥中最無上彼佛曾來入此殿是故此處最吉祥弗沙明達第一義諸吉祥中最無上彼佛曾來入此殿是故此處最吉祥提舍如來辯無礙諸吉祥中最無上彼佛曾來入此殿是故此處最吉祥波頭摩佛淨無垢諸吉祥中最無上彼佛曾來入此殿是故此處最吉祥然燈如來大光明諸吉祥中最無上彼佛曾來入此殿是故此處最吉祥誦偈畢即上供其齋佛儀載禪門日誦茲不具錄回向疏附此伏以佛身應現隨眾生而結歡喜之緣妙相端嚴恒不動而升光明之殿爰有一四天下云云入鄉貫姓名切念某甲前於某日發心䖍造釋迦如來迦葉阿難聖像三軀餘佛菩薩隨改茲於某日成就欣承至聖之範不同漢寢飛光得被道樹之陰儼若祇園敷座歸依有幸踊躍曷勝敬涓今月某日某時安位蓮臺圓成法相若拜懺誦經當續入於此以此功德謹申回向伏願寶座分身普應羣生之機感玉毫現瑞廣開法界之因緣俾低頭合掌皆種善根或心念口稱俱沾福慧更祝皇圖永固法道昌隆叢林安靜濟濟來賢聖之徒僧海調和綿綿挺龍象之子右疏恭請三寶證明造像圓成升座開光文疏年月日某甲具疏宣疏畢誦消灾吉祥呪化疏齋主奠茶作禮焚疏畢結呪已仍向上立維那舉回向呪用鼓鈸眾僧齊唱偈呪三遍唵娑摩囉娑摩囉彌摩曩斯哈囉摩訶咱哈囉吽三遍願晝吉祥夜吉祥晝夜六時恒吉祥一切時中吉祥者願諸上師哀攝受初遍三寶哀攝受二遍護法常擁護三遍畢三皈依竟其餘如裝造藥師彌陀文殊普賢尊聖像凡開工開光回向儀俱同此已酌改文偈其華嚴十佛吉祥偈惟諸佛可用造佛殿上梁圓成亦可用是日即稱釋迦佛名或別佛菩薩亦隨新裝所改稱證義曰吉祥偈出華嚴經第十六卷係世尊初升須彌山頂帝釋天主為佛敷座請佛納受已頌此十佛吉祥偈也今開光亦誦此偈以安聖位者以標佛像新成世尊初降亦如天主請佛納受而表此處最吉祥以辟除諸不祥也又按華嚴經佛升夜摩升兜率彼彼天主請佛納座皆先頌十佛吉祥偈何況人間豈可忽焉予私意凡新裝佛或新造佛殿當寫此十佛吉祥偈數張實貼殿上仗此經語禦捍邪祟猶如俗人書貼紫微黃道之意也脩整經典三歸正範云貝葉黃卷三藏聖教是為法寶經卷既為住持法寶是我所依理合敬奉使其裝訂整齊次第不亂乃或長閉經厨致蟲蠧朽爛或篇幅脫落部帙失次急宜脩補或募施主脩整亦可但不得作別用夫佛以法為師僧不重法可乎梵網經第四十四不供養經典戒云若佛子常應一心受持讀誦大乘經律乃至云若不如法供養者犯輕垢罪是故叢林立知藏藏主二執專司其事凡函帙安置脩補殘缺以及經本出入等事俱知藏總其綱而藏主分其執也凡經書以不出山門為限夏季風日暄明晾晒諸經查理字號候冷收橱本寺僧眾有請看者須登牌某月某日某人請某字函經還則消賬若其人告假并餘事欲去者先查取遺失者罰抄賠已出院若失於查取則知藏藏主二俱受罰照數賠補若私借與外人即無失亦罰凡交替執事須會客堂庫房及知藏到一一檢點清楚對眾清交新執若有流通經版安版處須明暗適中近風日則易裂太陰閉則易朽凡裝印紙墨以及書而訂線等俱以潔淨堅固為佳斷不可惜費省功咎同輕法也證義曰脩整經典乃表敬法寶此事係慧命攸關故此執亦為一寺重任而尤要在住持不惜貲費則脩整為易即執事之人亦因之而慎重矣至於叢林刻印經典流通乃興起佛法之第一大事愚意與其畵柱雕樑之多多益善不如黃卷赤軸之源源不竭利益後人誠非淺鮮即如今日緇白各得書本經典閱誦者乃嘉興楞嚴寺刻印大藏方冊之遺惠也假使無此一翻刊刻則書本必少梵本既難購且不便擕帶豈非僧俗之一大缺陷乎故凡叢林住持有心宏法者若果宗教精明自可隨機利人倘或住持事繁無暇及此則於現在切要經典隨力刊刻數種印送無力禪和功德無量華嚴經賢首品云又放光名法自在此光能覺一切眾令得無盡陀羅尼悉持一切諸佛法恭敬供養持法者給侍守護諸賢聖以種種法施眾生是故得成此光明又每見叢林之有經藏者住持漠不關心任其雨濕蟲蠧鼠殘而不一料理住持如此則執事可知若是者罪過亦無量愚意凡有藏經之處宜供一閱藏之僧使其日日翻閱看誦即是法輪常轉誠為叢林吉祥善事又有益於學人倘其日新有功即可延佛慧命豈不美哉第恐閱者有名無實或私行借賣者有之此則住持當不時稽查為妙愚菴摭古云棲賢諟禪師性高簡律身嚴動不違法暮年閱藏三次以坐閱不恭則立誦行披愚菴頌曰寶函藏真舍利積劫定慧深為法施迢遙來真丹征役非容易豈但立誦行諷圖報碎身猶愧脩造僧坊即寺院也從古立名故稱僧坊三歸正範云剃髮染衣嚴淨毗尼紹宏佛化是為僧寶既常宏化必依處所成就僧坊即其處也梵語僧伽此翻和合眾即出家五眾也梵語伽藍此翻眾園即僧眾所居也今名僧坊乃華梵兼舉耳然此中即供佛奉法之所而以僧坊為稱者佛殿法堂無獨立故梵網經不脩福慧戒云若佛子常應教化一切眾生建立僧坊山林園田立作佛墖冬夏安居坐禪處所一切行道處皆應立之云云夫既應立處所脩造之工費不能已也故叢林有知屋之執專司其事凡各處屋宇本無而新造者謂之造已有而或傾頺損壞須重脩者謂之脩凡所脩造當於必不可已者若其可已則已之葢為脩道而出家非為脩寺而出家也或在家檀信發心為之則可若出家人斷斷不宜孳孳而為當知以己躬下事為要緊此上等出家子之立志也至若志不及此而以造寺為功德者雖非性分中功德而有相莊嚴亦不可少但須不昧因果深知罪福不可尅減常住藏匿信施或不圖利而貪名以興建叢林為有光遂至運謀結勢巧奪強取令人吞聲輸納叢林未必遂興而已結若干怨憤人心若此佛意可知即守分僧苦行善募而未暗律學但知戒不私用則已遂乃移東就西將甲補乙或挪還急債或餽送僧俗不知甎錢買瓦僧糧作堂枉受辛勤反招惡報所謂天堂未就地獄先成也豈不悖哉又有住持雖不外募而別僧假名私募者當於寺外貼告帖一張上書本寺脩造某處係本寺自行竭力脩造靜聽檀越發心相助並無人在外募化云云一則免其脩名募化造業墮罪一則免其或因此滋生事端貽累常住證義曰雲棲法彚云建立叢林為眾固是美事然須己事已辦而後為之不然或煩勞神志或耽著世緣致令未有所得者望洋而退已有所得者中道而廢雖欽工御建事事優裕尚勞神費心自損不少況盡心力而募求乎或曰果如子言則佛像凐沒誰其整之墖寺崩頹誰其立之僧餓於道路而不得食誰其濟之人人唯辦己事而三寶荒蕪矣豈不聞脩慧不脩福羅漢應供薄乎答曰不然但患一體三寶荒蕪耳世間三寶自佛法入中國以來造佛建殿齋僧者時時不休處處相望何煩子之私憂而過計也又愚菴摭古云延恩法安禪師至黃山如意院敗屋破垣安住十年大廈化成即棄去所至不倦利濟晚居延恩屋廬牀簣破敗尤甚殊樂之令尹糾豪右將新之安哂曰檀法本於度人今非其發心而強之是名作業不名佛事也每謂人曰萬事隨緣是安樂法愚菴頌曰威之以行惠非出其誠心催科作檀度何異晝攫金我先如意院無意成叢林今之老也延恩院蔽風遮雨有茆苫君子居之有何陋蓬戶桑樞樂原憲破屋且勝樹下居聖師老衲皆茆廬顧我過之矣繹古發長噓按法彚摭古二條後人須善會其意法彚謂立志參學人己事去辦不可因此而自荒學非謂世間三寶之可荒蕪也特慧命為重耳摭古謂大脩行人自不圖安居大廈非謂佛殿之可任其傾頺且惡募強求有違佛制故不為也今之住持或不然既未甞立志參學終日為利夤緣只求自己之安飽不顧佛殿之傾頺有之稍圖體面者又或仗勢假威惡募強求者亦有之殊可慨矣夫既不能莊嚴自己一體三寶果能莊嚴世間三寶亦還救得一半此法彚未言之意也雖自己可以茆廬而居而三寶則當金碧以處但須有子來之風不可有催科之行耳此摭古未言之意也
