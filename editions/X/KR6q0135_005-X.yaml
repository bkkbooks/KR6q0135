body:
  text: 唐洪州百丈山沙門懷海集編清杭州真寂寺苾蒭儀潤證義越城戒珠寺住持妙永校閱住持章第五述曰住持者主持佛法之名也叢林立住持者藉人持其法使之永住而不滅也夫法者大聖之道也戒定慧者持法之本也僧園眾務者持法之事也本立而事乃治事治而本愈固故住持之人其關係最重大也粵稽靈山住持大迦葉統之竹林住持舍利弗主之自佛教入中國肆百年而達磨至又八傳而至百丈其時唯以道相授受雖與眾同居而規則簡略儀文未備未有禪宗住持之名百丈以禪宗寖盛上而王臣下而士庶皆嚮風問道統宗會元勢不能不專於一人而此一人者苟不稱其位則道不明不崇其體則法不立於是始奉出類拔萃之一人為禪宗住持而稱之曰長老以齒德俱尊也復作廣堂以居其眾設兩序以分其執而制度粲然矣然住持之體雖尊至於作務猶與眾均其勞賢如百丈而有一日不作一日不食之節則住持之義可知故當其時由眾所推或命之官而猶有辭聘舉而不赴者誠重其任而無所希慕於其間也至於今則庾廩之富輿僕之安皆住持私之無怪乎貴鬻豪奪視若奇貨矣嗚呼住持苟非其人一寺廢蕩且遺害於後世至於數十百年而不可復豈細故哉後之舉其人者幸審之處其位者宜慎之誠得其人以居其位則明道立法分執蒞事一切成辦上堂凡上堂預日下午掛牌牌云啟請或晚課下殿或晚二板或開小靜客堂鳴序板三陣集眾預俻序䞋知客令請主向上拜眾僧三拜已知客白眾云今某省某府某縣某姓名護法來寺特請兩序恭詣方丈啟請和尚明日上堂白已悅眾鳴引磬二下眾問訊兩序先至方丈左右排立次使照客捧香儀置方丈法座上次知客領請主執香至方丈侍者通白住持持臨座眾僧隨具一拜仍兩傍站定知客令請主中央拜已退後知客居中一觸禮合掌白云仰白和尚大慈忍聽今有某省某府某縣某甲護法為某事來山飯僧謹同兩序大眾懇請和尚明日上堂為眾說法惟願和尚不吝慈悲默然允許懇禱之至白已一拜知客歸本位立請主再上香設拜住持默允禮畢維那云兩序大眾師頂禮和尚眾隨具一禮禮畢末後先行回客堂請主謝畢眾回堂次日早粥二板再鳴序板集眾上方丈請主上香與前同請後堂師回堂當值侍者搭衣持具傳上堂牌至禪堂門外鳴小板二下暫立待堂師齊站班侍者進堂捧牌立中上舉已香燈師接牌供於禪堂佛前侍者行十方禮出堂維那令香燈師捧牌送法堂前或大殿前正中懸掛即舖設法座午梆開靜香燈師徐徐鳴七星鍾大眾齊至法堂方可結椎燒香侍者傳爐置法座上排檀香三瓣在案上俟住持拈香用復轉下行十方禮禮圓鳴鐘擂鼓大眾分左右班走鳴引磬上方丈迎請眾集請主上香設拜以及兩序禮畢維那呼末後先行客堂預請二位為末首領眾行不可參差其引磬在執拂侍者之前次捧爐次執具記錄共四人次請主執香次住持執如意而拄杖隨住持後餘人俱隨後眾至法堂或殿上左右排立知客與請主側立於下住持至中間問訊登座侍者立左右維那鳴磬一下鐘鼓齊歇唱香讚知客領請主上香設拜住持拈香侍者接香插爐唱奈麻雲來集菩薩摩訶薩至第三遍上加海會二字唱畢維那呼展具頂禮和尚尚答不展具眾隨具一拜禮畢起具照位對立左右悅眾輪次鳴引磬三陣燒香侍者拈香三派展大具三拜次眾侍者齊展具三拜起具問訊歸位已維那鳴磬三下又壓磬已白椎云法筵龍象眾當觀第一義鳴磬一下住持垂示隨機開導座下欲叩問須誠謹真實參究者出眾向座隨具一拜起具合掌問之語首須清朗和雅問答畢住持說法或住持不垂釣即不出問待上座說法竟維那白椎云諦觀法王法法王法如是鳴磬一下即呼展具頂禮和尚尚答不展具眾隨具一拜禮畢呼末後先行眾出爐杖拂如前隨後至方丈知客領請主禮謝和尚及兩序已眾僧向上維那呼展具頂禮和尚尚答不展具眾隨具一拜禮畢回堂侍者齊出班頂禮和尚或免禮上供等事見下飯僧儀軌聖節元旦佛誕成道結冬解夏無齋亦上堂監院為請主事儀同上唯無香信序䞋齋䞋公䞋等凡上堂等佛事冬月眾去帽施主請陞座儀同此證義曰凡登座說法須至心聽記不可作難會想生退屈心亦不可作串聞想生容易心須虗懷聞思必有機發不得隨學語者但取口辯所謂蛇飲水成毒牛飲水成乳信學成菩提戲學成生死是也即主法非其人亦不得於彼生輕薄想反障自心所謂依法不依人也故聞法時靜耳目而聽攝根塵而會倘有疑情咨詢不厭以道為懷掃除習氣打併一心勤修而觀力轉深煉磨而行門益淨如是久久定慧發可見自心性矣至說法者須提綱要學者請益遂形問答總為生死事大直截決疑不可以盲引盲誤人誤己倘自諒非其人不妨轉煩能者請一賢明首座以代可也又禪客發問切須虔誠真實吐露倘賣才弄巧必招惡報禪宗秘要云按禪書天台韶國師座下興教明和尚問曰飲光持釋迦丈六之衣在雞足山候彌勒下生將丈六之衣披在千尺之身應量恰好祇如釋迦身長丈六彌勒身長千尺為復是身解短耶衣解長耶師云汝却會明拂袖便出去師曰小兒子山僧若答汝不是當有因果汝若不是吾當見之明歸七日吐血浮光和尚勸曰汝速去懺悔明乃至方丈悲泣曰願和尚慈悲許某懺悔師云如人倒地因地而起不曾教汝起倒明復曰若許懺悔某當終身給侍師為出語曰佛佛道齊宛爾高低釋迦彌勒如印印泥據此可見發問不易暫時弄巧斧在口中可不慎諸晚參小參附五參住持日用宏法為務除不時上堂外朔聖說法必不可怠若五參陞座兩序至座下徑歸班立住持登座不拈香又所謂參者凡集眾開示皆益於參古人匡徒使之朝夕咨叩無時而不激揚此道故每晚必參謂之晚參或早課後眾上方丈儀同上堂謂之小參又凡遇結制解制冬夜歲夜對靈等皆說小參初無定所看眾多少或就方丈或就法堂在齋堂前預掛小參牌如四時八節請班首於課完在大殿秉拂亦可亦須預掛秉拂牌牌邊另貼紅紙一條請某某大師證義曰昔汾陽昭禪師住汾州太子院以并汾地苦寒故罷夜參有異比丘振錫而至謂師曰會中有大士六人奈何不說法言訖昇空而去師密記以偈云胡僧金錫光為法到汾陽六人成大器勸請為敷揚時楚圓守芝號上首楚圓即慈明也後住石霜時揚岐會公為監寺勸請夜說法慈明曰暮而升座從何得此規繩會徐對曰汾州晚參非規繩乎慈明頷之朔望附茶話每月十四三十放假集禪堂前剃頭淨衣午飯後開小靜洗浴晚課畢禮祖上方丈或說晚參回堂聞鼓聲吃普茶聽宣規約回堂方丈另請兩序茶一則察問學人見解二則評論常住去事依律布薩在此二日朔望早課傳爐祝聖祈禱維那喝雲集禮祖上方丈小參與元旦相彷唯禱四聖在大殿唱讚佛偈已接念佛時大悅眾同鳴法器數人然後出殿到四聖前呪讚祈禱早粥時客堂掛上供牌牌云大眾師聞鼓聲齊詣大殿及四聖前并影堂上供餘見前祝釐章景命四齋中說及見後大眾章布薩條詳明入室請益每月初三初八十三十八二十三二十八日方丈掛入室牌入室者乃師家勘辯學人䇿其未至正其邪執如金爐煉金鉛汞不存玉人治玉碔砆盡廢不拘昏曉不擇處所皆可行之學人入室請益必須誠心搭衣持具先白維那已悅眾領至室外立侍者彈門三下通白住持住持允則領學者進室展大具三拜長跪合掌乞求開導將自己平生參學盡情發露毫無隱藏不得自己妄逞知見狂造異說胡言亂語和尚自然慈心痛為針劄提持進步開示畢起立拜謝退出向侍者問訊回堂不可放逸自恣空延歲月孤負平生發心參學之志證義曰入室之事學者須真實請益師家須婆心指點方為不負若學者參學不實師家道眼不明縱然依樣畫貓兒實應酬故事而已近日諸方除一二真修禪林外并入室事亦少行之尤可慨也巡寮古規每逢初三二十八念誦仁王等一年四節巡寮僧堂前掛巡寮牌報眾各寮中央設住持位備拈香及茶湯伺候住持至鳴小板集本寮眾於門外排立問訊隨住持入寮寮主燒香敬住持同眾一拜問訊而坐住持詢問老病點檢寮舍缺乏敘話而起眾當展坐具拜謝臨訪免則問訊相送或朔望巡寮則不掛牌今則四節巡寮三八念誦俱不行每逢朔聖祈禱四聖等處以代念誦至於巡寮之事住持每日早晚課誦念佛時禮合寺各堂聖像隨便詢老問病檢點院事證義曰僧祇律云世尊以五事故五日一按行僧房一恐弟子著有為事二恐著俗論三恐著睡眠四為看病僧五令年少比丘觀佛威儀生歡喜故今住持遵佛遺儀故亦巡寮也普說普說起止之儀與小參彷彿小參唯住持說語須直截類於上堂普說語有多種不同住持說者或遇告香或夏前告香或中夏或特為某事或因請開示或為求決疑或為行者說或警䇿於學者或激揚於古道故文長義足名普說也抑或命人人各說隨其語言而勘辯之記錄即用紙正楷寫法語實貼齋堂廊下告香古之叢林依律結夏每夏前告香未預告香不許入室其告香在方丈或法堂今則禪宗於結冬貼單日早粥客堂掛牌牌云告香小食二板後鳴大鐘三下庫司到韋䭾座前設供香燭煇煌候禪堂止靜開小靜合院大眾搭衣持具齊詣韋䭾殿左右次序集已住持拈香維那舉奈麻香雲葢菩薩摩訶薩三遍照常上供畢齊展具三拜已仍對面立住持高聲白眾云暗室虧心神目如電善惡報應似影隨形但有早遲終無漏網謹白大眾各諦思惟惟兢惟惕戒之慎之白已至韋天前拈香三派三拜長跪合掌高聲告白我住持某甲若叢林不治法輪不轉尅眾益己侵損常住者使我現生之內折祿減壽惡疾纏身或遭惡難示報大眾臨命終時墮落三途諸惡趣中唯神鑒臨以警來者自下諸誓各須預熟以便告香告已一拜退立本位四班首同至韋天前居中拈香齊拜已長跪合掌齊聲告曰我首眾某甲若三業不勤四儀不肅恣縱威暴辜負常住者使我現生云云告已一拜退立本位下皆同此次維那拈香三派三拜長跪合掌高聲白曰我維那某甲若私心偏護規勢欺壓辜負眾人不盡執事使我現生云云次都監監院副寺衣鉢等凡財帛飲食經手者齊至韋天前居中者拈香三派齊三拜長跪合掌高聲告曰我監院某甲若容眾量窄愛眾心薄侵公益私瞞昧因果者使我現生云云次知眾知客僧值等凡調眾辦事者齊至同上我知眾某甲若憎貧愛富重俗輕僧過費常住圖自適意者使我云云次禪堂清眾某甲等若人多十人一班齊至同上我清眾某甲若懈怠偷安不辦己事虗消信施辜負常住者使我云云次列執等亦十人一班齊至同上我列執某甲若不盡本執有誤眾人費常住物而取自安者使我云云合院人俱告香已仍左右對立合掌悅眾鳴小魚子誦梵網經不發誓願二戒佛說梵網經菩薩心地品若佛子常應發一切願孝順父母師僧願得好師同學善知識常教我大乘經律十發趣十長養十金剛十地使我開解如法修行堅持佛戒寧捨身命念念不去心若一切菩薩不發是願者犯輕垢罪若佛子發十大願已持佛禁戒作是願言寧以此身投熾然猛火大坑刀山終不毀犯三世諸佛經律與一切女人作不淨行復作是願寧以熱鐵羅網千重周帀纏身終不以此破戒之身受於信心檀越一切衣服復作是願寧以此口吞熱鐵丸及大流猛火經百千劫終不以此破戒之口食於信心檀越百味飲食復作是願寧以此身臥大猛火羅網熱鐵地上終不以此破戒之身受於信心檀越百種床座復作是願寧以此身受三百鉾刺身經一劫二劫終不以此破戒之身受於信心檀越百味醫藥復作是願寧以此身投熱鐵鑊經百千劫終不以此破戒之身受於信心檀越千種房舍屋宅園林田地復作是願寧以鐵鎚打碎此身從頭至足令如微塵終不以此破戒之身受於信心檀越恭敬禮拜復作是願寧以百千熱鐵刀鉾挑其兩目終不以此破戒之心視他好色復作是願寧以百千鐵錐劖刺耳根經一刧二刧終不以此破戒之心聽好音聲復作是願寧以百千刃刀割去其鼻終不以此破戒之心貪嗅諸香復作是願寧以百千刃刀割斷其舌終不以此破戒之心食人百味淨食復作是願寧以利斧斬斫其身終不以此破戒之心貪著好觸復作是願願一切眾生成佛菩薩若不發是願者犯輕垢罪誦畢齊聲唱回向偈曰叩禱韋天尊威靈賞罰明善良多降福奸惡盡遭橫叩禱韋天尊威靈賞罰明公忠多降福私曲盡遭橫叩禱韋天尊威靈護叢林有人壞規矩立刻殃其身叩禱韋天尊嚴査真假情現前告香者誓要記分明叩禱韋天尊嚴査眾誓盟一句應一句句句報分明佛說梵網經有發誓願戒持戒因此勵破戒因此醫若說心存正何必用立誓飾此言詞人欲安心取利怕立神前誓何須住叢林韋天杵可畏須謹莫自欺負心人告香硬著頭皮來叩禱神靈顯加他三倍灾叢林若將衰奸邪漸進來叩求神聖力速賜剪除開誦畢舉韋䭾贊大眾三拜起具各回本處晚課畢巡寮又新住持入院後執事請定為眾告香然後開堂告香回後住持命侍者令客堂掛普說牌其儀軌與小參彷彿住持為眾開示下座已或命班首乃至參頭止挨次一一激揚此道即以此勘排學人證義曰告香立誓者誓是必固之心始行心弱宜須防持故發願誓以自防也若誓願心意不發道何由成辦乎增一阿含三十八經云比丘不發誓願者終不成佛道誓願之福不可稱計得至甘露滅盡之處故護持叢林必須告香以表清白然清白與否唯己自知人不及知人雖不知神實知之倘有愚僧誑妄對神自謂神是泥木或可欺瞞欲望僥倖逃於惡報縱使暫時未報終必受殃無能逃者可不懼哉或曰願多期望之語誓類呪詛之辭似非修行所宜答曰誓願中之勇烈意也呪詛怨中之毒害意也奈何以勇烈為毒害乎即如四宏誓非誓乎菩薩修行非四誓則成佛無基亦將以為呪詛而疑之乎總之告香之典關係於叢林不小告香行而人人知懼縱有飾詞者亦寡矣告香廢而梟鸞不別縱有特立不變者亦寡矣故叢林將興告香行也叢林將衰告香廢也興衰之機於是卜之愚菴摭古云慈航朴禪師主天童二十年食不背眾雖病不違奉己甚約待眾甚豐有小師知庫畢歸拜師曰某竭力營轉增一倍贏不敢自有納之常住朴怒曰汝所贏者悉從巧取不義之物常住淨財容汝不義物乎不納併逐其人噫小師私財納之常住已罕見聞猶怒不納併逐其人守斯告香清之至矣古道若是堪作師表告香者知之念誦凡念誦或常住自辦或施主發心俱當預定今約施主例尊官到知客同住持迎接儀見後說若非尊官客堂接待與飯僧同預日設壇嚴淨乃至滿散見祝釐章掛牌牌云本月某日某職某護法為某事誦某某經頂禮某懺共若干日諸師挨次輪日每日幾名開列於左某甲首座師某甲西堂師云云或逐日輪差或三日一換從班首至清眾內外均派嚴淨時經師先上方丈頂禮和尚請開示已進壇知客請施主拈香嚴淨已知客呼請主禮謝眾師三拜各回若係尊官則從權免禮次日開經知客令請主拈香正日宣疏上供圓滿上方丈回復凡經懺師不許在外應酬其經䞋公䞋等隨各家古例原本念誦條後接水陸規約九門今移於後另卷附念誦規約凡十一條古之叢林高蹈絕俗除祝𨤲外不通應酬政為大事不明剪爪不暇那肯應酬散其道念又若自未度何以度人故經云瑜伽一事乃登地菩薩利生之事非初心凡夫所宜然恐叢林淡薄缺乏所須衲子懈修法門衰減不得已乃略應念誦必也進壇生道場想對經像如對佛想誦其文思其義行其事踐其實必使身與口合口與心合不昏沉不散亂不懈怠不貪利知因果知慚愧競競業業若是則不期度人而自度人不期利益而自利益所謂人以財與我我以法與人等施無異猶可權為若鼓橐籥不出聲也或不識字而看經舂杵碓不觀想也全無誠意而禮懺身對尊像而目視他方口誦經懺而心存別念如是必招現前叢林道衰未來自靈受苦使自利利他之法寶反成自誤誤人之罪案可不慎哉所有規約謹陳於左誦經人先日見牌上有名即沐浴次早誦經懺須眼到口到心到不得於誦經懺時夾閒雜語亦不得經住便說話若雜談戲笑於經懺中罰銀壹錢八分在經懺歇後戲談者罰銀八分念誦時不得回頭轉腦看人看物一心稱念字字分明不出聲者完時罰重念過嚴淨不至者罰銀三分誦過一頁方至者罰銀六分經懺須補誦主法人不得散心妄想宜一一依文精誠作觀表白人不得急遽簡略宜一一依文次第宣誦其鐘鼓等亦宜莊雅不宜繁碎經懺及施食等不得法事未竟先收佛像莊嚴器物施食要一一依文精誠結印誦呪作觀三業相應不得含糊彈舌急促了事白文亦然內外香燈行人俱要誠潔火燭小心水陸堂中尤宜加倍慎重香燭供果等倘落地者不用已供過者亦不用蔬菜飯食等必熟得味不得填底不得用乾物生物犯鬬諍者罰銀八分因爭失威儀者罰銀一錢八分不服者出院所罰之銀另簿記數待修補經懺佛像用庫房要用心打點整理合用諸物不得苟簡以上條約須信受遵持不然自取殃禍現有清規罰汝後復決有因果可不慎哉年月日住持某甲重錄證義曰凡有念誦為轉法輪邇來僧眾此多苟簡罪戾不小雲棲法彚云昔烏鎮利濟寺有僧師徒二人俱稱謹厚記以經懺者日益眾因致饒裕而悋嗇不自享用亦不布施後得疾族人迎歸調治俄而謝世平生積貯盡為族有十年後現夢於所親曰經懺未完陰府考較甚急苦不可言世人所傳電閃光來認字讀還信不誣也筆之以誡夫應緣者又云水陸頭尾相連經懺接繁不斷求經次汲汲如選官請經師忙忙如報喜經懺日興道德日衰叢林至此不振甚矣可為浩歎設斛凡清明中元十月朝除夕設斛祭先即日下午客堂懸牌牌云是晚某節良辰于法堂設斛或施主有事隨改中座堂頭和尚或班首代隨改表白某甲師某甲師共四位侍座某師某師共二位中座於權執班首中選舉表白於客堂藏寮侍寮悅眾輪派或有䞋資中座表白侍座寫疏知客厨房值壇香燈茶頭照客辦供等俱照各家舊例證義曰設斛之事至於今日其譌多矣略言有十按密部儀軌將欲施食當先結界以成淨地結界之法用木四方定椿以繩攔之使人畜不得進界然後設施食壇鬼神壇俗呼寒林臺又呼孤魂臺及設兩旁薦位於界內其施食壇至孤魂壇中間用白布三疋作三道寶街待戌時初法師同表白先持大悲呪四方灑淨水想此界內以神呪力及觀想力變成淨地以為壇基誦呪三遍已法師施食壇前中間立定表白輔弼左右法師隨想界內淨地廣大無邊眾動鼓鈸用七星板如唱阿彌陀佛身金色腔齊唱淨地偈云一切方隅所有地瓦礫砂磧等皆無琉璃寶地平如掌柔軟微妙願安住猶如極樂國莊嚴妙寶為地眾花敷園林池沼無缺少以大法音願具足從出世間復能現種種七寶之所成無量光明遍照處諸佛菩薩願安住唱畢煞下鼓鈸一陣法師自舉偈云先結大輪明王印加持壇場悉清淨我今依教誦密言令我所作皆成就白已即默誦大輪明王呪二十一遍呪詳施食儀軌呪畢即起香云云茲者密部絕響結界不行其譌一也又準本經佛說是摩伽陀國所用之斛此食此水量同法界食之無盡今據我國一斛當五斗凡施食應用五斗米飯以成飯山五斗桶煑熟得味菜以成菜山五斗缸清潔冷水以成乳海方合佛制祀孤已次日清晨將此菜飯分為三分一施水族即放生池或大河海二施毛羣即放生所或山野處三施他方即乞丐流或貧苦人若無放生處即施遠地貧苦者近見飯不滿一杯菜不敷一筯或詰之以食太少則曰七粒遍十方而水全無殊不知七粒遍十方是僧眾二時臨齋出生之法乃常行之其勢不能多施食則專為此事而設故須事相全俻依佛敕用摩伽斛法故云設斛修齋加以神呪法力能令一食變無量食充足河沙品類皆得飽滿又恐眾類以貴輕賤以強陵弱擁遏孤幼令不得食使不均平越佛慈濟故請三寶及諸神祇監壇敕令使我所施一切無礙無高無下不擇冤親平等普遍邇來多不如法只用斛手不設斛飯正是食物未週終成虗設其譌二也又施食之事全重在有戒有定有觀慧有手印有真言至於敲唱助道而已茲者不擇戒定不熟觀想手印訛舛真言糢糊唯將唱腔以為正務匪唯赴應庸僧如此即叢林高德亦習而不察甚至以酒為敬桃榴為供不知其過其譌三也又祀孤原以施食為名則重在飯多菜多水多可遍濟飢渴至於冥資紙衣之類亦施道而已今者反是菜飯水不合佛制之供而主家飲噉反多縻費全無誠意感通不濟苦鬼飢渴舉世皆然不覺顛倒其譌四也又設壇祀孤召諸鬼來重在三檀等施施其飲食資生施也施其破獄摧罪等無畏施也施其三皈七如來名等法施也然此三施俱在壇前獲益即有冥錠亦應在壇前待誦尊勝呪完後方可焚化使諸眾食足法足財足既濟飢渴復轉善道方為有益乃邇來焰口鬼未召完先往沿路焚化冥錠使彼鬼眾三不得全愛冥資者失其聞法受食愛法食者失其冥資又不在壇前焚化則無神祇監管諒彼鬼眾以強欺弱在所不免施不平等又或榴桃樹邊即化紙散食是鬼畏懼不敢來受或火未盡掃灰破碎難用舉世不知其非其譌五也又施食法壇全出密部今略言之用大方桌兩張前一張為供佛壇最前一行香爐燭臺花瓶第二行花香燈塗菓樂六天母像此六天母像或用木雕或用銅錫細裝顏色六位各一色一面四手少年窈窕兩脚左舞右跪兩手各持本供面向於佛花母持花衣淡紅色表施香母持香衣黃色表戒燈母持燈衣紅色表忍塗母持水衣白色表進果母持果衣紅黃色表定樂母持樂器衣青祿色表慧像下俱踏蓮花花下俱一吽字書於立脚臺面大眾唱吽字湧出讚時法師不必做手勢結印但澄心閉目想六天母色相各從一吽字湧出既湧出已面手放光各持香花等供養三寶此名運想供養第三行供佛亭在中恰似寶塔形中供毗盧遮那佛佛亭後插一銅竿上用小鈎懸旛一首寫中央毗盧遮那如來又四方供四佛面面向中央佛蓮座火焰後亦各插一銅竿上用小鈎各懸旛一首寫東方阿閦如來南方寶生如來西方無量壽如來北方不空成就如來中佛兩傍再點大燭一對中佛後即後八仙桌第一行用鏡架置大圓鏡一座即準提經所說鏡壇也鏡前供曼怛所謂曼怛者梵語曼怛此云壇此壇約一世界總論非但為南洲一洲言壇如世界中之須彌山法師座處如南洲四洲皆朝須彌南洲坐南向北在下就南而論須彌在北南北之位既定則東洲應在右西洲應在左即依此舖米入觀師前鈴杵花米盤兩傍隨置儀軌共四本此正制也邇來壇前譌用五方童子壇中譌用水菓等不知佛過午不食奚用食菓舖曼怛誤以南上北下西右東左其譌六也又施食文卷重在下半卷所有偈文呪印俱當緩誦前半卷從開首至召請地藏皆為求佛法僧三寶作證乞濟度拔苦而已所有偈文可直聲快誦今者反是先在壇下諸設位前種種念誦次及上壇乃至別別召請嘆孤種種敲唱延緩良時直至破獄召請餓鬼乃至尊勝呪正當運心作觀緩緩持誦反急如風至於法事未完先收壇儀上則輕慢佛聖下則虗誑鬼神舉世不覺其譌七也又施食結界上壇應在西末戌初葢戌亥二時乃純陰之際鬼神無畏之時施其法食則受益良多一交子初則陽氣轉而陰氣衰鬼即有畏縱施法食彼不來受邇來有戌末尚未登壇至五更方完者或一夜登二登三者是則虗耗財物空騙鬼神唯了心願不諒陰靈其譌八也又施食普結鬼緣當先施其無畏是故先結界限不許人畜進界者使其安位也葢人陽也鬼陰也陰常畏陽故施食壇前人不得走設不得已當從壇後行之邇來或以蘭盆勝會彰名或以保佑平安為號盛懸燈彩廣掛紙神招搖男女聚集如看美戲如觀奇伎加以大鑼音樂喧閙塵囂純以人之陽氣逼之匪唯遠處鬼神不敢赴召即本地祖先亦驚往他方矣如此則徒設財食難結鬼緣反結鬼怨舉世不覺其譌九也又考藏中施食最初緣起唯佛說救拔焰口餓鬼陀羅尼經是不空譯又實叉難陀譯名佛說救面然餓鬼陀羅尼神呪經即前經重譯俱唯有變食真言而已不空又譯出瑜伽集要救阿難陀羅尼焰口儀軌經嗣有阿闍黎復依此經節為瑜伽集要燄口施食儀軌北卷現見藏中簡要直捷只有一條法界六道總召請及召請餓鬼印呪等儀無奈時人愛飾口耳加別別召請嘆孤等事行世俗稱海上𦦨口是也致使藏中原卷寢擱不行嗣天機大師目覩海上所行有違佛制節去繁蕪不意後人仍加繁𤨏即今流通本是也又按雲棲本考正本等並無五方結界者邇來好事者請五位法師設東西南北中五個法壇既然稱五方結界應當如前結界所說而結界之即四方四位法師亦應各持一呪東北楞嚴東南大悲西北尊勝西南隨求今但四方空坐而不持呪假稱作觀其譌十也有此十譌不惟無益而恐有損俗語云短壽𦦨口正在此耳主施食者可不慎乎是故欲學施食外當反此十譌而成十真內則發無上大菩提心先習觀智及諸印呪皆令精熟不得謬悞若稍謬誤不成印契賢聖不喜凡所祈求不獲成就作法者知之廣如諸家施食疏釋所說薰墖薰塔者齋主與諸師各侍香煙而繞故名薰塔今但念誦而不執香失所敬也齊主至客堂接待與飯僧例同即掛牌牌云即日某時某護法薰墖請師幾位列名于左某某師云云即通知塔主上下內外掃灑潔淨行單二人詣庫房領燈油燈草共燈若干盞每盞油滿燈草七枝時至集薰塔師知客請齋主拈香維那唱香贊施主三拜已維那舉遶塔偈云敬心觀墖當願眾生諸天及人所共瞻仰右遶於墖當願眾生所行無逆成一切智繞墖三匝當願眾生勤求佛道心無懈歇偈畢維那舉腔悅眾鳴魚眾齊誦奈麻多寶如來奈麻釋迦牟尼佛從第一層右遶三匝次至第二層右遶三匝乃至最上末層俱各遶三匝又從上次第下來亦各三匝已維那收佛號即舉禮塔偈云頂禮於墖當願眾生一切天人無能見頂偈畢維那舉腔一心頂禮多寶如來釋迦牟尼如來眾齊拜四十八拜極少十二拜在上午可上供若下午不上供或一日三次二次隨意至晚點燈迨第二日天明再如上薰塔一次回向熄燈維那宣疏云伏以覩舍利之光明靈蹤彌布于法界瞻浮圖之高廣剎幢遍照于人天灑香水以敬掃塗燭明燈而遙稱拜罄茲誠切仰瀆圓明續入鄉貫年庚謹為某事切念某甲積劫竛竮不悟法華之變土多生輪替罔逢雙樹之潛輝幸寶墖之在處巍然信如來之法身常住欣修行願用展䖍恭涓于今月某日謹備油香恭詣某寺頂禮寶墖稱揚聖號幾次點燈幾夜集此微因仰酬慈蔭伏願寶葢旋空天樂奏梵音之深妙金蓮湧地旃檀雜花雨之繽紛現瑞相於娑婆使羣生咸知歸仰放毫光於塵剎俾萬彚盡出苦輪以今稱禮之因願成菩提之果如有願求之事於此加入但不得近俗事而違遠佛法致成褻慢右疏恭請三寶證明薰墖文疏年月日某甲具疏宣畢化疏如常儀次舉薰墖功德殊勝行云云結三自歸三拜各回本處然此亦可僧中或一人或多人私自稱禮不必燃燈證義曰此中遶墖四偈出華嚴淨行品又藏中有遶墖功德經一卷佛說遶墖勝妙不可思議古云無事莫登三寶殿等閒休向墖中行若非掃地添香水總有輪王福也傾葢寶墖諸佛法身所在須信歸敬則生善滅惡而登禮有福不可戲笑登遊筆之以告今之遊觀者三寶殿亦然點藥師墖燈點藥師墖燈者經云若有病人欲脫病苦當為其人七日七夜受持八分齋戒即八關齋戒應以飲食及餘資具隨力所辦供養苾蒭僧晝夜六時禮拜行道供養彼藥師瑠璃光如來讀誦此經四十九遍燃四十九燈造彼如來形像七軀一一像前各置七燈乃至四十九日光明不絕造五色彩旛應放雜類眾生至四十九日可得過度危厄之難不為諸橫惡鬼所持據此經文壇儀甚為明易今改作藥師塔燈是依大灌頂部成式若無塔燈仍依經點又若無七位佛像亦可依七佛藥師經而供七佛名位上懸十二藥义大將五色神旛及諸莊嚴或誦經或禮懺或一日三日七日乃至四十九日隨齋主意回向疏云伏以慧日圓明燭十方之世界智燈晃昱破大地之昏蒙入二六之願門越三祇之果海續入鄉貫年庚謹求某事恭惟一十二願誓度沉淪四十九燈光明普遍七層洞徹於天宮三德普霑於沙界延壽量以無窮述宏功而罔測茲今月某日恭詣某寺云云伏願無明頓破本覺開明常瞻滿月之金容恒覩義天之玉軸慈輝照處災難全消願輪轉時壽年綿遠恭請三寶證明燃燈文疏年月日具疏宣畢化疏次舉燃燈功德殊勝行云云亦可燃燈度亡具如本經所說證義曰可供七佛名位者據七佛藥師經一奈麻善明稱吉祥王佛二奈麻寶月智嚴光音自在王佛三奈麻金色寶光妙行成就佛四奈麻無憂最勝吉祥佛五奈麻法海雷音佛六奈麻法海勝慧遊戲神通佛七奈麻藥師琉璃光佛藥义十二神旛者一金龍身首威光同王宮毗羅大將二執金剛杵長壽童顏伐折羅大將三腰束金帶多種福善迷企羅大將四住持十山有大名聞安底羅大將五身如淨珠戒香光嚴頞你羅大將六首冠花鬘現石女形珊底羅大將七能為天主護持田地因達羅大將八名號鯨魚具諸幻術波夷羅大將九行同龍蟒執日戲樂摩虎羅大將十頭有一角人見起疑真達羅大將十一威嚴若殺身光如月招杜羅大將十二廣尋善藝教諸字本毗羯羅大將又本經云以此善根願生西方極樂世界無量壽佛所聽聞正法而未定者若聞世尊藥師瑠璃光如來名號臨命終時有八大菩薩乘空而來示其道路即於彼界自然化生或有因此生於天上乃至還生人間云云據此稱名可以度亡而薦往生燃燈亦可以度亡而薦往生不僅現世消災延壽而已也上供儀軌見前報本章藥師佛誕同普佛接待齋主照飯僧例即掛牌牌云普佛時至鳴大鐘三下巡照打催板一轉眾集殿知客領齋主上香行禮維那舉香讚誦彌陀經大懺悔繞行稱佛名千聲拜彌陀十二禮觀音勢至海眾各三禮三皈依宣疏回向散䞋或有宣疏移在前香讚之後若度亡念佛完即往靈前上供化設位回向竟知客命齋主禮謝大眾各回肅眾凡叢林有公事客堂鳴序板三陣兩序齊至客堂遵規議定呈問住持住持準行則行不準再議若為諍鬬行者首眾舉知客即舉罪事云云各照事情重輕罰之若犯根本大戒者或生事惹禍重大者白方丈公議或稟有司或自公擯將擯條實貼頭山門貼擯條時鳴大鼓三下以杖攻出被擯之人只許從偏小門而出如魔黨私護者一同出院若交拳破口鬬諍者不論有理無理並皆出院若一高聲動手一默然不動者據理論理虧又高聲出院理正能默然不罰若理虧默然與高聲者並罰齋供眾倔強者擯出院或求懺悔於大眾臨供時長跪齋堂僧值看眾食竟白眾云今者某甲犯某過現在僧前求眾懺悔大眾齊答阿彌陀佛住持開示犯規人云某甲汝既住叢林應當謹守清規廣修善法云何反作此無恥之事云云汝今既求眾懺悔宜真實悔過自新若再犯者內有僧規擯罰汝外有國法栲治汝死有三途苦報汝可不懼哉汝能真實悔過否彼答曰蒙和尚慈論我某甲實心懺悔說畢再禮住持三拜尚云眾僧在內拜畢結齋回堂又輕者罰跪香幾枝或罰腐供眾餘犯闖靜等事俱本堂罰跪纖香一炷或錯打鐘板搭衣持具跪齋堂或上方丈四寮本堂求懺悔而止凡跪香堂中犯本堂跪堂外犯或佛殿或齋堂須眾人共見之處跪之跪必合掌豎腰如敢放逸者加以杖責具載下各堂規約所說又堂外有犯在知客罰堂內有犯在維那罰出普不到避懶偷安不聽知眾監收催督在值歲罰如山野不遵規矩在知客先舉呈方丈教訓證義曰僧徒自當恪遵佛制豈可有犯清規若有犯者除刑名重罪例屬有司外若僧人自相干犯當以清規律之若鬬諍犯分若污行縱逸若浸漁常住若私竊錢物宜從家訓無揚外醜蓋悉稱釋氏準俗同親應守祖規隨事懲戒重則集眾箠擯輕則罰腐罰齋而榜示之如關係錢物則責狀追部惟平惟𠃔使自悔艾古規繩頌云盜財并鬬爭酒色污僧倫速遣離清眾容留即敗羣又云犯重焚衣鉢應當集眾人山藤聊示耻驅擯出偏門昔大慧禪師住育王時榜示堂司僧爭無明决非好僧有理無理并皆出院或議有理而亦擯疑若未當殊不知僧當忍辱若執有理而爭者即是無明故同擯之所以重僧規也愚菴摭古云昔圓通法雲禪師座下明水遜為侍者適琳禪師掛搭遜為請新到茶琳他出遜托之隣榻僧移時忘之比會方丈座無琳圓通趣請至乃令去座立眾前責之曰山門禮數以表尊特故為怠慢何也琳曰固聆鼓忽內逼故後之非敢慢也圓通色厲而呵曰我鼓非巴荳擊著你便尿耶遜前請曰遜失執當受罰隣榻僧出眾曰此非侍者罪新到亦不知某受托而失憶當代罰出院三人任過不已圓通高其義併宥之噫如是肅眾如是任過高風可仰𠃔稱師表矣或曰有惡僧也顯諫之則不從默擯之則不喻干世綱常冐國憲典不可以僧法治者則如之何答曰此在權其事宜不可執一執於護法反至滅法者有矣與其全一人而辱及三寶孰若全三寶而殃止一人若稍無妨害者宜依清規量事區分若有妨害或倔強犴狡不可化導只可送官用王法處之不得免也或曰佛心主慈仁今清規甚嚴密無乃非佛意乎答曰子不知清規之嚴非嚴厲之嚴是嚴正之嚴也以嚴正攝僧則僧眾端以嚴正持法則法門立以嚴正攝心則心地正故責之擯之皆慈也以嚴為慈是大慈也若夫現奇特以要譽逞暴以示威與清規之嚴正實霄壤矣不可不辯此之問答出雲棲法彚訓童行古規知隨照客輩俗人為之故稱童行今叢林用僧者則不應稱童行須辨童行即叢林知隨照客之類也亦名隨眾古者於外來發心出家或求習學之人恐其立志有詐真偽難辨故先與三皈依名為童行亦號淨人標其已入三寶淨行而無五欲濁穢也邇來局為執勞運力承事之流濫稱道人從無為之說三歸者悞矣佛印禪師示訓曰自小離於父母第一皈依佛祖寅朝禮念精專夜靜堂中莫語普請作務慇懃常住什物愛護一粒米重千斤口裏應聲須顧觸事不要猖狂出言低聲慢舉出入束斂身心行步威儀詳序廊下逢僧問訊叉手旁邊待去既然捨却俗緣遵奉叢林規矩師長訓誨之時不得高聲辭訴白日無事學書聖教經文記取謹慎遞相作事且莫欺瞞常住衣衫黑黲直裰莫騁尖新麗楚仔細約束身心勿令世情染污深思六道輪𢌞警䇿應當恐怖出家要秉佛言不信三途受苦小心侍奉師僧恭敬三寶福助童行上下謙和酒肉賭錢莫閒話不要論量聖教時時思慕豈可虗度光陰死後將何𠙥據不唯辜負四恩亦乃帶累先祖辭親割愛投師本欲出塵濟度慷慨決志修行省察輪𢌞不住萬劫得箇人身慚愧須知來處去除懶惰睡眠調伏身心寬裕從小戒行真實長大為僧堅固參禪報答佛恩誓願須求頓悟今生幸得出家不可遇而不遇念念不退善根心心長成覺樹若能如是修行必證菩提之路此規誨當寔貼於本寮以便觸目警心證義曰童行乃學道護僧之執也故亦名道人或稱淨人是故於童行要鉗轄嚴威庶不為惡山菴雜錄云千瀨住嘉興天寧淨人盜街坊人狗煑而食之于瀨得煑狗名又荊石住姑蘇承天駕舟赴檀家講經墅落淨人盜居民羊煑而食之荊石得吃羊名噫盜狗盜羊出於下人私為何故住持當其惡名蓋尋常失於教訓且不留心察看耳為住持淨宜時慎之為行者普說行者有通有別通則不但外單名行單凡一切修行人皆名行者故有普說之佛事也別則此執在方丈乃服勞運力之人葢前訓童行乃在家小眾此行者是出家小眾須發心求福者充之古有普說之名而無普說之文大都在住持隨機設教耳其行者所執之事附錄於此早四板法座點燈打開水淨面水住持禮佛執燈籠清晨內外打掃拭桌取水料理內外客房床帳桌地等須潔淨并運茶取齋等事及洗碗收拾凡呼喚即至誤事者罰須勤儉次第勿避辛苦細心行之證義曰三世諸佛諸大菩薩皆從行門而出凡有道之人未嘗不有隱于執勞運力之類者愚菴摭古云雪竇典客太陽時與客夜話雌黃古今及趙州因緣往復不已傍立行者匿笑之客退雪竇呼行者責之曰對賓客敢爾耶對曰知彼客辨覈古今柰無定古今眼故敢笑雪曰趙州意汝奚會行者對以偈曰一兔橫身當古路蒼鷹纔見便生擒後來獵犬無靈性空向枯椿舊處尋雪竇大驚乃與定交或云行者是承天宗又云韓大伯噫古人具正知見如此猶隱於行者之流可見於諸行者不當以其服勞運力而輕之而身為行者亦應志求出世借行以助道不可安於服勞運力而無遠大之志也受法衣凡專使送法衣至客堂先以客禮待茶點即命照客通白住持或住持當日親往客堂相接或時晚送上客房來早相見先用盤托呈法衣信物置法座上然後知客陪上見住持行相見禮已專使致詞云上某下某老和尚法衣表信專此奉上云云即方丈請茶點送歸客房次日早課畢說受衣小參或陞座或上堂若送別物不須說法或嗣法本師已寂法堂右間即設靈几下座致祭用祭文諷經如遺書至之禮見後說證義曰此行尊師之禮也匪唯法衣為然乃至師賜呵策亦須誠敬而受方盡法子之禮雲棲崇行錄云晉法遇事道安為師後止江陵長沙寺講說眾經受業者四百餘人時一僧飲酒遇師罰而不遣安遙聞之以竹筒貯一荊杖封緘寄遇遇開緘見杖即曰此由飲酒僧耳我訓領不勤遠貽憂賜遂鳴椎集眾以筒置前燒香致敬伏地命維那行杖三下垂淚自責境內道俗無不嘆息因此勵業者甚眾蓮池贊曰噫使今人發安老之緘其不碎筒折杖而誶語者寡矣聖師賢弟子千載而下吾猶為二公多之掩關掩關之模始是圓覺經中佛為修禪觀行者制期而設也然上期止一百二十日至於東土掩關多以三載為期乃行脚得意後養道之事也時至集眾於大殿及韋殿本關上供維那舉香讚關主拈香設拜殿之佛前上供畢維那宣疏關主俯伏在維那後疏云伏以研真斷妄孤高晏座深林修觀明心守志藏形靜處精勤不退乃善道之初門放逸多疲是愆尤之根本續入鄉貫年庚及所求事切念既超俗染應離憒閙之方已忝僧儔當處清閒之境一關施設特為某事之專三載為期兼脩誦禮之助茲今月某日為始至某年某月某日告圓在于某寺掩關如法行住伏願慮從靜得一真之本昭然慧自定生萬行之苗增長一塵不染閉門即是深山十智同真離念便登覺地右疏恭請三寶證明掩關吉祥文疏年月日具疏至本關上供已關主搭衣持具往方丈請住持封關住持出關主展具三拜請住持至關房門外正中立一拂一杖侍立左右關主立在住持後維那舉讚讚畢引磬對鳴三陣已住持說法說完住持送關主進關封鎻關門已即以法語貼關壁外結韋䭾讚畢各回本處啟關啟關時至仍集眾至關房門前先說法開關已然後上供維那宣圓關疏云伏以安居秘藏悉彰化道規模入定那伽遍現威儀進止常恒不變何妨應用機緣靜極而通豈礙行周法界續入鄉貫年庚及所求事切念某甲質類盲龜智猶爝火望一乘之至道似窮子之遠牛車閉三歲之空關如兔株而迷象徑虗糜信廩唐擲光陰身苟安於斗室全叨佛力以護持期已畢於解關特仗懺功而酬謝爰擇云伏願以此圓關功德上祝皇圖鞏固帝道遐昌民物阜安風雨時若六道均躋于六度三界永息于三灾先親證果往生檀施沾恩獲福更祈住持某甲道風遐被法算增長叢林昌熾海眾安和德業均修福慧具足右疏恭請三寶證明圓關謝安文疏年月日某甲具疏回向如常儀關主禮謝眾師已各回關主上方丈頂禮和尚及往謝諸寮證義曰古云趙州八十猶行脚只為心頭未悄然據此半偈信知掩關乃了悟後養道之事雲棲崇行錄等皆載元高峯妙禪師頓悟後在龍鬚九年縛柴為龕冬夏一衲後造天目西巖石洞營小室如船榜曰死關上溜下淖風雨飄搖絕給侍屏服用併日一食晏如也洞非梯莫登去梯斷緣雖弟子罕得瞻視噫如斯掩關聖賢之道豈不成就較今掩關百色現成實天淵矣何怪乎道衰也迎待尊宿六禮迎待看單第一凡別剎尊宿至守門人即報客堂客堂白方丈知會禪堂維那白云某寺和尚到眾位搭衣持具迎接外鳴鐘出堂至山門候客至維那云大眾師頂禮某和尚禮畢住持陪尊宿至方丈住持拈香設拜畢維那呼眾云展具頂禮某和尚禮畢復云頂禮方丈和尚禮畢回堂值日侍者上茶果衣鉢照應尊宿寮房被帳床褥及說法座已次知會客堂送單知客至合掌向住持云送單請某和尚住持隨送禮畢各相安坐晚課掛牌牌云聞鐘聲看某和尚單各帶具上殿晚課畢鳴鐘詣尊宿座前候住持座前拈香禮畢維那呼眾展具云看某和尚單禮畢仍立定或住持方便請尊宿開導如不請開導即回堂侍者排班拜畢次上茶點凡賓主晤談法門中事侍者澄心敬聽可記者即錄之證義曰自迎請至送回皆敬師友重道德之禮儀也標稱尊宿者其道德可尊也雖其道德不可知而既係尊客有主賓義禮當敬故且令學人習慣敬長之道離狂傲故愚菴摭古云雪巖滿禪師與勝默為參友嘗跪受呵斥或怪問之師曰今諸方或師資法屬諍訟招譏獅子身中蟲自食獅子肉可悲也予思以激勸之耳噫古人事友如是高風千古則於他方尊宿其可慢乎至所甞受業之尊宿不更重乎陞座第二看單後命知客至尊宿前一禮合掌云方丈和尚兩序大眾明晨請某和尚慈悲陞座尊宿如允遂一禮覆方丈或住持親請不論登高座小參陞座次日早課時送紅衣到尊宿處傳陞座牌早課畢鳴鐘上方丈排立住持登座不拈香不舉讚維那呼展具頂禮和尚隨具一拜禮畢住持云今者某和尚道德高超法眼圓明今至此處乃大眾宿緣有幸䖍請開專維那云頂禮和尚一禮畢鳴引磬燈籠前行住持大眾次第至尊宿處住持拈香若尊宿與住持同輩即監院拈香或班首代拈拈畢維那呼展具頂禮某和尚此時住持先回禮畢呼末後先行至法座尊宿登座拈香舉讚乃至說法開導儀與上堂同唯登高座說法則鳴鐘鼓白椎餘皆同上證義曰此上敬下導互相激揚之禮也摭古頌云昔悅禪師至雪竇齒正壯辯論奇逸雪竇常下之茶會必設榻以尊異於是聲價踴貴洎悅出世有蘭上座來自雪竇悅勘之大驚譽於眾相從彌年而去前輩不以派異推轂後進可想見矣愚菴贊曰悅禪牙爪新獅子雪竇巖前能反擲見賢不敬非禮也雁翅開筵進香液我鼓瑟兮君撫琴仁風道望化蠻貉蘭公蘭香來雲峯雪竇茶筵今反璧落堂第三果係大尊宿應更請落堂粥畢住持親請尊宿如允即令值曰侍者通知客堂掛牌牌云請某和尚落堂開示即通知維那那白眾云今請某和尚落堂開示眾同參師各具威儀伺候佛前備香燭知客白住持云堂中齊備已請某和尚落堂住持陪尊宿至禪堂門口知客鳴報板二下班首維那鳴擊出接餘者立定尊宿或參堂行禮或單禮佛已住持遜客入座尊宿亦遜住時入座賓主謙恭坐次維那云大眾師頂禮二位和尚禮畢仍兩邊立定住持云諸人特到此處專為己躬下事無柰我某甲智淺力薄不能為汝等抽釘楔有負來志今者某和尚駕到此實乃宿緣慶幸某和尚於道辛苦多年具正法眼汝等當作難遭之想䖍心求請開示唯望某和尚垂慈悲於彼等一一開導萬望萬望尊宿開導畢維那云諸同參師禮謝某和尚禮畢又云諸同參師送某和尚若免即止住持陪回方丈侍者上茶茶畢送回寮或尊宿不𠃔落堂諸班首等各搭衣持具詣尊宿寮請求開示證義曰古之住持待學者唯以此一事相淘汰故賓主相見纔入門便以此一事相懇代為提持何其盛也今者法門不幸賓主雜談大抵世諦開示辦道希有其事致使學人漫遊千里空費參詢遐哉古規何日復矣噫請齋第四凡請尊宿齋侍者先於方丈設香案桌椅茶果次第住持先命班首伺候一同陪齋時至令班首一人侍者一人至尊宿座前一禮合掌云方丈請某和尚用齋尊宿至賓主行禮送正位坐拈香獻茶禮畢尊宿至住持座前拈香回禮坐次班首齊向尊宿座前為禮次向住持禮畢各照本執陪坐侍者齊出班作禮如免即一拜次上茶上果一桌侍者二人一一上菜各具威儀用心伺候不得使鞋履碗筯作聲齋畢賓主禮次淨手嚼楊枝潄口已送歸客寮侍者即送茶照常伺候證義曰昔高菴云教化之大莫先道德禮義住持尊道德則學者尚恭敬行禮義則學者耻貪競住持有失容之慢則學者有凌暴之弊住持有動色之諍則學者有攻鬬之禍先聖知於未然遂選明哲之士主於叢林使人具瞻不喻而化即此尊客待賓威儀柔嘉發言舉令皆可為後世之範模其用意良厚矣近時一槩苟簡賓主互輕禮義道德漸滅殆盡悲夫參堂巡寮第五凡尊宿參堂巡寮客堂先掛牌牌云某和尚於二板後參堂巡寮次知會維那班首維那白眾云今日某和尚參堂諸同參師各具威儀禪堂備坐椅一張知客領尊宿至堂外鳴報板二下云某和尚參堂候尊宿參堂行十方禮已悅眾將坐椅設中間首眾請尊宿坐維那云大眾師頂禮某和尚如免即止禮畢尊宿出堂知客鳴引磬至各寮慰問知客白云某寺某和尚巡寮問訊某某師巡畢請回方丈用茶敘談證義曰此尊宿答接待看單之禮也然此答禮中或有轉煩客堂報庫房設齋供眾者或但設腐供眾者或即以此巡寮為答禮而不供眾者此古禮也今則不然若看單而不供眾將羣起而譁矣噫回山第六尊宿將回山知客預先掛牌牌云大眾師聞鐘聲送某寺某和尚回山候時至客堂先上方丈向尊宿一禮云大眾師山門俟候送某和尚回山尊宿乃行住持送尊宿至佛殿尊宿禮佛畢即鳴鐘鼓維那呼眾云展具頂禮某和尚如免即止同送至山門排班合掌立送候去少時望不及眾乃回寺維那云大眾師上方丈頂禮和尚住持免云總請回堂坐香維那領眾回本堂證義曰尊宿往來之禮是重道德非重名位果真尊宿雖無名位亦應如是重法以勵學人愚菴摭古云昔羅漢南禪師嗣法雲居未為人知後至東林照覺鳴鐘集眾出迎於清溪之上眾大驚南師之名遂顯又佛印再住雲居時靈源叟禪師自龍山來匿跡眾居佛印知之陞座請源為座元禮敬優沃眾皆觀感道學日新又宋紹興間竹菴珪禪師奉詔開山雁蕩能仁寺時真歇了禪師居江心聞竹師至恐其緣未熟時過江迎竹師歸方丈大展九拜以誘溫人由是翕然歸敬噫如斯三住持可謂重道德而盡迎待尊宿之禮矣後之覽者當仿傚也護法至凡尊官至寺守門人報客堂客堂白方丈住持同班首及監院等在山門候接數人搭衣在佛前排立候官拈香時唱香讚住持鳴磬禮畢請方丈用茶住持陪伴應對行時仍同班首監院等候送出山門其餘一切檀護至皆須禮儀周到不可輕慢令外護灰心也若遠方明眼居士至如檀護法送單後輪今班首禪僧詣寮盤桓道要亦勿錯過均以賓主禮相見證義曰城市隣近叢林多有此事總須威儀齊整令人生敬而已至於臨機施設則存乎其人山菴雜錄云杭州下天竺鳳山儀法師元延祐間高麗駙馬瀋王被旨禮普陀觀音過杭出貲就明慶寺設齋齋諸山住持時至瀋王居座上眾官以次班座下諸山列兩廡鳳山趣上問王曰今日齋會為何王曰齋諸山鳳山曰大王既言齋諸山主人合無位而王自處尊位諸山列兩廡至有席地而坐者與邏齋何異於禮恐不然王聞之惶愧請謝即時下座前揖諸山分賓主而眾官退就兩廡之位齋畢王握鳳山手曰非吾師幾不成禮此所謂臨機施設而能開人之心者鳳山是也今世人好諛惡直此法不可輕用然古人芳規亦不可不知到宗剎諸山前之尊宿六禮是彼來也此之到宗剎諸山我往彼也彼我雖異其禮自同見上迎待尊宿禮可知矣有不同者見不住持出入所說茲不錄慶生凡遇住持壽誕預先一日庫房請香燭送各堂知客上方丈問住持明日念誦否若念誦即掛牌云云若不念誦即止次日早課各帶具合寺香燭煒煌燒香傳爐住持拈香維那舉寶鼎爇名香讚不祝延即誦楞嚴遶佛如常歸位展具禮釋迦佛三拜藥師佛十二拜日光月光海會各三拜起具課畢鳴鐘三下維那云大眾師齊上方丈慶賀和尚壽誕至已左右依次站定維那請住持住持陞座維那喝云大眾師敬祝和尚壽誕頂禮三拜拜已或說法或不說法昨晚間定說則照小參常規不說即於拜畢起具回堂早梆大眾用午梆上供照朔望式齋堂設腐慶賀等事槩不準行若舉念誦儀軌見上唯異疏云伏以寶燭初明晃耀金光搖壽岳琅函乍起汪洋法水湧靈濤依佛法之常住慶我生之遭逢鄉貫名年庚事切念某甲荷佛祖之光輝衣鉢有忝於寶剎稟凡夫之分段善緣實起於慈幃茲值母難之辰有懷罔極之痛是以敬集同袍齊詣寶殿頂禮某懺諷誦某經伏願聖基永固叢席興隆俾師長父母而過現沾恩冀祖禰宗親而遐邇獲福更祈某甲道行堅修智悲普運色身康泰晚節清娛生生披萬善以莊嚴品品證六通而自在更願以此功德情識均超咸𠙥一善之資成就無窮之福右疏恭請三寶證明幾旬慶生文疏年月日比丘某甲具疏回向時住持當令一侍者代謝諸師餘儀如常證義曰此順世禮敬住持報宏法之德也昔唐文皇萬乘之主生日不為樂況僧乎故曰在眾宜行在主宜止行則念誦亦可止則絕喧為正飯僧飯僧施主至客堂應酬即報方丈次令照客捧香儀點明送方丈香案上交代衣鉢侍者次領施主至方丈見住持作禮住持以禮接待稱美數語茶畢知客送單或當日來去即不送單若仕宦當鳴鐘集眾門迎見前護法至說方丈命監院照施主之資備大眾齋䞋不得侵損常住不得剋苦大眾酌中施設掛上供牌牌云大眾師聞鼓聲齊詣大殿及韋殿上供開午梆上供時掛飯僧牌牌云某處某護法為某某事設齋供眾若上堂齋預日掛牌若設如意大齋應三日前掛山門外至臨齋時知客領施主拜齋已領至厨庫謝代勞謝畢方丈請齋監院陪齋或一二班首或都監亦可凡齋銀任凴發心平等俵散公䞋序䞋客送等隨施主心客堂不許索較齋銀五兩已下則無公䞋若但設腐飯槩無䞋亦不上供六兩至十兩外每兩出銀一錢以為公䞋照各家舊例疏語亦隨事通達證義曰稽古略云宋居士洪慶善任江東節度使宿池州愚耶宗禪師迎之相與夜話洪間飯僧見於何經宗曰四十二章經云飯凡人百不如飯一善人飯善人千不如飯一無住無作無證之者則是正念獨脫能飯斯人功齊諸佛前輩知此旨者多矣洪曰其為誰乎宗曰且以近說如秦少游貶藤州自作挽章有誰為飯黃緇之句東坡既聞秦訃以書送銀五兩囑范元長為秦飯僧及東坡北歸至毗陵以病不起太學生裒錢於東京慧林飯僧黃門撰東坡墓誌首載之洪曰䞋金有據乎宗曰公豈不見毛詩小雅鹿鳴燕羣臣嘉賓也飲食之又實幣帛筐篚以將其厚意蓋飲食不足以盡敬而加贈遺以致殷勤也洪曰今聞師言知飯僧之義吾每歲於禪剎飯僧矣或問飯僧錢不得作餘事何謂耶答因果不合也昔湖南雲蓋山智禪師夜坐丈室忽聞焦灼氣枷鎻聲視之乃有荷火枷者枷尾倚於門閫智驚問曰汝為誰答曰前住當山某也不合將供僧物錢造僧堂違信施心令因果不相應故受此苦望為估值僧堂填設僧供乃可免耳智以己資如其言為償之一夕夢某謝曰賴師力獲免地獄生人天中三生後復得為僧今門閫燒痕猶存夫以供僧物作僧堂皆僧受用尚受悞用之報如此今多有竊常住為己有者其受報宜何如哉然此就受施而言至於信施發心亦宜平等按大智度論昔有信施飯僧但供老而不供少時諸羅漢以愍念心用神通力皆現老相彼敬喜而供養之至於呪願竟將受食盡復本形是年少比丘受食已隨機說法令心平等又西域樹提長者嘗設大如意齋七日以求賓頭盧尊者應供用鮮花置於聖僧位坐墪之下又案上供鮮花一瓶為驗若聖僧應供則七日事週而鮮花不萎不然花則枯萎至於七日事竟花俱枯萎長者不滿所願且憂且悔復再舉之以求如願仍不果遂心大慚愧無䇿可設遂發大誓必求降臨若不果遂以死為期至第七日痛哭哀求以冀感通時有丐者指鄰坐乞士謂長者曰此非尊者賓頭盧乎長者喜而頂禮賓頭盧云第一會我欲赴之而汝守門者以我微寒身不遮衣力阻拒之打我頭右肉碎成瘡汝第二會我又來赴守門者以我衣破裸形又阻拒之今者愍爾誠篤我於親友借一衣衣身方能赴會今而後汝欲真僧應供者當發平等心不擇微賤普施無遮福無涯矣又寒山詩云擇佛燒好香揀僧歸供養羅漢門前乞趂卻閒和尚不悟無為人從來無相狀封疏請名僧䞋錢兩三樣雲光好法師安角在頭上汝無平等心聖賢俱不降凡聖皆混然勸君休取相又地藏經指營齋度亡亦須精勤護淨奉獻佛僧方能存亡獲利施齋田施山施地施蕩施屋儀皆同此但改施物接待施主儀式同上住持命侍者請兩序班首及知會客堂庫房書記知產此是總名若別稱之掌山名知山管田名知田齊到方丈酬謝施主即寫捨書以為𠙥照施主住持及在會者俱簽押並給原契券親供糧串稅票俱收齊已住持上堂說法以報施恩事竟在會眾人與施主同往看產隨帶竹簽十餘枝以插標記使界限分明不得浸混他界以致爭訟每年春季會兩序眾執同看界限一次當年監院將捨契報稅即過寺戶勒石入萬年簿立捨書日佛前上供及上韋䭾供如常儀疏云伏以菩提樹高廣無邊盡十方而布蔭優曇花芬芳莫比遍剎土而敷春欣瞻大覺之伽藍俯殫檀那之敬信續入施主鄉貫年庚以及捨田為某某事住持某甲切念施主某甲在家繫縛隨業輪迴雖通一線之覺路未出塵勞幸依萬德之慈尊略開善信茲因欲植於善根敬捨良田為僧產為此擇於今日恭詣殿下敬獻半簋清供并達回向微因伏願某甲即施主名夙業消除福壽加增供佛及僧千劫因功不替捨貪作福三生果報常新統一家而胥慶盡閤戶以沽恩藉此福田終成佛果右疏恭請韋天證明捨田回向文疏年月日住持某甲具疏此疏佛前上供畢通陳已韋䭾前上供畢更須通曰韋天已即煉化若施主有祖先牌位或自長生祿位入報恩堂者是日登位亦當備供祭奠儀如常式證義曰施齋田上施也護持三寶宏法利生俱賴是乃真正福田蓋設齋飯僧止於一時若施齋田延於敷世功德尤大施地施蕩施屋類此可推故當上供陳疏以報旋恩也昔疎山性禪師為施主施田上堂云人人一坐具方圓儼今昔行坐不曾移歲寒消劫石更不屬陰陽又不輸糧役四至既分明契券親委悉復證者田地大自在休息那箇不具足受用無窮極如是布施汝如何不感激養十方佛種常生大智食轉施諸凡聖不思議功德不是有心求不是無心得須悟春風意莫認春山碧無上大因緣知恩念來歷因果既無差宜應全道力較彼來處功羮飯銅鐵汁驀然畫斷三輪虗空爭覔踪跡燈籠露住秋收依舊山堆嶽積柳絮隨風葵花向日如此說法可謂不負施主也供羅漢接待齋主同飯僧例預日客堂掛牌牌云明日早粥後齋供羅漢香燈師五人上供十人列名於左某某師某某師以上五人為香燈某某師某某師以上十人候上供庫房預備燭臺二百五十對香爐二百五十箇小碗一千五百箇竹筯五百雙茶鍾五百隻飯菜水菓齊備至正日清晨厨房人齊相帮燒菜一大鍋可盛小碗五百煑飯一大鍋可盛小碗五百天明時香燈五人先往庫房取水菓取碗取短燭五百枝即四兩頭燭臺二百五十對香爐二百五十箇每人管一百位羅漢每位前一茶一雙筯一果一菜一枝燭香爐兩位合一箇茶筯果俱供周已方點香燭次茶次飯又堂之正中面前置大方桌兩張橫𪮐可供十六大羅漢等牌位設香花燈塗果并用十菜每一牌位一茶一雙筯一飯又面前離三尺許用長桌三張並擺上供疏牌十三位見下上供中亦置香燭及供羅漢科儀十部每部用經葢覆之手爐十把俱齊備已時至知客先請上供師搭衣持具進羅漢堂次請齋主拈香到已十師展具三拜齋主先至中間普供位前拈香眾唱香讚云香纔爇雲騰寶鼎中旃檀沉乳真堪供香雲繚遶蓮花動十方諸佛下天宮天台山羅漢來受人間供奈麻香雲葢菩薩摩訶薩三稱維那舉云一切恭敬眾齊執香爐作梵唱云一心頂禮十方法界常住三寶拜已維那按磬白云伏以人分七方便自加行至於停心位列四沙門由無學訖於見道是皆知苦斷集帶果行因為析法之權根會人空之真理至若證已辦地入大乘門其所學般若同是故與菩薩共內秘大心之行外聞佛道之聲既皆為賢聖之僧故應受人天之供惟願妙堪佛囑熟此方震旦之緣允副凡情受茲日檀那之供密回慧照俯運悲懷冀普度於迷流俾咸登於樂土大眾和云故我一心虔誠奉請白已眾僧施主一拜一心奉請盡虗空遍法界十方常住諸佛法僧一心奉請娑婆教主本師釋迦牟尼文佛一心奉請盡虗空遍法界十方常住諸聲聞僧并諸眷屬以下尼位俱上加一心奉請未結并諸眷屬句同此常隨佛後千二百五十五大阿羅漢鹿苑先度五比丘最後須䟦陀羅諸阿羅漢世尊高弟大迦葉阿難陀等十大弟子靈山聞法大比丘眾萬二千大阿羅漢靈山得記學地無學地諸大聲聞眾五時聞法學地無學地諸大聲聞眾世尊滅後結集三藏阿難陀等諸阿羅漢世尊滅後正像法中歷祖所度諸阿羅漢住世十六大阿羅漢萬六千九百弟子眾某州某縣即本處地名某寺即本寺名住世五百大阿羅漢惟願不違本誓哀憫有情是日今時降臨法會請畢一拜三請時維那想一切羅漢皆以天眼照見大耳遙聞他心悉知嚴肅威儀從空而至他本未加慧俱通教二位即前十位之別出似不必加必請畢唱讚偈初度五人僧寶始世尊高弟飲光倫靈山一會實多徒萬二千人無學侶須䟦陀羅居最後五時聞法數難知涅槃已過眾聲聞三藏遺言俱結集十六真人親受囑未來為世福田師十方常住聖賢僧於此一時俱奉供讚畢煞下鼓