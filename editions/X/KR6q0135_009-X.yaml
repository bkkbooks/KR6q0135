body:
  text: 唐洪州百丈山沙門懷海集編清古杭真寂寺苾蒭儀潤證義清越城戒珠寺住持妙永校閱法器章第九述曰上古之世有化而無教化不足而禮樂作焉擊壤之歌不如九成之奏窪樽之飲不若五齊之醇固已然文生於質當思其本吾天竺聖人最初示化謂人人妙覺本無凡聖物物全真寧有淨穢無假修證不涉功用而昧者茫然自失有若聾瞽於是隨機設教擊犍椎以集眾演之為三藏修之為禪定迄於四十九年而化儀終矣梵語犍椎凡瓦木銅鐵之有聲者若鐘磬鐃鼓椎板螺唄叢林至今倣其制而用之於以警昏怠肅教令導幽滯而和神人也若夫大定常應大用常寂聞非有聞覺亦非覺以考以擊元風載揚無思無為化日自永雍雍乎仁壽之域清泰之都矣鐘鐘有小大報之別大鐘叢林號令資始也曉擊則破長夜警睡眠暮鳴則覺昏衢疏冥昧引杵宜緩揚聲欲長凡三通緊緩各一十八椎總一百零八下起止三下稍緊與大鼓報鐘互相照應凡鳴鐘先默誦願偈云願此鐘聲超法界鐵圍幽暗悉皆聞聞塵清淨證圓通一切眾生成正覺誦竟方執椎執椎已誦云洪鐘初扣二通三通隨改二扣三扣寶偈高吟上通天堂下徹地府擊第一椎上祝當今皇帝大統乾坤文武官僚高僧祿位二椎三界四生之內各免輪迴九有十類之中悉離苦海三椎五風十雨免遭飢饉之年南畝東郊俱沾堯舜之日四椎戰馬休征地利人和陣敗傷亡俱生淨土五椎飛禽走獸羅網不逢浪子孤孫早還鄉籍六椎無邊世界地久天長遠近檀那增延福壽七椎沙門興盛佛法長昇土地龍神安僧護法八椎父母師長存亡並利歷代祖禰同登彼岸九椎南無清淨法身毗盧遮那佛十椎南無圓滿報身盧舍那佛十一椎南無千百億化身本師釋迦牟尼佛十二椎南無當來下生彌勒尊佛十三椎南無極樂世界阿彌陀佛十四椎南無五臺山大智文殊師利菩薩十五椎南無峨嵋山大行普賢菩薩十六椎南無九華山大慈地藏王菩薩十七椎南無普陀山大悲觀世音菩薩十八椎次誦緊十八偈一字一椎即十八椎所願皇圖永固帝道遐昌佛日增輝法輪常轉如是緊緩二通共成一百八椎或在報鐘前後隨各家準定若為度亡撞幽冥鐘須晝夜響聲連接不緊不緩亦須念佛或念菩薩或誦經呪隨誦隨扣其利甚大故鐘頭為度生妙執也凡集眾各家鳴法隨其準定如禮祖普佛并戒期佛事等俱三下堂司主之如接送尊宿住持官員不以數限庫司主之上堂與大鼓相宜亦不定數限亦堂司主之其餘佛事隨各家鳴法但須各有準則不得違亂報鐘見前禪堂恒規中說小鐘凡唱讚念佛等用須劃定正板不得參差亂擊證義曰大鐘晨昏每一百八者即事顯理由是百八愚癡聲聲喚醒百八三昧椎椎打就聲須緩長者昔誌公借梁武道眼見地獄苦相問何以止之誌曰唯聞鐘聲其苦暫息帝遂詔天下寺院凡擊鐘令舒徐其聲也鳴時念誦者增一阿含經云若打時願一切惡道諸苦並皆停止若聞鐘聲兼說佛呪得除五百億劫生死重罪又金陵志云民有暴死陰司見五木縲械者告之曰吾南唐先主也為宋齊丘所誤殺和州降卒千餘人致此每聞鐘暫息吾苦仗汝歸白嗣君為吾造鐘民還具聞後主因造大鐘於清凉寺鐫曰薦烈祖孝高皇帝脫幽出厄又雲棲崇行錄云隋僧智興居大莊嚴寺執掌鐘頭大業五年同住僧三果者有兄從駕道亡其妻夢夫謂云吾至彭城病死墮地獄中賴莊嚴寺鳴鐘響振地獄乃得解脫欲報其恩可奉絹十疋妻奉絹興以散眾眾問扣鐘何以致感興曰吾扣鐘始祝曰願諸聖賢同入道場乃發三下及長扣又祝曰願諸惡趣聞我鐘聲俱離苦惱嚴冬極凍皮裂肉皴掌內凝血無所辭勞或以此故能冥感護所祝願耳又鐘者聚也故凡集眾須用之板板有內外之異鐵木之別報鐘下本板擊法隨各家準定禪堂內外俱有小板堂外名報板進堂擊之和尚進堂鳴板一下尊客進堂鳴板二下堂師進堂鳴板三下隨改堂內站香名站板行香名催板擊法見禪堂恒規及規約中客堂懸序板亦木為之擊法見客堂規約中夜巡有板亦大為之擊法見兩序章夜巡執事條厨房大板鑄鐵為之名呼板二時齋粥及早課擊之又小木板送香擊之又浴湯熱時浴頭擊小木板云云載浴堂規約木魚圓木魚念誦用之相傳謂魚晝夜常醒刻木象形念誦擊之所以警昏惰抑以齊眾音也長魚即梆懸齋堂二時粥飯及晚課厨房擊之普請出坡鳴三通客堂主之又浴室懸梆擊法見浴堂規約然鳴梆亦諸家有小異各隨宜改擊犍椎犍椎梵語也聲論翻為磬或翻鐘增一阿含經云阿難升講堂擊犍椎者此是如來信鼓也又諸律論並作犍槌或作犍椎槌音地羯磨疏中直云犍地故五分律云隨有瓦木銅鐵鳴者皆名犍地由此觀之則凡取音齊眾者皆是耳至於上堂說法前擊磬謂之白椎白椎云法筵龍象眾當觀第一義說畢擊磬謂之結椎結椎云諦觀法王法法王法如是昔世尊一日陞座大眾集定文殊白椎云諦觀法王法法王法如是世尊便下座此即結椎也磬圓磬念誦所鳴維那主之凡住持或尊宿仕宦施護等禮佛皆鳴三下匾磬石為之形似雲板懸方丈廊外有客見住持知客鳴三下又小手磬俗呼引磬禮佛誦請皆鳴之為起止之節具見大眾章付戒條說又有鐃鈸鐺鉿等皆唱誦佛事所用並宜和雅勿亂為準皷大法鼓與大鐘相偶晨昏擊時先重手三轉四下然後重手徐徐發擂中邊得所使其緊慢相參輕重相應音聲知暢起復連環隱隱轟轟若春雷之震蟄第一通沿聲長擊少歇轉第二通連聲稍促更不歇聲就轉第三通一向纏聲擊之完敲鼓磉二下起止互相照應凡上堂說戒迎送尊宿官員等事與大鐘同時起止凡佛事隨各家擊法宜各有常度無令失準又鐘鼓是人天號令須熟手充之中鼓小鼓念誦用之亦與小鐘相偶並須擊于中正亦宜和雅勿亂使誦持者音與口合口與心合恍然入寂念誦自在此亦法器之一助也證義曰金光明經信相菩薩夜夢金鼓其狀姝大其明普照踰如日光光中得見十方諸佛眾寶樹下坐琉璃座百干眷屬圍繞而為說法一人似婆羅門以抱擊鼓出大音聲其聲出懺悔偈信相菩薩從夢寤已至於佛所以其夢中所見金鼓及懺悔偈向如來說云云又楞嚴經云阿難汝更聽此祇園中食辦擊鼓眾集撞鐘鐘鼓音聲前後相續云云可見從來皆以音聲而作佛事也地輿名目一十九省清古杭真寂寺苾蒭儀潤輯錄述曰是書之錄有四緣也一行脚安單易尋貫籍二新戒牒錄可無謬舛三披閱墳典了知處所四每臨書札不致譌錯然此就今名而言其中古目傳寫稍有互異末知孰是盛京省領二府四州八縣轄寧古塔黑龍江奉天府名藩州領二州六縣承德縣名樂郊附府遼陽州襄平海城臨溟葢平葢州復州懷德寧海金州開原扶餘鐵嶺挹婁錦州府名遼西領二州二縣錦縣名徒河附郭寧遠州集寧廣寧縣險𤁂義州同昌岫巖城新䛵直𨽻省十一府六直隷州十九州一百二十四縣須天府名燕山五州十九縣大興析津附府宛平商都附府良鄉中都固安方城永清益昌東安安次香河武清通州潞縣三河臨𦚧武清雍邱寶坻泉州寧河梁城昌平州燕平順義范陽密雲檀州懷柔溫陽𣵠州涿鹿房山奉元霸州益津文安豐利大城平舒保定新鎮薊州尚武平谷漁陽遵化州名北平領二縣玉田經州豐潤平陽保定府名莫州領二州一十五縣清苑樊興附府滿城永樂安肅遂城定興范陽新城新泰唐縣解虞博野博陵望都武定容城漢縣完縣燕平蠡縣彖州雄縣歸義祁州安國束鹿鹿城安州高陽高平新安安全易州名易水領二縣淶水永陽廣昌飛柢承德府新設一州五縣灤平縣平泉州豐寧縣建昌縣赤峰縣朝陽縣永平府名孤竹頷一州六縣盧龍新昌附府遷安安昌撫寧新安昌黎遼西灤州海陽樂亭大定臨榆平州河間府名瀛海領一州十縣河間縣武垣獻縣樂城阜城漢阜任邱鄭州肅寧東州交河中水寧津保安景州廣川吳橋安度故城清河東光永寧天津府名津門領一州六縣天津章武青縣水安靜海曾川滄州長蘆南皮渤海鹽山高城慶雲樂陵正定府名恒山領一州十三縣正定東垣附府獲鹿鹿泉井陘威州阜平泜州欒城開縣行唐玉亭靈壽燕州平山蒲吾元氏槐渠贊皇房子晉州鼓城無極魏昌藁城亷州新樂新市冀州名信都領五縣南宮東陽新河堂陽棗強廣州武邑觀津衡水桃縣趙州名慶陽領縣五柏鄉鄗邑隆平廣河高邑慶元臨城趙國晉高梁深州名下博領縣三武強武遂饒陽博陵安平穀邱定州名中山領縣二曲陽恒陽深澤滋河順德府名襄國領縣九邢臺縣名龍江附府沙河亦名溫州南和名和州平鄉名封州廣宗西經鉅鹿南欒唐山名堯山內邱名青山任縣廣鄉廣平府名武安一州九縣永年縣名平千附府曲周斤漳肥鄉清漳雞澤量邨廣平長樂邯鄲趙都成安斥邱威縣洛水清河信成磁州隆陽大名府名陽平領一州六縣元城縣名貴鄉附府大名廣晉附府南樂樂昌清豐頓邱東明離狐開州名澶州長垣匡城宣化府名上谷領二州八縣宣化縣名廣寗附府赤城望雲萬全寧縣龍門女祁懷來沮陽蔚州靈邱西寧安塞懷安下落延慶州夷輿保定州涿鹿江南省舊名南京分江蘇八府三直隷州三小州六十二縣分安徽八府五直隷州四小州五十縣江寧府舊名應天名金陵領七縣上元縣名建業附府江寧縣名白門附府句容江乘溧水高平江浦臨滁六合瓦梁高淳淳溪蘇州府名姑蘇領九縣吳縣名平江附府西長洲茂苑府東元和鴻城附府崑山鹿城新陽南武常熟南沙昭文琴山吳江松陵震澤龐山太倉州名婁江領四縣鎮洋縣金山附州崇明海門嘉定膠城寶山吳淞松江府名雲問領七縣華亭名前京附府東婁縣名胥蒲附府西奉賢青邨金山柘上海滬瀆南滙川沙青浦青溪常州府名毗陵領八縣武進縣名姑幕附府陽湖名莒縣附府無錫錫山金匱梁溪江陰暨州宜與陽羨荊溪臨津靖江馬州鎮江府又名京口名潤州領縣四丹徒京江附府丹陽曲阿金壇金沙溧陽安水淮安府名淮陰領六縣山陽射陽附府阜寧黃浦鹽城鹽瀆清河角城安東連水桃源淮濱海州名胊山領二縣贛榆祝其沐陽厚邱揚州府名維楊名廣陵領二州六縣江都邦溝附府甘泉與縣附府儀徵真州高郵州臨澤興化白塗寶應安宜泰州蒲濤東臺通州名崇州領二縣如皐山泰興東陽徐州府名彭城領一州七縣銅山濮陽附府蕭縣龍城碭山杼秋豐縣大澤沛縣湖陸邳州下邳宿遷柵淵睢寧取盧安徽省從江南分出安慶府名皖城領六縣懷寧州附府桐城樅陽潛山梅城太湖習宿松高塘江新治徽州府名新安領六縣歙縣北野附府休寧海陽婺源星江祁門昌酉黟縣橫江績溪梁安寧國府名宣州領六縣宣城逡遵寧國宛陵涇縣安吳太平留邨旌德鳧山南陵青弋池州府名康化領六縣貴池秋浦附府青陽定陵銅陵義安石埭廣陽建德堯城東流和城太平府名姑孰領三縣當塗平江附府蕪湖襄垣繁昌春穀廬州府名汝陰領一州四縣合肥平梁附府廬江舒縣無為州臨湖巢縣槖泉舒城龍舒鳳陽府名濠州領二州五縣鳳陽縣灌邱附府懷遠平阿定遠陰陵壽州壽春鳳臺下蔡宿州符離靈璧穀陽頴州府名順昌領一州縣五阜陽富波附府頴上慎縣霍邱史水亳州小黃太和雜陽蒙城山桑廣德州名石封領一縣建平縣吉原滁州名頓邱領二縣全椒甘譙來安永陽和州名烏江領一縣含山龍亢六安州名盛唐領二縣英山蘄春霍山北浦泗州名淮平領三縣旰𣅿南延天長石梁五河澮河江西省領十三府一直隷州一州七十六縣南昌府名洪都為省會