  text: 百丈海禪師贊巍巍大雄峰全是黃金鑄一喝三日聾牙爪從茲露撥轉野狐禪分付下堂句引出赤鬚鬍聖賢俱罔措百丈清規原序翰林學士開國侯楊億述百丈大智禪師以禪宗肇自少室至曹溪以來多居律寺雖列別院然於説法住持未合規度故常爾介懷乃曰佛祖之道欲誕布化元冀來際不泯者豈當與諸部阿笈摩教為隨行耶或曰瑜伽論瓔珞經是大乘戒律胡不依隨哉師曰吾所宗非局大小乘非異大小乘當博約折中設於制範務其宜也於是創意別立禪居凡具道眼者有可尊之德號曰長老如西域道高臘長呼阿闍黎等之謂也即為教化主處於方丈同淨名之室非私寢之室也不立餘殿先樹法堂者表佛祖親囑受當代為尊也所裒學衆無多少無高下盡入僧堂依夏次安排設長連牀施椸架挂搭道具臥必斜枕牀唇右脅吉祥睡者以其坐禪既久略偃息而已具四威儀也除入室請益任學者勤怠或上或下不拘常準其合院大衆朝參夕聚長者上堂升座主事徒衆雁立側聆賓主間酬激揚宗要者示依法而住也齋粥隨宜二時均遍者務於節儉表法食雙運也行普請法上下均力也置十務寮舍每用首領一人管多人營事令各司其局也或有假號竊形混於清衆別致喧撓之事即當維那檢舉抽下本位挂搭擯令出院者貴安清衆也或彼有所犯集衆公議行責即以拄杖杖之遣逐從偏門而出者示恥辱也詳此一條制有四益一不污清衆生恭信故二不毀僧形循佛制故三不擾公門省獄訟故四不泄於外護宗綱故大衆同居聖凡孰辨且如來應世尚有六羣之黨況今像末豈得全無但見一僧有過便雷例譏誚殊不知輕衆壞法其損甚大今禪門若稍無妨害者宜依百丈叢林規式量事區分且立法防姦不為賢士然寧可有格無犯不可有犯無教惟大智禪師護法之益其大矣哉禪門獨行自此老始清規大要遍示後學令不忘本也其諸軌度集詳備也億叨睿旨刪定傳燈成書圖進因為序引清規證義記序國家治民律及例也佛祖範僧戒律清規也釋律類儒律唯佛説而無餘説也清規同世例從祖述而取合宜也然清規始於梁僧法雲住光宅寺奉詔所制今逸梁而著唐者梁時禪教未盛至唐法備僧盛百丈重集故特彰其名也全部九章初祝釐乃稱慶攄誠之義次報恩皆裕民福國之心次報本飲水知源次尊祖承恩追遠次住持明出令行止之重次兩序列各執分任之宜次大衆詳六和止作共持次節臘遵佛制結解應時末殿法器人天號令於是乎在更綴水陸清規會入儀軌以廣流通大哉天下師表唯百丈大智一人而已本山閣記云佛之道以達磨而明佛之事以百丈而備雖世殊事異張弛不一文質損益之間或不能不變通以盡利至於宏綱巨目未有不取法於茲規者惜乎流傳既久真偽雜糅又以佛法秋衰戒律寢廢嗟此清規勢將高擱救時之弊莫急於斯矣儀潤於是參閲諸本唯此最妙見其綱目與藏本同又與列祖提綱目録相合文簡而明義微而著事理圓融既醇且備詢為利鈍均益時地不礙者矣然恐初學未詳復引古德成言疏通而證明之使文之要義愈顯名曰百丈叢林清規證義記其著述緣起詳凡例元義中書成蒙諸仁者付梓流通謹序簡端以告時賢云爾道光三年歲次癸未解夏自恣日苾芻儀潤源洪書於苕上回龍真寂寺之耆舊寮百丈清規條例大備能行者間有之精此義者絶少或謂但具事儀無理學深談抑知護戒之類非理趣之不可思議乎或謂辭富事多而難記憶抑知九門之中具一切法猶嫌簡少敢刪煩乎是書大槩惟止作二持止持如武庫兵卒之宜備作持如文廟禮樂之莫遺特文淺義深未可為粗浮者道也仁和芝塘沈徵士以真寂比邱源洪法師所著證義記見示觀其涉獵內典薈萃成書末附水陸儀軌凡隱含關鍵處無不搜剔科儀闡明羲蘊俾讀者開卷了然誠佛祖救世之宏文衆生普度之寶筏也已欽命浙江副都統署將軍事加三級長白松齡序癸未冬余友沈芝塘徵君以源洪師所著清規證義記囑余敘讀之知能深契夫明心見性之理宜其海內聞名久為當代推重是書為佛祖遺規剖晣叢林當用之事最精且備依此行持得有紀律儼然靈山一會至今未散不皆為佛祖之遠裔乎哉雖然清規義記特其緒餘耳祇以心存普利故知言詮若夫三學精思六度妙諦其理未可淺窺唯學者事理交融名實兼顯則源師殷殷著述之心亦可無負矣原任江蘇巡撫錢唐陳桂生序序大哉百丈清規之詳美也忠君也孝親也事師也尊祖也報施恩也行禮儀也禪教律也典章大備條約分明嘆觀止矣晚近三學衰微叢林草草於是舊制漸湮前型半廢幸佛教猶留祖文未敝苾芻源洪諱儀潤者吾之教授師也每覩古今典籍各塹本宗遇抑揚處未免互謗如法苑碎金之類雖非偏滯未免雜糅若欲和而不雜分而不異似有待焉於是吾師彚成全璧綜計百餘十卷目曰緇門命脈記各繫證義分十二集子集敘三寶并緣起次之十集即南山懺摩天台賢首慈恩法性禪定密部翻譯淨土也百丈清規等殿於亥集所集既多刻行有待唯清規水陸先付剞劂書成盥誦恍入法筵以清規之重顯得證義之新彰目擊道存心領神會其鎔鑄古今發明精蘊不能增減一字也唯願人人從事於斯則清乎流者濁不能混規為圓者矩即以方遵此舊章布之叢席堪與經律論共為後學之津梁也夫道光二年四月佛誕日詔徵孝廉方正前陝西六品軍功受菩薩優婆塞戒仁和弟子芝塘沈起潛了生稽首敬題敘夫行以規而成圓規以清而不紊此叢林有清規一書也清規作於梁之法雲奉詔而述於唐之百丈禪師至今千百餘年時代既遙傳聞非一得源洪大師之證義而所記乃備夙曾持奉全編於九章中而見君親之仰戴及水陸之兼資其為叢林軌範益莫大焉吾杭自庚申後兩遭兵燹經帙全淪憫初參之無所行持也將體證義者手訂之意重梓是書乃邀慧月和尚慧機師共募刻資遂於三壇正範天台內集開雕之先親督繕刊逾年而竣事置之經房以廣流通願人從事於斯不特旨參清淨動協規模將老祖遺書叢林體制胥於是在夫明心見性本不泥以言詮而循規以端作止二持始繹祖文繼宣佛教上契歷代之心源無不於此肇之後之學者其知法門有大體歟同治十年歲次辛未仲秋之月海潮寺後學清道普照氏序豫自咸豐紀元僻居海上裹足不出者十年矣辛未初夏杭州海潮主人普照和尚持重刻清規證義示豫且囑殿數語於後固辭之不獲已乃濡筆書曰竊聞大聖人應現無方動止皆成模範下愚者知識有限涓埃俱獲咎過況法丁像季去聖時遙似窮子之走失他鄉倉皇莫辨如擔夫之迷入險道皂白不分吾教清規一書始成四卷乃作於唐之中葉洪都百丈山大智懷海禪師當時叢林即奉為左券以迄於今千有餘逮至國朝道光初年杭州瓶窑回龍真寂寺源洪大師者宗教兩通儒釋一貫因念古人尚質今人尚文殆非質無以存其朴非文不能暢其辭爰搜輯歷代古德語録中凡有裨益於重興始創耕種市井持律參禪講教諸門庭者因事因人因時因地無不條分縷晰一一增入以便有志斯道者隨宜采用庶免臨時慞惶首鼠兩端之誚纍成一十六卷付之剞劂儲於西湖經房流通咸豐庚辛之際疊遭兵燹一切藏板毀滅盡淨而普公亟尋舊本首傾鉢囊繼募衆善翻刻成帙仍貯經房其費資若干姑置弗論嘉其勤勤懇懇一片利物利人之心當與此書垂諸永久是為跋吳中後學願定和南百丈叢林清規證義記目録卷首原序證義序松序陳序沈序目録凡例五重元義一人喻法為名二權實相須為體三扶律內護為宗四依法辦事為用五乳酪並用為教相祝釐章卷第一凡六事聖節啓建正節早祝聖節圓滿皇后千秋受敕奉旨景命四齋報恩章卷第二凡十三事國忌供天護日護月附中秋祀月祈晴祈雨附祈雪遣蝗祈禱韋馱附韋天聖誕附伽藍誕祭竈報本章卷第三凡十二事釋迦佛降誕佛成道佛涅槃藥師佛誕彌陀佛誕彌勒佛誕準提聖誕文殊聖誕普賢聖誕觀音聖誕勢至聖誕地藏聖誕尊祖章卷第四凡十二事初祖達磨忌百丈祖師忌智者大師忌賢首法師忌道宣律祖忌慧遠祖師忌開山祖忌嗣法師忌剃度授經二師忌附父母忌禮塔設斛普薦掃塔住持章卷第五凡五十五事上堂晚參小參朔望入室請益巡寮普説告香念誦附念誦規約設斛薰塔點藥師塔燈普佛肅衆訓童行規誨為行者普説受法衣掩關啓關迎待尊宿六禮迎待看單升座落堂請齋參堂巡寮回山護法至到宗剎諸山慶生飯僧施齋田供羅漢放生附生所規約供法衣受煎點通嗣書法眷書遺書等附請新住持附請啓式入院住持出入退院板帳遷化入棺停棺茶毗入塔估唱安牌裝造佛像附開光式修整經典修造僧坊兩序章卷第六凡八十一執共九十四條執事單西序一禪堂首座西堂後堂堂主書記知藏藏主維那悅衆參頭清衆香燈司水二淨業堂規載大衆章執事同禪堂三侍寮祖侍燒香記録衣鉢湯藥請客侍者聖僧侍者行者淨人此二列執附前住持章東序四庫房都監監院副寺知事庫司庫頭米頭炭頭兼爐頭印房擔運帶貼庫庫房規銘五客堂僧值知衆知客照客茶頭行堂帶碗頭門頭客堂規約六厨房典座貼案飯頭二飯頭大火小火水頭磨頭雜務香燈厨房條規七山寮值歲知山巡山柴頭山寮香燈山寮規約知浴浴堂規約淨頭知屋監修化主八收供寮化飯收供收供寮規或有田設田房即用莊主監收等執園頭園房寮規下院執事約九旦過堂寮元旦過堂規間住耆舊堂規十香燈寮殿主法堂香燈藏樓香燈內塔主外塔主祖堂香燈巡照分日夜打掃請兩序執班首秉拂分二一新請受執二八節奉命請齋茶兩序辭執大衆章卷第七凡七十五事分上下兩卷上卷剃度正範分四一遵律十例即分十則二崇正辨訛三五戒元基又分十導引啓白請師開導請聖懺悔問遮難授皈戒發願誡囑回向四十支正範又分為十則通白敷座集衆請師遣求度者出和僧羯磨召求度者入開導辭謝君親剃髮授沙彌戒勸誡回向附剃度規約上供疏式付戒貼報單預備禮物預請諸執預習佛事酌定戒期右師派白受戒堂規布薩節要分十綱目十節懺悔羯磨僧法誦戒略誦戒式對首誦戒心念誦戒比邱律顯是明非菩薩僧衆誦戒菩薩律顯是明非居家布薩五篇六聚護戒道具附式叉摩那辨附尼八敬法上卷竟下卷起挂單安單普請日用軌範內分總別共十一則修身十事戒不祥事共住規約淨業堂規約佛七規約附回向疏分衛拾遺省行堂規約附看病執龜鏡文付法南嶽三支青原一支附天台一支賢首一支南山一支節臘章卷第八凡二十八事安居夏中念佛講經講堂規約座主條約蘭盆儀軌摘要開啓壇儀淨壇繞經上蘭盆供衆僧受食蘭盆會約解夏坐禪恆規分六早課第一上午第二下午第三晚課第四夜香第五禪堂規約第六孟冬貼單結冬起禪七解禪七解冬月分須知元旦上普供五月端陽冬至除夕法器章卷第九凡六事鍾板木魚犍椎磬鼓附地輿名目附列祖提綱録總目四十二卷卷首敘緣起凡例祝釐聖節啓建正節日聖節滿散景命四齋改元登極千秋節受敕奉旨降香到受師號并紫衣聖主請升座天眷請升座宗藩請升座詔汰詔復報恩聖忌聖后忌祈晴祈雨謝雨祈雪謝雪報本佛降誕佛成道佛涅槃涅槃日先期率衆財尊祖初祖忌拈香百丈忌開山忌嗣法師忌嗣法師翁忌掃歷代祖塔拈香受業忌父母忌住持日用上堂晚參小參有結制解制冬夜歲夜對靈之別普説有告香夏前中夏特請之異念誦水陸會肅衆訓童行為行者普説受法衣病起掩關啓關迎待尊宿分引座敘謝兩種護法至敘謝到宗剎諸山施主請升座慶生祈嗣飯僧施齋田供羅漢放生供法衣供法帔供寶蓋資冥受煎點通嗣書至法眷書至嗣法師遺書至二親遺書至歸省受業受請升座拈衣拈敕黃拈護法疏拈公帖指法座登座受請當晚小參辭衆頭首受請住持引座頭首受請借座升座當晚小參借座辭衆入院炷香佛事三門佛殿伽藍祖堂據室到院上堂開堂祝聖佛事拈敕黃捧御香拈劄付拈公帖拈護法疏拈方外交疏拈山門疏拈諸山疏拈三宗疏拈宗剎疏拈江湖疏指法座拈祝太上皇皇太后等香拈祝聖香拈護法香拈報謝香燒懷香白椎後垂語請就別剎開堂入院後請開堂入院日請開堂再住入院當晚小參為建寺檀越升座管待專使留請兩序報謝出入報謝回寺白衆出隊出隊歸立聖像胎骨入腹臟開光明聖像成請藏經捨經函迎經開經焙經補經營建劈草開基立磉豎柱上梁挂寺額落成鑄鑊結竈進火法座成建寶塔上塔珠寶索相輪合尖建壽塔定基開基立石開閉請行橋并謝開田并謝看退院辭衆退院再歸為住持遷化佛事入龕移龕鎖龕法堂挂真舉哀奠茶湯大夜對靈小參起龕全身入塔闍維奠茶湯秉炬安骨起骨轉骨煅骨靈骨入塔撒骨入祖堂安牌估唱下遺書尊宿訃至兩序請西序頭首請兩堂首座留首座請藏主侍者請東序知事請監寺提點請典座請修造請化主發化主請監收舉名德兼法嗣立僧立僧後秉命普説秉命入室後普説兩序進退挂鉢時請知事請兩序謝西序頭首謝兩堂首座謝書記藏主謝知殿侍者謝東序知事謝都監監院謝維那謝典座謝化主謝莊主謝諸莊監收謝兩序大衆剃髮執刀垂示付衣垂示度僧付戒辦道具大挂搭歸堂名勝挂搭普請為亡僧鎖龕起龕奠茶湯住持為亡僧秉炬起骨煅骨入塔撒骨為尼起龕秉炬入塔為優婆塞起棺秉炬起骨入壙撒土點主為優婆夷起棺秉炬煅骨入塔撒骨點主節臘建楞嚴會結制中夏建蘭盆會解制頭首四節秉拂住持謝四節秉拂元旦立春元宵寒食鋪帳簟端午建青苗會散青苗會炙茄會立秋開旦過中秋重陽開爐冬至法器鑄法鐘挂法鐘鳴法鐘施法鐘挂板挂鐘板挂木魚製法鼓按此之列祖提綱一書備録歷代宗師法語其名目校清規為詳第無事儀耳今此目後復附其目録者備是書未備之事目也此書係康初年武林理安杲翁悅和尚所輯彼蓋廣搜諸祖遺集而成故極詳備其凡例云是書大要以清規諸事為綱列祖提綱作目又云諸祖俱有聖節滿散語恐至元以前古清規內有此成式不敢遽遺云云據此則清規本中所遺多矣辛得呆翁一番搜索雖褐有法語而無作法然因此猶得見老祖遺規詳細若此顧目思義重有賴焉是呆翁之功也爰備録總目用資觀覽提綱又云一以使後學知法門有此大體以待後來好古者補行亮哉言矣凡例十三條清規自唐迄今時相去者千餘年僧例有古今之殊鄉風有南北之異是以未能盡合時機規之增減行之通塞有自來也然今流通諸本非失於太繁即失於太簡太繁則不暇靜修太簡則不能治務惟茲本繁簡得中儀文周備而條理井然便於行持又甚合時宜允堪垂範百丈至今時代既遙清規原本無從考核即今藏本頗多後世事迹可知百丈手訂原本失傳久矣然不可謂茲本中遂無百丈乎訂之規但不能確指耳其參以近代事者係歷代知識隨時隨地而為更易蓋禮應從宜變而通之以盡利也故曰言無古今合理者勝恐閲者見有近代事疑非百丈原本而生輕忽特發明於此清規原本九章今依次列卷唯水陸一種原在住持章內以文太富今分本另行清規名目有古今不同者如古稱頭首今名首座或號座元古稱監寺今名監院以及書狀改名書記僧堂改名禪堂之類俱改其名而不改其義又規條中古有而今無者如點茶拋香之類古無而今有者如祖忌增百丈等水陸增雲栖等及不許吃煙之類清規流傳既久不無以訛傳訛如執事之執歷考內典無職宇者蓋執者執持之義執其事而謹其行也雖如列職之各守其職然以執為職終屬牽強其他如三衣之謬施食之舛等茲皆更正集中義無不備而文有詳略如祝釐詳於首章即略於四節祈禱詳於元旦即略於朔望之類又於平日所常行者即不悉載所謂書不盡言言不盡意在人之善會而已叢林佛事雖多不出四種所謂止持即諸規戒作持即諸行儀念誦即轉法輪説法示第一義或唯以一事或兼二兼三或一事并具四種唯在住持隨宜設施兩序和衷共濟古賢軌則不難再見於今矣此書自方丈以至執事固無人不當備閲而初學為尤要果能熟記行持不惟臨事無疑又且得以束其形儀熏其心識現在可免放逸之咎他日可作軌範之師其益大矣誠宜人奉一編以備觀覽此書三根普被利鈍均沾一往觀之似文淺易明再四參詳實義深難曉粗心浮氣於斯懵焉茲集於義深難曉處則以證義引申而暢明之以便初參學者會取證義之作或隨文釋題或即事顯理如祀月淨頭等或補其要義或推廣衍説閲者皆宜留意證義雖出潤手而言多引古良以即古證今人易生信故所引某人某書必先載其名目若斷章取義不便録其名目者則佚之非敢掠美集中一切文疏似非百丈所述故他本或有不録者然吾釋子雖不當以詞藻為工分心習學而據事命辭不能不期於妥適故茲仍照原本録出俾用者得其現成不復鼓弄意識亦不無小補耳清規除藏本外世鮮刻本致鈔録者或無心舛誤或任意增減以訛傳訛漸失本真關係老祖遺規叢林體制甚非細故潤獲此編較之藏本似為妥貼而大旨則不相違背因思有此善本急宜流通遂不揣謭陋各綴一説於下以證明之俾閲者開卷了然無復疑義復請諸老宿再三校正乃敢刻行倘蒙諸方知識深體祖意妙合時機而教正之則更幸甚百丈叢林清規元義古杭真寂寺苾芻儀潤述義越城戒珠寺住持妙永校閲將為清規證義先明五重元義一人喻法為名二權實相須為體三扶律內護為宗四依法辦事為用五乳酪並用為教相初人喻法為名者初釋人百丈二字人也百丈本山名俗呼大雄山在洪州龍興路去郡治三百里今屬南昌府奉新縣懷海大師福州長樂王氏子卯歲落髮於西山慧照和尚進具於衡山法朝律師得法於江西馬祖大寂禪師乃南嶽下二世正宗也住此山大智壽聖禪寺盛宏禪宗兼崇律制嘗以梁朝光宅寺法雲奉詔所集僧制未盡協用遂重閲律藏博約折衷設規制範務合時宜又自維以身作則之義於是每日力作為衆標榜有勸止者師曰我無德以勞人衆阻之遂不食故有一日不作一日不食之語流播寰宇元和九年正月十七日寂壽九十五歲以元和十三年葬於茲山長慶元年敕諡大智禪師塔曰大寶勝輪流通清規宋大觀元年加諡覺照塔曰慧聚重刊清規元元統三年加諡宏宗妙行禪師敕僧德輝重修清規頒行叢林昔司馬頭陀嘗為百丈山銓記內有法王居之天下師表之句師實應焉按輿圖百丈為山名者數處此洪州之百丈也又自唐以來百丈為人名而顯著者數人此懷海老祖之稱百丈也略釋人竟次釋喻叢林二字喻也叢林乃草木葺聚之義喻僧坊為衆僧所止之處行人棲心修道之所能生植道芽趣登聖果福利羣生也又此名義具見經律華嚴離世間品頌曰菩薩妙法樹生於直心也信種慈悲根智慧以為身方便為枝幹五度為繁密定葉神通華一切智為果又法華藥草喻品亦以卉木叢林喻隨機受化又律中凡四僧已上乃至百千同住一處作法辦事如水乳合皆名叢林推之比邱而稱苾芻者西域謂此草有五德一體性柔軟喻僧定德折伏身心不致粗獷故二引蔓傍布喻僧慧德傳法度人綿延不絶故三馨香遠聞喻僧戒德戒香芬芳為衆所重故四能療疼痛喻僧解脫德能斷煩惱毒害不起故五不背日光喻僧解脫知見德常向佛日智慧光明解脫一切邪見邪業故故比邱稱苾芻也據此木草二喻可見為僧者全賴修行為本所謂住持有道德則叢林日安無則叢林日危衆僧有五德則名實皆得無則名實盡喪然則叢林豈易住而苾芻豈易稱哉略釋喻竟次釋法者清規二字法也先約事釋謂以澄徹潔白之模範布於日用而護佛教法也又清規即法之制度品節也根本有部百一羯磨第十卷佛言且如有事我於先來非許非遮若於此事順不清淨違清淨者此是不淨即不應行若事順清淨違不清淨者此即是淨應可順行四分律云是佛所制者不應卻非佛所制者不應制凡此皆清規之義百丈重集之意也又梵網經云請僧福田求願之時應入僧坊問知事人今欲請僧求願知事報言次第請者即得十方賢聖僧云云注曰僧坊即叢林也知事人即執事也應次第請即清規也又四分戒本第十尼薩耆波逸提云大德今為汝故送是衣價受取是比邱應語彼使如是言我不應受此衣價我若須衣合時清淨當受彼使語比邱言大德有執事人否須衣比邱應語言有若僧伽藍民若優婆塞此是比邱執事人常為諸比邱執事云云注曰不敢自持衣價令執事人代收待合時清淨當受守清規也又藥師經云有雖不破尸羅而破軌則注曰梵語尸羅此翻戒軌則即清規也故知叢林清規皆佛世已有即我東土漢明帝已來聚集衆僧叢林也如律行持清規也至唐世百丈時東土清規行世已六百餘年矣法久弊生祖適丁此乃重加整頓以惠後世華嚴經回向品云菩薩以法施為首發生一切清淨白法攝受趣向一切智心老祖之謂也次約理釋者戒珠妙永云清規者乃吾心本具圓常之妙道也夫心本圓明良由迷悟之異隨成十界依正之別然法性同也具也乃吾心之規也具也者包十界依正而無餘也同也者感迷悟因果而無差也規也者成萬法事理而無偏也無偏者中也無餘者假也無差者空也空也假也中也即吾心之三觀三觀者乃能規之用也空者照真絶纖塵假者照俗該萬有中者照二不住二真則一真一切真無俗無中而不真俗則一俗一切俗無真無中而不俗中則一中一切中無俗無真而不中真也俗也中也即吾心之三諦三諦者乃所規之體也由斯本體之難復故立法以繩之在佛為之律藏在儒謂之律例在百丈則謂之清規也雖世出世之不齊其止惡生善皆異其名而同其義者也是所謂清規者法也略釋法竟廣見下大衆章護戒條説二權實相須為體者天池法聚云道本乎實際而禮樂法制者攝化之權也非權則教無以立而道不行矣是故孔子作春秋述禮記備法制之權也欲無言一以貫顯覺際之實也即吾佛洪範三界軌持萬化一皆發乎自覺聖智之所現量用開遮持犯之權實相須顯信解行證之體用一致夫靈山一會衆盈百萬雍穆無違不啻水乳之合所謂不治而不亂不言而自信覿金容而感化宜不待夫誘掖告誡之諄諄矣及其護善遮惡而為毗尼之制則條陳縷析纖悉不遺於涅槃顧命則曰汝等比邱於吾滅後當尊重波羅提木叉是汝之師然則王化大千而垂範後世者總不越乎理事不二之為訓也明矣正法之餘教始東被其時佛法隆盛事儀之節固其可緩自達磨來後單傳心旨實證者固多而其中不無蹈虗之子致墮豁達之空遂以儀容進止為不足為品節制度為不足學者不知會權歸實實豈離權於是大智有清規之作用以翊贊毗尼紀綱法席蘭若肅清龍象蹴踏信乎理不遺事而佛事門中不捨一法故以權實相須為體也三扶律內護為宗者大小二乘毗尼律藏一言以蔽之曰止作雙持茲清規亦然各堂條約禁過防非等止持所攝也種種禮儀參禪念佛等作持所攝也具此止作與律相扶外以儀德感人而生正信內則守護正法常轉法輪不期然而然自利利人矣此所謂扶律內護為宗也如其戒律不持清規不行即是魔黨自破佛法梵網經謂佛法非外道天魔能破如師子身中蟲自食師子肉楞嚴經云云何賊人假我衣服裨販如來造種種業皆言佛法却誹出家具戒比邱為小乘道由是疑誤無量衆生墮無間獄是故佛臨涅槃扶律談常大意謂持戒比邱能呵責驅遣破戒者名真持戒今此清規義亦遵此故以扶律內護為宗也四依法辦事為用者事有二種一者時事元旦清明乃至佛誕祖忌等有定時而作故二者非時事慶生祈禱進院退院等以前後行止不定故其事雖多此二攝盡皆即事以明理明理以垂化然事或滯礙又當善於通變所化乃周邇來僧衆罕知此義非棄置不行即儀文舛錯其拘迃者又或固執不通以致隔礙難行重為清規病無惑乎法道漸以陵夷也將欲挽回流弊先當闡揚其義潤不揣鄙陋宗此善本附以證義暢其説而明其義俾人人得覩老祖遺規精詳若是苟能依法辦事將見改魔為佛轉邪成正除匪類安大衆齊禮儀養道德興叢林化衆生無有不周所謂僧寶慧命非戒律清規不能久住者信矣五乳酪並用為教相者天台智者用涅槃經從牛出乳乃至醍醐五味以判如來一代時教為五時初華嚴喻乳次阿含喻酪三方等喻生酥四般若喻熟酥五法華涅槃喻醍醐故茲清規亦借用判經之例判乳酪並用者五時之教梵網與華嚴同時粗妙混融剎剎塵塵無非一真法界所謂治世語言資生業等皆順正法是也今此清規義遵梵網上根行之理事無礙處處圓融堪擬乳味至如阿含雖專説生滅四諦而小乘之規即寓無生無作大乘之理亦猶醍醐之出於酥酥之出於酪也今此清規例比阿含即亦範彼小乘俾其謹守繩墨有基勿壞如人身四支不缺美服可彰如繪事粉素無虧彩色可繼堪擬酪味故以乳酪並用為教相也昔宗願云禪門事例雖無兩樣毗尼衲子家風別是一般規範若也途中受用自然格外清高如其觸向面牆實為減人瞻敬是以經歷叢席遍參諸方凡有補於見聞悉備除於綱目以此莊嚴寶社建立法幢所謂佛事門中缺一不可亦猶菩薩三聚聲聞七篇豈立法之喜繁實隨機而設教初機後學冀善參詳上德高流幸垂證鑒
