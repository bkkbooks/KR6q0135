body:
  text: 唐洪州百丈山沙門懷海集編清古杭真寂寺苾芻儀潤證義越城戒珠寺住持妙永校閲報本章第三述曰霅溪仁嶽大師嘗云儒家者流有終身之憂者考妣遠日之謂也釋氏子豈不然乎彼所以思生我劬勞之親此所以懷度我慈悲之父其德罔極其孝攸同觀夫夙世出家之徒具沙門之形奉釋迦之姓至佛涅槃日不能齊莊致禮者衆矣豫竊傷之觀師此言其所以警吾徒者甚至是即清規中報本一章之意也涅槃如是降誕亦然涅槃盡追遠之誠降誕慶曇華之現故同入報本其意深矣至如藥師彌勒文殊普賢觀音勢至地藏準提誕辰儀軌亦附列者以諸佛菩薩悲願宏深舉世所共欽故釋迦佛誕四月初八日佛誕客堂預日挂牌牌云明日恭逢本師釋迦文佛降誕之辰是晚合院大衆師聞鐘聲搭衣持具齊詣大殿禮佛是晚二板鳴鐘三下衆集住持拈香維那唱香讚畢呼展具舉讚佛偈云天上天下無如佛十方世界亦無比世間所有我盡見一切無有如佛者偈畢唱奈麻本師釋迦牟尼佛十二拜或數十拜文殊彌勒十方諸佛十方菩薩各三拜三皈依畢三拜回堂正日早課祝聖乃至上方丈說法儀與聖節同早課畢客堂挂牌牌云午前啓請上堂午飯後合院大衆師聞鐘聲齊詣大殿前稱揚聖號浴佛伏願佛日增輝法輪常轉粥後二板上堂儀軌見住持章是日午梆大殿上供如常儀止靜後鳴大鐘三下大衆齊詣殿前庫司嚴設花亭中供佛降生為悉達太子小像於香湯盆內安二小杓佛前一切供器俱移量他處以便浴佛即餘聖像是日俱沐浴衆集維那舉香讚住持拈香拜已維那至中拈香展具三拜已歸位喝云釋迦如來二稱九龍吐水灌沐金軀維那一唱大衆齊和已維那舉呪大衆齊音同持唵㫊暮伽廢嚕者娜摩訶畝陀囉摩抳鉢頭麼入縛攞跛囉襪嚲野𤙖衆持七遍已住持浴亭中太子降生像大衆散位各浴一佛或二三人共沐一像凡浴佛人各自帶鉢淨布取水浴時口誦呪曰唵底沙底沙僧伽娑訶念到浴完乃止大衆各歸本位維那長跪合掌高聲白安位文云恭聞法身現相祥光靄淨飯之宮化佛應真瑞氣擁迦維之國金軀生處便能一手指天寶體浴時遂感九龍吐水四方遍顧七步成蓮稱上下之獨尊受人天之交讚不戀王宮富貴直趣雪嶺修行十九學道出家三十降魔成佛演經至五千餘卷住世於八十多年開三乘方便之門導七趣菩提之路憶昔周昭王甲寅二十四載我佛降臨當今大清朝之幾十幾年真風遠被衆等荷生成之德今辰竭慶賀之誠冰潔道場雲臻梵侶金盆高捧喜觀悉達太子之金容聖水頻傾仰見摩耶夫人之聖德欲覲我佛之光輝須仗雷音之唱和維那白竟舉偈衆和天上天下無如佛十方世界亦無比世間所有我盡見一切無有如佛者毗藍園內降生時龍與諸天咸灌沐如來所有吉祥事我今灌沐亦如是我今灌沐諸如來淨智莊嚴功德聚五濁衆生令離垢同證如來淨法身香花燈塗妙莊嚴供養如來法報化唯願慈悲受供養窮未來際作佛事衆唱和畢將佛聖像各歸本位安妥維那唱獻寶座大衆齊和衆寶莊嚴微妙座諸珍間錯作花臺準教加持將奉獻唯願慈悲哀納受唵㫊暮伽鉢頭摩遜娜𨽻䭾羅䭾羅抳漫拏𨽻吽三遍念畢將一切供物器皿仍歸佛座前已維那舉供養偈衆同作梵唱誦云願此香花燈遍滿十方界供養佛法僧受用作佛事唵誐誐曩三婆縛伐日囉斛三遍畢衆唱讚九龍吐水沐浴金身天上天下獨為尊七步寶蓮生威德光明法界永沾恩奈麻吉祥會菩薩摩訶薩三稱回向偈云願消三障諸煩惱願得智慧證明了普願災障悉消除世世常行菩薩道三歸依竟各回本處是日念誦浴佛經懺如無用他懺代挂念誦牌及設壇如常聯句附後功圓萬德位證一乘是天中天上無二上橫遍十方豎窮三際成佛頂佛尊唯獨尊佛前本以迹彰首羣靈而成正覺機因時應從五濁而示降生山門脫珍服著敝衣扇真風於末世捨化城登寶所揭慧日於中天大殿簷下無佛無魔剎剎宣揚正法非垢非淨塵塵灌沐金軀經懺堂外證義曰邇來僧坊但供太子降生之像未聞浴佛之舉殊為缺典浴佛經出明清藏才知字函準經所說先作方壇中以淨泥和香水作日卓一張敷浴牀座上安浴盆盆內安小浴牀牀上供悉達太子像人各以二指取少許水浴佛口誦偈呪浴佛之水各自洗頭名吉祥水浴竟用棉拭潔仍供座上云云此之佛事包括如來一代時教今備録源委以示初學按天竺分東南西北中五大國佛生中天竺迦維國帝皇家姓剎帝利氏瞿曇梵語瞿曇此翻甘蔗其始祖王仙為獵人射死血入地生甘蔗二本日炙開一生男號甘蔗王一生女善賢妃生子作轉輪王以日炙又名日種傳七百世至淨飯王佛以纍劫功行滿足從兜率天降神皇宮于摩耶夫人腹時周昭王二十四生或謂二十六年甲寅歲四月八日生名薩婆悉達七日母升忉利賴姨母摩訶波闍波提乳養至一十九歲踰城往跋伽仙林中取劍斷髮脫身寶衣從獵師貿袈裟為比丘參學仙人數處復北渡恆河至伽闍山靜坐六年苦行日食一麻一麥以續精氣復自念若以羸身而取道者彼外道則言自飢是涅槃因乃浴于尼連河受牧女乳糜至菩提樹下釋提桓因以吉祥草敷坐跏趺於上自誓若不成道不起于座魔王波旬欲伽迫害百計不能少撓作是言曰汝今宜可速起還宮若不爾者當持汝足擲大海外爾時菩薩如師子王心無驚畏告言波旬汝曾供養一辟支佛受八戒齊由斯福故得為天王然我已於阿僧祇劫具足成就難行苦行大地未有如針鋒許非吾昔日修苦行處假使魔衆如恆河沙不能傾動我之一毛云何汝今欲以吾身擲大海外魔復言曰我於往昔施辟支佛得為天王斯事可明今汝所說以何為證於是菩薩伸手指地曰此知我爾時地神從金剛際踊身而出合掌白言誠如尊教有此地來我為其神此地無有如針鋒許非是菩薩本行之處魔聞斯言顛倒而墮作禮悔罪而去破魔軍已二月八日明星出時豁然大悟得無上道成最正覺世傳以臘八日謂周正建子故時年三十歲矣於摩竭提國阿蘭若菩提場中為大乘菩薩演說華嚴小乘不見不聞猶如聾瞽以梵釋勸請乃詣鹿苑為憍陳如等五人說四諦法及人天因果歷十二年時四十二歲至方等會上以大乘教轉大法輪說六度法淘汰弟子說維摩楞伽等經歷八年佛五十歲多說般若淘汰執情又二十二年時佛七十二歲說法華經乃至八年以諸弟子皆可任重授記作佛方暢本懷為穆王五十三年壬申歲時佛七十九歲將示涅槃先往仞利天為母說法佛姨母大愛道等五百比邱尼舍利弗目犍連等七萬阿羅漢不忍見佛涅槃同時入滅至次年二月十五日佛在拘尸那城外涅槃時至十界悉集各獻妙供佛俱不受最後純陀獻供佛受之為諸比邱說常樂我淨及敕依戒為師依四念處住復言無上正法悉已付囑摩訶迦葉當為汝等作大依止猶如如來又以阿難在娑羅林外為魔所嬈乃敕文殊云阿難吾弟給事我來二十餘年得八不思議聞法受持如水注器欲令受持是涅槃經文殊奉敕以呪降魔攝阿難歸佛言有梵志須跋陀羅年百二十未捨憍慢汝可告之如來中夜當般涅槃即與同回聞佛說法得阿羅漢佛告大衆自我得道度憍陳如最後度須跋陀羅吾事究竟二月十五日夜中說遺教經復伸告誠汝等比邱於我滅後當尊重波羅提木叉是汝大師如我住世無異云云即在雙樹下右脅而臥寂然無聲入次第定順逆出入共二十七反三回告大衆以大般若真空實相為本源便般涅槃弟子阿那律升忉利天告摩耶夫人自天而下世尊起棺說法慰母復語阿難當知我為後世不孝衆生故從金棺出問訊於母至七日迦葉出定知佛涅槃與五百弟子自耆闍崛山步行至悲哽作禮佛現雙足出棺時已二七日人天等各持香木至茶毗所化火自焚七日乃盡衆收舍利滿八金壜阿闍世等八國王共爭奪舍利後聽諫止八國各請一金壜回國供養至一百年後阿育王復收諸舍利敕諸神力一夜造成八萬四千塔每一塔藏一舍利復敕羅漢耶舍尊者放八萬四千光隨光分送舍利塔人天八部悉皆分遍我震旦國考古相傳有十九塔今最靈著者寧波阿育王寺一塔也佛成道他本凡佛菩薩前上供皆唱香讚已即白供文白竟然後上供與此相倒十二月初八日佛成道客堂預日挂牌晚二板禮佛正日祝聖乃至上堂說法與佛誕日同是日開午佛前上供衆集燒香傳爐住持上香維那舉讚住持三拜不收具長跪獻茶獻等皆侍者遞送知客置几上舉三拜而立至念普供養呪仍跪維那出班上香展具三拜長跪合掌作白凡佛菩薩前上供皆同此唯改白文恭聞如來無量劫來成佛豈假進修為憫衆生日用不知示以先覺覺自覺他而成覺道世出世間而稱世尊闡一代之化儀遵先佛之遺軌坐菩提樹魔宮隱而無光現優曇花法輪熾然常轉故始喻初日先照而末示拈花正傳顧末裔之何知誦遺言而有愓於今月八日恭遇如來成道之辰現前大衆少伸供養所願色空明暗咸宣微妙法音蠢動含靈共證智慧德相白已一拜起具復位舉讚云臘月八日覺帝揚靈菩提場內道初成夜半覩明星普救迷情幽暗悉光明禪悅藏三稱畢是日若設壇念誦儀軌如常聯句附後正覺山前覩明星而悟道大千界內揭慧日以流輝證義曰釋尊初成道嘆云奇哉一切衆生具有如來智慧德相但以妄想執著不能證得噫可見此道人人能成也人之不能成者溺於五塵情欲妄想耳故耳雖日聞道猶聾者之於鍾鼓也目雖日見道猶盲者之於日月也夫道之大也天地不足以為量故無範圍天地之量者不足以入道道之貴也軒冕不足以為榮故無塵視軒冕之度者不足以入道道之遠也沙劫不足以為期故無一念萬年之識者不足以入道故曰說道易成道難道非難也人自難之耳古云使道而可獻莫不獻之君道而可進莫不進之親道而可與莫不與之子孫確哉言乎所謂自性自度也故吾釋子於斯日也當深思皆有智慧德相之言不應自輕而退屈矣佛涅槃二月十五日佛涅槃日客堂預日挂牌牌云明日恭逢本師釋迦文佛涅槃之辰是晚大衆師聞鍾聲齊搭衣持具詣大殿禮佛晚二板禮佛與佛誕同正日祝聖等與朔望同唯繞佛畢禮釋迦佛十二拜為異早課後大殿鋪懺壇客堂挂牌牌云是日聞鼓聲大衆師依派班次詣大殿禮釋迦如來涅槃禮讚文懺并誦遺教經客堂與維那派班每班十人挨次上殿早粥後上堂儀軌見下住持章午梆上供儀與成道日同唯換文云恭以能仁應世寂默證真廓千界以居尊撫四生而為子形隨物現元同非相之身教逐機興詎異無言之道爰自法輪載轉化迹彌隆半字初談譬擊蒙而靡倦百金後寄猶贖命以唯勤普令煩惱之儔安住如來之藏四心告滿三德云歸所謂不令一人獨得滅度皆以如來滅度而滅度之是故入於涅槃不可得而思議我等鶴林既遠痛失於前緣像法猶存忝遵於遺訓今值中春之日緬懷北首之儀㵎藻溪蘋聊表薦羞之禮升香嘆德少申哀慕之誠唯願洪慈俯垂昭鑒白已一拜復位舉讚大慈悲父無上醫王為憐病子設權方示現已云亡法性真常壽命實難量禪悅藏三稱餘照朔望例開晚梆回向經懺畢即回堂不上方丈囿於化者終於盡順世無常寓諸幻而返諸真是名寂滅貼經懺堂大定恆常永住恆河沙劫圓機普應示現千百億身佛前原本述曰性者人之大本也振天地而莫知其始窮萬世而莫知其終佛與衆生均有是性悟之而登妙覺迷之而流浪生死從劫至劫六道異趣業報展轉無有窮已所賴聖訓洋洋堪作依怙吾徒忝形服預法系遵其行之為律宣其言之為教傳其心之為禪而循吾所謂大本者以同夫佛之全體妙用始可稱佛子而續慧命也其于諱日追悼豈世禮哉證義曰按大般涅槃經佛涅槃日獻供如雲揮淚如雨噫何其哀也又讀清明藏馳實字函中釋迦如來涅槃禮讚文摹寫如來涅槃相貌如在目前備戀慕之意近時人罕知之絶而不舉大忘本矣惟思齊大師倡涅槃會於寧波阿育王集衆禮懺朝舍利歲為常例或問曰吾聞諸佛法身遍一切處本無出世及以涅槃何用忌日至於禪宗門下單提正令佛祖尚無涅槃何有今乃於無生滅中妄見生滅上供禮懺豈非著境迷心不達理性耶師答曰子知法身常住而不知應跡云亡知法體遍周而不知應跡有所不有應跡安顯法身不有舍利誰知應跡既言法身常住豈有間於應身既曰法體遍周寧獨隔於舍利子欲撥事求理棄有談空事相尚迷況理性耶昔大迦葉將入雞足山必遍禮諸塔後方入定夫迦葉禪宗之初祖也豈其不達理性而然耶當知如來涅槃不可思議非常非斷非有非無不應以偏見而生分別蓋子所執法身常住不達如來善權方便利益衆生之事良由不深明理教而致然耳嗚呼自師倡為此會後人踵而行迄今不替俾人人知我佛之恩而盡報本之誠師之功德其可量哉然禮舍利不必拘定要在此會欲求懺罪報恩不拘何時皆可也雲棲崇行録云唐子鄰范氏子母王氏不信三寶鄰逃東都依廣壽寺慶修律師出家忽思親歸寧父失明母已故三載矣因詣嶽廟敷坐具誦法華誓見嶽帝求母生處其夜嶽帝召謂曰汝母禁獄現受諸苦鄰悲泣請免帝曰可往鄮山禮育王塔庶可救也鄰即詣塔哀泣禮拜至於四萬俄聞有呼鄰聲望空中見母謝曰承汝之力得生忉利天矣條然不見蓮池讚曰目連感佛教以供僧子鄰感神教以禮塔至孝通神明詎不信夫此為救親禮塔而獲益者至於己躬罪垢以禮塔而復還清淨者不可勝數又舍利色相隨人隨時變化不測歷歷見聞不能盡述以見佛之威神悲願二俱不可思議也惟當確信不疑至敬盡禮決有妙應藥師佛誕九月三十日藥師佛誕早課燒香傳爐住持拈香維那舉香贊至繞佛畢禮藥師佛號十二拜客堂於早粥時掛牌牌云今日恭逢藥師如來降誕之辰開午梆聞鼓聲大衆師搭衣持具齊詣藥師殿上供已下凡佛聖前上供皆同此唯改念誦及聖號時至集衆如常舉香讚已先稱奈麻藥師琉璃光如來三稱即鳴魚誦奈麻薄伽伐帝殺社窶嚕薜琉璃鉢喇婆喝囉闍也怛他揭多也阿囉喝帝三藐三勃陀也怛姪他唵殺逝殺逝殺社三沒揭帝莎訶誦四十九遍須記數極少二十一遍誦竟即誦變食呪二十一遍甘露呪普供養呪各三遍已維那宣白詞按施食經佛說變食真言供佛聖俱誦二十一遍供天仙十四遍施鬼神食誦七遍恭聞東方世界藥師如來功德智慧無量莊嚴放淨光明過於日月一切剎土淨如琉璃與西方界等無有異十二大願利樂有情凡有所求皆隨其心受持佛名與佛無異具大丈夫相及八十隨形一切惡趣無量灾難以佛威神皆得解脫弟子衆等願得無上菩提生生世世行菩薩道亦如藥師琉璃光如來所發十二大願利樂一切有情即此娑婆世界身心剎土皆如琉璃面見我佛及阿彌陀所願法界有情東西相泯二見永忘於中道義共證真常維那白畢舉藥師贊云藥師海會琉璃相光八大菩薩降吉祥七佛廣宣揚日月威光功德實難量奈麻藥師琉璃光如來三稱又三拜各回本處證義曰直解云藥師者藥以療病為功師以訓道為義即法界大師無上醫王也為衆生有種種病苦故諸佛有種種法藥如十惡是病十善是藥四倒是病四念處是藥多貪是病不淨觀是藥多瞋是病慈悲觀是藥多癡是病因緣觀是藥多散是病數息觀是藥多障是病念佛觀是藥六蔽是病六度是藥乃至八萬四千塵勞是病八萬四千法門是藥云云琉璃光者梵語吠琉璃此云帝青寶此寶明淨可喻佛身而言光者由淨故光也稱如來者十號之一也約應身乘如實道來成正覺也約報身第一義諦名如正覺名來也約法身無所從來亦無所去故名如來也本經云若有淨信男子女人得聞藥師琉璃光如來名號聞已誦持乃至供養形像等須知以念佛因行為能感果佛護念為能應由感故應感應道交故得所求願滿乃至成佛也誦呪感應義與持名相類彌陀佛誕十一月十七日彌陀佛誕掛牌上供等儀與藥師佛同但換彌陀經及白詞云恭聞五梅花綻乃周正建子之時兩策蓂飄正覺皇誕辰之會竊念某甲住持名字等愛纏濁國業繫幻軀得值真乘觀花輪而矢志專修淨念望寶地以馳神欲酬母憶之悲心不勝孺慕之誠悃爰設道場敬修微供持萬德之洪名宣一乘之祕典所願紺眸垂照金臂流光寶樹林中遙聽梵音談實相金繩界內儼瞻妙相記往生伏望洪慈俯垂鑒納白已一拜復位舉樂邦教主贊竟三稱聖號三拜而退證義曰阿彌陀佛娑婆衆生之大怙恃也執持名號淨土諸典已詳言之而聖誕佛事未見通行殊為缺典釋迦如來稱揚淨土指我還家而阿彌陀佛則我家中之慈親也我等憐𫺬異域久勞倚門之望今遇慈親誕降之辰漠不在意可乎故此之佛事當與釋迦如來並重又邇來念佛者平時名為專修至於禱壽命改藥師經解罪愆改梁皇懺濟厄難改消灾呪求智慧改觀音名向所念彌陀置之高閣不思念彌陀能感報受命無量況現身百年壽命乎念彌陀能滅八十億劫生死重罪況目前罪垢厄難乎彌陀經云我以智慧光廣照無央界況時人所稱智慧乎故阿彌陀佛如雪山藥王樹總治萬病非獨求生淨土如衆生願也按山菴雜録云元朝至正十五年冬張士誠侵湖州江浙守禦獲賊兵四十餘人夜宿西湖鳥窠寺黎明適前住饒州天寧寺僧謀大猷徐步廊廡間囚者見謀師持誦不輟皆求曰長老救我師曰我救你不得你若極誠念奈麻救苦救難阿彌陀佛却救得你中有三人極誠信受高聲稱念日夜不輟口既而官司取發衆囚易枷鎖至此三人因缺刑具但繫以繩既到審囚官獨鞠勘此三人一人供正治麥畦被虜二人供原是明州鋸匠來此傭作被虜三人遂獲縱免乃到鳥窠寺拜謝謀師而去由此觀之即當大辟念佛可免況餘乎並附録於此以為念佛不專者勸彌勒佛誕正月元旦日彌勒佛誕掛牌上供儀與藥師佛同先稱奈麻當來下生彌勒尊佛三稱次誦大方廣佛華嚴經八法界品彌勒章善財童子讚彌勒偈云佛子住於此普現衆生前猶如日月輪遍除生死暗佛子住於此普順衆生心變現無量身充滿十方剎佛子住於此遍遊諸世界一切如來所無量無數劫佛子住於此思量諸佛法無量無數劫其心無厭倦佛子住於此念念入三昧一一三昧門闡明諸佛境佛子住於此悉知一切剎無量無數劫衆生佛名號佛子住於此一念攝諸劫但隨衆生心而無分別想佛子住於此修習諸三昧一一心念中了知三世法佛子住於此結跏身不動普現一切剎一切諸趣中佛子住於此飲諸佛法海深入智慧海具足功德海佛子住於此悉知諸剎數世數衆生數佛名數亦然佛子住於此一念悉能了一切三世中國土之成壞佛子住於此普知佛行願菩薩所修行衆生根性欲佛子住於此見一微塵中無量剎道場衆生及諸劫佛子住於此一切塵亦然種種咸具足處處皆無礙佛子住於此普觀一切法衆生剎及世無起無所有觀察衆生等法等如來等剎等諸願等三世悉平等佛子住於此教化諸羣生供養諸如來思惟諸法性無量千萬劫所修願智行廣大不可量稱揚莫能盡彼諸大勇猛所行無障礙安住於此中我合掌敬禮諸佛之長子聖德慈氏尊我今恭敬禮願垂顧念我一遍接誦奈麻當來彌勒佛一百八遍次誦變食呪甘露水呪普供養呪皆與藥師同維那白云恭聞彌勒大士位登補處現處兜率天宮佛繼釋迦當生閻浮世界受能仁之遣付為衆生之導師無三灾之逼陵妙嚴國土有五福之康泰澤潤羣生龍華樹下悉聞三會之圓音寶蓮座前得預一生之授記今值春元恭逢聖誕謹設微供敬禮稱揚伏願現在慈風光滿人寰當來降跡大轉法輪白畢舉贊法身示現樓閣重開龍華三會運慈悲廣度出塵埃稽首蓮臺補處在當來奈麻當來彌勒尊佛三拜各回證義曰今此上供偈出華嚴第七十九卷經之中梵語彌勒此翻慈氏不食肉經云過去世有世界名勝華敷佛號彌勒恆以慈心教化一切彼佛說經名慈三昧光大悲海雲時彼國中有仙人名一切智光明聞此經功德願於未來成佛亦號彌勒於是捨家深山修道後遇荒年不得乞食時彼林中有母子二兔見仙人七日不食恐佛法慧命斷絶願自捨身命奉仙人食自投火中時有樹神白仙人言兔王母子為供養故投身火中今肉已熟汝可食之時彼仙人聞樹神語悲不能言以所誦經書置樹葉又說偈言寧當然身破眼目不忍行殺食衆生諸佛所說慈悲經彼經中說行慈者寧破骨髓出頭腦不忍噉肉食衆生如佛所說食肉者此人行慈不滿足當受多病短命身迷沒生死不成佛時彼仙人說此偈已因發誓言願我世世不起殺想恆不噉肉乃至成佛制斷肉戒作此語已自投火坑與兔併命光照國中國人見光尋至既見仙人及二兔死在火中見所說偈并得佛經持還上王王聞傳告共宣令聞此者一切皆發無上正真道心佛告式乾汝今當知爾時白兔王者今現我身釋迦牟尼佛是時兔兒者今羅睺羅是時仙人者今彌勒是我涅槃後五十六億萬歲當成佛道云云又華嚴部另有修慈分一卷亦彌勒請法從是以來號曰彌勒彌勒即慈氏也廣如經藏不能具引是則釋迦為現在主彌勒為當來主皆衆生之怙恃也縱生樂面見彌陀向入娑婆仍事彌勒豈可忽也或曰彌勒何時成佛答曰大約而言今此世界有成住壞空各二十劫此乃是住劫二十小劫中之第九小劫自萬四千歲始每過百年減一歲減至二萬歲時迦葉佛出迦葉佛滅後又百年減一歲減至人壽百歲身長一丈時釋迦佛出世釋迦滅後減至人壽三十歲時佛法滅盡惟阿彌陀經多留世間一百歲至人壽十歲身長一尺餘刀兵劫起互相誅戮世人將盡刀兵劫後天人下降人壽漸增至一百歲人喜修善時有十六位大羅漢與諸眷屬復來人中宏揚佛法如是乃至此洲人壽六萬歲時佛法尚盛至七萬歲時釋迦佛法永滅不現從此有七萬獨覺一時出現時此世界變穢為淨無諸荊棘溪谷堆阜平王潤澤金沙覆地處處皆有清池茂林名花瑞草及衆寶聚更相耀映甚可愛樂人皆慈心年成豐熟具如彌勒成佛經說至人壽八萬四千增極又復遞減至八萬歲彌勒降生乃至成佛為聲聞衆三會說法令出生死得證涅槃第一會度九十六俱胝聲聞衆第二會度九十四俱胝聲聞衆三會度九十二俱胝聲聞衆然此三會所度者皆是釋迦佛正法像法末法中一切真實持戒修行布施作福等人按藏中說彌勒之經有六種外有彌勒懺龍華懺兜率龜鏡等流通又前齊建武四年丁丑五月八日彌勒降跡在婺州義烏縣姓傅名翕年十六納劉氏女名妙光生普建普成二子在梁武帝時多顯神通并禪機有雙林傅大士語録行世別號善慧後知其彌勒應化也又五季時寧波奉化縣有一布袋和尚不知何許人自稱契此常以杖荷一袋而行時號長汀子往往以禪機示人而人少領悟者貞明三年三月三日示寂于奉化嶽林寺今天下僧坊山門皆供此像為彌勒佛也準提聖誕三月初六日準提佛母聖誕集衆等儀與藥師同先稱奈麻七俱胝佛母大準提菩薩摩訶薩三稱即誦唵囕嚙𡄦吽二十一遍唵麼尼鉢訥銘吽一百八遍稽首皈依蘇悉帝頭面頂禮七俱胝我今稱讚大準提惟願慈悲垂加護一遍奈麻颯哆喃三藐三菩䭾俱胝喃怛姪他唵折𨽻主𨽻準提娑婆訶唵部林誦一百八遍已誦變食呪甘露水呪普供養呪與藥師同維那白云恭聞準提佛母為二十五部之總領所說神呪是諸佛菩薩之種智不揀染淨持念無妨不拘具缺虔誠必應三根均益萬類咸宜今於本月初六恭逢佛母降誕之辰雲集僧衆敬獻微供伏願十度普攝定慧現前五蘊皆空苦厄盡度總持妙湛神呪加持與諸衆生同歸祕藏維那白畢舉準提贊云大哉佛母洪號準提演說三密陀羅尼妙應在誠祈功德希奇諦信永無疑南無七俱胝佛母大準提菩薩三稱三拜各回本處證義曰準提一呪為二十五部之總領者密部分五故一佛部中方毗盧遮那佛為主呪多佛說二金剛部東方阿閦佛為主呪多金剛菩薩說三寶部南方寶生佛為主呪多諸天說四蓮花部西方阿彌陀佛為主呪多諸菩薩說五羯磨部北方成就佛為主呪多化人鬼神說此五部中部部各具五成二十五也唵囕名淨法界若想若誦能令三業清淨一切罪障悉皆消除隨所住處悉得清淨衣服不淨便成淨衣身不澡浴便當澡浴若得外緣具者先沐浴次著淨衣更誦想此入囕字鮮白色放光如月照自身心則內外俱淨更妙嚙𡄦名護身誦之能除一切病苦灾障惡夢邪魅鬼神諸不祥事唵麼尼鉢訥銘吽即唵嘛呢叭𡄣吽名六字呪是觀音微妙本心當與準提次第誦持利益更大又準提佛母見衆生居此濁世難成齊戒故說此呪不拘葷酒不揀淨穢但志心持誦能使短命衆生增壽無量一切病苦皆得消滅凡有所求一切隨心若依法誦滿一百萬遍報滿便得往生淨土歷事諸佛普聞妙法得證菩提未加唵部林者如其持誦恐不成就即用此呪同上真言一處持誦決定成就一百八遍誦竟即回向惟上供時加變食甘露普供各三遍回向偈云我今持誦大準提即發菩提廣大願願我定慧速圓明願我功德皆成就願我勝福遍莊嚴願共衆生成佛道此約出世回向也若求世法當改云奉佛持準提呪弟子某甲為求某事令我早得成就云云凡奉持準提呪者每日六時極少早晚二時如一生長持隨意散誦不必記數但用準提鏡一面除早晚二時對鏡持誦外即以囊盛鏡佩帶在身任意持誦久久必獲感應除藏中諸準提經外有顯密圓通成佛心要集準提淨業集要等書流通文殊聖誕四月初四日文殊大士聖誕集衆等儀與藥師聖誕同先稱南無大智文殊師利菩薩摩訶薩三稱次誦大方廣佛華嚴經入法界品觀文殊章爾時尊者舍利弗在行道中觀諸比丘告海覺言海覺汝可觀察文殊師利菩薩清淨之身相好莊嚴一切天人莫能思議汝可觀察文殊師利圓光映徹令無量衆生發歡喜心汝可觀察文殊師利光網莊嚴除滅衆生無量苦惱汝可觀察文殊師利衆會具足皆是菩薩往昔善根之所攝受汝可觀察文殊師利所行之路左右八步平坦莊嚴汝可觀察文殊師利所住之處周回十方常有道場隨逐而轉汝可觀察文殊師利所行之路具足無量福德莊嚴左右兩邊有大伏藏種種珍寶自然而出汝可觀察文殊師利曾供養佛善根所流一切樹間出莊嚴藏汝可觀察文殊師利諸世間主雨供具雲頂禮恭敬以為供養汝可觀察文殊師利十方一切諸佛如來將說法時悉放眉間白毫相光來照其身從頂上入一遍念完即誦曼殊室利菩薩八字陀羅尼呪一百八遍唵痾末囉𤙖却浙囉呪畢誦變食真言甘露水真言普供養呪如常維那白云恭聞大士本為七佛之師故稱大智迹居五頂之勝號曰清涼寂光真境到處為家淨妙色身因緣而現緬維曼殊大願之所持如幻三昧之所運無方無體非色非空是以焚香稽首咸資般若之光歌唄贊揚悉植菩提之種茲維清和初四日值大聖降誕之辰雲集僧衆圍繞供養伏願昏昏業識望影全消汩汩煩心觀光豁爾維那白畢舉文殊贊云跡居五頂身跨青獅慈雲普覆法雨施妙演毗耶離七佛之師普化到今時南無大智文殊師利菩薩摩訶薩三稱衆三拜各回本處證義曰梵語文殊師利或云曼殊室利梵音楚夏也此翻妙德亦云妙吉祥以萬德圓明皆徹性源故稱妙德持名誦呪見聞獲益故稱妙吉祥也首誦觀文殊章出華嚴經第六十一卷次誦呪出文殊師利根本呪經佛告金剛手菩薩此八字大威德陀羅尼者乃往過去無量恆河沙諸佛所說為擁護一切十善國王令得如意壽命長遠福德無比兵甲休息國土安寧能大利益一切衆生斷三惡道遂諸願求若人暫聞憶念此呪即滅四重五逆等罪何況常念是人福德十地補處所不能奪況餘天等若持呪人事緣匆迫但能禁制身口意業十惡永絶即持此呪亦得成就除不正心不發菩提心云云五頂即五臺名清涼山者大華嚴經菩薩住處品云東北方有處名清涼山從昔已來諸菩薩衆於中止住現有菩薩名文殊師利與其眷屬諸菩薩衆一萬人俱常在其中而演說法又寶藏陀羅尼經云佛告金剛密跡主言我滅度後於南贍部州東北方有國名大震那其中有山名曰五頂文殊童子遊行居住為諸衆生於中說法及有無量天龍八部圍繞供養等此山在代州五臺縣具如志說又文殊為七佛師者心地觀經等俱如是說又處胎經云昔為能仁師今為佛弟子二尊不並化故我為菩薩是也華嚴經彌勒菩薩告善財言文殊師利所有大願非餘無量百千億那由他菩薩之所能有善男子文殊師利童子其行廣大其願無邊出生一切菩薩功德無有休息善男子文殊師利常為無量諸佛之母常為無量菩薩之師教化成就一切衆生云云以上皆約本說若約迹說者文殊般泥洹經云佛告陀羅此文殊師利以大慈悲生此國多羅聚落梵德婆羅門家其生之時家內屋宅化如蓮花從母右脅而生身紫金色墮地能言如天童子有七寶蓋隨覆其上現十種瑞相乃至云此菩薩住首楞嚴三昧力故於十方界或現初生或現滅度饒益衆生故有偈云文殊大菩薩不捨大悲願變身為異道或冠或露禮或處小兒叢遊戲於聚落或作貧窮人衰容為老病及現飢寒者巡方而求乞令人發一施與滿一切願令發信心已為說波羅密統領萬菩薩居住五頂山放億種光明見者罪消滅又云佛滅度後四百五十年文殊師利菩薩當至雪山為五百仙人宣揚法化令成熟已師與諸仙飛騰虗空至本生地尼拘樹下結跏趺坐入首楞嚴三昧現諸瑞相同五百仙人各現神變皆入涅槃其餘種種神用說種種法要種種利行種種感應廣載經律論中不能具述普賢聖誕二月草一日普賢大士聖誕集衆等儀與藥師聖誕同先稱南無大行普賢菩薩摩訶薩三稱次誦觀普賢菩薩行經章有一菩薩結跏趺坐名曰普賢身白玉色五十種光光五十種色以為項光身諸毛孔流出金光其金光端無量化佛諸化菩薩以為眷屬安祥徐步雨大寶花至行者前其象開口於象牙上諸池玉女鼓樂絃歌其聲微妙讚歎大乘一實之道行者見已歡喜敬禮復更讀誦甚深經典遍禮十方無量諸佛禮多寶佛塔及釋迦牟尼并禮普賢諸大菩薩發是誓願若我宿福應見普賢願尊者遍吉示我色身一遍接誦奈麻大行普賢菩薩一百八遍次誦變食甘露普供呪與藥師同維那作白云恭維大士乃華藏之輔聖作法界之津梁剎塵國土皆大行之所經百千法門悉大願之所持與華嚴而作長子理事圓融為極樂而作導師智力廣大今則仲春二十一日值大士降誕良辰雲集僧衆陳設供養伏願普門遍入大乘力普利一切衆生界滅除障垢無有餘一切妙行皆成就維那白畢舉普賢贊云普賢行願福聚無邊如是智慧號普賢一切悉皆圓萬德莊嚴利益遍人天南無大行普賢菩薩摩訶薩三稱衆三拜各回本處證義曰約華藏而論中毗盧左普賢右文殊蓋華嚴會上以普賢喻長子文殊喻幼男也約智行而言文殊表大智普賢表大行行以智為先導故文殊居左普賢居右今之奉供聖像並依智行為定位則先文殊而後普賢也是故域中四大名山第一五臺文殊居之第二峩眉普賢居之第三普陀觀音居之第四九華地藏居之按悲華經往昔劫中阿彌陀佛為轉輪王時觀音為第一太子名曰不眴勢至為第二太子名曰尼摩文殊為第三太子名曰王衆乃至第八太子名曰泯圖即今普賢菩薩是也是則本迹相同因果相類所有德相神用說法利行禮誦感應皆遍三藏非此筆墨所能具録即唐時天台寒山拾得二僧屢著靈異各有詩集傳世咸以為文殊普賢化身古今相傳亦奇跡也觀音聖誕二月十九日觀音聖誕掛牌上供等儀與藥師同先稱奈摩大悲觀世音菩薩三稱次誦妙法蓮華經觀世音菩薩普門品偈曰世尊妙相具我今重問彼佛子何因緣名為觀世音具足妙相尊偈答無盡意汝聽觀音行善應諸方所宏誓深如海歷劫不思議侍多千億佛發大清淨願我為汝略說聞名及見身心念不空過能滅諸有苦假使興害意推落大火坑念彼觀音力火坑變成池或漂流巨海龍魚諸鬼難念彼觀音力波浪不能沒或在須彌峯為人所推墮念彼觀音力如日虗空住或被惡人逐墮落金剛山念彼觀音力不能損一毛或值怨賊繞各執刀加害念彼觀音力咸即起慈心或遭王難苦臨刑欲壽終念彼觀音力刀尋段段壞或囚禁枷鎖手足被杻械念彼觀音力釋然得解脫呪詛諸毒藥所欲害身者念彼觀音力還著於本人或遇惡羅剎毒龍諸鬼等念彼觀音力時悉不敢害若惡獸圍繞利牙爪可怖念彼觀音力疾走無邊方蚖蛇及蝮蠍氣毒烟火然念彼觀音力尋聲自回去雲雷鼓掣電降雹澍大雨念彼觀音力應時得消散衆生被困厄無量苦逼身觀音妙智力能救世間苦具足神通力廣修智方便十方諸國土無剎不現身種種諸惡趣地獄鬼畜生生老病死苦以漸悉令滅真觀清淨觀廣大智慧觀悲觀及慈觀常願常瞻仰無垢清淨光慧日破諸暗能伏灾風火普明照世間悲體戒雷震慈意妙大雲澍甘露法雨滅除煩惱𦦨諍訟經官處怖畏軍陳中念彼觀音力衆怨悉退散妙音觀世音梵音海潮音勝彼世間音是故須常念念念勿生疑觀世音淨聖於苦惱死厄能為作依怙具一切功德慈眼視衆生福聚海無量是故應頂禮一遍接誦觀音聖號一百八遍餘儀如常但改白云伏以中和屆節水月彰自在之容夾鍾應律曇華現圓通之瑞顯悲願於三十二應娑婆赤子盡稱名舒慈光於十萬億程極樂導師常輔化切念某甲等泛塵勞海羈煩惱鄉六根橫流徒有奔塵之失三慧長翳未見旋性之功倘非大悲之慈親孰救憐𫺬之窮子茲逢聖誕敬薦馨香祈鑒微誠哀憐攝受白已一拜歸位舉贊云手持楊枝頂戴如來跏趺端坐寶蓮臺救苦甚悲哀一念能回無量慈門開舉聖號三稱畢三拜是日或禮懺或持名證義曰觀音救苦度生持名感應法華楞嚴既皆詳說別典紀載亦難悉數茲姑就僧中感應之最顯者略録數條見靈跡之昭昭類如是矣山菴雜録云昔徑山古鼎和尚生稟侏儒唇褰縮齒露齦聲嘶燥膚腠皴臘相工相之曰以爾之四賤相萃乎侏儒之軀平生不言可知矣師誓禱觀音日持聖號無算夜禮聖像計千如是二十年賤相化為福相唇舒緩而齒隱聲圓潤而膚光後遇向之相工賀曰師今相好當踞法座大振宗風其年出世隆教乃至居徑山十二年壽七十九此誦拜觀音易賤夭而為貴壽也又溫州壽昌寺絶照輝坐夏浮慈寮房掛聖像每夜虔禮一日忽見淨瓶水從壁湧出通身歡悅從此造詣益深智鑑益明此誦禮感智慧也又天童寺照寮元素多病洪武丙辰病日篤勉藏主勸持觀音聖號照日誦萬聲明年十月十七午時自念病勢去死不遠莫如改念阿彌陀佛方興此念忽見一婦人持淨瓶而現其前照驚訝失措既而定心諦觀乃是菩薩示相照涕泣露罪求哀須臾不見越五日病苦盡脫此禮誦除病也高僧傳云義熙初山陰嘉祥寺慧虔自知將盡乃屬想安養誠祈觀音預覩聖相疾雖綿篤神色如平日侍者咸聞異香頃之人寂道俗見聞者莫不歎美此禮誦感生淨土也要而言之觀音大士於衆生緣念甚深信久行篤真誠懇至若拜若誦皆獲感通菩薩之願力固有不可思議者矣勢至聖誕七月十三日勢至聖誕集衆等儀與藥師同先念南無西方極樂世界大勢至菩薩摩訶薩三稱次誦佛說觀無量壽佛經勢至觀章次觀大勢至菩薩此菩薩身量大小亦如觀世音圓光面各百二十五由旬照二百五十由旬舉身光明照十方國作紫金色有緣衆生皆悉得見但見此菩薩一毫孔光即見十方無量諸佛淨妙光明是故號此菩薩名無邊光以智慧光普照一切令離三途得無上力是故號此菩薩名大勢至此菩薩天冠有五百寶花一一寶花有五百寶臺一一臺中十方諸佛淨妙國土廣長之相皆於中現頂上肉髻如鉢頭摩花於肉髻上有一寶瓶盛諸光明普現佛事餘諸身相如觀世音等無有異此菩薩行時十方世界一切震動當地動處有五百億寶花一一寶花莊嚴高顯如極樂世界此菩薩坐時七寶國土一時動搖從下方金光佛剎乃至上方光明王佛剎於其中間無量塵數分身無量壽佛分身觀世音大勢至皆悉雲集極樂國土畟塞空中坐蓮花座演說妙法度苦衆生作此觀者名為觀見大勢至菩薩是為觀大勢至色身相觀此菩薩者名第十一觀除無數劫阿僧祇生死之罪作是觀者不處胞胎常遊諸佛淨妙國土一遍接朗誦南無大勢至菩薩一百八遍誦竟念變食甘露普供呪各三遍已維那白云恭聞勢至大士本昔因地以念佛心入無生忍今於此界攝念佛人歸於淨土是以為西方弼聖嘗示念佛三昧憶佛念佛現前當來必定見佛如染香人身有香氣此之法喻誠為諄切今值聖誕敬修供養伏願大士憐念衆生如母憶子常蒙加被亦如大士淨念相繼得三摩地盡此報身生極樂國白畢舉贊云勢至大士寶瓶巍峩攝受念佛誓宏多剎海盡包羅弼侍彌陀度苦出娑婆南無大勢至菩薩三稱三拜各回本處證義曰西方三聖彌陀居中觀音居左勢至居右今此上供用觀經文而觀大士以圓通義而顯本因也熙願云大勢至菩薩於河沙劫前以念佛入三摩地常在此世界中攝取念佛衆生往生淨土楞嚴經中佛問圓通菩薩自敘一章甚明是當世所稱蓮宗遠公諸祖尚係支那傳法之祖而大勢至菩薩則沙劫傳念佛法門之祖也章內所言念佛之法已極盡無餘而母子相憶等語尤為肫懇曲至余初一見生感不能自已再三諷誦感極涕零愈歎佛菩薩之恩難報自此以後每當念佛先朗誦此章一遍奉為常課一回持誦一回省發受益不小我既奉此法門而得加被願諸善人亦如是行持每於念佛時先誦此章念佛更為得力果是行持每於念佛時先誦此章念佛更為得力果能如法修行必蒙接引往生矣熙願即於此章略加疏釋見遠公忌中為念佛起首并十念門睡時入觀文觀經第十三觀又附勸言四則一勸發心念佛二勸實心念佛三勸求生淨土四勸正助雙修如此合訂名曰念佛切要刻印流通誠為切要宜廣布焉地藏聖誕七月三十日地藏聖誕早課燒香傳爐住持拈香維那舉香贊至繞佛舉拜地藏聖號十二拜早粥客堂掛牌等儀與藥師誕同先稱奈麻大慈地藏王菩薩三稱次誦地藏菩薩本願經見聞利益品偈曰吾觀地藏威神力恆河沙劫說難盡見聞瞻禮一念間利益人天無量事若男若女若龍神報盡應當墮惡道志心皈依大士身壽命轉增除罪障少失父母恩愛者未知魂神在何趣兄弟姊妹及諸親生長以來皆不識或塑或畫大士身悲戀瞻禮不暫捨三七日中念其名菩薩當現無邊體示其眷屬所生界縱墮惡趣尋出離若能不退是初心即獲摩頂受聖記欲修無上菩提者乃至出離三界苦是人即發大悲心先當瞻禮大士像一切諸願速成就永無業障能遮止有人發心念經典欲度羣迷超彼岸雖立是願不思議旋讀旋忘多廢失斯人有業障惑故於大乘經不能記供養地藏以香花衣服飲食諸玩具以淨水安大士前一日一夜求服之發殷重心慎五辛酒肉邪淫及妄語三七日內勿殺害至心思念大士名即於夢中見無邊覺來便得利根耳應是經教歷耳聞千萬生中永不忘以是大士不思議能使斯人獲此慧貧窮衆生及疾病家宅凶衰眷屬離睡夢之中悉不安求者乖違無稱遂志心瞻禮地藏像一切惡事皆消滅至於夢中盡得安衣食豐饒神鬼護欲入山林及渡海毒惡禽獸及惡人惡神惡鬼并惡風一切諸難諸苦惱但當瞻禮及供養地藏菩薩大士像如是山林大海中應是諸惡皆消滅觀音志心聽吾說地藏無盡不思議百千萬劫說不周廣宣大士如是力地藏名字人若聞乃至見像瞻禮者香花衣服飲食奉供養百千受妙樂若能以此回法界畢竟成佛超生死是故觀音汝當知普告恆沙諸國土一遍次誦唵三陀囉伽陀娑婆訶一百八遍餘如常儀維那白云伏以金風載發肇開金容之祥玉露將濡適顯玉毫之瑞率土傳誕降佳辰秋月初盡普天仰和煦聖德杲曰正中切念衆等身居末世罪結多生求脫苦輪必藉仁風之披拂欲登樂地全依慈照以逍遙茲值曇花示現之期敬舉芹藻薦馨之典衆等伏願金錫重光明珠流焰癡狂頓歇開無始之鐵城熱惱驟除出眼前之火宅人天普利幽明咸資白已一拜歸位舉贊地藏大士誓願宏深明珠照破鐵圍城金錫振幽冥禮像稱名沙界布陽春奈麻大慈地藏菩薩證義曰地藏度生之事地藏菩薩本願經地藏十輪經占察善惡業報經中廣說今舉東土示跡者神僧傳云佛滅度一千五百年地藏降迹新羅國主家姓金號喬覺永徽四年年二十四歲祝髮擕白犬善聽航海而來至江南池州府東青陽縣九華山端坐九子山頭七十五載至開元十六年七月三十夜成道計年九十九歲時有閣老閔公素懷善念每齊百僧必虗一位請洞僧即地藏也足數僧乃乞一袈裟地公許衣遍覆九峯遂盡喜捨其子求出家即道明和尚公後亦離俗網反禮其子為師故今侍像左道明右閔公職此故也菩薩入定二十年至至德二年七月三十日顯聖起塔至今成大道場現果録云吳門王建一日無疾忽終青衣引至冥府閻君鞠勘係是誤攝乃山東王建也由是出冥殿見地獄黑焰蔽空呌如雷吼三老僧趺坐樹抄以淨水灑之獄人痛聲停𥨊近前詢之即觀音普賢地藏也據此可見地藏經中所說持地藏名禮地藏像獲福消罪真有不可思議者
