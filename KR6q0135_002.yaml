body:
  text: 唐洪州百丈山沙門懷海集編清古杭真寂寺苾芻儀潤說義越城戒珠寺住持妙永校閲報恩章第二述曰禮重祭祀所以報恩酬德而一切恩中國恩為最欽惟盛朝崇佛爰及僧倫所以體恤之者極至聖聖相承罔或有間釋子追慕其容已乎國忌之規所以立也至若諸天有護法之恩於是有齊天之規日月有照臨之恩於是有護日護月之規檀越有信施之恩於是有祈晴祈雨遣蝗之規凡此皆報恩也又有兼求恩者則祈禱韋陀是也以天尊現天身而護法願力宏深有感斯應故南山讚云韋陀將軍最多洪護若見魔屬惑亂比邱則悽惶奔赴應時剪除可謂善於形容天尊護法之心矣今叢林中凡遇災難等事祈禱韋陀無不靈應知求恩自知報恩故以附於報恩一章竈神以大衆飲食所賴本為五祀之一故殿於卷末也國忌佛事逢本朝先聖忌辰即賓天日又稱升遐隔宿客堂掛牌牌云某日恭逢某皇帝升天忌辰早課大衆師齊詣大殿諷楞嚴呪念佛伏願聖心垂鑒佛日增輝用黃紙寫某皇帝聖位供大殿佛前設香花燈燭果供几筵正日早課僧衆雲集燒香傳爐住持拈香維那舉香讚課誦如常是日大殿設壇諷金剛經知客請住持拈香上供時住持上香上茶湯念誦畢維那回向云某州某寺住持傳法臣僧某甲於今某月某日恭遇某皇帝聖忌之辰謹集僧衆諷誦經呪所萃殊利謹伸回向伏願神遊八極乘雲車風馬逍遙位證中天受玉殿瓊樓快樂十方三世一切佛云云舉讚敬維先主護法周全葵忱傾向莫名言奉報在心田衆志䖍䖍唱誦利先天奈麻升天界菩薩摩訶薩三稱證義曰此先帝陟天道場理合舉行供天若但供天客堂預日掛供天諸師牌若兼經懺即懺牌加五鼓供天預晚嚴淨發符凡供天法事預日知客於法堂命香燈師打掃潔淨及張掛幢幡燈綵莊嚴供具等事堂正中上首設高座供佛法僧三牌位次于左右兩傍鋪設香案桌圍供器奉供光明會上侍從諸人及三界司事神祇等四十六牌位亦羅列香花燈燭等事次于丹墀下中間設天仙位供物俱同凡供菜飯俱要豐盛如法切不可用生冷不可食物反招不恭過愆如是齊備前一日晚止靜後鳴鼓三下知客通知維那等齊集次請齊主拈香衆師嚴淨已即發符牒預達諸天儀如常式但加結末讚云光明會上護法諸天日月星斗曜人間持國賜安然供奉心䖍福壽永綿綿南無登雲路菩薩摩訶薩三稱各回次日五更懺師潔躬祇候法堂燈燭供獻俱備知客鳴鼓三下領衆師齊集知客請齊主拈香餘事載科儀茲不贅科儀有詳略二種詳本別行略載禪門日誦唯四十九牌位式列左奈摩中天教主本師釋迦牟尼文佛牌中東方阿閦佛南方寶相佛西方無量壽佛北方微妙聲佛過去寶華功德海琉璃金山照明佛寶勝佛無垢熾寶光明王相佛金𦦨光明佛金百光明照藏佛金山實蓋佛金花𦦨光相佛大炬佛寶相佛共十四佛寫作一箇牌位上中奈摩金光明海微妙法炬最勝經王上左奈摩光明會上諸大菩薩信相菩薩金光明菩薩金藏菩薩常悲菩薩法上菩薩共六位寫作一箇牌位上右婆婆界主號令獨尊大梵天王并諸眷屬之位左一以下每位末俱添并諸眷屬之位六箇字地居世主忉利中王帝釋尊天左二東方護世乾達婆主持國天王左三南方護世鳩槃茶主增長天王左四西方護世大龍王主廣目天王左五北方護世大藥叉主多聞天王左六親伏怨魔誓為力士金剛密跡尊天左七特尊之主居色頂天摩醯首羅尊天左八二十八部統領鬼神散脂大將尊天左九能與總持大智慧聚大辨才尊天左十隨其所求令得成就大功德尊天左十一殷憂四部外護三洲韋䭾天將尊天左十二增長出生證明功德堅牢地神尊天左十三覺場垂蔭因果互嚴菩提樹神尊天左十四生諸鬼王保護男女鬼子母神尊天左十五行日月前救兵戈難摩利支尊天左十六百明利生千光破暗日宮太陽尊天左十七星主宿王清凉照夜月宮太陰尊天左十八祕藏法寶主執羣龍娑竭羅王尊天左十九掌幽冥權為地獄主閻摩羅王尊天左二十五嶽居東泰山府君天齊仁元尊神左二十一鐵圍兩山十八獄主十殿冥王尊神左二十二空神地神晝神夜神一切護身諸神等衆左二十三無色四空非非想處無所有處識處空處諸大天王右一色界四禪五那含天色究竟善現善見無熱無煩諸大天王右二色界四禪外道所居無想天王右三色界四禪居凡夫位廣果福生無雲天上諸大天王右四色界三禪遍淨無量淨少淨諸大天王右五色界二禪光音無量光少光諸大天王右六色界初禪天主大梵次及梵輔梵衆諸位天王右七欲色之間示為波旬五帝大魔及諸魔天右八欲界居頂他化大自在天王右九欲界居次恆受化樂自在天王右十欲界居中兜率陀天知足天王右十一欲界空居夜摩天王右十二居須彌頂四方各八三十二大天王右十三居須彌腰四方四部諸天天子右十四因本空居應世吉凶諸星宿天右十五須彌山下如次三級常憍天持鬘天堅首天諸天天子右十六光明會上迹示八部緊那羅王迦樓羅王摩睺羅伽王等一切神王右十七光明會上迹掌器界尼連河神主雨大神大飲食神風水諸神火神等神右十八東西兩土十八伽藍本寺伽藍護法聖衆右十九天干地支六十太歲十二宮神諸大星君右二十值年太歲本命宮曹業道冥官一切星君右二十一某省省主某府府主某縣縣主城隍尊神右二十二當山土地正神某坊土地正神即齊主所住土地右草三凡供天法儀略如日誦本中常儀行之茲備疏式云伏以靈山會上受如來付囑之音摩竭場中證世主妙嚴之品羣生有賴三界高居幸蒙降臨希垂朗鑒爰有一四天下南贍部洲大清國省府縣都圖土地祠下居住奉佛修齊供天為祈保何事云云略書意旨二語信某甲或有司為請主或鄉宦或士庶各具名姓是日稽首拈香至心皈命光明會主釋迦文佛金光會上諸佛菩薩天龍八部權實聖賢金蓮座下恭通情者伏為何事云云詳書所求心願特選今月某日敬陳簠簋之清齊遍奉權輿之天主望垂天恩俯納下誠伏願佛心哀愍天德宏敷隨本願以施恩示感應之如響人心克一天聽斯聰大顯威神用資法化右疏恭奏三寶諸天速疾垂恩無任惶悚激切之至年月日某某具疏證義曰金光明經藏有三譯一北凉曇無讖譯四卷即今流通本二隋僧寶貴與天竺志德合入有八卷三唐僧義淨譯十卷文義周足名金光明最勝王經今之供天但宗北譯供二十諸天太略矣此有四十九位乃並宗三譯足見古規詳細甚妙今摘録金光明最勝王經第八卷大辨才天女品偈一段以證古規經云我今皆召請佛之聲聞衆皆願速來至成就我求心所求真實語皆願無虗誑上從色究竟及以淨居天大梵及梵輔一切梵王衆乃至遍三千索訶世界主并及諸眷屬我今皆召請唯願降慈悲哀憐同攝受他化自在天及以樂變化覩史多天衆慈氏當成佛夜摩諸天衆及三十三天四天王衆天一切諸天衆地水火風神依妙高山住七海三神衆所有諸眷屬滿財及五頂日月諸星辰如是諸天衆令世間安隱期等諸天神不樂作罪業敬禮鬼子母及最小愛兒龍天藥叉衆乾達阿蘇羅及以緊那羅莫呼洛伽等我以世尊力悉皆申召請據此經文當依此古規備供方能感通也後之高賢其留意焉護日護月凡遇日蝕月蝕客堂預日掛牌牌云某日某時日蝕或月蝕合院大衆師聞鐘聲齊詣大殿前護日或護月時至庫司向日或月設供大衆聞鐘聲雲集住持拈香維那舉香雲蓋三稱畢齊念奈摩日光遍照菩薩護月改念月光至光還圓上供先念心經次變食甘露真言等乃至供畢維那宣疏護日疏云伏以此日而食占五紀之或乖畏天之威虞六沴之將作故徇民情而救護謹依佛力以禱禳由是現率衆僧謹發誠心齊誦東方琉璃世界日光遍照菩薩聖號用伸救護所冀日精速賜還光伏願五色開而黃道明照臨下土羣陰消而陽德盛昭回于天宣疏畢舉日光讚云圓光周遍聖德難量森羅海印煥天章沙界被恩光普濟冥陽同慶大輪王奈麻日宮太陽尊天菩薩三稱各回護月疏云伏以月耀陰精而主夜所賴照臨天示咎徵于下民於焉薄蝕既戒既懼以禱以禳由是率領僧衆謹發誠心齊誦東方琉璃世界月光遍照菩薩聖號用伸救護所冀月華速賜清光伏願妖氛滅跡一輪現大地山河玉兔長生萬象納廣寒宮殿宣畢舉讚香飄桂粟寶鏡團圞銀河清冷衆星環光明照耀寬缺處重圓敬禮利人天奈麻月宮太陰尊天菩薩三稱畢各回散證義曰此報日月照臨之恩也所謂蝕者日月交會日為月掩則日蝕日月相望月與日亢則月蝕亦名薄蝕黑氣往迫為薄日月黃赤無光如有物逼迫之象也形色虧缺為蝕日月虧缺被侵如蟲食葉也然此薄蝕亦七難中之一難人與萬物皆受照臨之恩故須護護者乃下土凡民各盡誠心以回天象之意云爾或曰護本界日月何故念東方菩薩名答曰名義相符故稱彼洪名救我日月且佛法無邊天心效順稱之宜矣結讚仍稱日宮月宮者仍從其本稱也若約理言日者實也常充實故以實智照真如理遍滅衆生一切迷暗令登涅槃山暫時不覺如同死人故須護也月者缺也有盈缺故以權智照世俗事遍除衆生一切煩惱令遊清涼海一念執滯墮坑落塹故須護也若午後護月不須上供以諸天早食不受午後供然清茶香燭自可供附中秋祀月八月十五日晚粥前客堂掛牌牌云是晚合院大衆師聞鐘聲齊詣大殿前拜月黃昏二板庫司於大殿前對月設供位供品唯香華清茶燈燭知客鳴鐘三下衆集傳爐住持拈香維那舉香雲蓋三稱已舉月宮太陰菩薩三稱誦藥師呪二十一遍展具禮月宮太陰尊天菩薩二十四拜拜畢起具舉讚雲開空淨獨露嬋娟皎潔無瑕體自圓一月一周天普照無邊恩光被大千奈麻月宮太陰尊天菩薩三稱各回本寮聞鼓聲齊集齊堂吃普茶每人加月餅一箇證義曰中秋相傳是月誕故舉世皆祀之約佛教而論祀月上供宜在上午蓋月類天諸天不受午後供也足以清規但設供位具花香燭水而已不具食物上供也邇來叢林祀月同俗訛謬已久甚至有稱禮月光遍照菩薩者或稱禮解脫月菩薩者更有上供時用齊佛儀者尤為謬誤愚者不識以訛傳訛諸方高明宜更正之或曰日月運行其德無二今只祀月未見祀日何也答比從俗之禮俗不尚祀日故又月者陰幽藉其輝映萬彚資其清凉論其功為日之亞若其德則大有近於吾佛之道者靈照自如虧蔽不能損其光何其明也影現衆水大小未嘗異其照何其公也容光必照何其圓也清淨自若何其寂也入污濁而不染何其貞也循環不息其運何其恆也盈虧不爽其時何其信也光被萬象而無應心何其虗也映星宿而獨耀何其熾也咸對一切目前何其普也若能因月而悟心則本覺自照障不能昏非之月明乎廣利無方恩冤不二非月之公乎頭頭是道法法全彰非月之圓乎處喧囂而常靜非月之寂乎居塵穢而獨潔非月之貞乎自強不息非月之恆乎孚及豚魚非月之信乎物來順應非月之虗乎惟其近於佛道若此故靈鷲說法常以月為喻寒山則云我心似秋月無物堪比倫嗚呼月之德可謂盛矣今中秋之交稱為月誕雖係俗傳而天高氣爽分外增明大圓鏡智如對目前於此時而專祀之不亦宜哉或又曰佛制比邱不拜天人等今月宮亦類諸天何以拜耶答曰律制約迹而論彼是俗神未登道果故不許拜拜則恐損彼福故制清規約本而論凡諸天神多聖賢應化今乃禮其德敬其護法故可拜若無德無護不涉于佛教者應遵佛制不拜為正若為名利而阿諛曲媚於世禮者則自他俱損不祥甚矣祈晴祈晴儀軌具載金剛光𦦨止風雨經是佛覩說但此經唯大藏有世難舉行今且隨世而行久雨不晴客堂先白方丈次掛牌於山門上正中牌云祈晴又用黃紙牌位牌書奈摩金剛光𦦨止風雨經光𦦨會上佛菩薩十七字為一蓮座設於某處須如法嚴治壇場陳設供養住持專心加謹僧衆各務整肅或有官員拈香或常住發心祈求皆務各竭真誠以期挽回天意不可虗應故事至期書記先付意旨維那知會堂司客堂報衆掛祈晴念誦牌如常式齊粥二時後鳴鐘集衆諷經或三日五日七日隨時而行輪僧十員或數十員分作幾引接續諷誦謂之不斷輪必期感應方可滿散懺謝凡有祈禱皆應如此每日二時臨供回堂後聞禪堂鳴二板知客鳴大鐘三下本壇即焚香燭禪堂止靜即開小靜內外大衆搭衣持具進壇住持拈香衆唱大悲聖主中道神章圓融無礙妙難量結界淨壇場衆等宣揚熱惱化清凉奈麻清凉地菩薩三稱畢隨舉奈麻大悲觀世音菩薩三稱持大悲呪二十一遍念觀音聖號千聲或持藥師呪四十九遍念藥師琉璃光如來千聲旋繞念畢鳴引磬二下歸位向上立維那鳴磬收佛號已次舉祈晴疏云天關久鎖不開容日夜滂沱鼓黑風為除民災求吉歲應時迸出一輪紅爰有一四天下南贍部洲大清國某省某府某縣某寺住持某甲如有當道官員為請主當一一具名姓是日至心拈香皈命娑婆教主釋迦文佛光焰會上諸佛聖賢天龍八部司事尊神諸蓮座前恭通情旨仰祈垂光俯賜感應某等切見淫雨為戾物用不成百川橫流民無寧處蓋衆生共業所感唯上帝好生為德由是謹發誠心啓建祈晴道場每日衆僧諷誦神呪佛號仰叩諸聖祈求晴霽速賜感彰伏願掃迷雲於四野陰沴潛消麗杲日於中天容光必照俾五行各順其序而萬彚悉遂其生右疏恭請佛天洞鑒龍神施行年月日住持某甲等具疏宣畢次舉讚云諸佛如來憫念衆生為求杲日破濃陰久雨得新晴遍地光明萬類樂欣欣奈麻光𦦨會上佛菩薩三稱大衆齊展四拈具維那押磬舉腔拜奈麻本師釋迦牟尼佛三拜藥師琉璃光如來三拜日光遍照月光遍照大悲觀世音各三拜南無金剛光𦦨止風雨經光𦦨會上佛菩薩三拜三歸依畢回堂即換第二引僧衆如前諷誦如是輪替魚音不絶凡上供如常儀此疏當寫二道建首日初時回向焚化一道上奏三寶諸天以求速應一道供壇上佛前每時回向宣讀一遍至天晴大回向焚化證義曰生物者日日盛為枯焦之由潤物者水水淹為腐爛之始故非時風雨及過時不雨皆為災難理合䖍求以冀風調雨順也祈雨久晴不雨山門上掛祈雨牌次依大雲輪請雨經文陳設結壇擇潔淨地方廣十二步以為道場築壇其中東向高一尺方十步取潔淨黃土埿壇四周壇中設牀方廣二丈為高座覆以青幄幄中設主壇僧座一高桌一兩傍設誦經矮座并矮桌如其人數凡座褥桌幃皆以青色從高座東量三肘外設青幃高桌一桌上設供器及乳糜雜果南西北竝同供龍王一身三頭竝諸眷屬西向從高座南量五肘外供龍王一身五頭竝諸眷屬北向從高座西量七肘外供龍王一身七頭竝諸眷屬東向從高座北量九肘外供龍王一身九頭竝諸眷屬南向壇四角各豎青幡七一幡下各燃油燈一燈前四角各設花瓶插諸鮮花壇之四周或一步或數步外以席為墻四面有門門各畫二行龍守護即用以結界經云或灰或水以為界畔者今以此代之龍首皆向門而蜿蜒其尾互相鈎結門外有屏亦以席為之選高行持戒僧一人主壇兩序亦擇戒行清淨僧唪經又選僧二人入壇為侍者以供添香注水之役僧皆青衣薰沐齊祓悉如經說晝夜嚴淨䖍誠結願諷誦經文至一七日或二七日遠至三七日自然感召天和甘霖應禱矣證義曰此先總說也壇用黃土代𤚩牛糞耳𤚩牛即雪山白牛純食雪山香草其糞香潔可用餘牛皆臭穢不堪用我東土不能取此故用淨黃土代之又莊嚴經所云青色者青蓋北方黑色取水德也又一肘即今裁尺一尺三肘即三尺耳次四方龍王像說龍王像畫於插屏上屏高二尺六寸寬一尺六寸屏座高一尺二寸屏心蒙以絹素各按方位照經中法相頭數繪於畫上在東方者一身三頭在南方者一身五頭在西方者一身七頭在北方者一身九頭并各畫諸眷屬圍繞下為海濤上有雲氣龍王眷屬甚衆不能悉畫今每方各繪四眷屬站立左右頭數各依中主次經幄說經幄設於壇之正中東向以覆高座方廣二丈簷高九尺中隆起如屋用青色布為之搘以黑漆木柱又染索令黑系於四角分絆於地簷之四周皆垂瓔珞清淨莊嚴儼如寶界矣次主壇桌座說主壇僧東向桌座各一以木為之設於高座中稍西桌高二尺六寸方三尺幃以青布置經其上用青羃蓋經誦則揭之座高一尺六寸方二尺藉以青褥次兩序桌座說兩序桌座設於主壇兩傍南北相對或二或四如其人數桌高九寸方二尺亦以木為之幃及經羃皆與主壇同坐則就地敷青褥方二尺次香花燭說香爐一以供炷香燭臺二以燃蠟燭又於其前設香爐一用末香假香燃熾其中以爇瓣香旁置二盤沉速檀等種種妙香令侍者時時添爇晝夜不絶以表誠敬花瓶四枚分設於壇四角幡燈之前瓶高一尺五寸圓徑一尺二寸可容水三斗以黑釉瓷為之下有座竝用黑漆中插種種草木鮮花用石黛和水注滿每日別注毋使隔宿花亦日用新好使清芬不絶祈龍天歡喜次食果說乳糜每供各五器雜果亦每供各五器器皆有托高下大小各隨其宜其果竝取鮮好珍品足稱上供者次幡說幡用二十八竿設於壇之四角每角各七以新青布為之長一丈竿用黑漆竿首飾以銅鈎鈎幡下用黑座其安設一竿正當壇之四角左右各三曲抱如矩整齊均一四面皆同次置燈說凡二十八盞設於壇四角各隨七幡為位以銅為之高五寸四分上盤深一寸六分圓徑五寸承以層臺下各一座刻為龍文中燃淨油晝夜光明照映一切上來壇法已竟次當依經作法經云我今召集此會一切諸龍王等據此將欲祈雨先當召請結壇已僧衆俱齊戒沐浴內外皆潔淨入壇主法與二表自及住持僧服青色及搭青衣卯時至詣大殿拈香禮佛三拜已主法舉瑤天玉露覺海金波大千沙界散芬陀三昧滌沉痾少水成多一滴淨山河南無清涼地菩薩摩訶薩三稱畢表白持淨水杯舉云奈摩大悲觀世音菩薩三稱舉偈云菩薩柳頭甘露水能令一滴遍十方腥膻垢穢盡蠲除加持壇場悉清淨教有密言謹當持誦衆齊持大悲呪表白灑淨緩緩而行先從大殿內右繞至殿外右繞一匝漸從壇下旋繞至壇上三匝畢各歸位立定已主法鳴磬結呪舉奈摩甘露王菩薩摩訶薩三拜少頃先主法出位至中拈香次表白次住持俱拈香已歸位向上立唱香贊云田疇龜拆旱魃為殃羣黎䖍禱共奔忙禾稼苦遭傷祈沛瓊漿遍界獲清涼香雲蓋三稱表白舉云一心頂禮十方法界常住三寶三拜法師靜心入觀想十方諸佛菩薩及龍王聖衆皆以天眼遙見天耳遙聞他心悉知知此大清國某省某府久旱無雨為茲如法建壇依經召請悉來降臨運想來已即白云恭開如來演法嘗宣請雨之經輪蓋啓端妙顯行慈之義設高座而鋪黃土䖍結淨壇爇明燈以映青幡依經請召由是苦滅樂施諸龍靈感雲興澤沛衆姓歡騰據今大清國某省某府某年某月亢旱已久田禾半枯將成荒歉由是依經建壇求降甘雨以救萬民然恐壇儀有錯僧戒有虧求不如法難以感通切聞大輪明呪能除此咎衆等䖍誠齊持大輪明王呪七遍以安壇儀呪見施食儀軌誦七遍已法師與表白及住持皆揭開經首召請經序中一百八十八位龍王一齊執香爐焚香表白舉云一心召請某某龍王云云每十位一合召召舉接結句云唯願以他心智運神足通上遵佛敕下愍有情來茲某省速降甘雨乃至最後一合召畢法師長跪合掌依經直白行大慈法及施一切樂呪文已法師與表白師即振鈴緩緩朗誦呪三遍已動鼓鈸竟法師鳴磬一下又直白經句已再依經本奉請諸如來一齊執香爐焚香表白舉云一心奉請某某如來每十位一合請請畢接結句云唯願諸佛如來運無緣慈敕茲某省速降甘雨共五十四位作六翻召請至最後一翻請畢法師仍長跪合掌鳴磬一下直白經文感應及持呪效已起立與表白即振鈴同音緩緩朗誦呪三遍鳴磬動鼓鈸畢法師立白及誦呪共十一番俱各呪三遍畢鳴磬動鼓鈸已法師撫尺高聲白經中敕文共六番每番呪三遍畢鳴磬動鈸已法師長跪合掌鳴磬一下依經白結壇儀軌圓滿已起立與表白執香爐舉回向偈每句一拜表白齊和求雨功德殊勝行無邊勝福皆回向普願亢旱諸州縣速得甘雨皆充滿此乃救急如火燃為求滅障速降雨唯願三寶及龍天慈愍有情雨應時十方三世一切佛一切菩薩摩訶薩摩訶般若波羅蜜三歸依畢即下壇此壇香燈師當盡心守護不得使一切閒雜人亂闖下午二板後法師與二表白及住持其四人入壇鳴魚朗誦請雨經如是上午請下午誦日日無間至得大雨乃止除此壇外另於附近殿宇中依次輪差僧十人最少四人輪誦大悲呪二十一遍觀音聖號一千聲回向拜觀音十二拜三皈畢換第二班接魚如是輪替晝夜不絶以求速雨上供等事一如常儀其牌位書奈摩無邊莊嚴海雲威德輪蓋龍王并諸眷屬之位上供畢舉讚云龍王聖衆威德難量欽承佛敕散瓊漿大慈臨壇場潤澤清涼注滴滿十方奈麻雲輪會上龍王聖衆菩薩三稱附祈雨疏稿此疏當書四道于建首日作三處化或製紙符官三位同三道疏各放在紙符官手上化更妙一奏三寶一奏諸天一奏諸龍王留一道每日宣讀至雨足大回向日焚化疏云伏以亢陽為灾百物就槁斯上天之降罰由下民之多愆惟諸佛開慈悲之門而神呪有祈禳之應由是謹發誠心啓建祈雨道場謹陳情懷仰希垂聽今據大清國某省某府某縣某寺住持僧某甲若當道官員為請主當一一具書姓名是日至心拈香皈命大雲輪主釋迦文佛請雨會上諸佛聖賢天龍八部司事尊神諸蓮座下恭通情旨蓋因本處時值某時亢旱日久少降時雨泉源消竭萬物枯槁庶民百姓其苦如熬有司執事其憂如煎切聞佛教有大雲輪請雨經呪最為感通由是某甲等於某日啓建依法祈禱雲集僧衆加持經呪然恐事理不周儀不如法難感龍天赦宥未能即霈甘霖由是謹貝表章先奏三寶聖衆次奏三界諸天次奏龍玉聖衆乞求俯垂鑒照憐愍有情宥其同業之愆賜以平等之澤起雲雷於山川牌滂沱矣拯生靈於塗炭厥惟艱哉次祈風伯雨師上承下佑稼神地主盡職關心庶茲多稼亦乃有秋時和歲稔萬民樂業謹竭丹誠稽首上疏右疏第一道疏恭奏三寶證明金蓮臺下第二道疏諸天洞鑒寶座下第三道疏龍神諸神寶座下年月日住持某甲等九頓謹奏附額聯大雲輪壇此額掛本壇廊下正中連兩傍聯句俱用黑紙白粉書正楷字大霈甘霖田疇得而滋育洪敷惠澤草木被以生成證義曰祈雨儀軌俱從佛經録出惟結壇設座幡惺圖像等經費浩繁若係宰官舉行固屬易辦倘為僧衆發心可用紙木代金帛祇須䖍誠整齊而已然經有若泛雨時亦能令止之句可見此經亦可祈晴而用但改經文中降注二字為速止二字改請雨為請晴并另換疏語可也此潤鄙見私議謹質高明又另壇誦大悲呪助其速賜感通所謂一切所求若不果遂者不得為大悲心陀羅尼也倘於山鄉僻野非當道官員所辦者但請遠近真實高僧隨其所專至誠求達亦能致雨雲棲華嚴感應略記云僧道英者陳氏子蒲縣人年十八親為之娶五載同居誓不相觸後從并縣炬法師聽華嚴經便落髮入太行由柏梯寺修行止觀屬亢旱講華嚴經以祈甘澤有二老翁各二童侍時來聽講英異而問之乃知海神因曰今為檀越請下微雨翁敕二童童即從窗孔中出須臾大雨雱霈遠近咸賴此講華嚴經而感時雨雱流也又法華持紀云梁雲光法師普通二年召於內殿講法華經天雨寶華天監中帝以亢陽問志公公曰雲能致雨帝因請講法華至其澤普洽雨即大霔高下霑足此講法華經而感雨也又云隋靈應南天竺寺釋真觀錢塘范氏子少有奇相舌紫羅紋左右手有仙人字誦法華經日定一部開皇十四年亢旱時請講海龍王經驟雨滂注此講海龍王經而致雨也又云宋明州釋中立鄞之陳氏子丱歲出家賜號明智熙寧中居南湖繼神智席日宣止觀元祐中再主延慶寺修法華懺法七年行法將圓一日於禪觀中見大舟師座其中以行自是辨慧泉涌師誦法華踰萬部禳救災旱靡不神此誦法華經并修懺而致雨也又云宋會稽道味山釋宗利既具戒往姑蘇依神悟修法華滿三載俄見普賢乘空過前尋詣新城碧沼專修念佛三昧政和元年天旱禱雨奪龍王現金色身甘雨霑足此念佛而致雨也又金剛持驗紀云唐呂文展開元三年任閬中縣丞雅好佛典尤專心持誦金剛經至三萬餘遍靈應奇異年既衰暮三牙并落忽生如舊在閬中時屬亢旱刺使劉浚令祈雨才持一遍遂獲沛然又若霖潦別駕又令誦經祈晴照時開霽此誦金剛經致雨也又明季杭州蓮池大師參學回杭欲覔一深山養道見雲棲塢幽靜遂駐錫結茆屬時亢旱村民請師求雨師云老僧在此只知念佛並無祈雨法術村民云只要大師念佛允請出山在田坂念佛雨遂至村民感德而樂助遂成梵剎此亦以念佛而致雨也故知祈雨全賴高僧平日功勛方能感通亦須請主如法䖍禱方應若請主不齊戒僧衆無道德但為應酬故事難感天和矣甚至喧閙雜穢酒肉遊戲匪唯不感更多愆也附祈雪儀軌無傳私謂可以祈雨法變通行之五祖演嘗有念誦開首偈云一年只餘此月天道未嘗降雪奉告三界龍神各自遞相報說普天普地鋪銀且要應時應節更望大衆慈悲為念神呪助力附録於此遣蝗凡遇遣蝗事急如火藏無遣蝗之經古有求天之儀客堂先白方丈次掛牌牌云遣蝗此牌懸山門上又客堂前掛牌云本月某日護法某甲為遣蝗事誦金光明經幾日至某日五鼓供天頂禮金光明懺法幾日為祈蝗淨年豐萬民樂業諸師芳名開列於左某師某師其餘儀軌見後住持章念誦條說今録疏式今據大清國某省某府某縣某寺住持某甲或當道卒官為請主或鄉人或仕宦隨請具書姓名是日稽首拈香皈命金光會主能仁慈尊光明會上寄位諸天梵釋四王天龍八部器界諸神司事聖衆諸寶座下恭通情旨切念飛蝗蔽天惟凶荒之可慮遺孽入地恐滋蔓之難圖匪假神功之驅除雖極人力而罔措由是即於本月某日謹發誠心啓建遣蝗保苗道場每日命僧諷誦金光明經五鼓供天禮金光明懺伏願以此功德消殄灾蟲滌之風雨掃種類以無遺投之江河隨業感而自化民安其業物遂其生某等不勝急切仰望之至年月日住持某甲當道有司某甲九頓謹奏此疏建首日先焚一道以奏天庭一道供在壇中每日宣讀至蝗止散回向焚化凡宣疏畢舉讚云保苗護稼司事尊神驅逐蝗蟲遂民生秀實滿田塍蔬果時新護養謝思深奈麻消灾障菩薩三稱其餘上供等事並如常儀至蝗止回向他本保青苗會亦在此攝證義曰蝗蟲天灾也古規誦金光明經拜金光明懺奉供諸天得捷疾感應按金光明經第二卷四天王品云此經能照諸天宮殿是經能與衆生快樂乃至是經能除穀貴饑饉云云又功德天品云以是因緣增長地味地神諸天悉皆歡喜所種穀米芽莖枝葉果實滋茂云云又堅牢地神品云以是之故閻浮提內藥草樹木根莖枝葉花果茲茂美色香味皆悉具足云云又鬼神品云是經力故諸天歡喜百穀果實皆悉滋茂云云據此可見此經真能遣蝗悉皆豐熟理合廣遍流通處處持誦常常不絶則天下太平消灾增福無過於此經故唐譯稱最勝經王也惜乎邇來除水陸堂外世罕見聞若山野僻地無此經者可將禪門日誦內有齊天法儀從瑤天玉露起至佛慈廣大讚止全卷禮誦亦可但改一心奉請為一心頂禮而已金光明經感應記云宋僧從禮襄陽人居台州平田精舍慎重莊默喜怒不形于色平居必虔誠持戒梁乾化年中夏旱衆請師祈雨遂誦金光明經感雨三日時錢武肅王聞之召入府建金光門懺道場云云據此既能致雨亦必能遣蝗矣然必須有德高僧易於感通非草草庸輩之所能為也抑或䖍心持大悲呪代之亦可所謂一切所求若不果遂者不得為大悲心陀羅尼是也但取真實處求法法皆能感應祈禱韋䭾凡遇荒歉常住將絶糧或為建造或修理等事維那及兩序白住持已預定日期外則請化主通白檀那內則報客堂掛牌牌云本月某日起聞鐘聲大衆師搭衣齊詣大殿或韋䭾殿持善天女呪祈禱韋䭾客堂請書記預製疏二道所為何事辭當合宜一起首宣化告達聖聰一圓滿宣化每時披讀每日二板後或開小靜鳴鐘三下衆集知客請住持拈香維那舉香讚已稱奈麻護法韋䭾尊天菩薩三遍即鳴大魚每時誦善天女呪繞殿或繞韋䭾計呪一百八遍極少四十九遍末遍鳴引磬二下一齊歸位呪畢宣疏住持再拈香維那舉韋䭾讚讚畢衆三拜各回本處每日六時起止同上事急者晝夜十二時再急者日夜調班誦誠心而䖍禱每日上供如常儀至事成就日回向化疏謝護法恩附助米上供疏伏以佛為出世慈父念念不忘僧云住世福田生生欲種爰有一四天下南贍部洲大清國省府縣寺奉佛回向信施助米住持某甲增入施米諸姓名字切念某等用住持名資生幻質須𠙥飲食以充腸借假修真寧免饔䬸而飽腹故法輪未轉先展食輪而六度將修先資檀度茲因寺糧屢空僧衆待哺爰起募於某日迄於某日共募米若干麥若干豆若干錢若干此雖檀越之宏施實賴韋天之感應用薦馨香聊申敬謝伏願天眼洞鑒照察無私顯示慈恩果因不昧俾樂助之家隨施之人現生之內五福駢臻他報之中二嚴克備右疏恭申韋天證明謝施回向文疏年月日住持某甲具疏餘事隨改附募化齊米引蓋聞某寺者某朝某師所建相繼以來迄今若干歲矣今棟宇雖堅緇侶甚衆無奈缺乏資糧朝午莫恃兼逢歉薄香積難充清泉野果不足療飢空倉冷灶將何實腹既無策之可籌計唯賴于檀護伏願仁人長者大施拯濟之功其廣釜鐘之惠或捨麥可充三粥或施米味入六和一斛百斛隨力緣而喜捨千升萬升憑歡喜以捐輸一言一物無非功德或捐或勸總是善因憑盞飯以結淨緣喜周禪悅贈少黍而登善簿福不唐捐從此僧衆焚修晨昏誦禱佛神默佑定獲嘉祥須急𠃔行延一寺之慧命勿吝心力為三寶之勳臣是為啓若為建造修理等事於緣滿日俱應上供告白韋天以報施護之恩證義曰此祈禱古規也蓋古人以道德修行為家務叢林絶無經懺等事大衆衣食全賴韋天默護感化十方但有修行決不餓死脫有急難但合誠懇禱韋天默相輔佑從無勉強募緣之事今者多有愚癡匪僧為化緣事以磚砌墻圍僅容其身植立於中如刀在鞘如等在殼者或四面釘釘號釘關站七日者或斬斷一手灰布膠漆示諸人者或掘地作坑倒埋其頭雙腳向天者有巨磚自捶其背至青腫者有用鎖自穿鎖其觜唇者有吃水為齊不食五者有雙足立橋欄上拜經人見之無不驚者有拖鐵索或拖小船等重百十斤者如是過為苦行顯異惑衆者種種不一非貪即愚真可憐憫我叢林中決定不許行此等魔事但謹守清規依教修行韋天決不負汝矣附韋天聖誕六月初三日或云十三未知孰是韋天聖誕早粥客堂掛牌牌云是日恭逢韋天聖誕大衆師聞鼓聲韋殿上供午梆鳴知客鳴大鼓三下衆集上供儀規並載禪門日誦茲不贅惟異白詞云蓋聞三洲感應護法韋䭾尊天菩薩行齊佛化德攝天人居高聽卑善惡隨僧俗之感興悲運智威慈等菩薩之權妙證無為功超有漏伏念末法僧衆福根淺薄道力衰微匪資韋天以護持曷使外魔而不嬈欣逢聖誕特獻𢕟芹伏願君民獲福普天海晏河清國土清寧遍界風調雨順佛日增輝法輪常轉叢林安靜剎土多賢聖之徒僧海調和法筵挺龍象之衆檀那衍慶道侶沾恩凡所希求吉祥如意證義曰韋天唯金光明經及諸天傳出其名而未詳其本迹也或曰即密跡力士或曰是樓至佛附伽藍誕按大灌頂經等西域伽藍神一十八位我東土伽藍多供華光關帝龍王等華光誕或云九月二十八日龍王誕不著關帝誕俗以五月十三日依本傳乃六月二十四日華光龍王聖跡不多見唯關帝或顯聖於玉泉山或示現於黃梅院今則無地不顯威靈故僧坊尊為護法伽藍神其誕曰上供儀同韋天唯白詞為異伏維大帝匡扶聖教招提氣象常新俯順凡情率土生靈攸賴凜神威之遠鎮諸方橫兆何生惟正直而聰明一切邪非自息是以法王嘉寵恆隨金殿之間天帝隆旌屢降寶籙之旨欣逢嶽誕共效涓忱敬獻香饈伏惟慈鑒從茲肅清覺地並除隱顯愆尤𠃔宜德被含生等視內外緇白此文維關帝前用若通白伽藍應用下詞恭聞伽藍聖衆菩薩智燭三界光照十方以伽藍為歸依塵塵助護與法王為城塹處處分身屏翰僧倫權衡佛事某甲等用住持各身投寶剎依本界以為歸恭遇誕辰共攄誠而設供伏願不忘佛囑遍坐道場翼輔正輪廓清魔路檀那蒙顯祐之功家庭叶慶僧衆托威權之護覺路亨通法幢建處宗風振起于千秋僧海和時道果圓成於曠劫證義曰西域十八伽藍名出七佛經等一美音二梵音三天鼓四歎妙五歎美六摩妙七雷音八師子九妙歎十梵響十一人音十二佛妙十三歎德十四廣目十五妙眼十六徹聽十七徹視十八遍視東土伽藍隨機不定或一唯華光或關帝或三或五其名位設相𠙥開山最初所定今時又多以關帝與韋天並列實因其靈應等也熙願贊云關聖大帝威神普應誓願宏深尤切護法是也祭竈六月草四十二月草四或草三并八月初三誕辰客堂早粥前掛牌牌云今日恭逢祭竈良辰開午梆聞鼓聲大衆師詣監齊聖前上供厨房香燈師到監齊位前設香案已往庫房取供果香燭等午梆知客鳴鼓三下衆集燒香傳爐住持拈香禮拜維那舉香雲蓋三稱乃至呪食畢儀與韋天同唯上供時監院拈香獻茶設拜至普供養呪竟維那至中拈香三拜問訊長跪合掌白云恭聞監齊大士智超空劫妙應時機陳粢盛以忘功一粒現須彌之相居雲厨而不宰大身周法界之門福護僧倫權衡佛事仰賴威德特設齊筵伏願以乘願之神明鑒虔恭之將事隨意化身示有相而原非色相變生為熟即食輪而助顯法輪使開厨而證入顯發羣機令觸味以知歸冥加提持僧衆調和人人行門精進咸餐法喜在在永播真風一拜歸位舉贊畢齊問訊而退證義曰祭竈雖同僧俗神異佛門是監齊大聖迹同諸天應早晨祭所謂諸天早食也今規約午祭亦可矣邇來僧坊同俗晚祭此於鬼食甚為不可非時而祭神不受享徒費無益又河南府志云唐至正初少林寺向有一僧蓬頭裸背跣足止著單棍在厨中作務數年殷勤莫曉法名至十一年頴州紅巾賊率衆突至少林欲行劫掠此僧乃持一火棍出變形數十丈獨立高峯賊見驚怖僧大呌曰吾緊那羅王也言訖遂歿人始知為菩薩化身塑像寺中遂為少林伽藍天下僧坊遂以此人為監齊而肖像供厨上也
