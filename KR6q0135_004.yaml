body:
  text: 唐洪州百丈山沙門懷海集編清杭州真寂寺苾芻儀潤證義越城戒珠寺住持妙永挍閲尊祖章第四述曰人各祀其祖重其形生之始也形生始於愛然形有時而化愛有時而盡惟性之靈然不昧者不恃生而存不偕亡而亡故佛教人必明性而後之學者復膠於名言不得其指歸自教流東國之後得其傳者蓋寡及吾祖達磨至示以直指之道而人始廓然見夫自性之妙由是以來相傳不絶後之傳祖道嗣祖位者如火之薪水之器繼繼承承以至於今可謂盛矣然則祖功宗德其可忘耶忌日追享之禮其可廢耶至於百丈大智禪師作清規以範吾徒而叢林為之一振其功實可與初祖並傳不朽故海會端公謂叢林祖堂宜祀達磨於中百丈陪於左而本寺之開山祖配焉今並載智者諸師忌辰禮儀者以演教扶律原原本本之恩亦不可忘也初祖達磨忌十月初五日初祖忌客堂預日挂牌牌云明日恭逢逢磨老祖示寂良辰是晚明早課畢聞鐘聲齊詣祖堂禮祖午前上供預日祖堂香燈師赴庫取香燭茶供供祖像前次取供器莊嚴祖堂晚課畢知客令鐘頭鳴鐘三下衆集祖堂住持上香三拜不收坐具上茶退身三拜再進前問訊增茶復位三拜收具維那云展具衆禮祖三拜回堂次日早課舉禮祖獻茶同上聞午梆知客鳴大鐘三下衆集祖堂住持上香維那舉奈麻香雲蓋菩薩摩訶薩三唱衆和次衆齊稱奈摩禪定宗主菩提達磨尊者三稱接誦楞伽阿跋多羅寶經一切佛語心品不生句生句常句無常句名相句無名相句住異句非住異句剎那句非剎那句自性句離自性句空句不空句斷句不斷句邊句非邊句中句非中句常句非常句緣句非緣句因句非因句煩惱句非煩惱句愛句非愛句方便句非方便句巧句非巧句淨句非淨句成句非成句譬句非譬句弟子句非弟子句師句非師句種性句非種性句三乘句非三乘句所有句無所有句願句非願句三輪句非三輪句標相句非標相句有品句非有品句俱句非俱句緣自聖智現法樂句非現法樂句剎土句非剎土句阿䨲句非阿䨲句水句非水句弓句非弓句實句非實句數句非數句神通數句非神通數句明句非明句虗空句非虗空句雲句非雲句工巧伎術明處句非工巧伎術明處句風句非風句地句非地句心句非心句施設句非施設句自性句非自性句陰句非陰句衆生句非衆生句慧句非慧句涅槃句非涅槃句爾𦦨句非爾𦦨句外道句非外道句荒亂句非荒亂句幻句非幻句夢句非夢句𦦨句非𦦨句像句非像句輪句非輪句揵闥婆句非捷闥婆句天句非天句飲食句非飲食句淫欲句非淫欲句見句非見句波羅密句非波羅密句戒句非戒句日月星宿句非日月星宿句諦句非諦句果句非果句滅起句非滅起句治句非治句占相句非占相句支句非支句巧明處句非巧明處句禪句非禪句迷句非迷句現句非現句護句非護句族句非族句仙句非仙句王句非王句攝受句非攝受句寶句非寶句記句非記句一闡提句非一闡提句女男不男句非女男不男句味句非味句事句非事句身句非身句覺句非覺句動句非動句根句非根句有為句非有為句無為句非無為句因果句非因果句色究竟句非色究竟句節句非節句叢樹葛藤句非叢樹葛藤句雜句非雜句説句非説句毗尼句非毗尼句比邱句非比邱句處句非處句字句非字句大慧是百八句先佛所説汝及諸菩薩摩訶薩應當修學一遍接誦變食呪十四遍甘露呪普供呪各三遍此念誦時住持三拜不收坐具進爐前獻茶獻食從東序遞供至住持一舉已住持遞西序至祖位側捧獻几上獻畢退歸位三拜再添香再歸位三拜時衆僧念誦畢住持再拈香説法説畢維那至中展具三拜長跪合掌白云恭維初祖迹現西天一葦航來開化東土大哉正傳紹覺皇之宗裔廓然無聖破義學之膏肓百川到海迥絶異流杲日麗天罄無側影指人心而成佛契妙道以忘言既大振其宗風有殊功於時教現濁世優曇花實為鼻祖取神州大乘器盡作兒孫茲逢葬履之辰爰效采蘩之薦所願信衣表佛祖之重力任千鈞一花開劫外之春芳聯萬世謹運丹忱虔申微供伏惟尚饗白竟一拜起具歸位舉贊衆齊唱云拈花悟旨祖道初興綿延四七演真乘六代遠傳燈奕葉相承正法永昌明奈摩禪定宗主菩提達磨尊者三稱衆三拜起具問訊各回本處若住持有事班首代獻下同此證義曰初祖南天竺國香至王第三子也姓剎帝利本名菩提多羅後遇二十七祖般若多羅尊者知師密迹因試令與二兄辨所施寶珠發明心要既而尊者謂曰汝於諸法已得通量夫達磨者通大法之義也宜名達磨因改名菩提達磨此翻覺法師乃白尊者曰我既得法當往何國而作佛事願重開示尊者曰汝雖得法未可遠遊且止南天待吾滅後六十七載當往震旦設大法藥直接上根慎勿遠行衰於日下梁普通八年丁未歲九月二十一日至南海廣州刺史蕭昂表聞武帝遣使詔迎十月一日至金陵與帝語不契是月十九日渡江北十一月二十三日屆於洛陽當魏孝明太和十年也寓止於嵩山少林寺面壁而坐終日默然人莫之測謂之壁觀婆羅門此時震旦義學相高多滯名相間有學者來扣宗旨祖斥相指心無有能領略者末遇神光斷臂安心付其衣鉢并授楞伽經以為印心至太和十九年丙辰歲十月五日端居而逝是歲十二月二十八日葬熊耳山起塔於定林寺其後魏使宋雲蔥嶺回見祖杖履一隻西行而去云唐諡圓覺大師塔曰空觀今上供仍誦楞伽經百八句者是禪宗心要故梵語楞伽此翻不可往其所詮義謂禪宗自覺聖智境界離心意識妄想非邪智可到故梵語阿跋多羅此翻無上謂究竟覺際更無有上故稱寶也一切佛語心者佛佛道同一即一切故蓋一經所明詳顯此心之義即達磨直指之心亦即世尊拈花所云涅槃妙心是以付囑二祖云楞伽四卷可以印心今此百八句乃世尊總答大慧所問每句中皆上半句拈其問相下半句隨掃之依心真如門掃一切相故皆曰非曰無曰離總標此心之外無法可説故令深信修學上供念誦亦此意也徑山妙喜曰禪之宗裔始於釋尊在靈山拈花唯迦葉微笑世尊云吾有正法眼藏涅槃妙心付囑于汝由此代相授受而至達磨磨至此不立文字直指人心見性成佛是為禪宗也又曰夫禪與教律本一禮也譬如百千異流同歸於海而無異味若教律家只依著文字語言不達元旨未也若是禪宗雖坐破蒲團未得證悟亦未也據此可見禪教律異派同源不宜互相詆呰百丈祖師忌正月十九日百丈祖忌容堂挂牌獻茶乃至上供等事皆與達磨祖忌同先舉云奈麻南嶽二世百丈懷海禪祖三稱接誦大方廣佛華嚴經梵行品爾時正念天子白法慧菩薩言佛子一切世界諸菩薩衆依如來教染衣出家云何而得梵行清淨從菩薩位逮於無上菩提之道法慧菩薩言佛子菩薩摩訶薩修梵行時應以十法而為所緣作意觀察所謂身身業語語業意意業佛法僧戒應如是觀為身是梵行耶乃至戒是梵行耶若身是梵行者當知梵行則為非善則為非法則為渾濁則為臭惡則為不淨則為可厭則為違逆則為雜染則為死尸則為蟲聚若身業是梵行者梵行則是行住坐臥左右顧視屈申俯仰若語是梵行者梵行則是音聲風息脣舌喉吻吐納抑縱高低清濁若語業是梵行者梵行則是起居問訊略説廣説喻説直説讚説毀説安立説隨俗説顯了説若意是梵行者梵行則應是覺是觀是分別是種種分別是憶念是種種憶念是思惟是種種思惟是幻術是眠夢若意業是梵行者當知梵行則是思想寒熱飢渴苦樂憂喜若佛是梵行者為色是佛耶受是佛耶想是佛耶行是佛耶識是佛耶為相是佛耶好是佛耶神通是佛耶業行是佛耶果報是佛耶若法是梵行者為寂滅是法耶涅槃是法耶不生是法耶不起是法耶不可説是法耶無分別是法耶無所行是法耶不合集是法耶不隨順是法耶無所得是法耶若僧是梵行者為預流向是僧耶預流果是僧耶一來向是僧耶一來果是僧耶不還向是僧耶不還果是僧耶阿羅漢向是僧耶阿羅漢果是僧耶三明是僧耶六通是僧耶若戒是梵行者為壇場是戒耶問清淨是戒耶教威儀是戒耶三説羯磨是戒耶和尚是戒耶阿闍黎是戒耶剃髮是戒耶著袈裟衣是戒耶乞食是戒耶正命是戒耶如是觀已於身無所取於修無所著於法無所住過去已滅未來未至現在空寂無作業者無受報者此世不移動彼世不改變此中何法名為梵行梵行從何處來誰之所有體為是誰由誰而作為是有為是無為是色為非色為是受為非受為是想為非想為是行為非行為是識為非識如是觀察梵行法不可得故三世法皆空寂故意無取著故心無障礙故所行無二故方便自在故受無相法故觀無相法故知佛法平等故具一切佛法故如是名為清淨梵行一遍接變食甘露等與達祖忌同唯換白詞云恭聞一言為天下法中矩中規萬世知師道尊有綱有紀以叢林禮樂之盛卜法筵龍象之興禪教並馳富擬石渠天祿經律相濟嚴如金科玉條允宜陪禪祖以享祀故遵諱日而營齋伏願不壞俗諦感來淨妙之身長續慧燈照燭昏蒙之夜白竟一拜起具歸位舉贊衆齊唱云天下師表宏紹正宗雖修妙行住真空禪律自圓通百丈宗風萬古作磨礱奈麻南嶽二世百丈懷海禪祖三稱餘儀同達祖忌證義曰祖堂中供達磨左供百丈右供開山雖為僧坊定例然只可禪宗如此若律宗中供曇無德左供道宣右開山懺摩宗中志公左悟達右開山天台宗中龍樹左智者右開山賢首宗中杜順左賢首右開山慈恩宗中玄奘左窺基右開山法性宗中僧肇左道安右開山密部宗中金剛智左大廣智右開山翻譯宗中迦葉摩騰左竺法蘭右開山淨土宗中慧遠左優曇右開山如是方顯各家宗主十家門庭不濫其各祖忌辰詳高僧傳等書摶者自見嗚呼邇來祖堂久失宗尚所供不識是何祖忌辰不知是何日枝派不知是何宗忘本至此佛法何能興哉其百丈行實已詳前元義茲不重出今上供念誦梵行品者蓋九章清規行雖不同總以持戒防非為其體相以無所得理觀為其自性理觀若明梵行自淨心純是法與法相應是乃不為塵境之所障礙事理雙修真俗不二則此梵行一品實有助於禪觀亦有助於清規非獨上供以為念誦亦當時參其語句也智者大師忌十一月二十四日天台宗主智者顗祖忌儀同達祖忌先舉云奈麻天台宗主智者大師三稱接誦妙法蓮華經如來壽量品偈曰自我得佛來所經諸劫數無量百千萬億載阿僧祇常説法教化無數億衆生令入於佛道爾來無量劫為度衆生故方便現涅槃而實不滅度常住此説法我常住於此以諸神通力令顛倒衆生雖近而不見衆見我滅度廣供養舍利咸皆懷戀慕而生渴仰心衆生既信伏質直意柔軟一心欲見佛不自惜身命時我及衆僧俱出靈鷲山我時語衆生常在此不滅以方便力故現有滅不滅餘國有衆生恭敬信樂者我復於彼中為説無上法汝等不聞此但謂我滅度我見諸衆生沒在於苦惱故不為現身令其生渴仰因其心戀慕乃出為説法神通力如是於阿僧祇劫常在靈鷲山及餘諸住處衆生見劫盡大火所燒時我此土安隱天人常充滿園林諸堂閣種種寶莊嚴寶樹多華果衆生所遊樂諸天擊天鼓常作衆伎樂雨曼陀羅華散佛及大衆我淨土不毀而衆見燒盡憂怖諸苦惱如是悉充滿是諸罪衆生以惡業因緣過阿僧祇劫不聞三寶名諸有修功德柔和質直者則皆見我身在此而説法或時為此衆説佛壽無量久乃見佛者為説佛難值我智力如是慧光照無量壽命無數劫久修業所得汝等有智者勿於此生疑當斷令永盡佛語實不虗如醫善方便為治狂子故實在而言死無能説虗妄我亦為世父救諸苦患者為凡夫顛倒實在而言滅以常見我故而生憍恣心放逸者五欲墮於惡道中我常知衆生行道不行道隨所應可度為説種種法每自作是意以何令衆生得入無上慧速成就佛身一遍接變食甘露等與達祖忌同唯換白詞云恭聞如來一代時教重賴後哲宣揚衆生六識癡迷仰藉宗師覺悟是以至人應化迹降荊州華容聖德預彰夢現香煙五彩神奇屢示品格非常誦法華而入定見靈山以儼然機感金陵就瓦棺而演法體翹台頂住金地以轉輪從茲教法流傳永劫不替逮至色身示寂五品暫居茲逢追遠之辰特設時新之供伏惟照鑒佑啓後人白竟一拜起具歸位舉贊衆齊唱云靈山囑纍金口親承如來所遣任非輕三觀自昭明祖祖相承台教續千燈奈麻天台宗主智者大師三稱衆三拜各回本處證義曰宗主諱智顗字德安姓陳頴川原籍父梁散騎益陽公陳起母徐氏一生事迹具見續高僧傳第二十一卷及別傳所載年六十七歲寂於隋開皇十七年十一月二十四日未時按大師讀法華至藥王品是真精進是名真法供養如來句豁然大悟頓證法華三昧遂宗法華判如來一代時教引信解品以判五時化儀要之如來故白毫一光光中頓現十法界六度萬行所謂示佛知見早已和盤托出了也因衆中不悟舍利弗三請説法佛以開權顯實開口就説唯以一大事因緣故出現於世無非為衆生開示悟入佛之知見至此如來壽量品徹底窮源為諸人道破了也然佛示現涅槃而智者亦是示現滅度今于追遠之辰上供誦此者正顯非唯佛祖而不涅槃即吾凡夫何曾有真生死耶所受生死輪回苦者乃妄想因緣耳若離妄想三身四智本是現成涅槃生死等於空花即此念誦而開示悟入佛之知見也賢首法師忌十一月十四日賢首宗主國一藏祖忌儀同達祖忌先舉云奈麻賢首宗主國一法師三稱接誦大方廣佛華嚴經如來出現品佛子菩薩摩訶薩應云何知如來應正等覺般涅槃佛子菩薩摩訶薩欲知如來大涅槃者當須了知根本自性如真如涅槃如來涅槃亦如是如實際涅槃如來涅槃亦如是如法界涅槃如來涅槃亦如是如虗空涅槃如來涅槃亦如是如法性涅槃如來涅槃亦如是如離欲際涅槃如來涅槃亦如是如無相際涅槃如來涅槃亦如是如我性際涅槃如來涅槃亦如是如一切法性際涅槃如來涅槃亦如是如真如際涅槃如來涅槃亦如是何以故涅槃無生無出故若法無生無出則無有滅佛子如來不為菩薩説諸如來究竟涅槃亦不為彼示現其事何以故為欲令見一切如來常住其前於一念中見過去未來一切諸佛色相圓清皆如現在亦不起二不二想何以故菩薩摩訶薩永離一切諸想著故佛子諸佛如來為令衆生生欣樂故出現於世欲令衆生生戀慕故示現涅槃而實如來無有出世亦無涅槃何以故如來常住清淨法界隨衆生心示現涅槃佛子譬如日出普照世間於一切淨水器中影無不現普遍衆處而無來往或一器破便不現影佛子於汝意云何彼影不現為日咎不答言不也但由器壞非日有咎佛子如來智日亦復如是普現法界無前無後一切衆生淨心器中佛無不現心器常淨常見佛身若心濁器破則不得見佛子若有衆生應以涅槃而得度者如來則為示現涅槃而實如來無生無歿無有滅度佛子譬如火大於一切世間能為火事或時一處其火息滅於意云何豈一切世間火皆滅耶答言不也佛子如來應正等覺亦復如是於一切世界施作佛事或於一世界能事已畢示入涅槃豈一切世界諸佛如來悉皆滅度佛子菩薩摩訶薩應如是知如來應正等覺大般涅槃復次佛子譬如幻師善明幻術以幻術力於三千大千世界一切國土城邑聚落示現幻身以幻力持經劫而住然於餘處幻事已訖隱身不現佛子於汝意云何彼大幻師豈於一處隱身不現便一切處皆隱滅耶答言不也佛子如來應正等覺亦復如是善知無量智慧方便種種幻術於一切法界普現其身持令常住盡未來際或於一處隨衆生心所作事訖示現涅槃豈以一處示入涅槃便謂一切悉皆滅度佛子菩薩摩訶薩應如是知如來應正等覺大般涅槃復次佛子如來應正等覺示涅槃時入不動三昧入此三昧已於一一身各放無量百千億那由他大光明一一光明各出阿僧祇蓮華一一蓮華各有不可説妙寶華藥一一華藥有師子座一一座上皆有如來結跏趺坐其佛身數正與一切衆生數等皆具上妙功德莊嚴從本願力之所生起若有衆生善根熟者見佛身已則皆受化然彼佛身盡未來際究竟安住隨宜化度一切衆生未曾失時佛子如來身者無有方處非實非虗但以諸佛本誓願力衆生堪度則便出現菩薩摩訶薩應如是知如來應正等覺大般涅槃佛子如來住於無量無礙究竟法界虗空界真如法性無生無滅及以實際為諸衆生隨時示現本願持故無有休息不捨一切衆生一切剎一切法一遍接變食甘露等與達祖忌同唯換白詞云恭聞法師迹後天台號稱賢首為華嚴之宗主成一家之教觀燃一指於岐州佛乘誓悟講大乘於唐代左道回心從此十門頓啓五教常存作千秋之指南為萬世之師法茲逢圓寂之辰聊奉瓣香之供伏願慧燈永照祖印重光佑啓後人長衍宗系白竟一拜歸位唱贊大哉賢首垂範萬世髫年燃指立宏誓志求法源底懸辨離微著述傳勿替奈麻賢首宗主國一法師三稱衆三拜各回本處證義曰宗主諱法藏字賢首賜諡號國一為東土華嚴宗第三祖也俗姓康氏康居國人當唐貞觀十七年十一月初二日降誕與天台智者先後相去將二百年專宏華嚴經中有品名賢首又十首菩薩中有一菩薩亦名賢首故以賢首二字立字亦即以此立宗名也所立教觀與天台大同小異上供用出現品涅槃章取其本教所宗而又恰與忌事相合也天台用法華壽量品亦此意邇來諸忌念誦多用心經往生呪或用彌陀經若在凡俗靈前宜矣如諸家祖師高僧早已出於三界豈亦如凡夫之賴超度耶故今諸祖各隨其宗而為念誦如達磨祖前誦楞伽百八句取禪宗印心無如此百八句者百丈祖師前誦華嚴梵行品取與清規相合再如道宣律祖誦梵網偈蓮社遠祖誦大勢至章庶各家門庭不致混濫兒孫既各明其所宗而諸祖之靈亦復增其愛樂義取關會不致儱侗循名考實允合機宜雖新訂於後人實無悖於前哲諸家宗主既念誦有別於後嗣歷祖亦然則源源相繼而各有攸歸矣道宣律祖忌十月初三日南山宗主道宣律祖忌儀同達祖忌先舉云奈麻南山宗主道宣律祖三稱接誦佛説梵網經菩薩心地品偈曰明人忍慧強能持如是法未成佛道間安獲五種利一者十方佛愍念常守護二者命終時正見心歡喜三者生生處為諸菩薩友四者功德聚戒度悉成就五者今後世性戒福慧滿此是諸佛子智者善思量計我著相者不能信是法滅壽取證者亦非下種處欲長菩提苗光明照世間應當靜觀察諸法真實相不生亦不滅不常復不斷不一亦不異不來亦不去如是一心中方便勤莊嚴菩薩所應作應當次第學於學於無學勿生分別想是名第一道亦名摩訶衍一切戲論惡悉從是處滅諸佛薩婆若悉從是處出是故諸佛子宜發大勇猛於諸佛淨戒護持如明珠過去諸菩薩已於是中學未來者當學現在者今學此是佛行處聖主所稱歎我已隨順説福德無量聚回以施衆生共向一切智願聞是法者疾得成佛道一遍接變食甘露等與達祖忌同換白云恭聞毗尼住世聖道鎡基波離結集於西乾大師應身於東土宗承智首教啓終南支那共仰戒光震旦咸稱律主感天人之侍衛授佛牙以表揚依佛制而造戒壇後世永賴隨天語以集傳記末法咸資今逢歸天之忌特薦精潔之羞伏願律風永振祖印重光戒香芬馥於九州法雨沾濡於七衆白竟一拜起具歸位舉贊衆唱波離再現律學中興南山教主震雷音三聚二持新戒海澄清正法永昌明奈麻南山宗主道宣澄照律師三稱衆三拜各回本處證義曰宗主諱道宣字實相為震旦初興律祖唐高宗時詔敕天下寺院圖形塑像奉祀懿宗敕諡澄照聖師具載宋高僧傳第十四卷今上供念誦梵網經末偈者分三段初十六句乃讚獎持戒利益之義次二十四句乃觀察實相戒體之義後十六句乃勸護淨戒及回向自利利人之義願上供者因此念誦而銘于心也亦可誦第三十五六不發願誓兩戒見下住持章告香條須熟誦時省而自勉之慧遠祖師忌八月初六日淨土宗主慧遠老祖忌儀同達祖忌先舉云奈麻蓮宗初祖慧遠祖師三稱接誦大佛頂如來密因修證了義諸菩薩萬行首楞嚴經大勢至法王子與其同倫五十二菩薩即從座起頂禮佛足而白佛言我憶往昔恆河沙劫有佛出世名無量光十二如來相繼一劫其最後佛名超日月光彼佛教我念佛三昧譬如有人一專為憶一人專忘如是二人若逢不逢或見非見二人相憶二憶念深如是乃至從生至生同於形影不相乖異十方如來憐念衆生如母憶子若子逃逝雖憶何為子若憶母如母憶時母子歷生不相違遠若衆生心憶佛念佛現前當來必定見佛去佛不遠不假方便自得心開如染香人身有香氣此則名曰香光莊嚴我本因地以念佛心入無生忍今於此界攝念佛人歸於淨土佛問圓通我無選擇都攝六根淨念相繼得三摩地斯為第一接誦往生呪三遍念佛百聲次誦變食呪十四遍甘露普供各三遍維那合掌白云恭聞淨業宗主實為遠公現迹雁門開法匡廬統一百二十三人一意西歸維七月二十八日合辭共誓東林社啓天下咸仰其高風西教流芳萬世共沾其惠澤茲當蓮開吉日衆等敬薦心香伏願不忘本誓隨彌陀以提携普運慈航度衆生於安養白竟一拜歸位唱贊第一大願觀想彌陀四十八願度娑婆九品湧金波寶網交羅度衆生出愛河奈麻淨業宗主遠公祖師三稱衆三拜各回本處證義曰宗主列傳出高僧傳第六卷茲不贅上供誦大勢至念佛圓通章者以此篇開示最直截也幽溪釋曰念佛三昧者念佛人以心緣佛以佛繫心心心相續無有間斷爾時內心不起外境無侵旋元自歸返流全一正不受諸受而得乎正受故稱念佛三昧也初立喻一專為憶者喻佛時念衆生如何度出三界苦也一人專忘者喻衆生唯貪五塵甘受六道苦也如是二人若逢不逢或見非見者喻佛常逢見衆生而衆生常不逢見佛此喻衆生不念佛之失也二人相憶者喻佛時念衆生衆生亦時念佛方謂二憶念深能如是念則生生常見佛土土覲如來故曰如是乃至從生至生同於形影不相乖異也次合法舉親喻而貼合之如來憐念衆生如母憶子者貼合一專為憶若子逃逝雖憶何為者貼合一人專忘此貼合不念佛之失次貼合念佛之得子若憶母者教以憶母之方當如母憶時謂念佛人用真切工夫不得一刻念世五欲是謂繫念方得名為如母憶時母子歷生不相違遠也又憶佛是恆審思量也念佛是心注一境也現前當來必定見佛者現前如遠公三見聖相之類當來如臨終佛迎乃至花開見佛之類去佛不遠者謂念佛人不唯見佛亦去佛不遠不久定當成佛也不假方便自得心開者謂舉念即緣佛境事理圓融能所絶待所謂我本因地以念佛心入無生忍苟非如此焉令即契無生不假方便信不誣也如染香人者喻衆生本非佛因念佛而頓有佛香也名香光莊嚴者蓋佛因念顯念因佛熏謂以諸佛法身之香氣而莊嚴乎衆生之色身也我本因地三句結自行因果相符今於此界三句乃果後利人既以此自度即以此教人亦以此力而攝生焉我無選擇都攝六根者念屬意根正論修處亦傍攝諸根根根念佛也意根若淨諸根皆攝故無選擇也日用之間唯彌陀是念唯淨土是求無有間斷即淨念相繼也如是法門實超勝餘門故曰入三摩地斯為第一開山祖忌凡遇本寺開山老祖忌及歷代祖忌知客預先一日通白住持已即挂牌牌云明日恭逢某祖忌曰大衆師是晚明早課畢聞鍾聲齊詣像前頂禮午梆上供侍者於影堂懸某祖像隨報供獻凡果菜須一二品隨時者所謂薦其時食也設香燭茶供晚課畢鳴鐘三下衆集像前住持拈香獻茶拜已維那呼展具禮祖三拜收具云頂禮尚尚禮畢回堂或有禮誦佛事維那與知客預請諸師懸牌已通知殿主鋪設經壇次日早課畢禮儀同前唯開山祖及嗣法師午前上堂餘但上供而已午梆上供衆集住持問訊拈香維那舉香贊已隨舉南無蓮池海會佛菩薩三稱衆接彌陀經候住持三拜將畢首座西堂先至住持兩邊側站次兩序執每邊站六人原班上下近前半步站齊首座西堂住持三人八字式跪下知客二人侍立像傍次第料理接傳供獻先茶次筯自東班序首一一挨次傳至首座首座端捧送住持住持舉獸已遞于西堂一一挨次傳至西班序首交于知客安擺其菜湯點飯悉照方丈齋欵擺齊兩邊起立歸位候住持八拜畢彌陀經方完誦呪及念佛百聲竟住持拈香説法已維那白祭文舉讚文讚隨名家所撰茲不備待住持奠茶拜已讚畢維那呼展具大衆禮祖三拜拜畢呼頂禮和尚禮畢呼起具各回本處此唯開山中興嗣法受業即剃度師之禮其餘諸祖不設壇諷經不一一跪獻供但上供奠茶而已然此影堂須有功本寺及以法住持者方許入位受大衆禮拜非同等間其忌辰單客堂庫房維那祖侍各貼一紙庶不有誤證義曰此報創建之德與繼守之功飲水知源禮合享祀不宜忘忽嗣法師忌凡遇嗣法本師忌辰獻供等事已載前説但此佛事須住持自出己財送庫司辦祭設供并諷經命書記具回向疏一道倘不及另具即依此疏式寫先具鄉貫生死日期敬惟本師性生慈善相絶我人繼規範於叢林行同百丈著謀猷於禪席德越萬峯傳臨濟幾十幾代之心燈標直指而披雲覩月享降迹幾十幾年之世壽謝塵勞而返朴歸真今值忌辰門人某甲殊愧青藍之喻徒承衣鉢之恩由是延衆諷某經一日申懇欵於慈尊啓人天之法席以此功德敬申酬報伏願鷲嶺峯前高超妙覺之位寂光土內常樂非相之身年月日門人某甲等具疏餘如念誦常式證義曰此報傳法之恩也父母生我色身先師生我慧命色身虗假不實慧命利益無窮是父母之恩固難報先師之恩更難報也區區芹藻之薦安得不留意耶即如巴陵三轉語為雲門作忌先輩用心之厚如此乃今末法之中不唯忌祭漫不關心竟有圖於名位負心忘本而另嗣他人者尤可慨矣禪宗祕要云五祖演禪師座下有一學人名開聖覺初參長蘆夫鐵腳久無所得聞演師法道徑造席下一日室中問云釋迦彌勒猶是他奴且道是阿誰覺云鬍張三黑李四演師然其語時圓悟和尚為座元師舉此語似之悟云好則好恐未實不可放過更於言下搜看次日入室垂問如前覺云昨日向和尚道了演師云道甚麼覺云鬍張三黑李四演師云不是不是覺云和尚為甚昨日道是演師云昨日是今日不是覺於言下大悟覺後出世住開聖見長蘆法席大盛乃嗣夫鐵腳不原所得悟人拈香時忽覺胸前如搗遂於痛處發癰成竅以乳香作餅塞之久而不愈竟卒噫此辜負重恩而別嗣之苦報也後之學者幸勿蹈此覆轍又雲悽崇行録云宋懷志金華人幼業講因一禪者激發棄講參方晚至洞山得法於真淨文禪師久之辭去真淨囑曰子禪雖逸格惜緣不勝耳志拜受命至袁州州人請住持楊岐掣肘而去遊湘上潭牧請住上封北禪皆不受菴於衡嶽二十餘年有偈曰萬機休罷付癡憨蹤迹時容野鹿參不脫麻衣拳作枕幾生夢在緑蘿菴晚投龍安龍安處之最樂堂遂終老焉蓮池贊曰顯達人之所欲遵遺命而力拒諸請可不謂難乎今人嗜名利棄禮義不請而往者紛如矣尚何憶乎師命剃度授經二師忌遇剃度授經二師忌如前儀亦須住持自出己財送庫司辦祭并諷經呪唯回向疏有異切念某甲百劫于生虗生浪死幸蒙剃染受經則改云慈教得入佛門授經則改云法門緬維莫重之恩實有難酬之嘆溯自曩日一靈歸寂沒憂海之深波惟茲忌辰五內悽惶痛昊天之罔極由是延衆諷經一日少申忱悃伏願佛日垂光爍破有生之罪障慈風普扇吹殘無始之愆尤彈指生極樂國中隨念坐蓮華臺上菩提不退般若常明年月日不孝徒某甲具疏證義曰剃度與授經即五種阿闍黎之前兩種也此雖不得法而曾從剃染或授經等舉此示不忘本也然古之為弟子者師沒而信愈堅今之弟子者師存而守已易況憶忌辰耶良由最初出家實非欲依止真師決擇生死蓋一時偶合而已是以其心見利則易逢惡友惑之則易瞋其師之訓以正也則易甚而棄正入邪罷僧仍俗者有之矣佛法何其衰哉按律中佛制弟子離師不得太早若師實愚或不守戒方許離之雲棲崇行録云唐清江幼悟幻泡禮曇一律師為親教師諷誦經法觸目而通識者曰此緇門千里駒也嘗與師稍忤捨而遊方遍歷法筵自責曰天下行半如我本師者鮮矣乃回師所當僧集時負荊唱言清江再投和尚唯願攝受時一師詬罵清江雨淚懺謝曰前念無知後心有悟望和尚大慈施與歡喜求哀再四律師憫之遂為師資如初一師沒謁忠國師得傳心要焉蓮池贊曰捨聖賢而知非當詬罵而不退可謂明且誠矣終傳心印不有由乎彼淺信之流小嫌則長往不返微呵則銜恨不忘空遇明師竟有何益如逢帝主不獲一官惜哉附父母忌父母之忌儀稍不同惟是我親非關衆也住持預日命侍者送祭儀於庫房代辦祭筵若舉念誦侍者即白維那客堂客堂即挂牌牌云明日堂頭和尚為父諱日追薦或母忌誕曰隨改諷某經一日請經師幾位開列於左某某師某某師晚課上殿時住持命侍者於方丈左傍設供位具香花燈茶供於牌前已晚課回堂住持獨自往山門外隨向俗家方位運心默召云我釋男某甲明日逢嚴父或慈母諱日之忌是以今於寺中設位供奉唯願我父我母以不思議天性相關應時知覺即知我男在此啓請隨請而來懇禱之至應三請請時應觀想父母形容音聲儼若隨請而來想父母來已即默云我父我母相偕進寺來想已隨即進寺到設位前四揖拈香獻茶想父母儼然坐已歡喜快樂再四揖而退是夜住持自用蒲團坐在設位下邊默念地藏菩薩聖號萬聲次日早課畢住持一人仍向設位拈香獻茶午梆上供即煩誦經幾位諸師到設位前上供儀與前同而不一一跪獻奉亦不行禮設拜待説法竟舉讚回向已維那云頂禮和尚各回本處至晚念誦畢回向如常向佛白薦疏一通云伏以釋天調御覺海導師琅函三藏靈文金地六和上士敢傾私慕之誠仰瀆圓明之鑒續入俗居鄉貫云云祠下居住奉佛誦經薦父或薦母比丘某甲專為追薦先考某某府君一位之靈若母改先妣某氏某孺人或父母雙薦二人名并用是日至心拈香歸命兩土化主彌陀釋迦極樂國中諸佛聖賢金蓮座下恭通情旨伏為先考某某享壽幾十幾歲原命某某相某月某日某時受生大限歿于某年月日時去世或薦母或雙薦隨改切念嚴君為母改云慈親雙薦改云父母德重若泰山之彌高養育恩深似滄海之難量不幸早經見背未報捐埃日月交馳光陰易邁茲今本月某日俄臨幾周忌辰仰憑大覺之功上酬劬勞之德由是延僧幾員念誦某經幾部用資雲程早離幽趣伏願已在人天者轉增五福任意逍遙未離諸趣者超升九品隨心自在右疏恭請三寶證明誦經薦親回向文疏年月日比丘某甲具疏事畢住持命一侍者代謝誦經諸師證義曰此報父母養育之恩及聽許出家之恩也按大乘本生心地觀經佛説四恩而父母恩為第一梁皇懺法云次復應須思念父母養育之恩懷抱乳哺愛重情深寧自危身安立其子云云佛言天下之恩莫過父母夫捨家人未能得道唯勤學業為善莫廢積德不止必能感報劬勞之恩又言其中若有父母少便孤背難可再遇空想悠然既未得神通天眼不知父母捨報神識更生何道唯當競設福力追而報恩為善不止功成必致經言為亡人作福如餉遠人若生人天增益功德若處三途或在八難永離衆苦若具真信受正法教即得超悟七世父母歷劫親緣憂畏悉除同得解脫是為智者至慈至孝最上報恩據此則作法追薦遵佛訓也雲棲崇行録云梁法雲陽羡人七歲出家為莊嚴寺寶亮弟子雋朗英秀於妙音寺開講法華維摩二經學者輻輳性誠孝勞於色養居母憂毀瘠過禮纍日不食旻法師謂曰聖人制禮賢者俯就不肖者豉及且毀不滅性尚出儒宗況佛有至言欲報生恩近則時奉顏儀遠則啓發菩提以導神識宜速思遠理使有成津何可恣情同於細近雲乃割哀微進饘粥蓮池贊曰曾子之母死水漿不入於口者七日即雲公之居喪雖曾子何加焉語曰釋氏棄其親豈理也哉又曰後周道丕長安貴胄里人唐宗室也七歲出家十九值駕幸洛京長安焚蕩乃負母入華山安止岩穴時穀湧貴丕自辟穀惟乞食供母母問食未恐傷母意必曰已齋母曰汝父霍山戰沒骨暴霜露能收取歸葬乎遂往霍山拾聚白骨晝夜誦經呪之曰昔人精誠所感滴血認骨願羣骨之中有動轉者即吾父遺骸也一心注想目不輕捨數日間有髑髏從骨聚躍出搖曳良久丕躃踊抱持賫歸見母是夜母夢夫歸明晨骨至人以為孝感所致後應制論道多居元席朝野歸重蓮池贊曰絶粒而餉母飢誦經而獲父骨可謂大孝兼乎存歿而至行超於古今者矣嗚呼異哉其次如僧道紀母必親供陳尊宿織蒲供母等釋氏之孝其親反過於世人傳記所載蓋歷有明徵今猶有病釋氏無親者三種不才僧之罪也安享十方之供而不念其親者一也高坐間暇而俾其親勞力如工僕者一也割愛出家而別禮他人為父母者三也生既如此死不薦悼無庸言矣忘本至斯尚何望其振興佛法乎禮塔凡新正除夕冬至隨改禮塔期定客堂預日挂牌牌云明日早粥後或小食後聞鍾聲大衆師各搭衣持具齊詣諸祖塔前禮塔即命照客通知塔主灑掃諸塔前後及路徑時至知客鳴大鍾三下禪堂開小靜內外大衆塔衣持具在殿前候齊依次序徐至開山祖塔前班次站定塔主燃香燭已住持拈香三拜繞塔三匝再拈香大衆合班展四摺具鳴引磬住持同禮塔三拜收具問訊分班次至某祖塔某祖塔俱如前禮唯普同塔住持不去監院拈香禮畢而回若路遙或天雨在影堂集衆禮祖九拜候天晴擇日住持與兩序執事補禮以便巡查蔭木無損塔地無傷設斛普薦清明節中元節或正日或先一日晚設放普薦祀祖斛食所有設位開列於左一本寺堂上開山老祖上某下某禪師次及中興某某禪師并諸歷代住持諸祖之位此是正中一行兩邊附列祖名下皆同此二本寺兩序先賢後哲有功權執及諸能執諸位覺靈之位三本寺列執并及先亡後化諸比邱衆次及諸沙彌輩覺靈之位四本寺同居各剃度師及壇上十師并引禮衆已故覺靈之位五本寺一派先遠至今在外法眷及剃度派并諸眷屬覺靈之位六現前同居緇素大衆各人已故二親男公處士女氏孺人之位七本寺捨基諸捨田地及諸捐助一切檀那男公處士女氏孺人之位八本寺開山從古至今在冥途者受戒歸依居家弟子并諸護法男公處士女氏孺人之位九本寺地主異姓先靈前後左右遠近高鄰男公處士女氏孺人之位十本寺近事先遠至今傭工淨人執勞運力諸方處士之位以上十位中從六至九應男女另立位使靈各便亦順世出世間之大禮不得合寫合供以亂禮體蓋陰陽一致也次附疏一通伏以大士興緣廣設冥陽之會阿難啓教宏開甘露之門天人鬼畜咸從箇裏超升緇素宗親盡向此中解脫爰有大清國某省某府某縣某寺秉釋迦如來遺教奉行主修祀祖法事沙門某甲今據本寺年例每逢清明佳節餘時隨改設斛普薦祀祖後裔住持某甲監院比邱某甲暨在寺衆僧人等是日至心拈香歸命瑜伽會主釋迦文佛顯密會上諸佛聖賢金蓮座下恭通情旨切念衆等叨父生母育之巨恩賴師傅施護之洪德既年例而資濟亦時屆而悽愴願承甘露之緣長潤冥泉之渴均資法喜齊上蓮舟由是謹於本月幾日屆當某節之辰先於今夜設壇如法普薦伏願化佛來迎諸慈垂照放光接河沙餓鬼統歸平等法筵施食周六道四生受用無邊佛事釋氏宗派固不飢虗儒門善信頓沾利樂同登淨土咸感蓮胎回此功德陰超陽泰恭請三寶云云時至香燭供果等皆齊備已法師在施食壇前舉贊起香舉佛號隨表白同至孤魂臺前法師拈香三問訊誦往生呪三遍已念奈麻面然大士菩薩三稱已合掌對大士立白文云淨極光通達寂照含虗空却來觀世間猶如夢中事仰白面然大士統領法界六道九種十類孤魂自他先亡家親眷屬等衆法師一問訊云唯願同承三寶力各悟一真心虗靈不昧飽餐法味於斯時業識無迥脫塵勞於永劫如斯利益唯神導引白已衆同唱贊云孤魂佛子莫住泉鄉少隨法水悟真常直下自承當返照回光何處不天堂贊畢念佛諸設位前各各上香問訊已仍歸壇前並照常例施食辨訛見下住持章施食條證義證義曰普薦之義以父母師長等不能盡出三界故有資於薦於清明中元順俗而行所以開死者之神識而盡生人之孝義也至若供雖不豐務存精潔所謂事死如事生也孔子曰菲飲食而致孝乎鬼神觀夫致孝之言則自奉雖儉祭祀必豐可知矣近時頻見僧俗以人所不堪食者供之無孝敬之意招褻慢之愆恆用慨然掃塔清明節客堂預日挂牌牌云明日清明掃塔大衆師聞鍾聲搭衣持具齊詣塔前上供即命塔主灑掃諸塔前後及諸路徑知客上方丈請問住持時分定時已即通知維那庫房正清明日早課畢鳴鐘三下祖堂禮祖或住持説小參或命班首秉拂候方丈傳牌施行早粥後祖堂影堂檀那祠堂皆先上供小食後掃塔及土地堂并孤魂壇上供塔主取供見下兩序章執事條中説時至知客鳴大鍾乃至住持拈香禮儀俱見禮塔條説三拜畢住持執掃塔頂次至塔基已放轉身下階至供桌再拈香維那舉香雲蓋三稱接念奈麻清淨法身毗盧遮那佛三稱次誦心經等上供祖侍跪獻供畢住持説法唯開山塔及嗣法師塔説法餘皆隨宜説畢結讚已衆向上展具鳴引磬三拜已起具問訊分班次至某塔儀式同前至最後塔畢大衆往普同塔住持回寺監院拈香拜掃衆誦彌陀經全卷往生呪三遍等上供末結唱蓮池海會讚畢衆三拜往土地堂及孤魂臺上供而回或列祖塔多或遠另日住持與兩序執事再掃上供大衆不去如本支或戒子或剃度由別處來掃塔客堂接待問其尊卑若在住持之長行尊宿禮見下住持章尊宿條説若同輩已下通白住持及庫房維那請定時已供儀備齊掃搭上供等儀與前同仍請大衆念誦住持陪掃或唯掃一塔二塔隨其本人所宜或彼辭衆不須念誦或辭住持不敢煩勞俱聽其便尊宿禮儀行止隨宜知客俱當預先問明證義曰禮塔掃塔皆時敬祖先看塔石之堅壞閲蔭木之損益上妥祖靈下安常住甚有關係不可忽也近時多廢此舉匪唯忘本更慮祖蔭有虧即常住有事儒釋有別祭掃禮同多見常住不幸人口不安皆由不勤祭掃祖靈不妥之所致也
