body:
  text: 唐洪州百丈山沙門懷海集編清古杭真寂寺苾蒭儀潤證義越城戒珠寺住持妙永校閱祝𨤲章第一述曰人之所貴在明道故自古聖君崇吾西方聖人之教不以世禮待吾徒尊其道也欽惟國朝優遇尤至特蠲賦役使安厥居而期以悉力於道聖恩廣博莫可名言為僧者必也悟明佛性謹守戒律庶不負盛朝隆重之至意而又朝夕祝𨤲佛慈冥加天心默眷俾我后導民於無為之化躋世於仁壽之域然後可以仰報萬一也其見諸日用者謹恭錄而存夫軌度焉聖節啟建欽遇聖節啟建金剛無量壽道場幾日長短隨宜僧不給假示敬也啟建之先三日客堂備紙詣書記寮知客觸禮一拜白云某日啟建聖節煩製疏語書記缺記錄代俱缺用現成疏見後書記製畢具單呈住持閱已親送客堂觸禮一拜答先禮也知客用黃紙書榜并聯額及疏等啟建之先一日客堂請維那共商念誦僧眾以次輪流派定呈住持看畢即請住持來早殿上領眾諷經祝聖當使殿主洒掃殿上啟建金剛無量壽道場舖設莊嚴懸諸聯額榜文張山門之左即掛牌牌云某月某日恭逢萬壽聖誕合院大眾師早課齊詣大殿宣揚秘呪持念誦藥師佛號伏願佛日洞明聖壽無疆餘事禮儀同上但隨改某事名其念誦牌每日多則二十四僧少則十名照次輪開建首日殿中陳設諸供物上供黃紙證明疏是日住持說法或上堂或小參隨宜而行儀見下住持章附證明疏及額聯句又榜疏中六經一懺隨宜若干當各書填數目伏以景運宏開聖人作而萬物覩湛恩普洽一人慶而兆民賴覆燾無私乾坤孰測其高厚照臨有赫日月莫喻其光華知讚仰之難窮欲補報而無極唯托鈞陶之內義重四恩故竭忠愛之心虔恭三祝爰有一四天下南贍部洲大清國某省府縣寺續入職員某臣僧某今於本年某月日恭逢天壽聖節本寺預於本月某日謹就大佛寶殿啟建金剛無量壽道場幾日逐日輪僧上殿披閱大方廣佛華嚴經大佛頂萬行首楞嚴經大乘妙法蓮華經大方廣圓覺修多羅了義經金剛般若波羅密經仁正護國般若經慈悲道場梁皇懺法於中加諷諸品真詮宣持密號所萃洪因端為祝延今上皇帝聖壽萬歲萬歲萬萬歲伏願斗樞電繞龍象筵開帝網百億山河咸歸聖量華藏三千世界益衍丕圖更祈夔龍登用景星耀而泰階平玉燭常調民氣樂而本固右疏恭申佛日洞明龍天昭格年月日住持臣僧某甲具若當道官員為請主並宜一一具書姓名此疏即作榜交用榜頭加萬壽無疆四箇大字又疏當於正節日壇內上午供時眾齊念南無無量壽佛化疏聖節滿日另有回向疏當預供壇內萬壽無疆金輪與法輪同轉福越三祇舜日與佛日齊輝壽延億劫此一聯額懸大殿前軒中普天同慶一人有慶雲戴日星拱辰照臨海宇萬壽無疆龍負圖鳳巢閣永固基山門遙瞻北極八表來朝同歸化育萬入貢共樂昇平經壇證義曰聖節亦名萬壽節或稱天壽以此日為聖人誕降之佳節也中峯本云但生植於天地之間者莫不被其澤唯我釋氏之流乃被其澤之尤者也何以為然葢孤虗柔弱而不能自立也言孤則遠離親族不營世家言虗則寄食檀門悽遲林麓言柔則潛心空寂守節循規言弱則守護性真不與物競自非聖人不忘佛囑曲垂外護則僧園資具安能永為常住而不遭陵奪於他人之手乎由是吾儕安居暇食一時一刻咸出聖恩雖天覆地擎不足云喻使盡形求法終身向道至若忘軀畢命亦不足以酬其萬分之一豈容懈怠懶惰虗延白日而更馳情於利欲者乎故茲聖節理合如法啟建照疏念誦以報國恩矣正節早祝正節日早課燒香侍者傳爐大眾雲集住持拈香維那舉香讚云寶鼎爇名香普遍十方䖍已下眾和誠奉獻法中王端為皇王祝聖壽地久天長後二句重一遍南無香雲葢菩薩摩訶薩三稱住持禮佛已讚完維那押磬悅眾鳴引磬齊念聖無量壽光明呪三遍其引磬一二遍慢板第三遍快板念畢煞下引磬維那押磬慢舉云藥師如來左班同稱藥師如來皇帝萬歲念完左默藥師右班齊稱維那押磬出班悅眾代執磬椎如來維那居中問訊長跪藥師如來拈香三派起立問訊轉身展大半具唱云皇帝萬歲一拜藥師如來左右同和維那第二拜藥師如來維那第三拜皇帝萬歲問訊長跪合掌監院隨住持後長跪合掌維那高聲祝云大圓滿覺應跡西乾心包太虗量周沙界一四天下南贍部洲大清國某省某府某縣某寺宏法沙門某甲監院比邱某甲等茲當某年某月某日恭逢天壽聖節餘節隨改良辰雲集現前僧眾登臨大雄寶殿諷演秘章稱揚嘉號所集洪因端為祝延今上皇帝聖躬下三句左右一齊合掌同祝云萬歲萬歲萬萬歲維那同監院一叩首此處悅眾鳴引磬兩下左右對面一問訊悅眾又押磬維那擡頭再祝云皇后齊年太子千秋文武官僚高增祿位悅眾打引磬一下又一押伏願堯風永扇舜日長清八方歌有道之君四海樂無為之化仰勞大眾同念金剛無量壽鳴大魚子大眾接念護國仁王菩薩摩訶薩此下接念楞嚴呪從薩怛他蘇伽多耶云云維那監院起立三拜起具歸位念至檀信皈依增福慧句接藥師偈云藥師如來琉璃光𦦨網莊嚴無等倫無邊行願利有情各隨所求皆不退南無東方淨琉璃世界藥師琉璃光如來繞念南無藥師琉璃光如來千聲歸位展具左右唱和禮拜南無藥師琉璃光如來十二拜南無日光遍照菩薩南無月光遍照菩薩南無藥師海會佛菩薩各三拜拜畢三歸依祝護法竟鳴大鐘三下維那云大眾師齊上法堂或方丈眾至肅立左右排列次第侍者通白住持住持出陞座拈香維那舉香贊贊畢喝展具尚答隨具維那云頂禮和尚三拜尚云一拜禮畢起具仍歸位對面立左右悅眾次第鳴引磬三陣已待住持說小參竟維那云禮謝和尚三拜尚云一拜禮畢回堂是日輪次念誦仍如常儀上午上堂并上供宣證明疏午齋腐飯俱載住持章證義曰清規首冠祝聖者欽遵佛敕而報國恩也按大乘本生心地觀經佛說國恩彰有十德今吾僧眾恭逢清平盛世幸值英明聖君恩如日月照臨德同天地覆載要而言之更有十大恩護一隆重三寶不忘佛囑故二修建佛剎為大檀護故三印行藏典流通佛法故四給僧戒牒參學無阻故五蠲免度牒出家得便故六欽賜墨寶莊嚴佛剎故七追封古德褒崇真脩故八年賜香燈永作福田故九另設僧官俗不辱僧故十不使僧役專心辦道故有此十恩理宜知報佛言我今五眼明見三世一切國王皆由過去侍五百佛得為帝主是為一切聖人羅漢來生其國作大利益我使五大力菩薩五大士五千大神王往護其國是故我今三寶付囑一切國王云云如大涅槃經等俱有佛敕外護之文故首舉也聖節圓滿聖節圓滿日客堂預先一日白住持及請當道宰官拈香已正圓滿日輪次念誦仍照常儀上午住持上堂至念誦經懺竟宰官到已眾集維那舉香贊宰官住持次第拈香眾合掌跪誦晚課內之大懺悔支誦畢起立合掌維那舉回向偈云十方法界至人口法界所有即其舌只憑此口與舌頭祝吾君壽無間歇億萬斯年注福源如海滉漾永不竭獅子窟內產狻猊鸑鷟定出丹山穴為瑞為祥遍九垓草木昆蟲盡歡悅稽首不可思議事喻若眾星拱明月故今宣暢妙伽陀第一義中真實說祝𨤲功德殊勝行無邊勝福皆回向普願沉溺諸眾生速往無量光佛剎十方三世一切佛一切菩薩摩訶薩摩訶般若波羅密此偈維那兩句一拜眾隨和共十拜一問訊已鳴樂器眾齊念南無大乘常住三寶三稱維那長跪宣回向疏云天上無雙日閻浮一至尊萬年松不老聖壽等乾坤爰有聖節圓滿回向文疏對佛披宣仰望慈悲俯垂證鑒伏以優鉢羅華瑞世同佛降生閻浮提樹連陰與天齊壽故毓夙成之睿質克承丕顯之聖謨大哉元至哉元體元居正會其極歸其極建極立中今據續入鄉貫寺名人名以及起首年月日啟建祝𨤲道場至今某月日圓滿回向於中䖍誦諸經頂禮懺法伏願垂拱無為天地位而萬物育鈞陶有象陰陽理而四時平壽考萬年本支百世更祈吾道之大同有俾聖時之至治山林鐘鼓樂化日之舒長草木昆蟲被膏澤之沾濡祥開震旦頌祝華封右疏恭申佛日洞明龍天昭格年月日住持臣僧某甲具疏若當道官員為請主並宜一一具書姓名宣畢鳴諸法器齊誦南無無量壽佛化疏化畢維那舉贊云普賢行願功德周圓普資恩有利人天福壽廣增延滅罪無邊同願禮金仙南無圓滿藏菩薩摩訶薩三稱向佛舉三歸依已眾又三拜竟各回本處殿主收拾莊嚴等物各還原處少頃維那領眾搭衣持具上方丈頂禮住持三拜回堂大眾謝維那普禮一拜證義曰祝𨤲者是為皇饗佛之辭以此悅佛神而報皇恩也按仁王梵網等經佛遙鑒未來慮僧家之微弱恐佛法衰殘是以金口囑累教海仗皇以流通玉手撫摩僧輪憑帝而熾盛若帝王臣宰少金湯之志則真教陵夷惠風掩扇人懷侮慢法雨難施矣是知城壍當時津梁後進者莫尚王臣擁護葢皇以覆護恩德被僧僧以明道熏修報答此乃法門第一要事故須日日祝延聖壽事事祝延聖壽方盡衲子報恩之誠今正殿佛前常供萬歲牌即是此意故首舉之昔後宋僧曇宗在靈味寺嘗為武帝行菩薩五悔法帝曰朕有何罪而為懺悔宗對曰昔虞舜至聖猶云予違汝弼湯武亦云萬方有罪罪在朕躬聖主引咎葢以軌世陛下齊聖往古履道思冲寧得獨異武帝善之噫曇宗之語可謂報恩師表也然僧又當知各為本分事重努力熏修庶幾佛恩國恩兩無所忝不可徒崇虗文而有荒實踐也皇后千秋遇皇后千秋日客堂隔宿掛念誦牌誦金剛經一日仍如常儀正日早課前祝聖已維那白云今某月某日恭逢皇后千秋令節謹集僧眾登殿諷誦所萃良因敬祝皇后懿筭千秋伏願八方天神來密佑更資遐筭助我皇仰勞大眾同念金剛無量壽云云與前聖節儀同證義曰皇后母儀天下助我皇共致太平故叢林有千秋之祝稱揚淑德求佛冥加臣僧之義所當然矣受敕奉旨凡朝廷旨臨山先差能執六人即監院知客衣鉢等預備龍亭出寺五里迎接時至住持領眾山門外兩邊立定不得參差失儀殿上設香案鳴鐘鼓候旨到齊跪俯伏旨過一齊起立隨後龍亭供奉殿中眾僧於殿前丹墀兩序排定知客高聲呼云皇恩御詔臨山大眾頂禮三拜萬歲拜已一齊俯伏書記捧詔向東邊高立宣讀畢仍供龍亭住持至亭前拈香三拜已再同眾僧謝恩九拜問訊已齊鳴法器及大鐘鼓誦南無無量壽佛捧詔登御書樓藏供已維那收佛號隨舉贊云天龍聖主護世周全皇恩深重莫名言奉報在心田眾僧䖍䖍頂戴萬德詮南無吉祥王菩薩摩訶薩三稱眾向上問訊各回本處住持陪官見下住持章說或當日或隔宿住持上堂謝恩祝𨤲證義曰受敕奉旨如降香賜衣賜號賜詩文詔陞座等並附祝𨤲者皆謝恩祝聖故按元大德七年八月二日護持聖旨到山住持元叟端禪師領眾望闕謝恩罷上堂云平生抱愚拙心意安林丘磐陀一片石松下聊優游迴鸞五色詔瞥爾來巖幽天恩浹肌骨淺薄將何酬願君為堯舜願臣為伊周金枝與玉葉光耀千千秋萬民贍秔稌四海銷戈矛竺仙正法眼如水常東流又明太祖皇帝賜元極頂禪師紫衣師謝恩上堂云內使傳宣出紫宸賜衣何幸及微臣金襴照耀天人喜白㲲鮮明雨露新光寵山林同佛日暖除霜雪布陽春餘生受用流傳遠萬歲宗門沐至仁景命四齋月旦月望初八念三名景命四齋日隔宿客堂掛諷經牌朔望誦梵網遵佛敕也初八念三誦仁王護國裕民也正日早課先祝聖維那白云某月日良辰某省府縣寺住持傳法臣僧謹集僧眾恭趨寶殿諷誦秘典稱揚聖號所萃宏因祝延今上皇帝聖壽萬安仰勞大眾同念金剛無量壽護國仁王菩薩摩訶薩云云課畢住持說小參朔望粥後齋堂集眾誦四分戒本飯後誦梵網儀詳下布薩條行堂師先於案上中供一佛香燭齊備兩邊桌上備律本魚磬等候開小靜鳴鐘三下侍者傳爐眾集展具拜已住持拈香維那舉香讚住持拜畢登座兩序亦挨次撩衣而坐維那鳴磬開經乃至誦竟回向下座眾展具三拜各回本處若值冬月在禪堂內者免誦侍寮收誦戒牌初八念三誦仁王般若同此又古規朔望日早粥二板後齋堂用普茶宣規約今禪宗權開非時食戒普茶移在晚二板見下住持章朔望條說即此朔望誦戒亦禪宗之權宜所開若依律制當於黑白月之盡日為正又古規每日齋粥二時下堂僧眾登殿維那舉無量壽呪三遍回向祝延聖壽又每月有四齋日六齋日十齋日每年正五九為善月俱念誦祝聖於每日早課至心經畢賜大祝延贊證義曰四齋稱景命者始於隋開皇三年詔天下正五九并四齋日各寺建祈禱道場不得殺生命取藏經中有毗沙門天王每歲巡按四大部洲正五九月治南洲故禁屠宰而唐之藩鎮每上任必犒士卒須大烹宰故以正五九不上官為禁殺也今誤為忌者非即四齋念誦亦遵佛教敕令人解義照自心源有則改之無則加勉非但為誦經釋愆報恩也噫念誦釋愆報恩雖未解義猶存其禮今有絕棄不行違背甚矣按續高僧傳及雲棲崇行錄釋僧雲者住寶明寺以講演著名四月十五日臨誦戒時白眾雲戒乃人人誦得何勞數聞可令一僧豎義使後進開悟眾無敢抗遂廢誦戒七月十五日眾集忽失雲所在四出追覔乃於古塚中得之流血被體問其故則云有猛士執大刀厲聲呵云僧雲爾何人斯敢廢誦戒妄充豎義即以刀劊我身痛毒難忍因扶掖還寺竭誠懺悔經於十年至心盡敬依式誦戒臨終之日異香來迎欣然而逝時咸嘉其即世懲革云雲棲蓮池云今時尚經論而輕戒律二千年來半月誦戒無復有舉行者予不揣與廢墜於山中人猶未之信也果報炳然於雲公有徵願覧者思之
