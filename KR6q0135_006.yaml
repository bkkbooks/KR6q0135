body:
  text: 唐洪州百丈山沙門懷海集編清杭州真寂寺苾芻儀潤證義越城戒珠寺住持妙永挍閲兩序章第六述曰兩序之設為衆辦事而因以提綱唱道黼黻宗猷乃至司帑庾歷庶務皆所以輔弼門庭關係甚重故夫世出世法無不間習成己成物全體備用尚矣次之或守一材效一能盡執無忝叢林亦嘉賴焉序列雖分古每易位而交執無彼此之別無崇卑之嫌今則判然不相代謀又單異內外班列崇卑亦時會所趣事雖不古理尚無舛至於擅事權結朋黨獨斷而羣譁岌岌乎不相容豈不謬歟此在主者慎擇所任復時申祖訓以戒之納諸條約而善調之庶幾衆無棄材人無廢事或馳驅於僧務或坐禪而勤修老祖風規當不遠於今日耳執事單東序都監監院維那副寺知衆知客知事悅衆值歲知浴典座監收衣鉢湯藥請客侍者知屋帶知器監修知山莊主庫司列執化主收供化飯庫頭米頭炭頭兼爐頭擔運茶頭行堂碗頭門頭貼案飯頭二飯菜頭火頭水頭磨頭雜務厨房香燈巡山柴頭山寮香燈淨頭園頭照客知隨西序首座西堂後堂堂主書記知藏藏主參頭祖侍燒香記録聖僧侍者列執殿主寮元鐘頭鼓頭印房夜巡清衆香燈司水法堂香燈藏樓香燈佛塔塔主塔院塔主祖堂香燈耆舊閒住看病打掃行者佛子淨人僧值此執不在兩序之內當録在單之正中央年月日住持某甲重録證義曰古之清規佛法為重故先西而後東今之叢林辦事為能故先東而後西其兩序執名此據大槩而已各家增減先後隨宜不以此為拘也亦名執事榜實貼齊堂每執若干另用小條書人名而加貼之又客堂用大牌一塊照齊堂單而具書之書法從中至邊橫列上書序執下書列執字須正楷右之邊行書題左之邊行年月日及住持某甲重録蓋叢林人衆難盡知識或有事舉難以稽查一視斯單人執了然是故執事進退先於此單出沒名條使一衆了了不致錯誤也他如律堂講堂另有執名此不録入者原本無故非敢遺漏也又凡充執事無論崇卑咸宜竭盡心力輔翊常住不當以人我榮辱自生分別苟能取捨情忘聖凡念寂搬柴運水總是禪機執㸑負舂無非妙用頭頭顯唯心之三昧法法了唯識之圓融所謂智慧了辦行願無虧也兩序分十寮見首卷目録西序首座乃西序首領表牽叢林輔翊住持分座說法開示後昆坐禪領衆謹守條章齊粥精粗勉諭執事僧行失儀依規示罰老病亡歿垂恤送終凡一衆事皆得舉行如衣有領如網有綱也雖諸方尊宿住持能以禮致之亦樂充此執謂之退位為人如文殊為七佛之師猶助釋迦揚化為衆上首故此執必擇其己事已辦衆所服從德業兼修者充之在講堂即都講之執西堂亞於首座其才其德可為班首者也然雖居班首之位猶同參學之人須循謹謙雅不可我慢貢高貽譏大衆在講堂即科主之執後堂位首後班以首座居前班為前堂故此為後堂扶贊宗風為衆模範不理常住雜務方丈命則為之堂主此執各堂有之以掌理其本堂之事兼理病人然為一堂之主亦須才德兼長慈悲為衆者充之至於禪堂堂主兼有開示之責同稱班首所關尤重也證義曰叢林以前四執目之為四班首然四中之最重者首座也蓋長老住持事繁不無分心之處若其專事為人開示警䇿勘辨勦絶以不辜來學者全在首座之得人矣昔靈樹之於雲門待至多年方補此位何其慎歟若西堂諸位既同其在允宜虗己從公共勷厥事庶幾祖燈傳於無盡耳書記執掌文翰一切書寫當盡其心不可粗率潦草并教初學經典儒釋兼通者可充此執禪堂貼單證義曰古人惟以了脫生死為大事間有拈弄文字皆了事後遊戲以咨發後人眼目非專以詞藻為工也乃近日僧中竟欲以此見長甚或留神書畫寄興琴棋名為風雅全忘清修生死到來毫無用處托古云峨嵋白長老作頌古千首以壓雪竇太和山主面唾曰此鴉臭當風氣已觸人矧欲勝人乎愚菴頌曰為僧僧醉文字酒參禪禪在頌千首曾知文不在紙上又道談元不開口君不見大藏數千卷書藏充二酉文章末技耳明道為樞紐孔子之見溫伯雪飲光一笑無何有秀上座獦獠叟一是不識丁一為文字藪衣法是誰傳不朽雪竇百之我千之野干鳴獅子吼噫為書記者宜知之自長老以下皆宜知之知藏兼通義學藏主乃其所屬須協衷保護經藏凡函帙安置修補殘缺以及經本出入等事俱知藏總其綱而藏主分其執也藏主執經橱鑰匙凡經書不借出以山門為限夏季風日暄明晾晒諸經收橱時查理字號不可紊亂凡請看者須登牌某月某日某人請某字函經還則消帳若其人告假并餘事欲去者先查取遺失者罰抄賠已出院凡交替執事必須客堂庫房及知藏到一一檢點清楚對衆清交新執缺少者賠二執禪堂貼單證義曰法者三寶之一而佛以法為師則法尤首重也二執掌理法寶最當敬慎維那綱維衆僧曲盡調攝堂以內事一人掌之堂以外事二時功課率衆領班上堂說法白椎示衆又如一切舉唱回向以音聲為佛事其任頗重凡堂中失儀遵規舉罰不得狥情故須諳練正直之人為之即住持有犯亦毫無私諱若表和尚堂者手拿堂規香板跪本位下表悅衆乃維那之副此執凡有數人以大二三四別之若維那不在堂皆須帶管堂中七期輪流料理并二時課誦外有事二板赴客堂報堂中人名朔望查收堂中什物教初參禮法一切佛事唱念分明禮儀熟諳之人可安此執參頭乃一堂參學之首看功夫開示後學護助參禪不理餘事禪堂貼單凡堂中自首座起至參頭止應說之話俱可說但不得越次首座在西堂已下俱不得說西堂在後堂以下皆不許說乃至悅衆在參頭則不說證義曰按翻譯名義集梵語維那此翻次第謂知僧事之次第也三寶感通録云劉宋時太始中揚州瓦官寺釋慧果者少誦法華經及華嚴十地品忽於圊廁見一鬼出現致敬云某甲昔為衆僧作維那小不如法墮地獄今生噉糞鬼中法師慈悲願助拔濟昔有錢三千埋在柿樹下願取為福慧果告衆掘錢為誦法華設會後夢見前鬼云已得改生大勝昔日之苦報也其餘如僧護經梁皇懺等並明感報充斯執者鑑之慎之其餘各執例此可知矣清衆有內外在堂內名清衆一切照堂規隨衆不理事務唯坐靜香禪堂貼單在堂外名聽用即公務也不貼單證義曰大約成佛作祖者均從堂內清衆而出古則內外諸執無不以參究為事今雖不乏其人而收其發心辦道者置之堂中坐香結制常住諸務不纍絲毫惟欲其人人成辦己事而已噫此是選佛場為清衆者當如何激昂奪發也耶若藉此以為偷安地殊為可惜甚或蕩檢踰間不受約束尤為可憐愍矣然長老班首祇宜常示其迷津不得故苛其香板且勿強受執事以違其初心多派經懺以撓其正念使之功勳間阻日久而無成也至堂外聽用凡常住差撥無得推故躲避差不公者對衆白禪堂香燈焚香供水點燈息燈晚課衆上殿時掃地拭桌照管堂師行李吃二堂粥飯半月到庫房取香濁油紙五日取草鞋鍋粑七期散糕果燒放參遇上堂則掛牌餘照堂規隨衆禪堂貼單司水每日清晨打面湯三時潄口水出坡淨腳水應時打掃前後丹墀及小淨溝以洗面等水沖之勿令作氣堂中有事相幫燒放參小食收拾器皿等事閒時採楊枝倘侍寮不在早午齊堂出生晚課殿上出生餘照堂規隨衆禪堂貼單以上第一寮見下大衆章證義曰香燈司水乃專為禪堂執事之人夫了畢大事清衆最便為衆充執實勢所不得已也然充此執者當知汲水焚香儘可參究掃塵洗腳時露消息但須除心何必執定除境動處薦得反勝靜中工夫耳祖侍兼影堂香燈侍奉先祖故為序位影堂不時灑掃凡上供入厨庫取供朔望取香燭油早晚點路燈開山祖塔上供祖侍跪獻一茶果二箸三菜四點心五湯六飯七清茶其餘塔前上供祖侍提茶凡諸祖忌辰預白方丈上供列祖忌辰單實貼本寮失誤祖忌不白者罰燒香乃侍寮之首領凡住持說法如上堂小參等鳴三陳引磬時出位拈香三瓣展大具三拜起具問訊歸位又上堂上供祈禱掃塔小參等事當預燒爐候用雙手高捧齊眉在住持前行證義曰古人親近知識多在侍寮以長老尋常接人機語不離左右可以隨處薦取故也昔南泉垂問來日設馬祖齊馬師來否洞山對曰待有伴即來雲居侍者持燈至見影在壁上僧問兩個相似時如何雲居曰一個是影今祖侍中有此伶俐漢否耶溈山侍百丈次丈云汝撥爐中有火否溈撥云無火丈撥得少火示云此不是火溈發悟今燒香中有此伶俐漢否耶記録外則書記內則記録凡遇小參上堂等事則傳牌出門則執杖請拂方丈說法則寫法語實貼班首秉拂則寫牌懸掛一一皆其所執故長老語録多出其手也此執以謹慎精細為要證義曰叢林中得文字法味者首推記録資須敏達品重恪恭雲棲崇行録云唐終南山至相寺智正禪師住山二十八年不涉世諦弟子智現伏承法教正凡有著述端坐思惟現執紙立侍隨出隨書常鎮日不坐一日足疼心悶不覺仆地正曰昔人翹足七日汝今才立顛墜心輕故也噫古人忘軀為法風規若此記録之執不當如是耶衣鉢外則監院內則衣鉢掌理常住莊嚴法器財物等事故須老成者為之立心端謹遇事通融庶幾上下雍肅故輕佻與拘執之人俱不可用所有寮規當執記取凡七條莊嚴法器出入清楚銀錢出入隨登帳目每月兩算果品食物愛惜收藏精潔奉客住持公出內外照應更須留心客至方丈所為某事自有知客交明監院定奪唯或點或飯見機欵待香信禮物不得私開待同寮及行者等須端嚴正直不得言語嬉戲客房物件或用或藏各得所宜不致損失年月日方丈示證義曰衣鉢為住持心腹之人行住相隨財物重托凡住持名譽資財損益全在此執不可不慎托古云石窗恭師道行孤峻優於才力久依天童宏智細大執務靡不歷試歸省時其母曰汝為人主事苟不明因果將纍我於地下恭曰某於常住毫髮不欺無足慮也噫充執務而能毫髮不欺者斯無愧矣湯藥外則典座內則湯藥應時供奉住持湯點左右應接佐助衣鉢撫恤行者此執須豐儉得宜尤嚴戒背衆飲食請客外則知客內則請客此執原在禪堂輪日二人在方丈一為當值不離丈室凡客來一面接待遂白住持或須齊點聽衣鉢語報廚庫房不得貽誤或有信物清交衣鉢粥飯過二堂一為監值早晚法座焚香點燈亦隨侍住持不相離遠以禮儀間雅為要證義曰按僧護經梁皇懺等載一沙彌盜果子七枚一人盜餅二番一人盜石密漿少許俱受三途苦報緣此是常住物或私食或私與人俱犯盜戒又禪宗祕要云僧照禪師南嶽高弟辨才無礙禪定第一嘗用衆鹽一撮作齊飯後入定忽見相起計三年增至數十斛急賣衣買鹽償衆其相方滅吁可畏也侍者隨侍之義有通有別通則自燒香起至聖僧止皆名侍者別則此執專侍住持以勤謹為要每日先於方丈及法堂內佛前裝香換水拭桌掃地一切齊潔已然後伺候住持盥沐茶湯收換衣履早晚問安出入侍立服勞執役先意承迎客至奉茶齊堂出生有事二板赴客堂議事送執與客堂同安列執領是住持上下通話如孝子之事親則得矣此執不得過幼以年長者充之證義曰古來一切高人其初侍師側時皆能忍難忍之勞苦方可得無得之妙法此乃重法輕身自古然也具如律藏及沙彌要略說文雲棲崇行録云唐招賢通少為六宮大使因詣鳥窠求出家窠不納堅求乃為剃落執侍左右勤劬不替經一十六年不蒙開示欲辭去窠問何之曰諸方學佛法去窠曰佛法此間亦有少許遂拈起布毛吹之通忽大悟因號布毛侍者蓮池云人見侍者於布毛下悟去不知一十六年忍勞之力也匪多載辛勤焉有今日事遇明師者幸無以躁心乘之聖僧侍者堂內安單住持落堂拂座獻茶拂拭竹篦香板打七照應住持面前香爐及放參茶果等事二時過堂及晚課出生已上侍寮共八執俱禪堂貼單以上第三寮竟證義曰聖僧即禪堂中所供之神僧像也禪堂古名僧堂因衆僧共居一堂故此僧堂中所供奉是阿若憍陳如大聖僧也此聖僧侍者之執專在堂中事奉聖僧之香火住持落堂兼事住持茶香等事故名聖僧侍者邇來禪堂中多供佛則聖僧之像寂無供者又改僧堂之名為禪堂而聖僧二字之義無著落矣以上侍寮共八執常與住持親近又邇時多以青年者充之故應遵守規範不得在住持前訟人之短不得在同寮中戲笑不得懈怠偷安此三事尤當謹戒托古云別峯印住雪竇有小師訴頭首過峯厲聲責曰汝是我小師包含上下則可反暴人短居左右必敗吾事杖逐之聞者歎服又宏智在淳禪師為侍者寮中與僧徵詰智不覺大笑淳適過聞之至夜詢之智曰偶與僧語話而粗不禁發笑淳切責之又真如晢侍者習坐禪困極以圓木為枕睡酣則枕轉覺而復起安坐如故率以為常或謂用心太過哲曰我於般若緣分素薄若不刻若勵志恐為妄習所牽況夢幻不真安得為長久計噫即此三事當謹之前鑑也以上西序竟行者淨人二列執附前住持章東序都監亦名都寺上古無之後因叢林人多事煩故復設此執乃上輔住持下匡監院者也雖不如監院之勞苦理事而大端則須總持是故亦名總理其位次大殿站在東邊末跪在維那並肩左行在監院後齊堂坐位在監院上在常住教十年監院之勞方充此執乃酬勞安享之位與首座平肩在堂外也證義見後監院為東序首領住持右肩執總庶務如栽培田園辦糧收租出納錢米會計帳簿大衆粥飯施主應酬一切皆其執也然凡事必會議稟住持妥貼方行勿得任性自專訓誨行單工人無縱威暴設使莊庫執務必須公平無用私黨總之必具五長可充此執一者慈悲恩顧大衆二者公直毫無偏私三者謹慎小大無慢四者勤勞不圖安逸五者敏達事無留難如此監院常住所賴也反此則損可知其位次大殿站在西班末跪在住持後副寺即監院之副其所管執與監院同凡事與監院和衷共濟一切煩雜瑣碎之事監院不及照管之處賴副寺治理財米出入隨上日記收管支用令庫頭每日具收支若千簽定飛單呈方丈謂之日單十日合次謂之旬單一月一結一年通結或每月十四三十到客堂會兩序逐一結算有無兼管謂之日黃總簿方丈庫房各一本知事亦名知糧正理糧差出入官府兼管田地山場界限等事每年錢米須早完納不致差役入寺為第一要事完糧串票交住持藏貯不可自藏證義曰此之四執事既關重因果亦重不可不慎也禪宗祕要云昔天台拾得禪師於國清寺莊牧牛寺僧說戒拾得驅牛至僧堂前撫掌大笑曰悠悠者聚頭首座呵云瘋人何得喧礙說戒拾得曰我不牧牛也此羣牛者多是此寺執事僧人也一一各呼亡僧號牛各應聲而過舉衆錯愕咸思改過噫可不鑑哉托古云昔寶壽師在五祖寺庫房充執住持戒公偶疾服藥須生薑行者就庫取寶叱之戒知之令將錢回買寶始與後洞山缺人郡守書託戒舉所知戒曰賣生薑漢去得壽出世住洞山遂有寶壽生薑辣萬年之句流傳於世云庫司料理庫房錢物茶果等項以及公用醬菜等物皆其料理四要廉謹之人並掌倉庫鎖匙證義曰僧菴雜録云混源在紫籜為庫司精勤充執於庫房規則線毫無犯然猶恐有過復題其寮壁云滴水粒米盡屬衆僧務悅人情理難支破當思披毛帶角歲旦久長明因果人幸宜知悉庫頭專掌支發收檢一切食用等物蓋庫司下之任力任勞者也謹厚之人可充此執證義曰此執敘詞太略今遵他本以補之曰油鹽等物槩不亂發大衆食菜鮮醃有異照各家舊例以為準定一切執事發油並照常規禪堂草鞋五日一發行單草鞋三日一發朔望發各處油燭茶葉線香草鞋等隨報而發凡上供菜果俱五色唯影堂祖塔加湯點攢菜有齊發下院腐物庫內有事相幫料理照管門戶及諸器物要秉公無私之人可充此執米頭米到過數上倉篩淨沙穀不時照看勿使煤爛此執以勤力潔淨為主舂米精粗得宜勿雜糠屑稻顆令人難食又五穀糧食及諸用器俱務收晒如法庶不暴殄客飯客麵照例平發證義曰古者內外諸執原無大小六祖為米頭而得法莫以外單而輕也而充斯執者亦勿自小其量焉炭頭兼爐頭預備柴炭以禦寒事或問化主或出寺産須令足用亦勿浪費兼管圍爐小心火燭證義曰兼管圍爐者蓋公界圍爐易於光陰虗度各宜修道不得檢閲外書及書畫等不得談笑諍論不得烘焙鞋襪及彈垢膩於火中不得撥火飛灰不得久停亂擠須挨班進違者白客堂行罰印房掌理經書語録等板常要看視清理不致壞爛紊亂不許人私刻印記安板處須明暗適中近風日則易裂太陰閉則易爛凡裝印用紙用墨以及書面釘線等項俱以潔淨堅固為佳不得私索銀錢各種定價不得私意增減應用流水簿登記明白或按季按年交白住持結算此係流通法寶之執各宜發心盡力料辦因果不誣慎之勉之證義曰印房掌理刻印必須眼目明利識書邪正緣近日多有愛可癡僧強引佛祖遺言錮執邪見自以為是編為語録輒化檀信刻行倘若不識邪正曲狥情面一經刊傳誤人不淺山菴雜録云千江照直指圓休菴奕三人俱是博地庸僧絶無正見妄自刻語録又如暉藏主將金剛經每分析段妄為之頌刻板流通時恕中慍在桐谷暉來謁慍慍問暉此經以何為宗竟矒無曉此非欺世盜名而何當今名德尊宿護法士大夫遇有如斯疏録切宜斥而止之萬勿市情曲譽為之序跋當思謗大般若報在阿鼻凜之至於邪教五部六冊等書久奉嚴禁自不敢混行送入或有續出之書粧點佛祖言句雜入邪教妄謬之詞如鍊丹出神等類或將心經金剛經等荒謬注解附印流傳均難逆料尤當呵拒銷毀扶護正法以弭後患也擔運帶貼庫庫房外買物件并挑運柴米竹木等必要交收明白遺失照物數賠庫房有事間即相幫證義曰他本補云若挑物人多立一人領衆記管出則貫珠行歸則散步走領衆失管缺物罰照價賠凡路費泛濫混用者查出一賠十附常住財物出入規銘并條給共十八條愛惜常住物如護眼中珠興利莫若除弊盡公自爾無私信施脂膏沾染便成業海伽藍因果明察即是福基銘曰物屬招提絲毫難犯守在爾躬必敬必憚清若澄潭正如直幹無曲無私何憂何患一有差池龍天較勘監院是大衆所倚須發大好心扶持叢林弊端要革利益要興不可糊塗過日只圖虗名如所為悖理衆勸不從者罰已出院衆執皆有人充監院管何事須總理一切時時覺察處處巡行莫誤衆事若衆執有事俱白監院不白者罰誤事者出院若監院自專不與兩序共議輕則罰誤事罰已出院副寺出納常住財物等登記明白失記者罰牽混不明者罰凡田山等花利銀錢至通兩序同看驗過封記用時對衆開封私開者罰庫司管各色器物屬何務者交付彼本務明白彼退務時同監院等照前一一點明交代違者罰若失壞者記彼帳名令賠若忘記即代賠其賠銀仍買原物無混違者罰庫頭管諸物件內外出入當與而不與者罰不應與而私與者倍罰給發香燭油米果菜等不照規例狥私加減者罰買賣收租暗中索利者罰賠出院米麥等至查收明白即記帳聽用此係大衆慧命所關不許出還鋪店貨帳及糶如有違者大衆公擯一切財物若以公濟私及私情挪借易換不白明者賠罰飲食背衆及恣意多費油燭等物者罰飲食等不時揀點若以餿爛招病之物供衆者罰朽壞者賠償亡僧物不得誤用病人買物必與多寡從公違者罰各處應用之物如香燭之類預時置辦應時不齊者罰凡罰繳銀錢俱歸公用其免坡務仍歸坡務用混用者罰賠監修料理匠作器用凡物件出入隨手記明不記者罰失者罰賠如偷安不監查工匠及錯誤工帳不清者罰每月十四三十集兩序算帳書記報帳若失算者罰每年糧稅串票呈方丈收藏私藏者罰庫房執事凡交執須一一對衆點明交付新執違者罰年月日住持某甲重録以上第四寮竟證義曰按律部僧物有四種一者常住常住謂衆僧舍宅什物樹木田園人畜米麥等物以體局當處不通餘界但得受用不許分賣故重云常住二者十方常住謂寺中供僧成熟之飲食等物體具十方非局本處善見律云不打鐘食犯偷盜罪蓋明十方僧俱有分故也三者現前常住此有二種一物現前二僧衆現前但此物唯施此處現前僧衆故也四者十方現前常住謂亡僧之物體同十方以十方現在僧得分故毗婆沙論云盜亡僧物則於誰處得根本罪答云已作羯磨者於羯磨衆處得若未作羯磨者普於一切諸善說法衆得今詳分亡僧物十方來僧在羯磨數前即得羯磨後來不得也懶菴云此四種常住之物不可絲毫有犯其罪非輕先聖後聖叮嚀至切山僧或出或處未嘗不以此切切介意猶恐未至作偈自警云十方僧物重如山萬劫千生豈易還金口共談曾未信他年怎免鐵城關人身難得好思量頭角生時歲月長堪笑貪他一粒米等間失却半年糧托古云宏禪師秀峯祥公之嗣住啓霞山有貴人卜葬所親比柩至宏堅臥其穴不克襄事郡守仇待制遣人諭之曰千年常住一朝僧長老何苦爭耶宏曰不可以一朝僧壞千年常住竟寢其事僧值原無實位取僧衆輪值之義亦取僧中最直之意充此執者應不阿諛不委曲不回護不偏黨代方丈監當其所不及早晚出入內外大衆皆當嚴畏故亦名紏察自班首起至參頭止凡五日一換新舊交執在大殿晚課念佛畢舊僧值先請竹篦放佛座前課畢舊僧值行十方禮禮畢請竹篦下來對新僧值一舉交過一問訊新僧值受竹篦行十方禮禮畢各歸本處每早三板催點路燈從方丈以及各寮催衆上殿各處嚴查天明看開山門大衆過堂上殿照看門戶粥飯吃二堂兼禁放逸大衆出坡回安置各物如法晚課催衆齊上殿日沒少頃看關山門上鎖俟堂內起香催點路燈及各處琉璃二板有事客堂議事無事則已止靜後各處巡查四枝香開大靜後禁止點燈六枝香完看息路燈細看厨房茶房火燭凡遇禪七堂外事事料理此執母論住持及諸執事有過則舉有失即罰不順私情乃叢林公直之執必須居心如水執法如山方能使衆僧威儀次第出入循規坡事不怠坐香俱到過堂上殿齊集無誤鐘鼓分明內外有禮倘方丈不遵祖堂跪香大衆不遵上白方丈遵規處罰此執得其人即可恆充不須更換其請在齊堂粥飯時知客先將竹篦置齊堂中住持案前新僧值向上展具頂禮三拜知客至座前一問訊將竹篦一舉下對新僧值一舉交過竹篦對面問訊新僧值向上一問訊知客即將齊堂門外預備僧值燈籠親持交與其餘禮儀仍照請執事條所行證義曰所謂僧值者叢林人衆理須整肅故擇衆中之梗直不阿者為之檢點於其間事甚繁碎恐一人精力不及難於久在故令兩序挨次輪值是名僧值也至若關係叢林大事不可遲誤者無論內外執事皆得隨時經管有當言者亦可各𡥅所見直言無隱不必待輪僧值即住持有犯亦可在齊堂粥飯時對衆跪白所謂君有諍臣父有諍子若細小事務與衆無礙不害常住者即僧值亦當善權處之蓋人人不免小過耳禪宗祕要云唯佛一人無有過失餘人誰能無者弟子見師之過若實若虗其心自壞不復能得法利應作是念我先世福德不具足故不得值佛今值是雜行師我不應念其過失而自妨般若師之過失不著於我我但從師受般若法譬如狗皮囊盛好實物不應以囊故而棄其寶如弊人執燭照道不可以人弊故而棄其明自墜溝壑所謂依法不依人也若不可依勢難共處一期住滿我可他去胡用多言知衆為知客之首外應檀那內調大衆既欲和光同塵又須任勞任怨時察大衆賢否勤惰舉直錯枉不得愛憎不公凡客堂外單巨細事務留心照管凡送新執必開示彼本執所宜令彼警心以期稱執證義曰他本補云知衆正理客情及一切牌面有齊散䞋派理執事等凡送新執具茶送單問訊云云出坡催督避瀨并收理不盡坡務知客執典賓客凡客到或僧或俗不曾識面者無論高下俱要謙和盡禮請問姓號居處及其來意不可怠慢或遇可疑之人又當外禮內防不可一例輕信以致失事若遠僧求住或生客寄宿宜詳審來踪看光景體貌不可留者即好語却之儻若緇素上客至一面接待隨令照客通白住持然後引上相見次者就客堂欵待只宜閒談佛理不可妄談世事臧否人物餘見客堂規約所說證義曰知客一執須明曉世緣兼通文墨方可應酬無礙蓋來往雅俗不一故知客得人不惟佛法尊重亦使僧衆無譏不可忽也附列執照客料理外客房潔淨整齊客至伺候茶飯捧香信禮物到方丈交當值侍者客宿則照應單被等項並管客房行李燈火等事執掌鎖鑰若失物者罰賠凡侍客不許私索客送等事違者查出重罰凡知客陪客茶飯等事須殷勤站侍不得有失威儀凡呼喚即到前合掌恭立無事靜居本寮不得離遠茶點客飯等依知客語而行茶頭三板夜巡送燈燒開水面湯候殿主先打供水粥罷止靜燒開靜茶及四枝香燒開水午飯罷燒二板茶止靜燒開靜茶四枝足香燒開水晚課後燒開水候二板茶小靜茶四枝香茶如打禪七加六枝香八枝香開水有佛事不定照管洗面至天明復取湯洗面者不許除老病及尊客手巾宜洗潔淨非時索開水洗衣服者不聽行堂帶碗頭凡粥飯未開梆前齊鋪碗筯值日案上焚香盛菜飯不得粗蠢致碗磕作聲結齊畢方許收碗值日者吃頭堂候吃二堂人到值日行堂食罷淨碗筯須留心收拾失遺損壞者賠遇普茶到禪堂領茶壺茶鐘茶畢即還遇齊鋪蒲墩拜過即收齊畢貼齊單地三日一掃隨衆半坡值日看寮凡打禪七吃放參點柱燈鳴小板三下放參完收碗畢即息燈凡值日者免晚課誦餘隨衆門頭日夜照應門戶以時啓閉不得有誤出入人等留心照看防小人混竄偷竊物件或夜扣山門先通知同寮然後同開有尊宿官員士夫等將到速報知客遠方僧俗隨喜者勿拒值日者看寮守門不移步證義曰古有門頭偈云凡為門頭者見客便起迎切莫分貧富皆當禮待人門庭勤灑掃語笑莫高喧鄰里宜尊敬兒童須照看叢林門大開游人不必忌若故攔阻人無私却有弊黎明即早起既晚便關門小心防火燭定例不然燈既已充此執身不離山門將晚須嚴察休容生面存凡有經懺事照規給公䞋若再私索化察出定遷擯少年諸婦女莫與共閒談三寶清淨地切須避疑嫌乞丐匪僧輩休教入門來恐生叢林事亦恐不雅觀日中紛出入尚要常著眼夜靜若出入更要細查點莫道此執小門頭關係深眼明心細者方可掌山門附客堂規約二十七條擔囊負鉢本為參尋撥草瞻風曾無別事既垂見訪宜禁喧囂諸事安排百凡隨衆動靜凜乎人表閒忙卓乎衆先有法可嚴有儀可範如此法器可謂高流所有規約幸相共鑒客至茶湯點心單被一一調停若不識面即請問名號住處不得疏慢失誤違者罰值日知客不拘有事無事必須客堂靜候失候者罰早晚上殿若無僧值即知客照應路燈及大殿蒲墩並照管諸師站立行列如不到者查問公事有無誤者罰聞梆聲諸師過堂若無僧值即知客照應打板接滾板及站齊堂照應誤者罰遇班首秉拂或八節犒勞或兩序公幹出寺等須知客自請一次已然後使照客請官員來往帖到即差照客白住持知客先為侍陪奉茶乃至跟住持候送誤者罰凡二板客堂議事副寺舉買賣用費事值歲舉坡事悅衆報堂中事侍者舉白住持上下通事知客開時節人情當作一切大小等事議畢同白住持內外諸師有事白客堂值日知客理直置不理者罰若口角相爭白客堂者秉公直言如不服者請衆知客公議處罰倘再不遵公擯出院若徇私情斷事不公者一併議罰外遊閒雜人在寺閙事者知客協勸如值日坐視畏縮不前者罰知客無事過堂上殿出坡不到者罰除有疾病諸師出入不到客堂告假銷假者及在外閒遊放逸執事人知而不舉者同罰客堂一應事務或有專權自任或同寮互相嫉妬及私情偏袒者白衆同寮議罰知客雖非值日亦不得在外閒遊違者罰禪客至不得一例諸方耆德安上客房舊執回來素有功於常住者安上客房五日作客次安賢者寮遠來禪衲及久住者三日作客初參晚學一日作客即隨衆行事至於江湖混雜之輩早到一食晚到一宿即請別行不安客房混誤者罰別剎長老至請淨面更衣吃茶即報住持然後領見乃至齊畢巡單客方丈後安侍者一位餘安客房彼若參堂巡寮大衆齊禮法堂右設一座若看兩序另外看單彼不參堂巡寮大衆不禮唯兩序看單彼亦回看兩序施主設齊散䞋等事副寺協同知客公議如式齊供小食除客堂待賓客內外一例散䞋單䞋雙䞋照規客衆及法眷道友到者俱客寮暫住然後斟酌送堂如混送入堂者罰凡求住者令先看共住規約欲進堂者先看禪堂規約私商衆執察其立志的係參學好人可許安單若邪知邪見或粗野頑劣人皆不許入堂妨衆混送者罰客房牀帳等一切物件俱宜撿點如法不得私借一切外單及諸閒住如有以舊兌新者照一賠二不能賠者責已遷單凡有佛事命照客預掛牌失誤者罰凡書信至或禮物至問明送某處即登簿或當時收送交代仍將回書付來手失誤者罰客堂衆執犯諍閙者即時抽單逐出勿論是非或恃強偏見障礙同寮等執不肯和同商議有礙常住事倍罰出寮凡起單者細查單物防錯携常住物件如失誤者罰凡求戒者問其來歷并經律衣鉢香信席銀等俱齊備引彼見書記登簿若不如法而誤許者罰香信等見第七卷戒期條說俱如法已引見住持即送進堂先自禮佛行十方禮已次招求戒進堂禮佛三拜已次呼作禮諸師三拜拜已引禮呼求戒禮謝引進師三拜答云禮佛一拜即出堂應用人情錢物及公署禮節等須兩序同商議若執己見而行者罰失誤重罰僧值條例見前執事中明年月日住持某甲重録證義曰施主往來銀錢進出多從客堂手善惡因果昭然不爽行護云昔揚州白塔寺道昶掌知僧物自在侵用忽冥官數人白日入寺曳昶下地欲斷其頭昶驚呌乞命官厲聲言合房資財並送還僧當放汝活昶叩頭言不敢違命即鳴鐘集衆盡捨衣物造像設齊冥官三日復至見昶一鉢一衲不言而去昶自是勉勵進修卒成明行故寶梁經云寧自噉身肉不得盜三寶財物洞山價云常住須憑戒力扶莫將妄用恣貪圖掌他三寶門中物惜似雙親兩眼珠暗裏縱能機巧算冥中自有鬼神誅絲毫若也無私取免至來生作馬驢以上第五寮竟典座古云首座調性典座調命掌衆飲食勿視等閒一切供養務在精潔護惜常住不得暴殄就厨粥飯不得異衆粥飯上桶先望齊堂焚香拜已方發過堂餘如厨房寮規所說下皆同此貼案凡上供供菜須製熟得味不得先嘗不得用生菜等填底褻瀆佛神罪咎不小不得私造偏衆飲食若大衆菜及客菜應先嘗味使調和得宜不得粗心失味亦不得私做人情與者受者俱罰除病人要不罰此執兼打呼板滾板若無典座俱屬帶管證義曰按僧護經佛言汝見第二瓨者乃至為僧當厨軟美供養在先食噉粗澀惡者僧中行付以是因緣入地獄中作大肉瓨火燒受苦至今不息汝見第三瓨者迦葉佛時是僧淨人作飲食時好者自噉或與婦兒粗澀惡者持僧中行以是因緣在地獄中作大肉瓨火燒受苦至今不息飯頭香到開梆打粥飯先盛供次齊堂客堂山寮園房塔院老堂病堂餘外私給者罰夏季粥飯宜量人衆之去來扣水米之加減如有餘宜早調理不得致餿惡二飯即客飯頭每日料理小食飯頭相幫或客堂或侍寮報客數已入庫取米小食鍋粑歸庫房俟行單發心用客飯鍋粑照單三處輪日發一客堂二禪堂三方丈菜頭三時菜俱商之典座料理清潔切大衆菜一齊相幫勿使狼藉證義曰僧護經云汝見第一瓶者迦葉佛時是出家人為僧當厨應朝食者留至後日後日食者至第三日以是因緣入地獄中作大肉瓶火燒受苦至今不息火頭分大小執大火頭每早三板後燒粥鍋禪堂板香止靜燒飯鍋熟後仍坐管不許諸人取火開梆後無阻小食客飯亦大火燒晚粥同小火頭候禪堂送香燒菜鍋小食客菜小火燒有齊煎腐若蒸饅頭一齊相幫凡除火即掃竈前謹防火燭竈下不得積薪每晚收拾打掃乾淨烟惚內每月朔掃一次證義曰僧護經云汝見肉樹迦葉佛時是出家人為僧當薪以衆僧薪房中自然或與知識以是因緣入地獄中作大肉樹火燒受苦至今不息又禪宗祕要云西域達摩密多尊者智慧深遠功德具足善能通達三昧定相南天竺國有二比邱心意柔和素樂善法聞尊者坐禪第一即共相將往詣其所於其住處有三重窟爾時二人至下窟中見一比邱著弊壞衣形貌醜陋端坐竈前為僧然火時二比邱問言長老達摩密多為在何處答言今在最上窟中汝等宜可急往見之爾時二人進至上窟見向比邱已於中坐時一比邱語其伴曰此老比邱云何乃似向所見者時伴比邱聰慧機悟即語之曰今此尊者尚能流布名聞豈不能至此而坐即前為禮問曰大德威名世間希有何故自屈為僧然火達摩密多曰子今當聽我念生死受若長遠若使頭手可得然者吾當為僧而盡然之況餘身分及以然火何足為難吾念往昔五百世中常受狗身飢窮嬴乏未曾再飽乃於昔時值一人醉嘔吐委地我食得足又昔曾有夫妻二人糜熟出外我見無人頭入器中食糜得足頭不得出夫妻回家瞋食其糜即斷吾頭於五百世受斯狗身雖一飽滿而失身命以是思惟生死長久周遍五道受苦無量故吾今者不憚勤勞躬為衆僧而自然火時二比邱聞是語已深觀生死無量過患應時逮得須陀洹道水頭掌理厨房茶房及各堂缸水常令盈滿清潔所應需用勿使缺乏亦不得慳護不與或更嗔怒水桶挑畢即覆夏月用濾水囊置傍以便濾用隨衆過堂尊客往來兼挑行李須親交明力金照常住舊例私索校量者罰證義曰僧護經云汝見水中立人迦葉佛時是出家人為僧掌水見僧用水小復過多逐可意處即足其水餘者不給以是因緣入地獄中水中獨立唱言水水受其大苦至今不息磨頭有乾有水乾者磨米麥等隨庫房使用水者作豆腐等凡磨事須收拾潔淨不得狼藉踐踏或私與人者罰雜務兼桶頭淨齊堂桶收供飯桶淨器皿淨鍋大衆油醬客菜作料聽典座貼案語入庫聽發厨房人吃飯雜務行堂菜頭行菜凡厨下應做之務不得推委及勤換洗器水香燈打掃厨房內外打茶催本寮人課誦上殿除公事若止靜不到者白典座朔望到庫房取厨神供果香燭及厨用茶葉厨房十執須壯健有公忠道心者充之附厨房條規凡十條寸薪粒米當知來處之艱難滴水殘虀須念作時之非易既不肯暴殄於天物更當思調和夫衆口酸醎適味香軟得宜慎重烹飪勿生輕忽以供養為懷不貪果腹雖隨衆作務常抱道心粥飯三時不得一朝失誤晨昏二課何妨數刻清修銘曰雪峯飯頭溈山典座古德芳風於今未墮攝爾狂心慎爾口過運水搬柴母忘者箇堂內坐禪堂外禪坐誰知傳衣不離碓磨故此行門佛天所喜求福則得造業則失勤謹廉隅求福之本偏衆懈怠造業之基謹遵規銘為汝良師厨房共住者粥飯小食俱在厨下同衆甘苦一槩不許別處私食及私留鮮美自食者罰早課不上殿者罰竊取常住油米食物者倍罰出院菜頭洗切大衆菜聽典座調理辦齊等事一齊相幫不到者罰飯頭煮大衆粥飯洗鍋二飯相幫擡飯器俗呼飯匾飯器亦飯頭洗有齊開大鍋飯頭三人隨宜分派推諉失事者罰貼案收拾客菜小火頭燒火雜務洗鍋留私菜者重罰照應開梆接板及神前點香失誤者罰雜務到庫房取客菜偷取私留者重罰出院除當值坡課不隨衆者罰厨房高聲大呌者罰飲酒賭博者重罰出院新增吃烟者罰設齊日頭堂所剩腐菜晚粥再供大衆不得棄擲違者罰不得將滾湯潑地上傷蟲蟻命違者罰香燈照看衆人行李失則罰賠年月日住持某甲重録以上第六寮竟證義曰三世佛祖皆從行門而出如雪峰義存禪師初在德山會下充飯頭後主雪峰為一千五百人善知識潭州溈山靈祐禪師初在百丈會下為典座後居溈山亦領衆一千五百故今規銘舉此二人以為行單勸發并見古人序列原無上下內外之別也雲棲法彚云邇來年少十指不點水百事不干懷坐香則曰腿酸行行則曰腰痛早夜勤修則曰吾體弱多病或詰之則又曰愚者用力智者用心愚修福智修慧噫果若是言將見迦葉以頭陀愚六祖以米頭愚雪峰溈山以飯頭典座愚至佛不捨穿針之福得無佛亦愚耶又崇行録云宋雲居簡初謁膺膺與語三日大奇之而誡令刻若事衆於是簡操井曰司樵㸑遍掌寺務不妨商略古今噫古哲高風如此聞之令人興起然此不獨為厨房十執勸一切行單皆當知此義值歲正理坡務耕種收租等事有事二板赴客堂議事兼管常住竹木或修房屋必須用大材料者果衆議僉同上白方丈奉命然後斫伐若私伐一株罰賠出院或私行售賣及私情與人者倍罰出院於一切坡務耕種收租等怠惰偷安不實心辦理者罰出院證義曰他本補云夏備梅雨一月之柴冬備陰雪數旬之㸑最為要緊斫伐柴薪須要擇地并留樹秧以俟長發凡柴頭上山斫柴大衆出坡等皆要親到不得偷安刀斧繩索匾挑等物時時檢點慣住深山者可安此執知山管田名知田總管名知産須識常住産業界限分明不得侵混他界以致爭訟每年春季會兩序衆執同清理界限一次田畝應時開懇種植怠慢者罰若有私弊倍罰出院花息成交親到庫房交收明白凡新受斯執客堂庫房及前執領看界限認熟吃二堂粥飯以防偷竊若拿獲偷者送至客堂辦理不得私行拷打致釀事端巡山隨知山行事竹木茶筍等皆所照管凡有偷竊竹木之人不得私自放走查出重罰粥飯亦吃二堂柴頭即小工每日斫柴若干為定多則加錢少則除帳全日不斫扣除飯錢若開山斫柴商之值歲知山不得硬自作主柴薪不得私賣查出罰賠刀繩傢伙俱自辦遇亡僧輪流擡棺收力金并辦應用柴薪此執多俗人為之山寮香燈打茶水粥飯火缸越三日到庫房取草鞋朔望取香燭茶葉上供入厨庫取供打掃本寮看行李如有失誤者賠附山寮規約凡七條夫山阜為一寺之龍脤林樹為一寺之庇蔭木竹花果僧坊所資土嶺石峯風水攸賴一切無損則合寺興隆僧衆適悅而安於居矣所以一切竹木不可忽亂砍伐一切土石不得任便採取此山寮大綱也其餘規條開列於後巡山不論風雨時在山中四圍上下巡查不得偷懶致有盜取等事如懶惰偷安者察出重罰山中竹木花果柴草不得私賣如犯者重罰出寮小工須聽知山吩咐砍伐柴木枝條不得任意伐去樹頭或伐盡不留遺種違者罰小工若常住有事即聽呼喚如違者罰山寮賭錢不論僧俗犯者出寮山寮相打相罵不論僧俗犯者出寮知山管理山寮諸人須賞罰均平如偏私者罰年月日住持某甲重録實貼山寮證義曰凡附近叢林竹木與山門作景致宜畜培茂盛護持龍胝蔭藏風水則叢林日茂山氣日靈不惟人傑亦壯觀矣知浴正理浴堂兼管病人湯藥等事或但管浴室中什物所用柴草等須預備乾燥此屬序執附浴堂規銘凡十三條蕩滌盡也未是本來面目盥沐潔矣終非無位真人未達色空秪道塵來身外了知冷暖方明自性本靈果有一絲不掛底禪客正好向這裏摸索銘曰山巍路遠致其柴薪瀹金燃火效其勞勤昧者不知浴事偏緊年少嬉笑沸湯交淋凡此暴褻永宜自針洗心滌慮日新又新何以報德忽悟水因其或未然且遵規銘凡浴日淨頭挑浴水深五寸知浴料理然火水熱設監浴公位已焚香默禱聖僧臨浴少頃先請住持次請尊客三擊梆三下頭首兩序四鳴頭通梆禪堂等堂師五鳴二通梆列執六鳴三通梆客舊普浴不候梆聲強入者罰尊客至或為經懺等燒浴者先尊客次懺師及香燈并作用人次重務擔力人後普浴自穀雨至夏至五日一浴夏至至處暑一日一浴處暑至秋分五日一浴秋分至穀雨半月一浴浴室內掛小板一塊湯冷鳴板二下湯熱鳴板三下須添水鳴板一下不得高聲大喚違者罰凡浴者各宜聽梆次序不得參差其執單年幼者在最後違者罰左右顧視及談笑嚷鬧涕唾等罰脫衣穿衣各宜回互不得肆縱違者罰浴時各宜自諒不得堂中久戀致礙後來違者罰用皂角者罰有瘡癬各宜回互後浴不得在前違者罰僧值監浴留心照察有犯者照例罰之失照者罰年月日住持某甲重録實貼浴室外牆證義曰佛制浴室濯其色身堪以載道佛敕布薩沐其戒身定慧發生倘臨浴放逸則身垢未淨心垢先生是無慚愧人也又為僧者遺尿澡浴須避天光洗浣下裳勿晒當路按佛祖統紀僧如寶在霅川覺華寺聞古德有以浴僧功德回向淨土者遂治浴室供衆僧至年八十一請衆啜茶言別而逝據此可見知浴一事功德良多或從慕化或出常住隨宜施設不可缺也淨頭三時過堂時關鎖後門四板點路燈課誦上殿時挑各處淨桶北方多不用淨桶只用圊房須打掃潔淨勤換洗手水洗晒手巾晚課罷送各處淨桶凡浴日若無知浴即行代辦照浴室規約燒浴鍋或園頭帶此執亦可證義曰圊廁最穢而淨頭稱者兼有事理兩義事則律中多以破戒懺罪比邱為之謂其常打掃穢處潔淨能令衆僧歡喜以除破戒垢穢而還得清淨戒也理則大乘止觀云凡大小便利亦有止觀所言觀者當於穢處作是念言此等不淨悉是心作有即非有我今應當變此不淨令作清淨即想此穢處作寶池寶渠滿中清淨香水或滿酥酪自想己身作七寶身所棄便利即香乳酥密等復知此淨相唯是心作虗相無實是名觀門所言止門者知此不淨之處及身所棄不淨之物唯是過去惡業熏心故現此不淨之相可見然此心想有即非有唯是一心平等無念即名止門問曰上來所有淨不淨法雖是心作皆由過去業熏所起何得現世假想變之即從心轉答曰心體具足一切法性而非緣不起是故溷中穢由過業而得現寶池酥酪無往緣而不發若能加心淨想即是寶池酥酪之業熏心故淨相得生厭惡之心空觀之心即是除滅不淨之緣淨熏心故穢相隨滅此蓋過去之業定能熏心起相現世之功亦得熏心顯妙用也如此於大小便處假想熏心而改變之其餘一切淨穢境須如是假想熏心以改其舊相故得現在除去憎愛云云蕅益云便利穢作淨想則能除憎受食淨作穢想則能除愛憎愛悉除便成漏盡假想純熟法隨念轉出世方便孰過於此若能悟此淨穢本源則可以悟大千世界不在心外從此垢盡心淨不知吾身之為法界法界之為吾身我身法界非一非二則三毒自去罪法自除也此非唯為淨頭者當作是觀一切人皆可作是觀知屋帶知器凡殿堂寮舍厨厰各處屋宇時時看視或漏者宜早修蓋或修或造預白監院及時整理老祖塔及塔院下院乃至道路沖塌器皿朽損商之監院客堂速為修理凡遇修造一切門向皆須慎重不宜輕改若實不得已須請高明堪輿看過方可凡池井不得亂填亭閣不得亂造竹木不得亂斫地土不得亂掘若故意執拗填掘造斫破風水者知屋與主事執同罰出院若住持硬作主者兩序統同內外法眷公議若剛愎者另換住持監修乃知屋之副執若無知屋則監修正理修造督管匠人及諸工帳財物木料等事此執須習於工作老成練達者充之此二皆序執此條證義見前住持章修造僧坊條說化主種種不同凡叢林淡薄無産或遇荒年糧不足當請米麥化主或係大修殿宇當請修造化主此外更有菜化主鹽化主草鞋化主香燭化主等凡化主募化財物各認地方弗使重疊惟須隨喜樂助不可勉強如下順人心即上合佛心矣語言應對切宜大方若有私毫苟且倍罰出院總之必不得已始行募化若其可已即不必立此執如有私在外冒名募化者立擯出院以上第七寮竟證義曰邇來叢林多安化主廣給募疏住持讚美牢籠執事獎勞崇敬遂至矜功欺衆把持當家或畜私財大錯因果退息檀信佛世有諸弟子自遠遊歸所過聚落望而閉戶問其故謂畏衆僧之募化也噫可以鑒矣不知所謂化者以德化人之謂非只募人財物之謂故宜顧名思義華嚴淨行品云見不捨人當願衆生常不捨離勝功德法見能捨人當願衆生永得捨離三惡道苦據此二偈於不捨人尚發慈心豈肯於已捨財存利己意作化主者其知之化飯此執與前化主不同此但化飯也猶有乞食之遺意化允作記以交收供此執多與人熟識不可因此閒遊閒語或管人事務或到他家屏處與女人說話寄物往來等犯者罰證義曰化飯亦名化主此執多近俗人故誡其不可屏處與女說話外避譏嫌內護自心法華經云若有因緣須獨入時但一心念佛若為女人說法不露齒笑不現胸臆乃至為法猶不親厚況復餘事此金口切誡又華嚴淨行品云見嚴飾人當願衆生三十二相以為嚴好見無嚴飾當願衆生捨諸飾好具頭陀行乃至云見端正人當願衆生於佛菩薩常生淨信見醜陋人當願衆生於不善事不生樂著夫嚴飾端正於女相為多故此四偈為化主者所當切記非唯化主乃至一切僧衆亦當切記也收供即收擔此已化之飯人以此飯供僧僧即以此飯供佛故謂之收供此執多係發心苦行之人充之亦有兼利而為者蓋今叢林中多係將此飯計斤給錢若干假如收供每日能擔三四十斤即可得錢若干錢因力取尚無大礙況因此供養大衆即有功德唯當實心實力行之餘見下規約說收圓滿飯客堂請大衆師幫挑或小工挑元旦日每人領監院單帖若干初二日清晨上方丈吃飯菜六色銀六分出門送帖賀施主年凡常住稱飯單銀每斤二分半算每季首初十內外請僧值客堂衣鉢監發庫房知客登帳每月散給草鞋豆腐錢一人六十文初二一半十六一半有齊俱到齊堂隨衆證義曰既充收供之執以代衆僧乞食之勞當因收供之事而究自己修性之義夫佛世芳規唯乞食為正命食梵語比邱此云乞士所謂乞者內乞法以養性外乞食以資身乞食資身見下分衛條說乞汝養性者我乞即通於彼乞華嚴淨行品云入里乞食當願衆生入深法界心無障礙到入門戶當願衆生入於一切佛法之門入其家已當願衆生得入佛乘三世平等據此三偈則事顯義幽正好參究所云入深法界者即俗顯真即事明理法界即衆生身心之本體也從本已來靈明廓徹廣大虗寂唯一真之境而已無有形貌而森羅大千無有邊際而含融萬有昭昭于心目之間而相不可覩晃晃於色塵之內而理不可分非徹法之慧目離念之明智不能見自心如此之無障礙也此謂入於一切佛法之門此之謂得入佛乘三世平等如是乞法養性終日收供而不見所收之供終日勞苦而不見勞苦之相其於福慧豈可思議此所謂收供之義也附收供寮規凡十八條三世諸佛皆從行門而出況收供一執帶水拖泥衝寒冒暑誠非真心供衆常懷道念者難任此執古人云收十方施主之供增彼福慧齊十方僧侶之衆成其道業非發大願者不能既發願行此須要豎精進幢被忍辱衣乘久遠輪懷利濟心則將來福報自然過人第恐日久弊生放逸念起將成佛因為地獄案悔之晚矣故須清規以保其志今特派寮首二人早晚出入秉公警察有過必舉小則白客堂大則白方丈若寮首知而容隱被餘執察出者同罰規條如左各宜遵守在外誹謗常住者重罰出院收供回洗足歸寮靜坐不得閒談闖寮違者罰同行人互相吵閙者重罰飯桶每年新正一修如任意損壞屢索修整者罰挑唆鬬爭攪羣亂衆者出院凡有事務先白頭單轉上方丈違者罰私募財物或以飯易錢米者出院因辦私務致荒廢飯者罰風雨寒暑失飯擔者罰在外與人爭鬬生事者罰將常住竹木花果等物送人者罰飯食不隨衆過費常住薪水及私運柴薪寮內私造飲食者罰無故一日不收供者罰如飯數若有病自請人代至半月不愈交擔違者罰私留僧俗寮內食宿及私行在外過宿或將飯與人者罰寮外高聲語笑夏月赤膊拖褲違犯寮規頭單不舉者同罰不候開梆擅打粥飯及三餐餘食菜飯不即回厨房過時回出者罰年月日住持某甲重録實貼在收供寮中堂證義曰佛世分衛乞食乃為正制惟今東土所施甚微數家不足供一僧之食又僧衆多雜漫無威儀若齊遊乞未免駭衆且妨道業故立斯執代衆行乞也然收供既代衆勞衆僧何以安享故律制受食須存五觀五觀者一計功多少諒彼來處二忖己德行全缺應供三防心離過貪等為宗四正是良藥為療形枯五為成道業應受此食由是五觀相應增進道業可成所謂身依食住道由身修也如此庶不虗消信施不然難免償還禪宗祕要云昔提婆尊者得法後至迦毗羅國有長者名梵摩淨德一日園樹生耳如菌味甚甘美唯長者與第二子羅睺羅多取食取已隨長餘親屬皆不能食提婆知其宿因遂至其家長者問其故提曰汝曾供一比丘否然此比丘道眼未明虗沽信施報為木耳唯汝與子精勒供養故得享之提問長者年多少答七十九提曰學道不通理轉身還信施汝年八十一此樹不生耳後如其記梵網經云寧以此口常吞熱鐵丸及大流猛火經百千劫終不以此破戒之口食信心檀越百味飲食云云此諸佛誠言僧受供者宜自思之莊主亦名靜主乃靜室之主也俗呼下院當家凡莊田一切事務俱其專主田界莊舍農具悉屬檢點修理些小事體隨時分遣或關大體須白常住定奪收納租例一以公平勿致主佃互虧如更換佃戶先要查明佃人好歹白常住商定始令領田勿得貪小利而以私心俵給致貽後患監收凡出入租息穀米等物詳細交納勿得舛錯以多報少以少報多凡收租事皆其執此莊主監收二執其弊最多須廉正耆舊發心輔佐住持者充之古規莊主監收皆係列執今改為序執矣證義曰僧護經云汝見第一地者迦葉佛時是出家人衆僧田中為己私種不酬僧直時持律比丘依戒呵責汝今云何不酬僧直是人爾時依恃王勢不受教誨答諸比丘我是汝奴汝若有力何不自種以是因緣受火地獄苦至今不息汝見第二地者迦葉佛時是白衣人在僧田種不酬僧直以是因緣墮地獄中作大肉地受諸苦惱至今不息園頭經理園地四季栽種不可荒蕪一切物産以時灌溉勿致有名無實不濟大衆凡時鮮瓜菜等不得私行先食或將園菜私賣私送查出重罰證義曰華嚴淨行品云見修園圃當願衆生五欲圃中耘除愛草據此一偈即事顯理為園頭者非唯盡力耘種亦可發大心而致於悟大道按禪書昔梁山觀和尚會下有個園頭參得禪衆中多有不信者一日有僧去撩撥他要其露個消息乃問園頭何不出問堂頭一兩則話結緣園頭曰我除是不出問若出須教者老漢下禪牀立地在比及梁山上堂園頭果出問家賊難防時如何山曰識得不為冤頭曰識得後如何山曰貶向無生國裡頭曰莫便是他安身立命處也無山曰死水不藏龍頭曰如何是活水龍山曰興波不作浪頭曰忽然傾湫倒嶽時如何梁山果然從法座上走下把住曰闍黎莫教濕著老僧袈裟角大慧杲曰須知悟底人與悟底人相見自然縱奪可觀噫彼亦園頭也出語令人可與邇來胡為不然附園房寮規凡九條捨身勤勞如法栽種園有四時不斷之蔬地無三尺未墾之土日日勤力灌溉朝朝黽勉耰鋤上供三尊積來多少功德下充衆口結就普遍因緣當思盡執毋自怠荒所有寮規允宜遵守私賣蔬菜等物者責擯私情送人及私食者罰賠遺失器具傢伙種子等物者賠頭單領衆種作如有躲懶偷安或出外遊蕩或不聽調遣者責擯出寮除頭單每人輪值日打粥飯茶水若推諉者罰澆灌失時有名無實者罰各寮私取菜瓜等物頭單容情不白常住私許者同罰招留僧俗到寮內私與粥飯者罰吃葷酒賭錢等事者責擯如上條約若有犯頭單應舉知而不舉者同罰年月日住持某甲重録實貼園房證義曰按律中自種田園殊違佛制然末法之際資生艱難有不得不然者惟既領此執當思大衆色身攸賴即慧命所關實心管理實力勤作庶幾無愧福報亦多若能以此田地喻我心田心地則福慧可兼如華嚴經第七十七卷彌勒贊善財偈云善財見衆生心田甚荒穢為除三毒刺尊求利智犁今仍以偈釋我心如田園諸種靡不納青黃與白黑隨其所種生菩提譬嘉禾種之即有秋持戒為彊理忍辱勿忘助布施以糞溉精進以耘智慧為雨露及時資潤澤治心如治田荒廢芽乃焦若不違斯喻是名知田園附下院執事約即莊主園頭另住之處就稍遠者言故名下院凡九條夫下院雖係行行之地亦宜不忘薰修庶不辜負出家之心莫謂執事之外更無所營須知運水搬柴無非佛事舂米作飯正好參求古來行單中知識高人不少即稟性愚魯念佛個個皆能須各努力莫負初心既為一家法屬即應恪守祖訓幸相體悉無忝家風施主到一切物件下院當家細心經理一一照數暫停即使工人通信一面照應施主如法禮待共住規約與常住同一例遵守如違者罰莊主貼案園頭火頭水頭雜務共六執每一執每月鹽米若干每季單銀若干隨各家定式有齊雙䞋莊主凡下院大小事俱其專管責任綦重除公事不許出外早晚領衆課誦不得放逸不許私情留客食宿一切執事人等有過輕則教訓重則白常住議罰貼案料理下院大衆菜飯開梆打板灑掃厨下與水火頭俱隨衆課誦園頭料理園地應時種植不得怠惰荒蕪兼帶淨頭并燒浴鍋火頭息炭謹慎火燭雖寒槩不許取火違者白莊主罰水頭兼破柴雜務兼行堂及諸洗掃并管門戶聽往常住取物常住執事唯監院副寺知客監收等有事許在下院食息其餘槩不許攪擾違者莊主白常住罰年月日住持某甲重録實貼下院證義曰下院路隔稍遠同其艱辛雖未廣納衆賢實乃大小一體或曰下院既充執作心無二用清規中令其熏修何謂也答曰若以靜坐默觀為是舉止執作為非者未免觸途成滯雲棲崇行録云宋圓照本禪師參永安升升道崇重衲子歸者如雲本敝衣垢面操并曰典炊㸑以給之夜則入室參道升曰頭陀荷衆良苦亦疲勞乎本曰若捨一法不名滿足菩提必欲此生親證豈敢言勞蓮池師云掌衆務而不礙商量古今典炊㸑而不妨入室參道今沙門袖手受供曰吾辦道者也彼行務者也是何其與古異也故道日衰矣以上第八寮竟寮元前之各寮列執各附序執後今此一科不涉諸寮故另列於此古者掌衆寮之經文什物茶湯柴炭請給供需灑掃浣濯剃髮椸巾之類今則專主旦過堂亦名雲水堂凡客師到以禮相接一東一西送單指示客師規約常住道風住人臧否皆在寮元須擇老參修行者為之附旦過堂規即雲水堂凡十三條者裏放得下不妨當處知歸明日又擔去依舊石頭路滑暫投一宿賓主歷然入衆三餐精粗須辦溪山各異終非究竟因緣雲月雖同未是到家消息個中不了寸香聊供同參白業兼修二課切須共到可住即住慎勿虗延欲行便行毋勞擬議須知負笈擔簦為明己事勿以形勞而少安勿以力倦而多懈雲堂禪堂要具規模無二自心自性何妨隨處提撕所有規條謹列於左本堂安單一東一西凡課誦坐香止靜等並隨禪堂規式早午二時板香晚間四枝香開大靜後放參違者罰日逐祇圖在外間遊者罰睡眠時談笑者罰近午到午飯隨衆近晚到晚粥隨衆時過始到補吃晚到一宿次日午飯即行天雨待雨止有病待病愈輿疾至者審其來歷分明方納即寫板帳另簿記衆中有不守清規者寮元善勸不聽即白衆查明跪香不服者白客堂遷單若不白衆徑自亂嚷亂罵者罰亂打者重罰本堂香燈師照應客師茶水如無寮元即為帶管隨喜出外久不歸堂者罰聞普梆不隨衆出坡者罰威儀不整肅者罰吃烟者罰新增吃酒者出院議論諸方知識長短好惡者罰好逞機鋒者罰過堂上殿不搭衣者罰除未受戒若去時察衆中有單身老弱可虞者白客堂方便護送遇有來踪詭異言辭閃爍人即須縱細查問恐有匪徒托跡致啓禍端顢頇失察者罰年月日住持某甲重録證義曰十方衲子有依止行腳兩種依止者棲以禪堂行腳者安置雲水其中有明徹大事隨緣行腳者有己事未明尋師訪友者有機緣不對另參知識者有朝山進香隨喜結緣者有性喜雲遊不專為道者既到此地總須接待充寮元者當盡心照應所謂有緣共住理合和平寬厚方能接度同參如果真為生死發心辦道者領向客堂討單客堂即通白住持送入禪堂或餘寮蓋叢林與衰唯在得人則六和共住外無間言至於堂名旦過者取其晚到二宿次日午飯即行之意今改名為雲水者則取其去留無定之象也閒住即空住寮房無執事之閒僧乃耆舊之人耆則老年舊則曾久充執事有功常住者也須全坡老年則免凡課誦隨衆若進堂坐香照堂規行齊堂受食及課誦繞佛在禪堂執事後無事不得亂闖蓋古之叢林無單寮獨榻故此寮房只許年老無歸或久充執事而力疲告退者居之然亦必閲藏念佛禮拜者方准否則不准也證義曰僧護經云汝見第一肉𤬪者迦葉佛時是衆僧上座不能禪誦不持戒律飽食熟睡但能論說無益之語精肴供養在先飲食以是因緣入地獄中作大肉𤬪火燒受苦至今不息附耆舊堂規耆舊與耆宿異舊乃年老久住之人宿是長老有德之類叢林耆舊堂者古之東堂也俗呼老堂凡進此堂須生慚愧當想此身目暗耳聾髮白面皺背傴腰曲骨痛筋攣步履龍鍾精神昏塞故知此身不久必赴死門前路茫茫畢竟何往若果己事成辦何勞多言其或未然守規念佛年滿七十在寺慎修無過者方可送入八十者量處九十者不論量處者隨宜不論者徑送老人所需湯藥飲食等庫頭飯頭典座執吝不與者罰實不該與對衆辨明若私意厚薄不公者罰老人無齒若生硬不能隨衆宜另與軟熟食物老人衰頺早課來否不論晚課隨衆不到者罰八十者量處九十者徑免在堂中屢屢諍嚷及外遊生事者出堂老堂香燈較別處為辛苦除點燈打水灑掃浣濯更加扶老煎藥等事故須精壯力健發心事老者充之既充而怠惰偷安者罰年月日住持某甲重録以上第九寮竟證義曰耆宿德高臘長之稱也此處只可稱耆舊唯臘長耳毗尼母論云從無夏至九夏名下座十夏至十九夏稱中座二十夏至四十夏號上座五十夏以上僧衆所尊總稱耆舊此依受戒年次論准二十歲方受戒故年七十耆舊位也然叢林之設原為老病禪林寶訓中高菴云貧道嘗閲藏教諦審佛意不許比丘坐受無功之食生懶惰心起吾我見每晨持鉢乞食不擇貴賤均可植福後稱常住本為老病不能行乞者設非少壯可得而食逮佛滅後至我中國推能者為之即收供也所得利養聚為招提以安廣衆今聞數剎住持不識因果不安老病背戾佛旨削弱法門苟不住院老將安歸昔世尊在日或不赴請遍巡僧房看視老病一一致問仍勸比丘遞相恭敬云云此即慰老病楷模殿主早四板供淨水焚香聽大鐘完點燭開梆供粥鳴磬三下粥罷拂拭塵埃嚴潔几案灑掃佛殿及廊下丹墀香客香燭有餘留備課誦應用不得私賣私送午梆供飯晚點琉璃朔望及節日早課預送鐺鈸小鼓在殿凡上供取供回供有經懺到衣鉢寮領莊嚴法器一一點明鋪設整齊小心照管燈燭經懺畢一一點明交還原處出半坡佛聖像半月一拂拭一年一浴依浴佛規見前若帶鐘頭見下第九法器說法堂香燈打掃法堂內外潔淨住持行禮鋪蒲團早晚焚香然燈晚點兩廊路燈開大靜熄早晨四板點天明熄遇上堂掌擂大鼓坡事半坡隨衆過堂課誦藏樓香燈早晚焚香然燈打茶水灑掃看閲藏諸師行李吃二堂遇上堂鳴大鐘凡上供取供回供餘與法堂香燈同內塔主唯管佛塔香火灑掃等事隨衆上殿過堂有薰塔者一切料理無佛塔處無此執外塔主打掃一切祖塔及時拔草晨昏勤事香火凡清明等上供例與前諸香燈同凡亡僧入塔料理如法倘外方入塔須白客堂而行若受私禮而偷入者罰祖堂即賢者寮香燈每晚定香止靜等事與禪堂同餘與藏樓香燈同餘處香燈事雖各異然燈燒香禮敬皆同早晚焚香潄口洗手次誦爐香乍爇香讚已接誦呪曰唵什筏栗多末你阿鉢羅句吒蘇破囉尼毗迦知虎𤙖三遍次誦獻香呪曰唵薩婆怛他揭多杜婆布闍瞋伽三慕達囉窣囉拏三末曳𤙖三遍敬香誦呪想此香雲遍滿十方佛剎一切聖賢咸起護念所謂爐香乍爇法界蒙熏諸佛海會悉遙聞隨處結祥雲誠意方應諸佛現全身若先然燈或焚燭當誦獻燈呪曰唵薩婆怛他揭多你婆布闍瞑伽三慕達囉𥦑癹囉拏三末曳𤙖三遍敬油燈或燈燭亦誦呪想起燈雲至各聖賢之前所謂玉燭乍輝法界普光誦此三呪則然香焚燭能滅罪消灾增福無量若不誦呪觀想又無誠心雖焚香燭恐三寶天神亦不受矣證義曰殿主為衆香燈之首領代衆僧勤事佛陀者也餘處香燈義亦同此香花燈塗果樂六種供養中以香燈為名者五濁穢世臭不可聞當夜暗時黑不可見欲求三寶天神常居於此護念我等故常焚妙香以解其穢遇暗然燈以明其物使無臭暗之障而成微妙之香光明之臺此香燈之義也故此執全在心誠方成敬獻所謂香從心生心由香達不居三際可遍十方燈照佛慧照心易明至理又必賴誦呪心想而成方盡敬獻乃充香燈之大要也此不獨香燈為然一切人皆宜如是不但三寶如斯凡敬天神皆宜如斯金光明經四天王品云是妙香氣於一念頃即至我等諸天宮其香即時變成香蓋其香微妙金色晃耀照我等宮釋宮梵宮乃至諸佛世界於諸佛上虗空之中亦成香蓋金光普照亦復如是華嚴經賢首品云又放光明香莊嚴種種妙香集為帳普散十方諸國土供養一切大德尊又放光明未香嚴種種未香聚為帳普散十方諸國土供養一切大德尊據此全賴誠心觀想以為供養則一瓣香遍滿十方成光明毫奏天音樂焚天寶香呈天肴膳設天寶衣演大法義一一互遍彼彼無礙唯誠心觀想所成如是朝夕進香如是朝夕課誦如是念誦禮拜如是懺悔求願則三寶天神感應如響是以每日恆用香花燈水朝夕承事當極誠敬其所得福報不可思議又凡誠心然燈以感勝報者如闍王受決經云王請佛飯已曰更復何宜耆婆言唯宜燃燈王敕具百斛麻油膏從宮然至祇洹時窮母感激乞得兩錢買油主曰母大貧何不買食母曰今見王作大功德雖實貧窮欲燃一燈作後世本主嘉益三合凡得五合計不足半夕誓言若我後世得道如佛膏當通夕光明不消明旦目連以次滅燈母一燈三滅不盡乃以威神引隨嵐風吹燈燈更熾盛佛告目連此當來佛光明非汝威神所滅此母宿命務以經法未暇修檀故今貧窮却後三十劫當得作佛號須彌燈光如來又施燈功德經云若人於佛塔廟施燈明已臨終得三種明一者臨終時先所作福悉皆現前憶念不失心生踊悅二者因此便能念佛能行布施得欣喜心無有死苦三者因此便得念法之心又臨終時更得四種光明一見日出二見月出三見諸天四見佛坐菩提樹及見自身合掌敬佛見四種已便生三十三天華嚴賢首品云又放光明名照曜映蔽一切諸天光所有暗障靡不除普為衆生作饒益此光覺悟一切衆令執燈明供養佛以燈供養諸佛故得成世中無上燈據此香燈一執速能成就無量功德巡照有日夜之別日巡是序執正管常住雜事相幫僧值不時勤催各處打掃潔淨不許僧衆在山門外遊戲凡官長至預白客堂隨吃二堂夜巡是列執日暮定香候香到鳴三板送茶房燈開水好鳴四板點厨房燈停一寸香五板定香須準如遲早失時者早粥過堂時罰跪齊堂日課聞大鐘三下打催板普佛亦然晚課聞禪堂報鐘三下打催板課誦隨衆上殿晚開大靜後打催板一轉暇時仍幫殿主作事若帶鼓頭見下第九法器章說打掃每日灑掃上下東西內外路道及前後廊廡丹墀俱要拔草潔淨兼帶天王殿香燈之事以上第十寮竟證義曰根本部律云給孤長者每於晨朝往逝多林掃地禮佛異日長者他緣不遑入寺世尊見地不淨即自掃地特舍利子等悉皆掃地遍掃除已入堂共坐佛告諸苾芻凡掃地有五勝利一因地掃自心清淨二他見地無塵垢令他心淨三諸天歡喜地淨無塵即去憍慢塵也四植端正業調伏心故五因掃寺地功德增長命終之後當生天上禪林寶訓云入寺路徑開闢廊廡修整以此知其為好長老也請兩序執請列執不用此禮凡請序執預日客堂與維那開衆僧名冊及各所宜呈住持閲住持若許即留維那知客另差侍者請悅衆同受執之師進方丈行禮已命坐敘話量才安執取其所宜次日早粥過堂齊堂內念供請執事送位四班首及監院都監副寺住持送位其餘知客送位預先掛牌牌云奉和尚命請某甲師為某某執事云云二板後鳴序板新請序執搭衣持具舊執不搭衣齊到客堂知客即依次宣執單云云宣畢白衆云恭喜諸位師傳普禮一拜舊執先到方丈兩邊站班次知客領新執到方丈前云新請執事展具頂禮和尚三禮畢新執退廊下舊執出位向座排班舊執首衆云頂禮和尚禮畢住持云參堂舊執先至堂兩邊站班知客鳴報板三下云新請執事師參堂行禮乃至禮圓四班首住持送位已住持即退出其餘維那接具依次照執送位一一送畢維那云恭喜諸位師傅一拜拜畢各照本位調單次第而坐是日晚課大殿送蒲團位送寮課畢維那云新請執事師出位行禮禮畢班首秉拂見下云云維那云新請執事師上祖堂禮祖不鳴鐘次上方丈禮畢知客領新執巡寮鳴引磬云新請衆執事師巡寮問訊某某師乃至巡畢各回已客堂鳴序板衆集看單回堂方丈請茶茶畢回堂依位坐香將到止淨前散香坐畢維那云新請執事師出位行十方禮若係班首則行禮時諸序執應下單在本位立獨清衆不隨諸執還禮因此禮蓋為序執而設也禮畢維那復云兩序師傅代諸位師傅看單白已維那同衆執看本堂單東西各一拜禮畢各照本位坐止靜所請執事堂內貼單者進堂行禮若侍寮只記録參堂影堂侍者雖貼單而不參堂又如都監監院知客等俱不參堂凡安列執監院維那知客侍者其四人同送進寮送單已客堂請新執茶飯又四班首名聖執佛世文殊普賢等皆為輔弼故監院知客維那等名賢執佛世一切賢聖皆為故書記侍寮典座等名能執能辦世出世間諸佛事故是等皆須力竭為人推心護衆彼此互益不負所執矣證義曰叢林充執佛法不通難調慧命世法不諳難理常住故要恰當然後為美大凡選執如初到客師不能深知其人可安為兩序閒執日久自見底裏知之無疑方可重託至受執之人唯當勉盡己執不可畏難推諉三寶地果能盡心竭力不愁無好處也托古云雲峯悅禪師初到大愚入室請開示愚令作街坊化主化訖又以雪寒令為衆乞炭師亦順命事罷岩復以堂司缺人今以煩汝師黽勉受之偶坐後架桶箍忽散自架墮落忽開悟頓見岩用處之妙披衣入室岩笑曰維那且喜師再拜不及吐一辭而出噫易三執而桶底脫執豈負汝耶班首秉拂分二一新請受執首座叢林標榜人天眼目坐禪領衆提唱宗風其人難得凡請首執住持預日齊堂表衆云今有某甲大師或某和尚才德兼備衆所推服知見高明慧命所寄佇俟法雨普沾少刻大衆師恭請伏望悲𠃔午後二板鳴寮板衆集客堂恭請請儀見前請畢上方丈禮畢參堂住持送位衆禮畢送寮是晚課時侍者傳秉拂牌牌右上貼紅簽簽上寫云請某首座和尚或稱大師餘執隨改住持命侍寮傳爐紅衣拄杖到首座寮課畢首座搭衣侍者執杖隨後維那云迎請首座師鳴引磬迎至座前首座行禮禮圓登座侍者侍立兩傍維那舉贊首座拈香畢維那云頂禮首座師師云不消即止說法竟維那云頂禮首座師禮畢下座衆送歸寮辭送即止首座上方丈禮住持呈稿已謝侍者一拜方丈待茶記録寫法語牌懸掛次日首座出己資請庫房設煎點供衆若首座淡薄常住代資凡朔望及時節先禮住持次禮首座或新請班首受執秉拂儀同此課畢在大殿設平座香案為異二八節奉命若四時八節請班首秉拂者預日住持命都監知客侍者往某班首寮請明日上午為衆秉拂正日早粥二板後都監等賚牌拂再至彼寮都監敬香與衆作禮已侍者白云方丈和尚慈命令某等謹賚牌拂專此拜請即午為衆秉拂班首即同侍者上方丈禮座受命已復酬禮衆執即回寮使本寮行者掛牌法堂正中設平座又另設一座在左邊上首為方丈位時至鳴鐘三下都監執香同兩序至寮一觸禮迎至法堂班首行十方問訊禮復至方丈位前一觸禮轉身登座都監上香大衆一觸禮班首不酬禮燒香侍者上香若十方名德為班首方丈至秉拂座前問訊秉拂人起身側立仍復座云侍者請和尚趺坐說已就坐悅衆鳴引磬三陳乃至說法畢下座復至方丈位前一觸禮即禮兩序及侍者兩序送班首歸寮辭送即止班首上方丈謝秉拂回寮都監令庫司送茶果一桌至彼寮是日客堂請秉拂班首用客飯一日即晚二板方丈待秉拂茶證義曰首座古稱頭首亦號座元或請名德須稱和尚或是法嗣應呼大師山菴雜録云饒州永福寺浩靈江為首座秉拂僧問進一步時如何答撞墻撞壁問退一步時如何答墮坑落塹問不進不退時如何答立地死漢或曰首座答三轉語盡赴來機好住持古林曰好在什麼處不見道一句合頭語萬劫繫驢橛雖然切不得便恁麼又翔鳳山湛天淵為首座秉拂云翔鳳山前行看白雲乍舒乍捲禺泉亭上坐聽流水或抑或揚眼處作耳處佛事耳處作眼處佛事便見非唯觀世音我亦從中證住持一源曰有便見二字是與別人說話無此二字方是自家說話天淵云還丹一粒點鐵成金堂頭之語也觀此二則秉拂住持與秉拂人點撿贊美互相舉揚毫無諛諂貢高之意是秉拂之芳規也請齊茶凡方丈請齊或請茶堂中首衆預表堂云今日方丈和尚請齊或請茶諸師各具威儀外諸寮執事集至客堂候侍者請會齊堂師照執次序同上方丈排立住持臨座維那云大衆師頂禮和尚禮畢分次序座各具威儀勿得言語杯盤碗箸不得作聲齊畢或茶畢若住持有說聽畢一齊起立出位向上排立維那云大衆師禮謝和尚禮畢各回本處又兩序為內外綱維大衆領袖互相體重綱領振矣凡結制解制冬至除夕元旦等大節住持當請方丈齊及犒勞兩序新舊茶湯點果五色凡退執隔一期者不預一表常住禮一表酬勞也其餘諸小犒勞有功必酬須隨意合宜而已其外單列執犒勞俱在客堂或隨其本寮若果真淡薄有真道心者雖清衆外單亦須另眼犒勞衣物使其一心修行不致起妄念也證義曰方丈請齊請茶事非一端此只言節序普請序執之規也或新安單或新請執或別有事均有齊茶之設大約住持之待衆也慎以擇之誠以推之各執之匡主也忠以襄之和以商之即有意見不同總以理長則就唯冀利益於常住而已兩序辭執凡兩序有辭執者午後先上方丈作禮辭執至晚參堂列執期滿要退到客堂辭執不上方丈亦不參堂堂內清衆告假在維那前先辭維那𠃔午後到方丈及客堂禮辭至晚參堂今多改在晚課畢告假次日起單行清衆一齊客堂茶飯序執方丈茶飯茶飯畢候送至期滿告假還伊進堂香信以作路費證義曰執事辭退須看其人如係可有可無之人不妨聽其辭退如其人為可靠之人不應輕聽蓋人才難得有關常住往往因一人之去就而常住之興衰隨之正不妨委曲攀留當以常住為重也必其人實有不能不辭之勢始聽之
